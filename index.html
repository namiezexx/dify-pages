<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>테트리스 - Tetris Game</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Roboto+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2196F3;
            --secondary: #FF5722;
            --background: #121212;
            --accent: #4CAF50;
            --text: #FFFFFF;
            --board-bg: #000000;
            --grid: #333333;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, var(--background) 0%, #1a1a1a 100%);
            color: var(--text);
            font-family: 'Roboto Mono', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        .game-container {
            display: flex;
            align-items: flex-start;
            gap: 30px;
            padding: 20px;
            max-width: 100vw;
        }

        .game-board {
            border: 3px solid var(--primary);
            background-color: var(--board-bg);
            position: relative;
            box-shadow: 0 0 30px rgba(33, 150, 243, 0.3);
            border-radius: 8px;
        }

        .side-panel {
            width: 200px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .panel-section {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid var(--grid);
            border-radius: 10px;
            padding: 15px;
            backdrop-filter: blur(10px);
        }

        .next-block {
            text-align: center;
        }

        .next-block h3 {
            font-size: 14px;
            margin-bottom: 10px;
            color: var(--accent);
            font-weight: 700;
        }

        .score-item {
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .score-label {
            color: #CCCCCC;
            font-size: 12px;
            font-weight: 300;
        }

        .score-value {
            color: var(--accent);
            font-weight: 500;
            font-size: 14px;
        }

        .controls {
            font-size: 11px;
            line-height: 1.5;
        }

        .controls h4 {
            color: var(--primary);
            margin-bottom: 8px;
            font-size: 12px;
        }

        .controls div {
            margin-bottom: 4px;
            color: #999;
        }

        .game-over {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        .game-over-content {
            background: var(--background);
            border: 2px solid var(--secondary);
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .game-over h2 {
            font-family: 'Orbitron', monospace;
            font-size: 28px;
            color: var(--secondary);
            margin-bottom: 20px;
            text-shadow: 0 0 10px var(--secondary);
        }

        .final-score-display {
            font-size: 18px;
            margin-bottom: 25px;
            color: var(--accent);
        }

        .restart-btn {
            background: linear-gradient(135deg, var(--primary), #1976D2);
            color: var(--text);
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            margin-top: 10px;
            font-family: 'Roboto Mono', monospace;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(33, 150, 243, 0.3);
        }

        .restart-btn:hover {
            background: linear-gradient(135deg, #1976D2, var(--primary));
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(33, 150, 243, 0.4);
        }

        .restart-btn:active {
            transform: translateY(0);
        }

        .title {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Orbitron', monospace;
            font-size: 48px;
            font-weight: 900;
            color: var(--primary);
            text-shadow: 0 0 20px rgba(33, 150, 243, 0.5);
            z-index: 10;
        }

        .pause-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            justify-content: center;
            align-items: center;
            border-radius: 8px;
        }

        .pause-text {
            font-family: 'Orbitron', monospace;
            font-size: 24px;
            color: var(--text);
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        /* 모바일 대응 */
        @media (max-width: 768px) {
            .title {
                font-size: 32px;
                top: 10px;
            }
            
            .game-container {
                flex-direction: column;
                align-items: center;
                gap: 20px;
                padding: 10px;
            }
            
            .side-panel {
                width: 100%;
                max-width: 300px;
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: space-between;
            }
            
            .panel-section {
                flex: 1;
                min-width: 120px;
                margin: 5px;
            }
            
            #gameCanvas {
                width: 250px;
                height: 500px;
            }
        }

        @media (max-width: 480px) {
            .title {
                font-size: 24px;
            }
            
            #gameCanvas {
                width: 200px;
                height: 400px;
            }
            
            .side-panel {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="title">TETRIS</div>
    
    <div class="game-container">
        <div class="game-board">
            <canvas id="gameCanvas" width="300" height="600"></canvas>
            <div class="pause-overlay" id="pauseOverlay">
                <div class="pause-text">PAUSED</div>
            </div>
        </div>
        
        <div class="side-panel">
            <div class="panel-section next-block">
                <h3>NEXT</h3>
                <canvas id="nextCanvas" width="100" height="100"></canvas>
            </div>
            
            <div class="panel-section score-panel">
                <div class="score-item">
                    <span class="score-label">SCORE</span>
                    <span class="score-value" id="score">0</span>
                </div>
                <div class="score-item">
                    <span class="score-label">LEVEL</span>
                    <span class="score-value" id="level">1</span>
                </div>
                <div class="score-item">
                    <span class="score-label">LINES</span>
                    <span class="score-value" id="lines">0</span>
                </div>
                <button class="restart-btn" onclick="game.restart()">RESTART</button>
            </div>
            
            <div class="panel-section controls">
                <h4>조작법</h4>
                <div>← → : 좌우 이동</div>
                <div>↑ : 회전</div>
                <div>↓ : 빠른 낙하</div>
                <div>Space : 즉시 낙하</div>
                <div>P : 일시정지</div>
            </div>
        </div>
    </div>

    <div class="game-over" id="gameOver">
        <div class="game-over-content">
            <h2>GAME OVER</h2>
            <div class="final-score-display">최종 점수: <span id="finalScore">0</span></div>
            <button class="restart-btn" onclick="game.restart()">다시 시작</button>
        </div>
    </div>

    <script>
        class TetrisGame {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.nextCanvas = document.getElementById('nextCanvas');
                this.nextCtx = this.nextCanvas.getContext('2d');
                
                this.BOARD_WIDTH = 10;
                this.BOARD_HEIGHT = 20;
                this.BLOCK_SIZE = 30;
                
                this.gameState = 'playing';
                this.board = [];
                this.currentPiece = null;
                this.nextPiece = null;
                this.score = 0;
                this.level = 1;
                this.lines = 0;
                this.dropTimer = 0;
                this.dropInterval = 1000;
                this.lastTime = 0;
                
                this.pieces = {
                    I: { shape: [[1, 1, 1, 1]], color: '#00FFFF' },
                    O: { shape: [[1, 1], [1, 1]], color: '#FFFF00' },
                    T: { shape: [[0, 1, 0], [1, 1, 1]], color: '#800080' },
                    S: { shape: [[0, 1, 1], [1, 1, 0]], color: '#00FF00' },
                    Z: { shape: [[1, 1, 0], [0, 1, 1]], color: '#FF0000' },
                    J: { shape: [[1, 0, 0], [1, 1, 1]], color: '#0000FF' },
                    L: { shape: [[0, 0, 1], [1, 1, 1]], color: '#FFA500' }
                };
                
                this.init();
            }
            
            init() {
                this.board = Array(this.BOARD_HEIGHT).fill().map(() => Array(this.BOARD_WIDTH).fill(0));
                this.nextPiece = this.createRandomPiece();
                this.spawnNewPiece();
                this.setupEventListeners();
                this.gameLoop();
            }
            
            setupEventListeners() {
                // 키보드 이벤트
                document.addEventListener('keydown', (e) => {
                    this.handleKeyPress(e);
                });
                
                // 터치 이벤트 (모바일 지원)
                let touchStartX = 0;
                let touchStartY = 0;
                let touchStartTime = 0;
                
                this.canvas.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    const touch = e.touches[0];
                    touchStartX = touch.clientX;
                    touchStartY = touch.clientY;
                    touchStartTime = Date.now();
                }, { passive: false });
                
                this.canvas.addEventListener('touchend', (e) => {
                    e.preventDefault();
                    if (this.gameState !== 'playing') return;
                    
                    const touch = e.changedTouches[0];
                    const deltaX = touch.clientX - touchStartX;
                    const deltaY = touch.clientY - touchStartY;
                    const deltaTime = Date.now() - touchStartTime;
                    
                    if (deltaTime < 200) { // 빠른 탭
                        this.rotatePiece();
                    } else if (Math.abs(deltaX) > Math.abs(deltaY)) {
                        if (deltaX > 30) this.movePiece(1, 0);
                        else if (deltaX < -30) this.movePiece(-1, 0);
                    } else {
                        if (deltaY > 30) this.movePiece(0, 1);
                        else if (deltaY < -30) this.hardDrop();
                    }
                }, { passive: false });
            }
            
            handleKeyPress(e) {
                if (this.gameState === 'gameover') return;
                
                switch(e.key.toLowerCase()) {
                    case 'arrowleft':
                        if (this.gameState === 'playing') this.movePiece(-1, 0);
                        break;
                    case 'arrowright':
                        if (this.gameState === 'playing') this.movePiece(1, 0);
                        break;
                    case 'arrowdown':
                        if (this.gameState === 'playing') this.movePiece(0, 1);
                        break;
                    case 'arrowup':
                        if (this.gameState === 'playing') this.rotatePiece();
                        break;
                    case ' ':
                        if (this.gameState === 'playing') this.hardDrop();
                        break;
                    case 'p':
                        this.togglePause();
                        break;
                }
                e.preventDefault();
            }
            
            createRandomPiece() {
                const pieceTypes = Object.keys(this.pieces);
                const randomType = pieceTypes[Math.floor(Math.random() * pieceTypes.length)];
                const piece = this.pieces[randomType];
                
                return {
                    type: randomType,
                    shape: piece.shape.map(row => [...row]),
                    color: piece.color,
                    x: Math.floor(this.BOARD_WIDTH / 2) - Math.floor(piece.shape[0].length / 2),
                    y: 0
                };
            }
            
            spawnNewPiece() {
                this.currentPiece = this.nextPiece;
                this.nextPiece = this.createRandomPiece();
                
                if (this.checkCollision(this.currentPiece, 0, 0)) {
                    this.gameOver();
                }
            }
            
            movePiece(deltaX, deltaY) {
                if (this.checkCollision(this.currentPiece, deltaX, deltaY)) {
                    if (deltaY > 0) {
                        this.placePiece();
                    }
                    return false;
                }
                
                this.currentPiece.x += deltaX;
                this.currentPiece.y += deltaY;
                return true;
            }
            
            rotatePiece() {
                const rotated = this.rotateMatrix(this.currentPiece.shape);
                const originalShape = this.currentPiece.shape;
                
                this.currentPiece.shape = rotated;
                
                if (this.checkCollision(this.currentPiece, 0, 0)) {
                    let canRotate = false;
                    for (let offset = 1; offset <= 2; offset++) {
                        if (!this.checkCollision(this.currentPiece, -offset, 0)) {
                            this.currentPiece.x -= offset;
                            canRotate = true;
                            break;
                        } else if (!this.checkCollision(this.currentPiece, offset, 0)) {
                            this.currentPiece.x += offset;
                            canRotate = true;
                            break;
                        }
                    }
                    
                    if (!canRotate) {
                        this.currentPiece.shape = originalShape;
                    }
                }
            }
            
            rotateMatrix(matrix) {
                const rows = matrix.length;
                const cols = matrix[0].length;
                const rotated = Array(cols).fill().map(() => Array(rows).fill(0));
                
                for (let i = 0; i < rows; i++) {
                    for (let j = 0; j < cols; j++) {
                        rotated[j][rows - 1 - i] = matrix[i][j];
                    }
                }
                
                return rotated;
            }
            
            hardDrop() {
                let dropDistance = 0;
                while (!this.checkCollision(this.currentPiece, 0, 1)) {
                    this.currentPiece.y++;
                    dropDistance++;
                }
                this.score += dropDistance * 2;
                this.placePiece();
            }
            
            checkCollision(piece, deltaX, deltaY) {
                const newX = piece.x + deltaX;
                const newY = piece.y + deltaY;
                
                for (let y = 0; y < piece.shape.length; y++) {
                    for (let x = 0; x < piece.shape[y].length; x++) {
                        if (piece.shape[y][x]) {
                            const boardX = newX + x;
                            const boardY = newY + y;
                            
                            if (boardX < 0 || boardX >= this.BOARD_WIDTH || boardY >= this.BOARD_HEIGHT) {
                                return true;
                            }
                            
                            if (boardY >= 0 && this.board[boardY][boardX]) {
                                return true;
                            }
                        }
                    }
                }
                
                return false;
            }
            
            placePiece() {
                for (let y = 0; y < this.currentPiece.shape.length; y++) {
                    for (let x = 0; x < this.currentPiece.shape[y].length; x++) {
                        if (this.currentPiece.shape[y][x]) {
                            const boardX = this.currentPiece.x + x;
                            const boardY = this.currentPiece.y + y;
                            
                            if (boardY >= 0) {
                                this.board[boardY][boardX] = this.currentPiece.color;
                            }
                        }
                    }
                }
                
                this.clearLines();
                this.spawnNewPiece();
            }
            
            clearLines() {
                let linesCleared = 0;
                
                for (let y = this.BOARD_HEIGHT - 1; y >= 0; y--) {
                    if (this.board[y].every(cell => cell !== 0)) {
                        this.board.splice(y, 1);
                        this.board.unshift(Array(this.BOARD_WIDTH).fill(0));
                        linesCleared++;
                        y++;
                    }
                }
                
                if (linesCleared > 0) {
                    const baseScore = [0, 100, 300, 500, 800][linesCleared];
                    this.score += baseScore * this.level;
                    this.lines += linesCleared;
                    
                    const newLevel = Math.floor(this.lines / 10) + 1;
                    if (newLevel > this.level) {
                        this.level = newLevel;
                        this.dropInterval = Math.max(50, 1000 - (this.level - 1) * 100);
                    }
                    
                    this.updateUI();
                }
            }
            
            calculateGhostPiece() {
                if (!this.currentPiece) return null;
                
                const ghostPiece = {
                    ...this.currentPiece,
                    shape: this.currentPiece.shape.map(row => [...row])
                };
                
                while (!this.checkCollision(ghostPiece, 0, 1)) {
                    ghostPiece.y++;
                }
                
                return ghostPiece;
            }
            
            togglePause() {
                if (this.gameState === 'playing') {
                    this.gameState = 'paused';
                    document.getElementById('pauseOverlay').style.display = 'flex';
                } else if (this.gameState === 'paused') {
                    this.gameState = 'playing';
                    document.getElementById('pauseOverlay').style.display = 'none';
                }
            }
            
            gameOver() {
                this.gameState = 'gameover';
                document.getElementById('finalScore').textContent = this.score.toLocaleString();
                document.getElementById('gameOver').style.display = 'flex';
            }
            
            restart() {
                this.gameState = 'playing';
                this.score = 0;
                this.level = 1;
                this.lines = 0;
                this.dropTimer = 0;
                this.dropInterval = 1000;
                
                document.getElementById('gameOver').style.display = 'none';
                document.getElementById('pauseOverlay').style.display = 'none';
                
                this.updateUI();
                this.init();
            }
            
            updateUI() {
                document.getElementById('score').textContent = this.score.toLocaleString();
                document.getElementById('level').textContent = this.level;
                document.getElementById('lines').textContent = this.lines;
            }
            
            gameLoop(currentTime = 0) {
                const deltaTime = currentTime - this.lastTime;
                this.lastTime = currentTime;
                
                if (this.gameState === 'playing') {
                    this.dropTimer += deltaTime;
                    if (this.dropTimer >= this.dropInterval) {
                        this.movePiece(0, 1);
                        this.dropTimer = 0;
                    }
                }
                
                this.render();
                requestAnimationFrame((time) => this.gameLoop(time));
            }
            
            render() {
                // 메인 캔버스 클리어
                this.ctx.fillStyle = '#000000';
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                
                this.drawGrid();
                this.renderBoard();
                
                if (this.currentPiece && this.gameState === 'playing') {
                    const ghostPiece = this.calculateGhostPiece();
                    if (ghostPiece && ghostPiece.y !== this.currentPiece.y) {
                        this.renderPiece(ghostPiece, 0.3);
                    }
                    this.renderPiece(this.currentPiece, 1.0);
                }
                
                this.renderNextPiece();
            }
            
            drawGrid() {
                this.ctx.strokeStyle = '#333333';
                this.ctx.lineWidth = 0.5;
                
                for (let x = 0; x <= this.BOARD_WIDTH; x++) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(x * this.BLOCK_SIZE, 0);
                    this.ctx.lineTo(x * this.BLOCK_SIZE, this.canvas.height);
                    this.ctx.stroke();
                }
                
                for (let y = 0; y <= this.BOARD_HEIGHT; y++) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(0, y * this.BLOCK_SIZE);
                    this.ctx.lineTo(this.canvas.width, y * this.BLOCK_SIZE);
                    this.ctx.stroke();
                }
            }
            
            renderBoard() {
                for (let y = 0; y < this.BOARD_HEIGHT; y++) {
                    for (let x = 0; x < this.BOARD_WIDTH; x++) {
                        if (this.board[y][x]) {
                            this.ctx.fillStyle = this.board[y][x];
                            this.ctx.fillRect(
                                x * this.BLOCK_SIZE + 1,
                                y * this.BLOCK_SIZE + 1,
                                this.BLOCK_SIZE - 2,
                                this.BLOCK_SIZE - 2
                            );
                            
                            // 블록 테두리
                            this.ctx.strokeStyle = '#FFFFFF';
                            this.ctx.lineWidth = 1;
                            this.ctx.strokeRect(
                                x * this.BLOCK_SIZE + 1,
                                y * this.BLOCK_SIZE + 1,
                                this.BLOCK_SIZE - 2,
                                this.BLOCK_SIZE - 2
                            );
                        }
                    }
                }
            }
            
            renderPiece(piece, opacity = 1.0) {
                const alpha = Math.round(opacity * 255).toString(16).padStart(2, '0');
                this.ctx.fillStyle = piece.color + alpha;
                
                for (let y = 0; y < piece.shape.length; y++) {
                    for (let x = 0; x < piece.shape[y].length; x++) {
                        if (piece.shape[y][x]) {
                            const drawX = (piece.x + x) * this.BLOCK_SIZE;
                            const drawY = (piece.y + y) * this.BLOCK_SIZE;
                            
                            if (drawY >= 0) {
                                this.ctx.fillRect(
                                    drawX + 1,
                                    drawY + 1,
                                    this.BLOCK_SIZE - 2,
                                    this.BLOCK_SIZE - 2
                                );
                                
                                if (opacity === 1.0) {
                                    this.ctx.strokeStyle = '#FFFFFF';
                                    this.ctx.lineWidth = 1;
                                    this.ctx.strokeRect(
                                        drawX + 1,
                                        drawY + 1,
                                        this.BLOCK_SIZE - 2,
                                        this.BLOCK_SIZE - 2
                                    );
                                }
                            }
                        }
                    }
                }
            }
            
            renderNextPiece() {
                this.nextCtx.fillStyle = '#000000';
                this.nextCtx.fillRect(0, 0, this.nextCanvas.width, this.nextCanvas.height);
                
                if (this.nextPiece) {
                    const blockSize = 20;
                    const offsetX = (this.nextCanvas.width - this.nextPiece.shape[0].length * blockSize) / 2;
                    const offsetY = (this.nextCanvas.height - this.nextPiece.shape.length * blockSize) / 2;
                    
                    this.nextCtx.fillStyle = this.nextPiece.color;
                    
                    for (let y = 0; y < this.nextPiece.shape.length; y++) {
                        for (let x = 0; x < this.nextPiece.shape[y].length; x++) {
                            if (this.nextPiece.shape[y][x]) {
                                this.nextCtx.fillRect(
                                    offsetX + x * blockSize + 1,
                                    offsetY + y * blockSize + 1,
                                    blockSize - 2,
                                    blockSize - 2
                                );
                            }
                        }
                    }
                }
            }
        }
        
        let game;
        
        document.addEventListener('DOMContentLoaded', () => {
            game = new TetrisGame();
        });
    </script>
</body>
</html>
