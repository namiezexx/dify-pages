<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>엘리멘탈 가디언 - Elemental Guardian</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #2E8B57;
      --secondary: #DC143C;
      --bg-color: #1C1C1C;
      --accent: #FFD700;
      --tile-border: #2F2F2F;
      --path-tile: #8B4513;
      --placement-tile: #1F3F1F;
      --hud-bg: rgba(0,0,0,0.7);
      --ui-text: #FFFFFF;
      --muted: #BDBDBD;
      --viewport-width: 1200px;
      --viewport-height: 800px;
      --map-width: 800px;
      --map-height: 600px;
      --sidebar-width: 200px;
      --hud-height: 100px;
      --radius: 10px;
      --transition-fast: 180ms;
      --transition-med: 300ms;
      --shadow: 0 6px 18px rgba(0,0,0,0.6);
      --gold-glow: 0 0 10px rgba(255,215,0,0.45);
      font-size: 16px;
    }
    
    html,body {
      height:100%; margin:0; padding:0; background:var(--bg-color);
      color:var(--ui-text); font-family: "Roboto Mono", monospace;
      -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale;
    }
    
    header#hud {
      height: var(--hud-height); width: 100%; box-sizing: border-box;
      padding: 14px 24px; position: fixed; top: 0; left: 0;
      display: flex; align-items: center; justify-content: center;
      background: var(--hud-bg); z-index: 40; backdrop-filter: blur(4px);
      border-bottom: 1px solid rgba(255,255,255,0.03);
      font-family: "Orbitron", sans-serif;
    }
    
    .hud-inner {
      width: min(var(--viewport-width), 98%);
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
    }
    
    .hud-item {
      color: var(--ui-text); display:flex; align-items:center; gap:10px;
    }
    
    .hud-icon { font-size:1.4rem; }
    .hud-value { font-size:1.25rem; font-weight:700; color:var(--accent); }
    
    #game-area {
      width: min(var(--viewport-width), 98%); max-width: var(--viewport-width);
      margin: calc(var(--hud-height) + 16px) auto 24px;
      display: flex; gap: 16px; align-items: flex-start; justify-content: center;
      padding: 0 12px; box-sizing: border-box;
    }
    
    #map-area {
      width: var(--map-width); height: var(--map-height); position: relative;
      background: var(--bg-color); border-radius: 8px; box-shadow: var(--shadow);
      overflow: hidden; flex: 0 0 var(--map-width);
      display: flex; align-items: center; justify-content: center;
    }
    
    #game-canvas {
      display:block; width:100%; height:100%;
      background:linear-gradient(#1C1C1C,#191919); image-rendering: optimizeSpeed;
    }
    
    #grid-overlay {
      pointer-events:none; position:absolute; inset:0;
      background-image:
        linear-gradient(to right, rgba(47,47,47,0.8) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(47,47,47,0.8) 1px, transparent 1px);
      background-size: 32px 32px; opacity: 0.65; mix-blend-mode: overlay;
    }
    
    #range-overlay {
      position:absolute; left:0; top:0; width:0; height:0; border-radius:50%;
      background: rgba(46,139,87,0.25); pointer-events:none;
      transform: translate(-50%,-50%);
      transition: width 150ms ease, height 150ms ease, opacity 120ms ease;
      box-shadow: 0 0 0 2px rgba(46,139,87,0.12) inset; z-index:20;
    }
    
    #projectile-layer {
      position:absolute; inset:0; pointer-events:none; z-index:25;
    }
    
    .projectile {
      position:absolute; width:4px; height:4px; border-radius:50%;
      background: var(--accent);
      filter: drop-shadow(0 0 6px rgba(255,215,0,0.6));
      transform: translate(-50%,-50%); will-change: transform, opacity;
    }
    
    #sidebar {
      width: var(--sidebar-width); height: var(--map-height);
      background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      border-radius: 8px; box-shadow: var(--shadow); padding: 18px; box-sizing: border-box;
      display:flex; flex-direction:column; gap:12px; z-index:30;
      flex: 0 0 var(--sidebar-width);
    }
    
    .sidebar-title {
      margin:0; font-family: "Orbitron", sans-serif; color:var(--ui-text); font-size:1.05rem;
    }
    
    .tower-list {
      display:flex; flex-direction:column; gap:10px; margin-top:8px;
    }
    
    .tower-btn {
      display:flex; gap:12px; align-items:center; padding:10px; border-radius:8px;
      background: rgba(255,255,255,0.02); border:1px solid rgba(255,255,255,0.03);
      color:var(--ui-text); cursor:pointer;
      transition: filter var(--transition-fast), transform var(--transition-fast);
      outline: none;
    }
    
    .tower-btn:hover {
      filter:brightness(1.2); transform:translateY(-2px);
    }
    
    .tower-btn[aria-pressed="true"] {
      box-shadow: var(--gold-glow); border-color: var(--accent);
    }
    
    .tower-btn.selected {
      box-shadow: var(--gold-glow); border-color: var(--accent);
    }
    
    .tower-preview {
      width:44px; height:44px; border-radius:6px;
      display:inline-flex; align-items:center; justify-content:center; flex:0 0 44px;
    }
    
    .tower-basic-preview {
      background: var(--placement-tile);
      box-shadow: inset 0 0 0 2px #0b2b0b, 0 3px 8px rgba(0,0,0,0.6);
      position:relative;
    }
    
    .tower-basic-preview::after {
      content:""; width:14px; height:14px; background:var(--primary); display:block;
      border-radius:2px; box-shadow: 0 0 0 3px rgba(0,0,0,0.6) inset;
    }
    
    .tower-aoe-preview {
      background: var(--placement-tile); position:relative;
    }
    
    .tower-aoe-preview::after {
      content:""; width:0; height:0; border-left:10px solid transparent;
      border-right:10px solid transparent; border-bottom:16px solid #2a7fbf;
      display:block; transform: translateY(-2px);
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.6));
    }
    
    .tower-meta {
      display:flex; flex-direction:column; align-items:flex-start; gap:4px;
    }
    
    .tower-name { font-weight:700; color:var(--ui-text); }
    .tower-cost { color:var(--muted); font-size:0.85rem; }
    .sidebar-footer { margin-top:auto; color:var(--muted); font-size:0.78rem; }
    
    #wave-btn {
      position: fixed; right: 34px; bottom: 28px; width:200px; height:50px;
      background: linear-gradient(180deg, var(--primary), #2a7a4e);
      color:#081008; font-weight:700; border-radius:14px; border: none;
      cursor:pointer; box-shadow: 0 8px 24px rgba(46,139,87,0.25); z-index:60;
      transition: transform var(--transition-fast), filter var(--transition-fast), box-shadow var(--transition-fast);
      display:flex; align-items:center; justify-content:center;
      font-family:"Orbitron",sans-serif;
    }
    
    #wave-btn:hover {
      filter:brightness(1.2); transform:translateY(-3px);
    }
    
    #game-modal {
      position: fixed; inset:0; display:flex; align-items:center; justify-content:center;
      background: rgba(8,8,8,0.5); z-index:100; opacity:0; pointer-events:none;
      transition: opacity var(--transition-med) ease;
    }
    
    #game-modal[aria-hidden="false"] {
      opacity:1; pointer-events:auto;
    }
    
    .modal-card {
      width: min(520px, 92%);
      background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      border-radius:12px; padding:22px; box-shadow: var(--shadow); text-align:center;
      border: 1px solid rgba(255,255,255,0.04);
    }
    
    .modal-card h3 {
      margin:0 0 8px 0; font-family:"Orbitron",sans-serif; color:var(--accent);
    }
    
    .modal-card p {
      margin:0 0 16px 0; color:var(--muted);
    }
    
    .modal-actions {
      display:flex; gap:10px; justify-content:center;
    }
    
    .btn-primary {
      background:var(--accent); border:none; padding:10px 14px; border-radius:8px;
      cursor:pointer; font-weight:700; color: #000;
    }
    
    .btn-ghost {
      background:transparent; border:1px solid rgba(255,255,255,0.06);
      padding:10px 12px; border-radius:8px; color:var(--ui-text); cursor:pointer;
    }
    
    .sr-only {
      position:absolute; width:1px; height:1px; padding:0; margin:-1px;
      overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; border:0;
    }
    
    .muted { color: var(--muted); }
    .accent { color: var(--accent); font-weight:700; }
    
    @media (max-width: 1280px) {
      :root { --viewport-width: calc(100vw - 24px); }
      #game-area { margin-top: calc(var(--hud-height) + 8px); }
      #wave-btn { right: 18px; bottom: 18px; }
    }
    
    @media (max-width: 920px) {
      #game-area { flex-direction:column; align-items:center; gap:12px; margin-bottom:80px; }
      #map-area, #sidebar { width: calc(100vw - 48px); max-width: 920px; flex: 1 1 auto; }
      #sidebar { height: auto; padding-bottom: 18px; }
      #wave-btn { right: 12px; bottom: 12px; width:160px; height:44px; }
    }
  </style>
</head>
<body>
  <header id="hud" role="region" aria-label="Game HUD">
    <div class="hud-inner">
      <div class="hud-item hud-left" id="hud-gold" title="Gold">
        <span class="hud-icon">💰</span>
        <span id="gold-amount" class="hud-value">100</span>
      </div>
      <div class="hud-item hud-center" id="hud-life" title="Life">
        <span class="hud-icon">❤️</span>
        <span id="life-amount" class="hud-value">20</span>
      </div>
      <div class="hud-item hud-right" id="hud-wave" title="Wave">
        <span class="hud-icon">⚔️</span>
        <span id="wave-amount" class="hud-value">0 / 10</span>
      </div>
    </div>
  </header>

  <main id="game-area">
    <section id="map-area" aria-label="Game Map">
      <canvas id="game-canvas" width="800" height="600" tabindex="0" aria-label="Game canvas">
        브라우저가 Canvas를 지원하지 않습니다.
      </canvas>
      <div id="grid-overlay" aria-hidden="true"></div>
      <div id="range-overlay" aria-hidden="true"></div>
      <div id="projectile-layer" aria-hidden="true"></div>
    </section>

    <aside id="sidebar" aria-label="Tower Selection">
      <h2 class="sidebar-title">타워 선택</h2>
      <div class="tower-list">
        <button class="tower-btn" id="tower-basic" data-tower-type="basic" aria-pressed="false" title="기본 타워">
          <span class="tower-preview tower-basic-preview" aria-hidden="true"></span>
          <span class="tower-meta">
            <span class="tower-name">기본 타워</span>
            <span class="tower-cost">25 <span class="accent">💰</span></span>
          </span>
        </button>
        <button class="tower-btn" id="tower-aoe" data-tower-type="aoe" aria-pressed="false" title="광역 타워">
          <span class="tower-preview tower-aoe-preview" aria-hidden="true"></span>
          <span class="tower-meta">
            <span class="tower-name">광역 타워</span>
            <span class="tower-cost">50 <span class="accent">💰</span></span>
          </span>
        </button>
      </div>
      <div class="sidebar-footer">
        <small class="muted">팁: 타워를 선택한 후 맵 타일을 클릭하여 배치하세요.</small>
      </div>
    </aside>
  </main>

  <button id="wave-btn" aria-label="Start Next Wave">다음 웨이브 ▶</button>

  <div id="game-modal" role="dialog" aria-modal="true" aria-hidden="true">
    <div class="modal-card">
      <h3 id="modal-title">엘리멘탈 가디언</h3>
      <p id="modal-message">준비되면 웨이브를 시작하세요.</p>
      <div class="modal-actions">
        <button id="modal-start" class="btn-primary">시작</button>
        <button id="modal-close" class="btn-ghost">닫기</button>
      </div>
    </div>
  </div>

  <div id="sr-live" aria-live="polite" aria-atomic="true" class="sr-only"></div>

  <script>
    class ElementalGuardian {
        constructor() {
            this.canvas = document.getElementById('game-canvas');
            this.ctx = this.canvas.getContext('2d');
            
            // 게임 상태
            this.gameState = 'WAITING';
            this.animationId = null;
            
            // 게임 데이터
            this.gold = 100;
            this.life = 20;
            this.score = 0;
            this.currentWave = 0;
            this.totalWaves = 10;
            
            // 게임 객체들
            this.grid = new Grid(20, 15, 40);
            this.towers = [];
            this.enemies = [];
            this.projectiles = [];
            this.waveManager = new WaveManager();
            
            // 선택된 타워 타입
            this.selectedTowerType = null;
            this.hoveredTile = null;
            
            // 마지막 업데이트 시간
            this.lastTime = 0;
            
            this.init();
        }
        
        init() {
            this.setupEventListeners();
            this.updateUI();
            this.gameLoop(0);
        }
        
        setupEventListeners() {
            // 마우스 이벤트
            this.canvas.addEventListener('click', (e) => this.handleClick(e));
            this.canvas.addEventListener('mousemove', (e) => this.handleMouseMove(e));
            
            // 키보드 이벤트
            document.addEventListener('keydown', (e) => this.handleKeyDown(e));
            
            // UI 버튼 이벤트
            document.getElementById('tower-basic').addEventListener('click', () => {
                this.selectedTowerType = 'basic';
                this.updateTowerButtons();
            });
            
            document.getElementById('tower-aoe').addEventListener('click', () => {
                this.selectedTowerType = 'aoe';
                this.updateTowerButtons();
            });
            
            document.getElementById('wave-btn').addEventListener('click', () => {
                this.startNextWave();
            });
            
            // 모달 이벤트
            document.getElementById('modal-start').addEventListener('click', () => {
                document.getElementById('game-modal').setAttribute('aria-hidden', 'true');
                document.body.classList.add('playing');
            });
            
            document.getElementById('modal-close').addEventListener('click', () => {
                document.getElementById('game-modal').setAttribute('aria-hidden', 'true');
            });
        }
        
        handleClick(event) {
            if (this.gameState !== 'WAITING' && this.gameState !== 'PLAYING') return;
            
            const rect = this.canvas.getBoundingClientRect();
            const x = event.clientX - rect.left;
            const y = event.clientY - rect.top;
            
            const gridPos = this.grid.screenToGrid(x, y);
            if (!gridPos) return;
            
            // 타워 배치
            if (this.selectedTowerType && this.canPlaceTower(gridPos.x, gridPos.y)) {
                this.placeTower(gridPos.x, gridPos.y, this.selectedTowerType);
            }
        }
        
        handleMouseMove(event) {
            const rect = this.canvas.getBoundingClientRect();
            const x = event.clientX - rect.left;
            const y = event.clientY - rect.top;
            
            this.hoveredTile = this.grid.screenToGrid(x, y);
        }
        
        handleKeyDown(event) {
            switch(event.code) {
                case 'Space':
                    event.preventDefault();
                    this.togglePause();
                    break;
                case 'Escape':
                    this.selectedTowerType = null;
                    this.updateTowerButtons();
                    break;
            }
        }
        
        canPlaceTower(x, y) {
            if (!this.grid.isValidPosition(x, y)) return false;
            if (this.grid.getTile(x, y).type !== 'buildable') return false;
            if (this.getTowerAt(x, y)) return false;
            
            const towerCost = this.selectedTowerType === 'basic' ? 25 : 50;
            return this.gold >= towerCost;
        }
        
        placeTower(x, y, type) {
            const towerCost = type === 'basic' ? 25 : 50;
            if (this.gold < towerCost) return;
            
            const tower = new Tower(x, y, type);
            this.towers.push(tower);
            this.gold -= towerCost;
            this.updateUI();
        }
        
        getTowerAt(x, y) {
            return this.towers.find(tower => tower.x === x && tower.y === y);
        }
        
        startNextWave() {
            if (this.gameState !== 'WAITING') return;
            if (this.currentWave >= this.totalWaves) return;
            
            this.currentWave++;
            this.gameState = 'PLAYING';
            this.waveManager.startWave(this.currentWave);
            this.updateUI();
            
            document.getElementById('wave-btn').style.display = 'none';
        }
        
        togglePause() {
            if (this.gameState === 'PLAYING') {
                this.gameState = 'PAUSED';
            } else if (this.gameState === 'PAUSED') {
                this.gameState = 'PLAYING';
            }
            this.updateUI();
        }
        
        gameLoop(currentTime) {
            const deltaTime = currentTime - this.lastTime;
            this.lastTime = currentTime;
            
            if (this.gameState === 'PLAYING') {
                this.update(deltaTime);
            }
            
            this.render();
            this.animationId = requestAnimationFrame((time) => this.gameLoop(time));
        }
        
        update(deltaTime) {
            // 웨이브 관리 업데이트
            this.waveManager.update(deltaTime);
            
            // 적 스폰
            const newEnemies = this.waveManager.getSpawnedEnemies();
            this.enemies.push(...newEnemies);
            
            // 적 업데이트
            this.updateEnemies(deltaTime);
            
            // 타워 업데이트
            this.updateTowers(deltaTime);
            
            // 투사체 업데이트
            this.updateProjectiles(deltaTime);
            
            // 게임 상태 체크
            this.checkGameState();
        }
        
        updateEnemies(deltaTime) {
            for (let i = this.enemies.length - 1; i >= 0; i--) {
                const enemy = this.enemies[i];
                enemy.update(deltaTime);
                
                // 적이 목표에 도달했는지 확인
                if (enemy.reachedEnd) {
                    this.life--;
                    this.enemies.splice(i, 1);
                }
                // 적이 죽었는지 확인
                else if (enemy.hp <= 0) {
                    this.gold += enemy.reward;
                    this.score += enemy.reward * 10;
                    this.enemies.splice(i, 1);
                }
            }
            this.updateUI();
        }
        
        updateTowers(deltaTime) {
            this.towers.forEach(tower => {
                tower.update(deltaTime);
                
                // 타겟 찾기
                if (tower.canFire()) {
                    const target = this.findTarget(tower);
                    if (target) {
                        const projectile = tower.fire(target);
                        if (projectile) {
                            this.projectiles.push(projectile);
                        }
                    }
                }
            });
        }
        
        findTarget(tower) {
            let closestEnemy = null;
            let closestDistance = Infinity;
            
            this.enemies.forEach(enemy => {
                const distance = tower.getDistanceTo(enemy);
                if (distance <= tower.range && enemy.pathProgress > (closestEnemy?.pathProgress || -1)) {
                    closestEnemy = enemy;
                    closestDistance = distance;
                }
            });
            
            return closestEnemy;
        }
        
        updateProjectiles(deltaTime) {
            for (let i = this.projectiles.length - 1; i >= 0; i--) {
                const projectile = this.projectiles[i];
                projectile.update(deltaTime);
                
                if (projectile.hasHit || projectile.shouldRemove) {
                    if (projectile.hasHit) {
                        this.handleProjectileHit(projectile);
                    }
                    this.projectiles.splice(i, 1);
                }
            }
        }
        
        handleProjectileHit(projectile) {
            if (projectile.tower.type === 'aoe') {
                // 광역 공격
                this.enemies.forEach(enemy => {
                    const distance = Math.sqrt(
                        Math.pow(enemy.x - projectile.x, 2) + 
                        Math.pow(enemy.y - projectile.y, 2)
                    );
                    if (distance <= 60) {
                        enemy.takeDamage(projectile.damage * (distance <= 30 ? 1 : 0.5));
                    }
                });
            } else {
                // 단일 공격
                if (projectile.target && projectile.target.hp > 0) {
                    projectile.target.takeDamage(projectile.damage);
                }
            }
        }
        
        checkGameState() {
            // 패배 조건 체크
            if (this.life <= 0) {
                this.gameState = 'GAME_OVER';
                this.showModal('게임 오버', `최종 점수: ${this.score}`);
                return;
            }
            
            // 승리 조건 체크
            if (this.currentWave >= this.totalWaves && 
                this.enemies.length === 0 && 
                this.waveManager.isWaveComplete()) {
                this.gameState = 'VICTORY';
                this.score += this.life * 100;
                this.showModal('승리!', `최종 점수: ${this.score}`);
                return;
            }
            
            // 웨이브 완료 체크
            if (this.gameState === 'PLAYING' && 
                this.enemies.length === 0 && 
                this.waveManager.isWaveComplete()) {
                this.gameState = 'WAITING';
                this.score += 200;
                document.getElementById('wave-btn').style.display = 'block';
                this.updateUI();
            }
        }
        
        showModal(title, message) {
            document.getElementById('modal-title').textContent = title;
            document.getElementById('modal-message').textContent = message;
            document.getElementById('game-modal').setAttribute('aria-hidden', 'false');
        }
        
        render() {
            // 화면 클리어
            this.ctx.fillStyle = '#1C1C1C';
            this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
            
            // 그리드 렌더링
            this.grid.render(this.ctx);
            
            // 호버된 타일 하이라이트
            if (this.hoveredTile && this.selectedTowerType) {
                this.renderTileHighlight(this.hoveredTile.x, this.hoveredTile.y);
            }
            
            // 타워 범위 표시
            if (this.hoveredTile) {
                const tower = this.getTowerAt(this.hoveredTile.x, this.hoveredTile.y);
                if (tower) {
                    this.renderTowerRange(tower);
                }
            }
            
            // 게임 객체들 렌더링
            this.enemies.forEach(enemy => enemy.render(this.ctx, this.grid));
            this.towers.forEach(tower => tower.render(this.ctx, this.grid));
            this.projectiles.forEach(projectile => projectile.render(this.ctx, this.grid));
            
            // 게임 상태 오버레이
            this.renderGameStateOverlay();
        }
        
        renderTileHighlight(x, y) {
            const screenPos = this.grid.gridToScreen(x, y);
            const canPlace = this.canPlaceTower(x, y);
            
            this.ctx.strokeStyle = canPlace ? '#FFD700' : '#DC143C';
            this.ctx.lineWidth = 2;
            this.ctx.setLineDash([5, 5]);
            this.ctx.strokeRect(screenPos.x, screenPos.y, this.grid.tileSize, this.grid.tileSize);
            this.ctx.setLineDash([]);
        }
        
        renderTowerRange(tower) {
            const screenPos = this.grid.gridToScreen(tower.x, tower.y);
            const centerX = screenPos.x + this.grid.tileSize / 2;
            const centerY = screenPos.y + this.grid.tileSize / 2;
            
            this.ctx.fillStyle = 'rgba(46, 139, 87, 0.3)';
            this.ctx.beginPath();
            this.ctx.arc(centerX, centerY, tower.range, 0, Math.PI * 2);
            this.ctx.fill();
        }
        
        renderGameStateOverlay() {
            if (this.gameState === 'PAUSED') {
                this.ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                
                this.ctx.fillStyle = '#FFFFFF';
                this.ctx.font = '48px Orbitron';
                this.ctx.textAlign = 'center';
                this.ctx.fillText('PAUSED', this.canvas.width / 2, this.canvas.height / 2);
            }
        }
        
        updateUI() {
            document.getElementById('gold-amount').textContent = this.gold;
            document.getElementById('life-amount').textContent = this.life;
            document.getElementById('wave-amount').textContent = `${this.currentWave} / ${this.totalWaves}`;
            
            // 버튼 상태 업데이트
            const basicBtn = document.getElementById('tower-basic');
            const aoeBtn = document.getElementById('tower-aoe');
            const waveBtn = document.getElementById('wave-btn');
            
            basicBtn.disabled = this.gold < 25;
            aoeBtn.disabled = this.gold < 50;
            
            if (this.gameState === 'WAITING' && this.currentWave < this.totalWaves) {
                waveBtn.style.display = 'block';
                waveBtn.textContent = `웨이브 ${this.currentWave + 1} 시작`;
            } else {
                waveBtn.style.display = 'none';
            }
        }
        
        updateTowerButtons() {
            document.getElementById('tower-basic').classList.toggle('selected', this.selectedTowerType === 'basic');
            document.getElementById('tower-aoe').classList.toggle('selected', this.selectedTowerType === 'aoe');
        }
    }

    class Grid {
        constructor(width, height, tileSize) {
            this.width = width;
            this.height = height;
            this.tileSize = tileSize;
            this.tiles = [];
            
            this.initializeTiles();
        }
        
        initializeTiles() {
            const pathY = Math.floor(this.height / 2);
            
            for (let y = 0; y < this.height; y++) {
                this.tiles[y] = [];
                for (let x = 0; x < this.width; x++) {
                    if (y === pathY) {
                        this.tiles[y][x] = { type: 'path' };
                    } else {
                        this.tiles[y][x] = { type: 'buildable' };
                    }
                }
            }
        }
        
        getTile(x, y) {
            if (!this.isValidPosition(x, y)) return null;
            return this.tiles[y][x];
        }
        
        isValidPosition(x, y) {
            return x >= 0 && x < this.width && y >= 0 && y < this.height;
        }
        
        gridToScreen(x, y) {
            return {
                x: x * this.tileSize,
                y: y * this.tileSize
            };
        }
        
        screenToGrid(screenX, screenY) {
            const y = Math.floor(screenY / this.tileSize);
            const x = Math.floor(screenX / this.tileSize);
            
            if (this.isValidPosition(x, y)) {
                return { x, y };
            }
            return null;
        }
        
        render(ctx) {
            for (let y = 0; y < this.height; y++) {
                for (let x = 0; x < this.width; x++) {
                    const tile = this.tiles[y][x];
                    const screenPos = this.gridToScreen(x, y);
                    
                    if (tile.type === 'path') {
                        ctx.fillStyle = '#8B4513';
                    } else {
                        ctx.fillStyle = '#1F3F1F';
                    }
                    
                    ctx.fillRect(screenPos.x, screenPos.y, this.tileSize, this.tileSize);
                    
                    ctx.strokeStyle = '#2F2F2F';
                    ctx.lineWidth = 1;
                    ctx.strokeRect(screenPos.x, screenPos.y, this.tileSize, this.tileSize);
                }
            }
        }
    }

    class Enemy {
        constructor(type, pathY) {
            this.type = type;
            this.pathY = pathY;
            this.x = -20;
            this.y = pathY * 40 + 20;
            this.pathProgress = 0;
            this.reachedEnd = false;
            
            if (type === 'basic') {
                this.maxHp = 30;
                this.hp = 30;
                this.speed = 50;
                this.reward = 5;
                this.size = 8;
                this.color = '#DC143C';
            } else if (type === 'strong') {
                this.maxHp = 80;
                this.hp = 80;
                this.speed = 30;
                this.reward = 15;
                this.size = 10;
                this.color = '#8B0000';
            }
        }
        
        update(deltaTime) {
            this.x += this.speed * (deltaTime / 1000);
            this.pathProgress = this.x;
            
            if (this.x > 820) {
                this.reachedEnd = true;
            }
        }
        
        takeDamage(damage) {
            this.hp -= damage;
            if (this.hp < 0) this.hp = 0;
        }
        
        render(ctx, grid) {
            // HP 바
            if (this.hp < this.maxHp) {
                ctx.fillStyle = '#8B0000';
                ctx.fillRect(this.x - this.size, this.y - this.size - 8, this.size * 2, 4);
                
                ctx.fillStyle = '#DC143C';
                const hpWidth = (this.hp / this.maxHp) * this.size * 2;
                ctx.fillRect(this.x - this.size, this.y - this.size - 8, hpWidth, 4);
            }
            
            // 적 본체
            ctx.fillStyle = this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
            
            // 중앙 점
            ctx.fillStyle = '#FFFFFF';
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size * 0.3, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    class Tower {
        constructor(x, y, type) {
            this.x = x;
            this.y = y;
            this.type = type;
            this.lastFireTime = 0;
            this.level = 1;
            
            if (type === 'basic') {
                this.damage = 20;
                this.range = 80;
                this.fireRate = 1000;
                this.cost = 25;
                this.color = '#2E8B57';
            } else if (type === 'aoe') {
                this.damage = 15;
                this.range = 70;
                this.fireRate = 1500;
                this.cost = 50;
                this.color = '#4169E1';
            }
        }
        
        update(deltaTime) {
            // 타워 업데이트 로직
        }
        
        canFire() {
            return Date.now() - this.lastFireTime >= this.fireRate;
        }
        
        fire(target) {
            if (!this.canFire()) return null;
            
            this.lastFireTime = Date.now();
            return new Projectile(this, target);
        }
        
        getDistanceTo(enemy) {
            const towerScreenPos = this.getScreenPosition();
            const dx = enemy.x - towerScreenPos.x;
            const dy = enemy.y - towerScreenPos.y;
            return Math.sqrt(dx * dx + dy * dy);
        }
        
        getScreenPosition() {
            return {
                x: this.x * 40 + 20,
                y: this.y * 40 + 20
            };
        }
        
        render(ctx, grid) {
            const screenPos = grid.gridToScreen(this.x, this.y);
            const centerX = screenPos.x + grid.tileSize / 2;
            const centerY = screenPos.y + grid.tileSize / 2;
            
            if (this.type === 'basic') {
                ctx.fillStyle = this.color;
                ctx.fillRect(screenPos.x + 8, screenPos.y + 8, 24, 24);
                
                ctx.fillStyle = '#000000';
                ctx.beginPath();
                ctx.arc(centerX, centerY, 4, 0, Math.PI * 2);
                ctx.fill();
            } else if (this.type === 'aoe') {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.moveTo(centerX, screenPos.y + 8);
                ctx.lineTo(screenPos.x + 8, screenPos.y + 32);
                ctx.lineTo(screenPos.x + 32, screenPos.y + 32);
                ctx.closePath();
                ctx.fill();
                
                ctx.strokeStyle = '#000000';
                ctx.lineWidth = 2;
                ctx.stroke();
            }
        }
    }

    class Projectile {
        constructor(tower, target) {
            this.tower = tower;
            this.target = target;
            this.damage = tower.damage;
            this.speed = 300;
            
            const towerPos = tower.getScreenPosition();
            this.x = towerPos.x;
            this.y = towerPos.y;
            
            this.hasHit = false;
            this.shouldRemove = false;
            
            this.targetX = target.x;
            this.targetY = target.y;
            
            const dx = this.targetX - this.x;
            const dy = this.targetY - this.y;
            const distance = Math.sqrt(dx * dx + dy * dy);
            
            this.velocityX = (dx / distance) * this.speed;
            this.velocityY = (dy / distance) * this.speed;
            
            this.trail = [];
        }
        
        update(deltaTime) {
            if (this.hasHit || this.shouldRemove) return;
            
            this.trail.push({ x: this.x, y: this.y });
            if (this.trail.length > 3) {
                this.trail.shift();
            }
            
            this.x += this.velocityX * (deltaTime / 1000);
            this.y += this.velocityY * (deltaTime / 1000);
            
            if (this.target && this.target.hp > 0) {
                const dx = this.target.x - this.x;
                const dy = this.target.y - this.y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                
                if (distance < 10) {
                    this.hasHit = true;
                    return;
                }
            }
            
            if (this.x < -50 || this.x > 850 || this.y < -50 || this.y > 650) {
                this.shouldRemove = true;
            }
            
            if (!this.target || this.target.hp <= 0) {
                if (this.tower.type === 'aoe') {
                    this.hasHit = true;
                } else {
                    this.shouldRemove = true;
                }
            }
        }
        
        render(ctx, grid) {
            this.trail.forEach((pos, index) => {
                const alpha = (index + 1) / this.trail.length * 0.5;
                ctx.fillStyle = `rgba(255, 255, 0, ${alpha})`;
                ctx.beginPath();
                ctx.arc(pos.x, pos.y, 2, 0, Math.PI * 2);
                ctx.fill();
            });
            
            ctx.fillStyle = '#FFD700';
            ctx.beginPath();
            ctx.arc(this.x, this.y, 4, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    class WaveManager {
        constructor() {
            this.currentWave = 0;
            this.enemiesSpawned = 0;
            this.enemiesToSpawn = 0;
            this.spawnTimer = 0;
            this.spawnInterval = 1000;
            this.waveActive = false;
            this.spawnedEnemies = [];
            this.pathY = 7;
        }
        
        startWave(waveNumber) {
            this.currentWave = waveNumber;
            this.enemiesSpawned = 0;
            this.spawnTimer = 0;
            this.waveActive = true;
            this.spawnedEnemies = [];
            
            this.enemiesToSpawn = Math.floor(5 + waveNumber * 2.5);
            this.spawnInterval = Math.max(500, 1200 - waveNumber * 50);
        }
        
        update(deltaTime) {
            if (!this.waveActive) return;
            
            this.spawnTimer += deltaTime;
            
            if (this.enemiesSpawned < this.enemiesToSpawn && this.spawnTimer >= this.spawnInterval) {
                this.spawnEnemy();
                this.spawnTimer = 0;
            }
            
            if (this.enemiesSpawned >= this.enemiesToSpawn) {
                this.waveActive = false;
            }
        }
        
        spawnEnemy() {
            const strongEnemyChance = Math.min(0.3, this.currentWave * 0.05);
            const enemyType = Math.random() < strongEnemyChance ? 'strong' : 'basic';
            
            const enemy = new Enemy(enemyType, this.pathY);
            this.spawnedEnemies.push(enemy);
            this.enemiesSpawned++;
        }
        
        getSpawnedEnemies() {
            const enemies = [...this.spawnedEnemies];
            this.spawnedEnemies = [];
            return enemies;
        }
        
        isWaveComplete() {
            return !this.waveActive && this.enemiesSpawned >= this.enemiesToSpawn;
        }
    }

    // 게임 시작
    document.addEventListener('DOMContentLoaded', () => {
        // 초기 모달 표시
        document.getElementById('game-modal').setAttribute('aria-hidden', 'false');
        
        // 게임 인스턴스 생성
        window.game = new ElementalGuardian();
    });
  </script>
