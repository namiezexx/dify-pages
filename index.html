<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>교보두더지게임</title>
    <style>
        :root {
            --bg-color: #2E8B57;
            --hole-color: #8B4513;
            --mole-color: #8B4513;
            --golden-color: #FFD700;
            --golden-accent: #FFA500;
            --text-color: #FFFFFF;
            --highlight-color: #FFFF00;
            --shadow-color: rgba(0, 0, 0, 0.3);
            --border-radius: 20px;
            --hole-size: 80px;
            --mole-size: 60px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, var(--bg-color) 0%, #228B44 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
            overflow-x: hidden;
        }

        #game-container {
            background: rgba(255, 255, 255, 0.1);
            border-radius: var(--border-radius);
            padding: 20px;
            box-shadow: 0 10px 30px var(--shadow-color);
            backdrop-filter: blur(10px);
            max-width: 500px;
            width: 100%;
            margin: 20px;
        }

        #game-header {
            text-align: center;
            margin-bottom: 30px;
            color: var(--text-color);
        }

        #game-header h1 {
            font-size: 2.5rem;
            margin-bottom: 15px;
            text-shadow: 2px 2px 4px var(--shadow-color);
            color: var(--highlight-color);
        }

        .score-board {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .score-item {
            background: rgba(255, 255, 255, 0.2);
            padding: 10px;
            border-radius: 10px;
            text-align: center;
        }

        .score-label {
            font-size: 0.9rem;
            opacity: 0.8;
            margin-bottom: 5px;
        }

        .score-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--highlight-color);
        }

        #game-board {
            display: grid;
            grid-template: repeat(3, 1fr) / repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.1);
            border-radius: var(--border-radius);
        }

        .mole-hole {
            position: relative;
            width: var(--hole-size);
            height: 60px;
            background: var(--hole-color);
            border-radius: 50%;
            box-shadow: 
                inset 0 5px 15px rgba(0, 0, 0, 0.6),
                0 2px 5px rgba(0, 0, 0, 0.3);
            cursor: pointer;
            transition: transform 0.1s ease;
            justify-self: center;
            overflow: hidden;
        }

        .mole-hole:hover {
            transform: scale(1.05);
        }

        .mole {
            position: absolute;
            width: var(--mole-size);
            height: var(--mole-size);
            background: var(--mole-color);
            border-radius: 50%;
            bottom: -60px;
            left: 50%;
            transform: translateX(-50%);
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
        }

        .mole::before {
            content: '';
            position: absolute;
            top: 15px;
            left: 15px;
            width: 8px;
            height: 8px;
            background: #000;
            border-radius: 50%;
            box-shadow: 15px 0 0 #000;
        }

        .mole::after {
            content: '';
            position: absolute;
            top: 5px;
            left: 8px;
            width: 12px;
            height: 15px;
            background: var(--mole-color);
            border-radius: 50% 50% 0 0;
            box-shadow: 32px 0 0 var(--mole-color);
        }

        .mole.active {
            bottom: 10px;
            animation: moleWiggle 0.5s ease-in-out;
        }

        .golden-mole {
            background: var(--golden-color);
            box-shadow: 
                0 2px 8px rgba(0, 0, 0, 0.4),
                0 0 20px rgba(255, 215, 0, 0.6);
            animation: shimmer 0.5s infinite alternate;
        }

        .golden-mole::after {
            background: var(--golden-color);
            box-shadow: 32px 0 0 var(--golden-color);
        }

        .mole.clicked {
            transform: translateX(-50%) scale(0.9);
        }

        @keyframes moleWiggle {
            0%, 100% { transform: translateX(-50%) rotate(0deg); }
            25% { transform: translateX(-50%) rotate(-2deg); }
            75% { transform: translateX(-50%) rotate(2deg); }
        }

        @keyframes shimmer {
            0% { 
                box-shadow: 
                    0 2px 8px rgba(0, 0, 0, 0.4),
                    0 0 20px rgba(255, 215, 0, 0.6);
            }
            100% { 
                box-shadow: 
                    0 2px 8px rgba(0, 0, 0, 0.4),
                    0 0 30px rgba(255, 215, 0, 0.9),
                    0 0 40px rgba(255, 165, 0, 0.5);
            }
        }

        #game-controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .btn {
            background: linear-gradient(145deg, #4CAF50, #45a049);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            min-width: 100px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        #start-btn {
            background: linear-gradient(145deg, #FF6B6B, #FF5252);
        }

        #pause-btn {
            background: linear-gradient(145deg, #FFA726, #FF9800);
        }

        #restart-btn {
            background: linear-gradient(145deg, #42A5F5, #2196F3);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* 모바일 최적화 */
        @media (max-width: 480px) {
            #game-container {
                margin: 10px;
                padding: 15px;
            }

            #game-header h1 {
                font-size: 2rem;
            }

            .score-board {
                gap: 10px;
            }

            .score-item {
                padding: 8px;
            }

            .score-value {
                font-size: 1.2rem;
            }

            #game-board {
                gap: 15px;
                padding: 15px;
            }

            :root {
                --hole-size: 70px;
                --mole-size: 50px;
            }

            .btn {
                padding: 10px 20px;
                font-size: 0.9rem;
                min-width: 80px;
            }
        }

        @media (max-width: 320px) {
            #game-board {
                gap: 10px;
                padding: 10px;
            }

            :root {
                --hole-size: 60px;
                --mole-size: 45px;
            }

            .score-board {
                grid-template-columns: 1fr;
                gap: 8px;
            }

            #game-controls {
                gap: 10px;
            }
        }

        /* 접근성 향상 */
        @media (prefers-reduced-motion: reduce) {
            .mole, .btn, .mole-hole {
                transition: none;
            }
            
            .mole.active {
                animation: none;
            }
            
            .golden-mole {
                animation: none;
            }
        }
    </style>
</head>
<body>
    <div id="game-container">
        <header id="game-header">
            <h1>교보두더지게임</h1>
            <div class="score-board">
                <div class="score-item">
                    <div class="score-label">현재 점수</div>
                    <div class="score-value" id="current-score" aria-live="polite">0</div>
                </div>
                <div class="score-item">
                    <div class="score-label">최고 점수</div>
                    <div class="score-value" id="high-score" aria-live="polite">0</div>
                </div>
                <div class="score-item">
                    <div class="score-label">잡은 수</div>
                    <div class="score-value" id="mole-count" aria-live="polite">0</div>
                </div>
            </div>
        </header>

        <main id="game-board" role="main" aria-label="게임 보드">
            <div class="mole-hole" data-hole-index="0" role="button" tabindex="0" aria-label="두더지 구멍 1"></div>
            <div class="mole-hole" data-hole-index="1" role="button" tabindex="0" aria-label="두더지 구멍 2"></div>
            <div class="mole-hole" data-hole-index="2" role="button" tabindex="0" aria-label="두더지 구멍 3"></div>
            <div class="mole-hole" data-hole-index="3" role="button" tabindex="0" aria-label="두더지 구멍 4"></div>
            <div class="mole-hole" data-hole-index="4" role="button" tabindex="0" aria-label="두더지 구멍 5"></div>
            <div class="mole-hole" data-hole-index="5" role="button" tabindex="0" aria-label="두더지 구멍 6"></div>
            <div class="mole-hole" data-hole-index="6" role="button" tabindex="0" aria-label="두더지 구멍 7"></div>
            <div class="mole-hole" data-hole-index="7" role="button" tabindex="0" aria-label="두더지 구멍 8"></div>
            <div class="mole-hole" data-hole-index="8" role="button" tabindex="0" aria-label="두더지 구멍 9"></div>
        </main>

        <footer id="game-controls" role="navigation" aria-label="게임 컨트롤">
            <button id="start-btn" class="btn" aria-label="게임 시작">게임 시작</button>
            <button id="pause-btn" class="btn" disabled aria-label="게임 일시정지">일시정지</button>
            <button id="restart-btn" class="btn" disabled aria-label="게임 재시작">재시작</button>
        </footer>
    </div>

    <script>
    /**
     * 교보두더지게임 JavaScript 엔진
     * DOM 기반 3x3 격자 시스템으로 구현된 아케이드 액션 게임
     * 상태머신 패턴을 적용하여 게임 상태를 체계적으로 관리
     */

    // 게임 상태 관리 객체 (State Machine Pattern)
    const gameState = {
        isPlaying: false,           // 게임 진행 상태
        isPaused: false,            // 일시정지 상태
        score: 0,                   // 현재 점수
        highScore: 0,               // 최고 점수 (로컬스토리지에서 관리)
        moleCount: 0,               // 잡은 일반 두더지 수
        goldenMoleCount: 0,         // 잡은 황금 두더지 수
        activeMoles: [],            // 현재 활성화된 두더지 배열
        gameInterval: null,         // 두더지 생성 인터벌 ID
        nextMoleId: 1               // 다음 두더지 고유 ID 생성기
    };

    // 게임 설정 상수
    const GAME_CONFIG = {
        GRID_SIZE: 9,                           // 3x3 격자 총 구멍 수
        NORMAL_MOLE_SCORE: 10,                  // 일반 두더지 점수
        GOLDEN_MOLE_SCORE: 50,                  // 황금 두더지 점수
        GOLDEN_MOLE_TRIGGER: 10,                // 황금 두더지 출현 조건 (10마리마다)
        MOLE_SPAWN_MIN: 1500,                   // 두더지 최소 출현 간격 (밀리초)
        MOLE_SPAWN_MAX: 3000,                   // 두더지 최대 출현 간격 (밀리초)
        MOLE_LIFESPAN: 2000,                    // 두더지 생존 시간 (2초)
        GOLDEN_MOLE_CLICK_REQUIRED: 2,          // 황금 두더지 필요 클릭 수
        NORMAL_MOLE_CLICK_REQUIRED: 1           // 일반 두더지 필요 클릭 수
    };

    /**
     * 메인 게임 컨트롤러 모듈
     * 모든 게임 로직을 캡슐화하고 외부 인터페이스를 제공
     */
    const GameController = (function() {
        
        /**
         * 게임 초기화 함수
         * DOM 로드 완료 시점에 실행되어 게임 환경을 설정
         */
        function initGame() {
            try {
                // 로컬스토리지에서 최고점수 불러오기
                loadHighScore();
                
                // UI 초기 상태 설정
                updateScoreDisplay();
                updateMoleCountDisplay();
                
                // 이벤트 리스너 등록 (이벤트 위임 패턴 적용)
                bindEventListeners();
                
                // 게임보드 초기화 상태 확인
                validateGameBoard();
                
                console.log('교보두더지게임 초기화 완료');
            } catch (error) {
                console.error('게임 초기화 중 오류 발생:', error);
                alert('게임 초기화에 실패했습니다. 페이지를 새로고침해주세요.');
            }
        }
        
        /**
         * 게임보드 유효성 검사
         * 필수 DOM 요소들이 올바르게 구성되었는지 확인
         */
        function validateGameBoard() {
            const gameBoard = document.getElementById('game-board');
            if (!gameBoard) {
                throw new Error('게임보드 요소를 찾을 수 없습니다.');
            }
            
            const holes = gameBoard.querySelectorAll('.mole-hole');
            if (holes.length !== GAME_CONFIG.GRID_SIZE) {
                throw new Error(`두더지 구멍이 ${GAME_CONFIG.GRID_SIZE}개가 아닙니다. 현재: ${holes.length}개`);
            }
            
            // 각 구멍에 data-hole-index 속성 확인
            holes.forEach((hole, index) => {
                if (!hole.hasAttribute('data-hole-index')) {
                    hole.setAttribute('data-hole-index', index.toString());
                }
            });
        }
        
        /**
         * 이벤트 리스너 바인딩
         * 게임 컨트롤과 두더지 클릭 이벤트를 등록
         */
        function bindEventListeners() {
            // 게임 컨트롤 버튼 이벤트
            const startBtn = document.getElementById('start-btn');
            const pauseBtn = document.getElementById('pause-btn');
            const restartBtn = document.getElementById('restart-btn');
            
            if (startBtn) startBtn.addEventListener('click', handleStartGame);
            if (pauseBtn) pauseBtn.addEventListener('click', handlePauseGame);
            if (restartBtn) restartBtn.addEventListener('click', handleRestartGame);
            
            // 이벤트 위임을 통한 두더지 클릭 이벤트 처리
            const gameBoard = document.getElementById('game-board');
            if (gameBoard) {
                gameBoard.addEventListener('click', handleMoleClick);
                gameBoard.addEventListener('keydown', handleKeyboardInput);
            }
        }
        
        /**
         * 키보드 입력 처리 (접근성 개선)
         */
        function handleKeyboardInput(event) {
            if (event.key === 'Enter' || event.key === ' ') {
                event.preventDefault();
                handleMoleClick(event);
            }
        }
        
        /**
         * 게임 시작 이벤트 핸들러
         * 게임 상태를 시작 모드로 전환하고 두더지 생성 루프 가동
         */
        function handleStartGame() {
            try {
                if (gameState.isPlaying) {
                    console.log('게임이 이미 진행 중입니다.');
                    return;
                }
                
                startGame();
                updateButtonStates();
                console.log('게임이 시작되었습니다.');
            } catch (error) {
                console.error('게임 시작 중 오류:', error);
                alert('게임 시작에 실패했습니다.');
            }
        }
        
        /**
         * 일시정지 이벤트 핸들러
         * 게임을 일시정지하거나 재개
         */
        function handlePauseGame() {
            try {
                if (!gameState.isPlaying) {
                    console.log('게임이 시작되지 않았습니다.');
                    return;
                }
                
                if (gameState.isPaused) {
                    resumeGame();
                } else {
                    pauseGame();
                }
                
                updateButtonStates();
            } catch (error) {
                console.error('게임 일시정지 처리 중 오류:', error);
            }
        }
        
        /**
         * 재시작 이벤트 핸들러
         * 게임을 완전히 초기화하고 새로 시작
         */
        function handleRestartGame() {
            try {
                stopGame();
                resetGameData();
                startGame();
                updateButtonStates();
                console.log('게임이 재시작되었습니다.');
            } catch (error) {
                console.error('게임 재시작 중 오류:', error);
                alert('게임 재시작에 실패했습니다.');
            }
        }
        
        /**
         * 두더지 클릭 이벤트 핸들러
         * 이벤트 위임 패턴을 사용하여 동적으로 생성된 두더지 클릭 처리
         */
        function handleMoleClick(event) {
            try {
                // 클릭된 요소가 두더지인지 확인
                if (!event.target.classList.contains('mole') && 
                    !event.target.classList.contains('golden-mole')) {
                    return;
                }
                
                const moleElement = event.target;
                const moleId = parseInt(moleElement.getAttribute('data-mole-id'));
                
                if (isNaN(moleId)) {
                    console.error('유효하지 않은 두더지 ID');
                    return;
                }
                
                // 두더지 클릭 처리
                catchMole(moleId, moleElement);
                
            } catch (error) {
                console.error('두더지 클릭 처리 중 오류:', error);
            }
        }
        
        /**
         * 게임 시작 핵심 로직
         * 상태를 시작 모드로 설정하고 두더지 생성 루프 가동
         */
        function startGame() {
            gameState.isPlaying = true;
            gameState.isPaused = false;
            
            // 두더지 자동 생성 인터벌 시작
            startMoleSpawnLoop();
        }
        
        /**
         * 게임 일시정지
         */
        function pauseGame() {
            gameState.isPaused = true;
            
            // 두더지 생성 인터벌 정지
            if (gameState.gameInterval) {
                clearInterval(gameState.gameInterval);
                gameState.gameInterval = null;
            }
        }
        
        /**
         * 게임 재개
         */
        function resumeGame() {
            gameState.isPaused = false;
            
            // 두더지 생성 인터벌 재시작
            startMoleSpawnLoop();
        }
        
        /**
         * 게임 정지
         */
        function stopGame() {
            gameState.isPlaying = false;
            gameState.isPaused = false;
            
            // 모든 활성 두더지 제거
            clearAllMoles();
            
            // 두더지 생성 인터벌 정지
            if (gameState.gameInterval) {
                clearInterval(gameState.gameInterval);
                gameState.gameInterval = null;
            }
        }
        
        /**
         * 게임 데이터 초기화
         */
        function resetGameData() {
            gameState.score = 0;
            gameState.moleCount = 0;
            gameState.goldenMoleCount = 0;
            gameState.nextMoleId = 1;
            
            updateScoreDisplay();
            updateMoleCountDisplay();
        }
        
        /**
         * 두더지 자동 생성 루프 시작
         * 랜덤한 간격으로 두더지를 생성하는 인터벌 설정
         */
        function startMoleSpawnLoop() {
            if (gameState.gameInterval) {
                clearInterval(gameState.gameInterval);
            }
            
            // 첫 번째 두더지 즉시 생성
            setTimeout(spawnRandomMole, 500);
            
            // 주기적으로 두더지 생성
            gameState.gameInterval = setInterval(() => {
                if (gameState.isPlaying && !gameState.isPaused) {
                    spawnRandomMole();
                }
            }, getRandomSpawnInterval());
        }
        
        /**
         * 랜덤 두더지 생성
         * 빈 구멍에 일반 또는 황금 두더지를 생성
         */
        function spawnRandomMole() {
            try {
                // 사용 가능한 구멍 찾기
                const availableHoles = getAvailableHoles();
                
                if (availableHoles.length === 0) {
                    console.log('사용 가능한 구멍이 없습니다.');
                    return;
                }
                
                // 랜덤 구멍 선택
                const randomHoleIndex = availableHoles[Math.floor(Math.random() * availableHoles.length)];
                
                // 황금 두더지 출현 조건 확인 (10마리마다)
                const shouldSpawnGolden = (gameState.moleCount > 0) && 
                                        (gameState.moleCount % GAME_CONFIG.GOLDEN_MOLE_TRIGGER === 0) && 
                                        (gameState.goldenMoleCount * GAME_CONFIG.GOLDEN_MOLE_TRIGGER < gameState.moleCount);
                
                spawnMole(randomHoleIndex, shouldSpawnGolden);
                
            } catch (error) {
                console.error('두더지 생성 중 오류:', error);
            }
        }
        
        /**
         * 사용 가능한 구멍 인덱스 배열 반환
         */
        function getAvailableHoles() {
            const occupiedHoles = gameState.activeMoles.map(mole => mole.holeIndex);
            const allHoles = Array.from({length: GAME_CONFIG.GRID_SIZE}, (_, i) => i);
            return allHoles.filter(index => !occupiedHoles.includes(index));
        }
        
        /**
         * 특정 구멍에 두더지 생성
         * @param {number} holeIndex - 구멍 인덱스 (0-8)
         * @param {boolean} isGolden - 황금 두더지 여부
         */
        function spawnMole(holeIndex, isGolden = false) {
            try {
                const moleId = gameState.nextMoleId++;
                const hole = document.querySelector(`[data-hole-index="${holeIndex}"]`);
                
                if (!hole) {
                    console.error(`구멍을 찾을 수 없습니다: index ${holeIndex}`);
                    return;
                }
                
                // 두더지 DOM 요소 생성
                const moleElement = createMoleElement(moleId, isGolden);
                hole.appendChild(moleElement);
                
                // 게임 상태에 두더지 정보 추가
                const moleData = {
                    id: moleId,
                    holeIndex: holeIndex,
                    isGolden: isGolden,
                    clickCount: 0,
                    element: moleElement
                };
                
                gameState.activeMoles.push(moleData);
                
                // 두더지 등장 애니메이션
                requestAnimationFrame(() => {
                    moleElement.classList.add('active');
                });
                
                // 두더지 자동 제거 타이머 설정
                setTimeout(() => {
                    removeMole(moleId);
                }, GAME_CONFIG.MOLE_LIFESPAN);
                
            } catch (error) {
                console.error('두더지 생성 중 오류:', error);
            }
        }
        
        /**
         * 두더지 DOM 요소 생성
         * @param {number} moleId - 두더지 고유 ID
         * @param {boolean} isGolden - 황금 두더지 여부
         */
        function createMoleElement(moleId, isGolden) {
            const moleElement = document.createElement('div');
            
            // 기본 클래스 설정
            moleElement.className = isGolden ? 'mole golden-mole' : 'mole';
            
            // 데이터 속성 설정
            moleElement.setAttribute('data-mole-id', moleId.toString());
            moleElement.setAttribute('data-is-golden', isGolden.toString());
            moleElement.setAttribute('data-click-count', '0');
            
            // 접근성 속성
            moleElement.setAttribute('role', 'button');
            moleElement.setAttribute('tabindex', '0');
            moleElement.setAttribute('aria-label', isGolden ? '황금 두더지' : '일반 두더지');
            
            return moleElement;
        }
        
        /**
         * 두더지 클릭 처리 핵심 로직
         * @param {number} moleId - 클릭된 두더지 ID
         * @param {Element} moleElement - 두더지 DOM 요소
         */
        function catchMole(moleId, moleElement) {
            try {
                // 게임이 진행 중이 아니면 무시
                if (!gameState.isPlaying || gameState.isPaused) {
                    return;
                }
                
                // 활성 두더지 목록에서 찾기
                const moleIndex = gameState.activeMoles.findIndex(mole => mole.id === moleId);
                
                if (moleIndex === -1) {
                    console.log('이미 제거된 두더지입니다.');
                    return;
                }
                
                const moleData = gameState.activeMoles[moleIndex];
                moleData.clickCount++;
                
                // 클릭 피드백 애니메이션
                applyClickFeedback(moleElement);
                
                // 두더지 종류에 따른 처리
                const requiredClicks = moleData.isGolden ? 
                    GAME_CONFIG.GOLDEN_MOLE_CLICK_REQUIRED : 
                    GAME_CONFIG.NORMAL_MOLE_CLICK_REQUIRED;
                
                // 필요한 클릭 수에 도달했는지 확인
                if (moleData.clickCount >= requiredClicks) {
                    // 점수 추가
                    const scoreGained = moleData.isGolden ? 
                        GAME_CONFIG.GOLDEN_MOLE_SCORE : 
                        GAME_CONFIG.NORMAL_MOLE_SCORE;
                    
                    gameState.score += scoreGained;
                    
                    // 잡은 두더지 수 업데이트
                    if (moleData.isGolden) {
                        gameState.goldenMoleCount++;
                    } else {
                        gameState.moleCount++;
                    }
                    
                    // 최고점수 업데이트
                    if (gameState.score > gameState.highScore) {
                        gameState.highScore = gameState.score;
                        saveHighScore();
                    }
                    
                    // UI 업데이트
                    updateScoreDisplay();
                    updateMoleCountDisplay();
                    
                    // 두더지 제거
                    removeMole(moleId);
                    
                    console.log(`${moleData.isGolden ? '황금' : '일반'} 두더지 잡음! +${scoreGained}점`);
                } else {
                    // 황금 두더지의 경우 클릭 카운트 표시 업데이트
                    moleElement.setAttribute('data-click-count', moleData.clickCount.toString());
                }
                
            } catch (error) {
                console.error('두더지 잡기 처리 중 오류:', error);
            }
        }
        
        /**
         * 클릭 피드백 애니메이션 적용
         * @param {Element} moleElement - 두더지 DOM 요소
         */
        function applyClickFeedback(moleElement) {
            moleElement.classList.add('clicked');
            
            setTimeout(() => {
                moleElement.classList.remove('clicked');
            }, 100);
        }
        
        /**
         * 두더지 제거
         * @param {number} moleId - 제거할 두더지 ID
         */
        function removeMole(moleId) {
            try {
                const moleIndex = gameState.activeMoles.findIndex(mole => mole.id === moleId);
                
                if (moleIndex === -1) {
                    return; // 이미 제거됨
                }
                
                const moleData = gameState.activeMoles[moleIndex];
                const moleElement = moleData.element;
                
                // 퇴장 애니메이션
                if (moleElement && moleElement.parentNode) {
                    moleElement.classList.remove('active');
                    
                    setTimeout(() => {
                        if (moleElement.parentNode) {
                            moleElement.parentNode.removeChild(moleElement);
                        }
                    }, 300);
                }
                
                // 활성 두더지 목록에서 제거
                gameState.activeMoles.splice(moleIndex, 1);
                
            } catch (error) {
                console.error('두더지 제거 중 오류:', error);
            }
        }
        
        /**
         * 모든 활성 두더지 제거
         */
        function clearAllMoles() {
            try {
                // 복사본을 만들어서 안전하게 제거
                const molesToRemove = [...gameState.activeMoles];
                
                molesToRemove.forEach(mole => {
                    removeMole(mole.id);
                });
                
                gameState.activeMoles = [];
                
            } catch (error) {
                console.error('모든 두더지 제거 중 오류:', error);
            }
        }
        
        /**
         * 랜덤 스폰 간격 생성
         * @returns {number} 밀리초 단위 간격
         */
        function getRandomSpawnInterval() {
            return Math.random() * (GAME_CONFIG.MOLE_SPAWN_MAX - GAME_CONFIG.MOLE_SPAWN_MIN) + GAME_CONFIG.MOLE_SPAWN_MIN;
        }
        
        /**
         * 점수 UI 업데이트
         */
        function updateScoreDisplay() {
            try {
                const currentScoreElement = document.getElementById('current-score');
                const highScoreElement = document.getElementById('high-score');
                
                if (currentScoreElement) {
                    currentScoreElement.textContent = gameState.score.toString();
                }
                
                if (highScoreElement) {
                    highScoreElement.textContent = gameState.highScore.toString();
                }
            } catch (error) {
                console.error('점수 표시 업데이트 중 오류:', error);
            }
        }
        
        /**
         * 두더지 카운트 UI 업데이트
         */
        function updateMoleCountDisplay() {
            try {
                const moleCountElement = document.getElementById('mole-count');
                
                if (moleCountElement) {
                    const totalCaught = gameState.moleCount + gameState.goldenMoleCount;
                    moleCountElement.textContent = totalCaught.toString();
                }
            } catch (error) {
                console.error('두더지 카운트 표시 업데이트 중 오류:', error);
            }
        }
        
        /**
         * 버튼 상태 업데이트
         */
        function updateButtonStates() {
            try {
                const startBtn = document.getElementById('start-btn');
                const pauseBtn = document.getElementById('pause-btn');
                const restartBtn = document.getElementById('restart-btn');
                
                if (startBtn) {
                    startBtn.disabled = gameState.isPlaying;
                    startBtn.textContent = gameState.isPlaying ? '게임 중' : '게임 시작';
                }
                
                if (pauseBtn) {
                    pauseBtn.disabled = !gameState.isPlaying;
                    pauseBtn.textContent = gameState.isPaused ? '재개' : '일시정지';
                }
                
                if (restartBtn) {
                    restartBtn.disabled = !gameState.isPlaying;
                }
            } catch (error) {
                console.error('버튼 상태 업데이트 중 오류:', error);
            }
        }
        
        /**
         * 최고점수 저장 (로컬스토리지)
         */
        function saveHighScore() {
            try {
                localStorage.setItem('mole-game-high-score', gameState.highScore.toString());
            } catch (error) {
                console.error('최고점수 저장 중 오류:', error);
            }
        }
        
        /**
         * 최고점수 불러오기 (로컬스토리지)
         */
        function loadHighScore() {
            try {
                const saved = localStorage.getItem('mole-game-high-score');
                if (saved) {
                    gameState.highScore = parseInt(saved) || 0;
                }
            } catch (error) {
                console.error('최고점수 불러오기 중 오류:', error);
                gameState.highScore = 0;
            }
        }
        
        // 외부 인터페이스 반환 (모듈 패턴)
        return {
            init: initGame,
            start: handleStartGame,
            pause: handlePauseGame,
            restart: handleRestartGame,
            getState: () => ({ ...gameState }) // 상태 복사본 반환
        };
    })();

    /**
     * 페이지 로드 시 게임 초기화
     * DOM Content Loaded 이벤트를 통해 안전한 초기화 보장
     */
    function handleGameInit() {
        try {
            GameController.init();
            console.log('교보두더지게임이 성공적으로 초기화되었습니다.');
        } catch (error) {
            console.error('게임 초기화 실패:', error);
            alert('게임을 불러오는 중 오류가 발생했습니다. 페이지를 새로고침해주세요.');
        }
    }

    // DOM 로드 완료 후 게임 초기화 실행
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', handleGameInit);
    } else {
        // 이미 로드된 경우 즉시 실행
        handleGameInit();
    }

    // 전역 객체에 게임 컨트롤러 노출 (디버깅 및 확장성을 위해)
    window.MoleGame = GameController;
    </script>
</body>
</html>
