<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GALLAG - Retro Arcade Shooter</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* CSS 변수 정의 */
        :root {
          /* 색상 팔레트 */
          --primary-color: #00FF41;
          --secondary-color: #FF0040;
          --background-color: #0A0A23;
          --accent-color: #FFD700;
          --white: #FFFFFF;
          --cyan: #00FFFF;
          --border-color: #1E3A8A;
          
          /* 폰트 */
          --font-title: 'Orbitron', monospace;
          --font-body: 'Courier Prime', monospace;
          
          /* 효과 */
          --neon-glow: 0 0 10px currentColor, 0 0 20px currentColor, 0 0 30px currentColor;
          --text-shadow: 0 0 10px currentColor;
        }

        /* 전역 스타일 */
        * {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
        }

        body {
          font-family: var(--font-body);
          background: var(--background-color);
          color: var(--primary-color);
          overflow: hidden;
          height: 100vh;
          position: relative;
        }

        /* 별 배경 */
        #stars-container {
          position: fixed;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          z-index: -1;
        }

        .stars {
          position: absolute;
          width: 100%;
          height: 100%;
          background: transparent;
        }

        .stars::before {
          content: '';
          position: absolute;
          width: 100%;
          height: 200%;
          background-image: 
            radial-gradient(2px 2px at 20px 30px, #fff, transparent),
            radial-gradient(2px 2px at 40px 70px, rgba(255,255,255,0.8), transparent),
            radial-gradient(1px 1px at 90px 40px, #fff, transparent),
            radial-gradient(1px 1px at 130px 80px, rgba(255,255,255,0.6), transparent),
            radial-gradient(2px 2px at 160px 30px, #fff, transparent);
          background-repeat: repeat;
          background-size: 200px 100px;
          animation: moveStars 20s linear infinite;
        }

        #stars-layer2::before {
          background-size: 180px 120px;
          animation: moveStars 15s linear infinite;
          opacity: 0.7;
        }

        #stars-layer3::before {
          background-size: 220px 90px;
          animation: moveStars 25s linear infinite;
          opacity: 0.5;
        }

        @keyframes moveStars {
          from { transform: translateY(-100%); }
          to { transform: translateY(100%); }
        }

        /* 화면 전환 시스템 */
        .screen {
          position: absolute;
          width: 100%;
          height: 100%;
          display: flex;
          align-items: center;
          justify-content: center;
          opacity: 0;
          visibility: hidden;
          transition: all 0.3s ease-in-out;
          z-index: 10;
        }

        .screen.active {
          opacity: 1;
          visibility: visible;
        }

        /* 네온 테두리 */
        .neon-border {
          border: 2px solid var(--border-color);
          border-radius: 20px;
          padding: 40px;
          background: rgba(10, 10, 35, 0.8);
          backdrop-filter: blur(10px);
          box-shadow: 
            0 0 20px rgba(30, 58, 138, 0.5),
            inset 0 0 20px rgba(0, 255, 65, 0.1);
          position: relative;
        }

        .neon-border::before {
          content: '';
          position: absolute;
          top: -2px;
          left: -2px;
          right: -2px;
          bottom: -2px;
          background: linear-gradient(45deg, var(--primary-color), var(--cyan), var(--accent-color), var(--secondary-color));
          border-radius: 22px;
          z-index: -1;
          opacity: 0.3;
          animation: borderGlow 3s ease-in-out infinite alternate;
        }

        @keyframes borderGlow {
          0% { opacity: 0.3; }
          100% { opacity: 0.6; }
        }

        /* 타이틀 스타일 */
        .title-main {
          font-family: var(--font-title);
          font-size: 4rem;
          font-weight: 900;
          text-align: center;
          color: var(--primary-color);
          text-shadow: var(--neon-glow);
          letter-spacing: 0.2em;
          margin-bottom: 10px;
          animation: titlePulse 2s ease-in-out infinite alternate;
        }

        .title-main.red {
          color: var(--secondary-color);
        }

        .title-main.gold {
          color: var(--accent-color);
        }

        @keyframes titlePulse {
          0% { text-shadow: 0 0 10px currentColor, 0 0 20px currentColor, 0 0 30px currentColor; }
          100% { text-shadow: 0 0 15px currentColor, 0 0 25px currentColor, 0 0 35px currentColor, 0 0 45px currentColor; }
        }

        .title-subtitle {
          font-family: var(--font-body);
          font-size: 1rem;
          text-align: center;
          color: var(--cyan);
          letter-spacing: 0.1em;
          margin-bottom: 30px;
          opacity: 0.8;
        }

        /* 메인 메뉴 */
        .menu-content {
          text-align: center;
          max-width: 400px;
        }

        .high-score {
          margin-bottom: 40px;
        }

        .high-score .label {
          font-size: 0.9rem;
          color: var(--cyan);
          margin-bottom: 5px;
          letter-spacing: 0.1em;
        }

        .high-score .score {
          font-family: var(--font-title);
          font-size: 2rem;
          color: var(--accent-color);
          text-shadow: var(--text-shadow);
          font-weight: 700;
        }

        /* 네온 버튼 */
        .neon-button {
          position: relative;
          background: transparent;
          border: 2px solid var(--primary-color);
          color: var(--primary-color);
          font-family: var(--font-title);
          font-size: 1.2rem;
          font-weight: 700;
          padding: 15px 30px;
          margin: 10px;
          border-radius: 10px;
          cursor: pointer;
          text-transform: uppercase;
          letter-spacing: 0.1em;
          transition: all 0.3s ease;
          overflow: hidden;
        }

        .neon-button:hover {
          color: var(--background-color);
          background: var(--primary-color);
          box-shadow: var(--neon-glow);
          transform: scale(1.05);
        }

        .neon-button.secondary {
          border-color: var(--cyan);
          color: var(--cyan);
        }

        .neon-button.secondary:hover {
          background: var(--cyan);
        }

        .button-glow {
          position: absolute;
          top: 0;
          left: -100%;
          width: 100%;
          height: 100%;
          background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
          transition: left 0.5s ease;
        }

        .neon-button:hover .button-glow {
          left: 100%;
        }

        .button-text {
          position: relative;
          z-index: 2;
        }

        /* 컨트롤 정보 */
        .controls-info {
          margin-top: 30px;
          font-size: 0.9rem;
          color: rgba(0, 255, 255, 0.7);
        }

        .control-item {
          margin: 5px 0;
          letter-spacing: 0.05em;
        }

        /* 게임 화면 스타일 */
        #game-screen {
          padding: 0;
          align-items: flex-start;
          justify-content: flex-start;
        }

        #game-hud {
          position: absolute;
          top: 0;
          left: 0;
          right: 0;
          height: 80px;
          background: rgba(10, 10, 35, 0.9);
          border-bottom: 2px solid var(--border-color);
          display: flex;
          align-items: center;
          justify-content: space-between;
          padding: 0 30px;
          z-index: 20;
          backdrop-filter: blur(10px);
        }

        .hud-left, .hud-right {
          display: flex;
          gap: 30px;
        }

        .hud-center {
          flex: 1;
          text-align: center;
        }

        .hud-item {
          display: flex;
          flex-direction: column;
          align-items: center;
          gap: 5px;
        }

        .hud-label {
          font-size: 0.8rem;
          color: var(--cyan);
          letter-spacing: 0.1em;
          opacity: 0.8;
        }

        .hud-value {
          font-family: var(--font-title);
          font-size: 1.4rem;
          font-weight: 700;
          color: var(--primary-color);
          text-shadow: var(--text-shadow);
        }

        .score-display {
          position: relative;
        }

        .score-value {
          font-family: var(--font-title);
          font-size: 2.5rem;
          font-weight: 900;
          color: var(--accent-color);
          text-shadow: 0 0 15px var(--accent-color);
          letter-spacing: 0.1em;
        }

        /* 생명 및 파워 표시 */
        .lives-container {
          display: flex;
          gap: 5px;
        }

        .life-icon {
          font-size: 1.2rem;
          filter: drop-shadow(0 0 5px var(--primary-color));
          animation: lifePulse 2s ease-in-out infinite alternate;
        }

        @keyframes lifePulse {
          0% { transform: scale(1); }
          100% { transform: scale(1.1); }
        }

        .power-bars {
          display: flex;
          gap: 3px;
        }

        .power-bar {
          width: 15px;
          height: 20px;
          background: rgba(0, 255, 65, 0.3);
          border: 1px solid var(--primary-color);
          border-radius: 2px;
          position: relative;
        }

        .power-bar.active {
          background: var(--primary-color);
          box-shadow: 0 0 10px var(--primary-color);
        }

        /* 게임 컨테이너 */
        #game-container {
          position: absolute;
          top: 80px;
          left: 0;
          right: 0;
          bottom: 0;
          display: flex;
          justify-content: center;
          align-items: center;
          background: linear-gradient(180deg, rgba(10,10,35,0.8) 0%, rgba(5,5,15,0.9) 100%);
        }

        #gameCanvas {
          border: 2px solid var(--border-color);
          border-radius: 10px;
          background: rgba(0, 0, 0, 0.3);
          box-shadow: 
            0 0 20px rgba(30, 58, 138, 0.5),
            inset 0 0 20px rgba(0, 0, 0, 0.5);
        }

        /* 스테이지 메시지 */
        .stage-message {
          position: absolute;
          top: 50%;
          left: 50%;
          transform: translate(-50%, -50%);
          text-align: center;
          z-index: 30;
          background: rgba(10, 10, 35, 0.95);
          border: 2px solid var(--primary-color);
          border-radius: 15px;
          padding: 40px 60px;
          opacity: 0;
          visibility: hidden;
          transition: all 0.3s ease;
        }

        .stage-message.show {
          opacity: 1;
          visibility: visible;
          animation: stageMessagePulse 0.5s ease-out;
        }

        @keyframes stageMessagePulse {
          0% { transform: translate(-50%, -50%) scale(0.8); }
          100% { transform: translate(-50%, -50%) scale(1); }
        }

        .message-title {
          font-family: var(--font-title);
          font-size: 2.5rem;
          font-weight: 900;
          color: var(--accent-color);
          text-shadow: var(--neon-glow);
          margin-bottom: 15px;
          letter-spacing: 0.1em;
        }

        .message-subtitle {
          font-size: 1rem;
          color: var(--cyan);
          letter-spacing: 0.05em;
          opacity: 0.8;
        }

        /* 게임 오버/승리 화면 */
        .stat-item {
          display: flex;
          justify-content: space-between;
          align-items: center;
          margin: 15px 0;
          padding: 10px 0;
          border-bottom: 1px solid rgba(30, 58, 138, 0.5);
        }

        .stat-label {
          font-size: 1rem;
          color: var(--cyan);
          letter-spacing: 0.05em;
        }

        .stat-value {
          font-family: var(--font-title);
          font-size: 1.5rem;
          font-weight: 700;
          color: var(--accent-color);
          text-shadow: var(--text-shadow);
        }

        .game-over-buttons, .victory-buttons {
          display: flex;
          justify-content: center;
          gap: 20px;
          margin-top: 30px;
        }

        /* 반응형 디자인 */
        @media (max-width: 1024px) {
          .title-main {
            font-size: 3rem;
          }
          
          #gameCanvas {
            width: 90vw;
            height: 60vh;
          }
          
          .neon-border {
            padding: 30px 20px;
          }
        }

        @media (max-width: 768px) {
          .title-main {
            font-size: 2.5rem;
          }
          
          #game-hud {
            height: 70px;
            padding: 0 15px;
          }
          
          .hud-left, .hud-right {
            gap: 15px;
          }
          
          .score-value {
            font-size: 2rem;
          }
          
          .hud-value {
            font-size: 1.2rem;
          }
          
          .neon-button {
            font-size: 1rem;
            padding: 12px 25px;
          }
        }
    </style>
</head>
<body>
    <!-- Background Stars -->
    <div id="stars-container">
        <div class="stars" id="stars-layer1"></div>
        <div class="stars" id="stars-layer2"></div>
        <div class="stars" id="stars-layer3"></div>
    </div>

    <!-- Main Menu Screen -->
    <div id="main-menu" class="screen active">
        <div class="neon-border">
            <div class="game-title">
                <h1 class="title-main">GALLAG</h1>
                <div class="title-subtitle">RETRO ARCADE SHOOTER</div>
            </div>
            
            <div class="menu-content">
                <div class="high-score">
                    <div class="label">HIGH SCORE</div>
                    <div class="score" id="high-score-display">0</div>
                </div>
                
                <button id="start-button" class="neon-button">
                    <span class="button-text">START GAME</span>
                    <div class="button-glow"></div>
                </button>
                
                <div class="controls-info">
                    <div class="control-item">← → MOVE</div>
                    <div class="control-item">SPACE FIRE</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Game Screen -->
    <div id="game-screen" class="screen">
        <!-- HUD -->
        <div id="game-hud">
            <div class="hud-left">
                <div class="hud-item">
                    <span class="hud-label">STAGE</span>
                    <span class="hud-value" id="stage-display">01</span>
                </div>
                <div class="hud-item">
                    <span class="hud-label">ENEMIES</span>
                    <span class="hud-value" id="enemies-display">20</span>
                </div>
            </div>
            
            <div class="hud-center">
                <div class="score-display">
                    <span class="score-value" id="score-display">000000</span>
                </div>
            </div>
            
            <div class="hud-right">
                <div class="hud-item">
                    <span class="hud-label">LIVES</span>
                    <div class="lives-container" id="lives-display">
                        <div class="life-icon">🚀</div>
                        <div class="life-icon">🚀</div>
                        <div class="life-icon">🚀</div>
                    </div>
                </div>
                <div class="hud-item">
                    <span class="hud-label">POWER</span>
                    <div class="power-bars" id="power-display">
                        <div class="power-bar active"></div>
                        <div class="power-bar"></div>
                        <div class="power-bar"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Game Canvas -->
        <div id="game-container">
            <canvas id="gameCanvas" width="800" height="600"></canvas>
        </div>

        <!-- Stage Clear Message -->
        <div id="stage-clear" class="stage-message">
            <div class="message-content">
                <div class="message-title">STAGE CLEAR!</div>
                <div class="message-subtitle">GET READY FOR NEXT STAGE</div>
            </div>
        </div>
    </div>

    <!-- Game Over Screen -->
    <div id="game-over-screen" class="screen">
        <div class="neon-border">
            <div class="game-over-title">
                <h2 class="title-main red">GAME OVER</h2>
            </div>
            
            <div class="game-over-stats">
                <div class="stat-item">
                    <span class="stat-label">FINAL SCORE</span>
                    <span class="stat-value" id="final-score">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">STAGE REACHED</span>
                    <span class="stat-value" id="final-stage">1</span>
                </div>
            </div>
            
            <div class="game-over-buttons">
                <button id="restart-button" class="neon-button">
                    <span class="button-text">PLAY AGAIN</span>
                    <div class="button-glow"></div>
                </button>
                <button id="main-menu-button" class="neon-button secondary">
                    <span class="button-text">MAIN MENU</span>
                    <div class="button-glow"></div>
                </button>
            </div>
        </div>
    </div>

    <!-- Victory Screen -->
    <div id="victory-screen" class="screen">
        <div class="neon-border">
            <div class="victory-title">
                <h2 class="title-main gold">VICTORY!</h2>
                <div class="title-subtitle">ALL STAGES COMPLETED</div>
            </div>
            
            <div class="victory-stats">
                <div class="stat-item">
                    <span class="stat-label">FINAL SCORE</span>
                    <span class="stat-value" id="victory-score">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">ACCURACY</span>
                    <span class="stat-value" id="accuracy">100%</span>
                </div>
            </div>
            
            <div class="victory-buttons">
                <button id="victory-restart-button" class="neon-button">
                    <span class="button-text">PLAY AGAIN</span>
                    <div class="button-glow"></div>
                </button>
                <button id="victory-menu-button" class="neon-button secondary">
                    <span class="button-text">MAIN MENU</span>
                    <div class="button-glow"></div>
                </button>
            </div>
        </div>
    </div>

    <script>
        // 갤러그 게임 메인 엔진
        const GallagGame = (() => {
            'use strict';

            // 게임 상수 설정
            const CONFIG = {
                CANVAS_WIDTH: 800,
                CANVAS_HEIGHT: 600,
                PLAYER_SPEED: 5,
                BULLET_SPEED: 8,
                ENEMY_SPEED: 2,
                ITEM_SPEED: 3,
                FPS: 60,
                COLORS: {
                    PRIMARY: '#00FF41',
                    SECONDARY: '#FF0040', 
                    BACKGROUND: '#0A0A23',
                    ACCENT: '#FFD700',
                    WHITE: '#FFFFFF'
                }
            };

            // 게임 상태 관리
            const GameState = {
                MAIN_MENU: 'mainMenu',
                PLAYING: 'playing',
                GAME_OVER: 'gameOver',
                STAGE_CLEAR: 'stageClear',
                VICTORY: 'victory'
            };

            // DOM 요소 참조
            const elements = {
                mainMenu: document.getElementById('main-menu'),
                gameScreen: document.getElementById('game-screen'),
                gameOverScreen: document.getElementById('game-over-screen'),
                victoryScreen: document.getElementById('victory-screen'),
                canvas: document.getElementById('gameCanvas'),
                startButton: document.getElementById('start-button'),
                restartButton: document.getElementById('restart-button'),
                mainMenuButton: document.getElementById('main-menu-button'),
                victoryRestartButton: document.getElementById('victory-restart-button'),
                victoryMenuButton: document.getElementById('victory-menu-button'),
                highScoreDisplay: document.getElementById('high-score-display'),
                stageDisplay: document.getElementById('stage-display'),
                enemiesDisplay: document.getElementById('enemies-display'),
                scoreDisplay: document.getElementById('score-display'),
                livesDisplay: document.getElementById('lives-display'),
                powerDisplay: document.getElementById('power-display'),
                finalScore: document.getElementById('final-score'),
                finalStage: document.getElementById('final-stage'),
                victoryScore: document.getElementById('victory-score'),
                accuracy: document.getElementById('accuracy'),
                stageClear: document.getElementById('stage-clear')
            };

            // 메인 게임 클래스
            class Game {
                constructor() {
                    this.ctx = elements.canvas.getContext('2d');
                    this.currentState = GameState.MAIN_MENU;
                    
                    // 게임 데이터 초기화
                    this.score = 0;
                    this.stage = 1;
                    this.lives = 3;
                    this.highScore = parseInt(localStorage.getItem('gallag_highScore')) || 0;
                    this.totalShots = 0;
                    this.totalHits = 0;
                    
                    // 게임 객체 배열
                    this.player = null;
                    this.enemies = [];
                    this.bullets = [];
                    this.items = [];
                    this.particles = [];
                    this.stars = [];
                    
                    // 입력 상태
                    this.keys = {};
                    this.lastShot = 0;
                    
                    // 초기화
                    this.setupCanvas();
                    this.setupEventListeners();
                    this.generateStars();
                    this.updateHUD();
                    
                    // 게임 루프 시작
                    this.gameLoop();
                }

                setupCanvas() {
                    elements.canvas.width = CONFIG.CANVAS_WIDTH;
                    elements.canvas.height = CONFIG.CANVAS_HEIGHT;
                }

                setupEventListeners() {
                    // 키보드 이벤트
                    document.addEventListener('keydown', (e) => {
                        this.keys[e.code] = true;
                        e.preventDefault();
                    });

                    document.addEventListener('keyup', (e) => {
                        this.keys[e.code] = false;
                        e.preventDefault();
                    });

                    // 버튼 이벤트
                    elements.startButton?.addEventListener('click', () => this.startGame());
                    elements.restartButton?.addEventListener('click', () => this.restartGame());
                    elements.mainMenuButton?.addEventListener('click', () => this.showMainMenu());
                    elements.victoryRestartButton?.addEventListener('click', () => this.restartGame());
                    elements.victoryMenuButton?.addEventListener('click', () => this.showMainMenu());

                    // 터치 이벤트 (모바일 지원)
                    elements.canvas.addEventListener('touchstart', (e) => {
                        e.preventDefault();
                        if (this.currentState === GameState.PLAYING && this.player) {
                            this.shootBullet();
                        }
                    });

                    elements.canvas.addEventListener('touchmove', (e) => {
                        e.preventDefault();
                        if (this.currentState === GameState.PLAYING && this.player) {
                            const touch = e.touches[0];
                            const rect = elements.canvas.getBoundingClientRect();
                            const touchX = (touch.clientX - rect.left) * (CONFIG.CANVAS_WIDTH / rect.width);
                            
                            this.player.x = Math.max(0, Math.min(touchX - this.player.width / 2, 
                                CONFIG.CANVAS_WIDTH - this.player.width));
                        }
                    });
                }

                generateStars() {
                    this.stars = [];
                    for (let i = 0; i < 100; i++) {
                        this.stars.push({
                            x: Math.random() * CONFIG.CANVAS_WIDTH,
                            y: Math.random() * CONFIG.CANVAS_HEIGHT,
                            speed: Math.random() * 2 + 1,
                            size: Math.random() * 2 + 1
                        });
                    }
                }

                startGame() {
                    this.currentState = GameState.PLAYING;
                    this.showScreen('game-screen');
                    this.player = new Player(CONFIG.CANVAS_WIDTH / 2 - 15, CONFIG.CANVAS_HEIGHT - 50);
                    this.generateEnemies();
                    this.updateHUD();
                }

                restartGame() {
                    this.score = 0;
                    this.stage = 1;
                    this.lives = 3;
                    this.totalShots = 0;
                    this.totalHits = 0;
                    this.enemies = [];
                    this.bullets = [];
                    this.items = [];
                    this.particles = [];
                    this.startGame();
                }

                showMainMenu() {
                    this.currentState = GameState.MAIN_MENU;
                    this.showScreen('main-menu');
                    elements.highScoreDisplay.textContent = this.highScore.toString();
                }

                showScreen(screenId) {
                    // 모든 화면 숨기기
                    document.querySelectorAll('.screen').forEach(screen => {
                        screen.classList.remove('active');
                    });
                    
                    // 선택된 화면 보이기
                    const targetScreen = document.getElementById(screenId);
                    if (targetScreen) {
                        targetScreen.classList.add('active');
                    }
                }

                generateEnemies() {
                    const enemyCount = Math.min(20 + (this.stage - 1) * 5, 50);
                    this.enemies = [];
                    
                    for (let i = 0; i < enemyCount; i++) {
                        const x = Math.random() * (CONFIG.CANVAS_WIDTH - 20);
                        const y = Math.random() * 200 + 50;
                        this.enemies.push(new Enemy(x, y));
                    }
                    this.updateHUD();
                }

                shootBullet() {
                    const now = Date.now();
                    if (now - this.lastShot < 150 || !this.player) return;
                    
                    this.lastShot = now;
                    this.totalShots++;
                    const bulletCount = this.player.powerLevel;
                    
                    if (bulletCount === 1) {
                        this.bullets.push(new Bullet(this.player.x + this.player.width / 2 - 1, this.player.y));
                    } else if (bulletCount === 2) {
                        this.bullets.push(new Bullet(this.player.x + 5, this.player.y));
                        this.bullets.push(new Bullet(this.player.x + this.player.width - 5, this.player.y));
                    } else if (bulletCount >= 3) {
                        this.bullets.push(new Bullet(this.player.x + this.player.width / 2 - 1, this.player.y));
                        this.bullets.push(new Bullet(this.player.x + 5, this.player.y));
                        this.bullets.push(new Bullet(this.player.x + this.player.width - 5, this.player.y));
                    }
                }

                spawnItem(x, y) {
                    if (Math.random() < 0.15) {
                        this.items.push(new Item(x, y));
                    }
                }

                createExplosion(x, y) {
                    for (let i = 0; i < 8; i++) {
                        this.particles.push(new Particle(x, y));
                    }
                }

                checkCollision(rect1, rect2) {
                    return rect1.x < rect2.x + rect2.width &&
                           rect1.x + rect1.width > rect2.x &&
                           rect1.y < rect2.y + rect2.height &&
                           rect1.y + rect1.height > rect2.y;
                }

                update() {
                    if (this.currentState !== GameState.PLAYING) return;

                    // 플레이어 이동
                    if (this.player) {
                        if (this.keys['ArrowLeft'] && this.player.x > 0) {
                            this.player.x -= CONFIG.PLAYER_SPEED;
                        }
                        if (this.keys['ArrowRight'] && this.player.x < CONFIG.CANVAS_WIDTH - this.player.width) {
                            this.player.x += CONFIG.PLAYER_SPEED;
                        }
                        if (this.keys['Space']) {
                            this.shootBullet();
                        }
                    }

                    // 별 애니메이션
                    this.stars.forEach(star => {
                        star.y += star.speed;
                        if (star.y > CONFIG.CANVAS_HEIGHT) {
                            star.y = -star.size;
                            star.x = Math.random() * CONFIG.CANVAS_WIDTH;
                        }
                    });

                    // 적 이동
                    this.enemies.forEach(enemy => enemy.update());

                    // 총알 이동
                    for (let i = this.bullets.length - 1; i >= 0; i--) {
                        this.bullets[i].y -= CONFIG.BULLET_SPEED;
                        if (this.bullets[i].y < -10) {
                            this.bullets.splice(i, 1);
                        }
                    }

                    // 아이템 이동
                    for (let i = this.items.length - 1; i >= 0; i--) {
                        this.items[i].y += CONFIG.ITEM_SPEED;
                        if (this.items[i].y > CONFIG.CANVAS_HEIGHT + 20) {
                            this.items.splice(i, 1);
                        }
                    }

                    // 파티클 업데이트
                    for (let i = this.particles.length - 1; i >= 0; i--) {
                        this.particles[i].update();
                        if (this.particles[i].life <= 0) {
                            this.particles.splice(i, 1);
                        }
                    }

                    // 충돌 감지
                    this.handleCollisions();

                    // 스테이지 클리어 체크
                    if (this.enemies.length === 0) {
                        this.stage++;
                        if (this.stage > 10) {
                            this.currentState = GameState.VICTORY;
                            this.updateHighScore();
                            this.showVictoryScreen();
                        } else {
                            this.showStageClear();
                            setTimeout(() => {
                                this.hideStageClear();
                                this.generateEnemies();
                            }, 2000);
                        }
                    }

                    this.updateHUD();
                }

                handleCollisions() {
                    // 총알 vs 적
                    for (let i = this.bullets.length - 1; i >= 0; i--) {
                        for (let j = this.enemies.length - 1; j >= 0; j--) {
                            if (this.checkCollision(this.bullets[i], this.enemies[j])) {
                                this.createExplosion(this.enemies[j].x + this.enemies[j].width / 2, 
                                    this.enemies[j].y + this.enemies[j].height / 2);
                                this.score += 100 * this.stage;
                                this.totalHits++;
                                this.spawnItem(this.enemies[j].x, this.enemies[j].y);
                                this.bullets.splice(i, 1);
                                this.enemies.splice(j, 1);
                                break;
                            }
                        }
                    }

                    // 플레이어 vs 적
                    if (this.player) {
                        for (let i = this.enemies.length - 1; i >= 0; i--) {
                            if (this.checkCollision(this.player, this.enemies[i])) {
                                this.createExplosion(this.player.x + this.player.width / 2, 
                                    this.player.y + this.player.height / 2);
                                this.lives--;
                                this.enemies.splice(i, 1);
                                
                                if (this.lives <= 0) {
                                    this.currentState = GameState.GAME_OVER;
                                    this.updateHighScore();
                                    this.showGameOverScreen();
                                    return;
                                }
                                break;
                            }
                        }

                        // 플레이어 vs 아이템
                        for (let i = this.items.length - 1; i >= 0; i--) {
                            if (this.checkCollision(this.player, this.items[i])) {
                                this.score += 500;
                                this.player.powerUp();
                                this.createExplosion(this.items[i].x, this.items[i].y);
                                this.items.splice(i, 1);
                            }
                        }
                    }
                }

                updateHighScore() {
                    if (this.score > this.highScore) {
                        this.highScore = this.score;
                        localStorage.setItem('gallag_highScore', this.highScore.toString());
                    }
                }

                updateHUD() {
                    if (elements.stageDisplay) elements.stageDisplay.textContent = this.stage.toString().padStart(2, '0');
                    if (elements.enemiesDisplay) elements.enemiesDisplay.textContent = this.enemies.length.toString();
                    if (elements.scoreDisplay) elements.scoreDisplay.textContent = this.score.toString().padStart(6, '0');
                    
                    // 생명 표시 업데이트
                    if (elements.livesDisplay) {
                        const lifeIcons = elements.livesDisplay.querySelectorAll('.life-icon');
                        lifeIcons.forEach((icon, index) => {
                            icon.style.opacity = index < this.lives ? '1' : '0.3';
                        });
                    }
                    
                    // 파워 표시 업데이트
                    if (elements.powerDisplay && this.player) {
                        const powerBars = elements.powerDisplay.querySelectorAll('.power-bar');
                        powerBars.forEach((bar, index) => {
                            if (index < this.player.powerLevel) {
                                bar.classList.add('active');
                            } else {
                                bar.classList.remove('active');
                            }
                        });
                    }
                }

                showStageClear() {
                    if (elements.stageClear) {
                        elements.stageClear.classList.add('show');
                    }
                }

                hideStageClear() {
                    if (elements.stageClear) {
                        elements.stageClear.classList.remove('show');
                    }
                }

                showGameOverScreen() {
                    this.showScreen('game-over-screen');
                    if (elements.finalScore) elements.finalScore.textContent = this.score.toString();
                    if (elements.finalStage) elements.finalStage.textContent = this.stage.toString();
                }

                showVictoryScreen() {
                    this.showScreen('victory-screen');
                    const accuracy = this.totalShots > 0 ? Math.round((this.totalHits / this.totalShots) * 100) : 100;
                    if (elements.victoryScore) elements.victoryScore.textContent = this.score.toString();
                    if (elements.accuracy) elements.accuracy.textContent = accuracy + '%';
                }

                render() {
                    // 화면 지우기
                    this.ctx.fillStyle = CONFIG.COLORS.BACKGROUND;
                    this.ctx.fillRect(0, 0, CONFIG.CANVAS_WIDTH, CONFIG.CANVAS_HEIGHT);

                    // 별 그리기
                    this.ctx.fillStyle = CONFIG.COLORS.WHITE;
                    this.stars.forEach(star => {
                        this.ctx.fillRect(star.x, star.y, star.size, star.size);
                    });

                    // 게임 상태별 렌더링
                    if (this.currentState === GameState.PLAYING) {
                        this.renderGame();
                    }
                }

                renderGame() {
                    // 게임 오브젝트 렌더링
                    if (this.player) this.player.render(this.ctx);
                    this.enemies.forEach(enemy => enemy.render(this.ctx));
                    this.bullets.forEach(bullet => bullet.render(this.ctx));
                    this.items.forEach(item => item.render(this.ctx));
                    this.particles.forEach(particle => particle.render(this.ctx));
                }

                gameLoop() {
                    this.update();
                    this.render();
                    requestAnimationFrame(() => this.gameLoop());
                }
            }

            // 플레이어 클래스
            class Player {
                constructor(x, y) {
                    this.x = x;
                    this.y = y;
                    this.width = 30;
                    this.height = 20;
                    this.powerLevel = 1;
                }

                powerUp() {
                    this.powerLevel = Math.min(3, this.powerLevel + 1);
                }

                render(ctx) {
                    ctx.fillStyle = CONFIG.COLORS.PRIMARY;
                    ctx.beginPath();
                    ctx.moveTo(this.x + this.width / 2, this.y);
                    ctx.lineTo(this.x, this.y + this.height);
                    ctx.lineTo(this.x + this.width, this.y + this.height);
                    ctx.closePath();
                    ctx.fill();

                    // 엔진 효과
                    ctx.fillStyle = CONFIG.COLORS.WHITE;
                    ctx.fillRect(this.x + 5, this.y + this.height - 5, 5, 3);
                    ctx.fillRect(this.x + this.width - 10, this.y + this.height - 5, 5, 3);
                }
            }

            // 적 클래스
            class Enemy {
                constructor(x, y) {
                    this.x = x;
                    this.y = y;
                    this.width = 20;
                    this.height = 15;
                    this.direction = Math.random() > 0.5 ? 1 : -1;
                    this.moveCounter = 0;
                    this.speed = CONFIG.ENEMY_SPEED + Math.random();
                }

                update() {
                    this.x += this.direction * this.speed;
                    this.moveCounter++;

                    if (this.moveCounter > 60) {
                        this.direction *= -1;
                        this.moveCounter = 0;
                    }

                    if (this.x <= 0 || this.x >= CONFIG.CANVAS_WIDTH - this.width) {
                        this.direction *= -1;
                        this.y += 10;
                    }
                }

                render(ctx) {
                    ctx.fillStyle = CONFIG.COLORS.SECONDARY;
                    ctx.beginPath();
                    ctx.moveTo(this.x, this.y);
                    ctx.lineTo(this.x + this.width, this.y);
                    ctx.lineTo(this.x + this.width / 2, this.y + this.height);
                    ctx.closePath();
                    ctx.fill();

                    ctx.fillStyle = '#FF8C00';
                    ctx.fillRect(this.x + this.width / 2 - 2, this.y + 5, 4, 4);
                }
            }

            // 총알 클래스
            class Bullet {
                constructor(x, y) {
                    this.x = x;
                    this.y = y;
                    this.width = 2;
                    this.height = 8;
                }

                render(ctx) {
                    ctx.fillStyle = CONFIG.COLORS.WHITE;
                    ctx.fillRect(this.x, this.y, this.width, this.height);
                }
            }

            // 아이템 클래스
            class Item {
                constructor(x, y) {
                    this.x = x;
                    this.y = y;
                    this.width = 12;
                    this.height = 12;
                    this.glowPhase = 0;
                }

                render(ctx) {
                    this.glowPhase += 0.2;
                    const alpha = (Math.sin(this.glowPhase) + 1) / 2 * 0.5 + 0.5;
                    
                    ctx.fillStyle = CONFIG.COLORS.ACCENT;
                    ctx.globalAlpha = alpha;
                    ctx.beginPath();
                    ctx.arc(this.x + this.width / 2, this.y + this.height / 2, this.width / 2, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.globalAlpha = 1;
                }
            }

            // 파티클 클래스
            class Particle {
                constructor(x, y) {
                    this.x = x;
                    this.y = y;
                    this.vx = (Math.random() - 0.5) * 8;
                    this.vy = (Math.random() - 0.5) * 8;
                    this.life = 30;
                    this.maxLife = 30;
                    this.size = Math.random() * 4 + 2;
                }

                update() {
                    this.x += this.vx;
                    this.y += this.vy;
                    this.life--;
                    this.vx *= 0.95;
                    this.vy *= 0.95;
                }

                render(ctx) {
                    const alpha = this.life / this.maxLife;
                    ctx.fillStyle = CONFIG.COLORS.ACCENT;
                    ctx.globalAlpha = alpha;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.globalAlpha = 1;
                }
            }

            return {
                init() {
                    window.addEventListener('load', () => {
                        new Game();
                    });
                }
            };
        })();

        // 게임 시작
        GallagGame.init();
    </script>
</body>
