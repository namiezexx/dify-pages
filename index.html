<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>방구차 레이싱 - Fart Car Racing</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #4CAF50;
            --secondary-color: #F44336;
            --background-color: #2C3E50;
            --accent-color: #FFD700;
            --ui-primary: #3498DB;
            --ui-hover: #5DADE2;
            --ui-border: #2980B9;
            --text-light: #FFFFFF;
            --text-dark: #2C3E50;
            --font-title: 'Press Start 2P', monospace;
            --font-body: 'Roboto', sans-serif;
            --canvas-width: 800px;
            --canvas-height: 600px;
            --button-height: 60px;
            --border-radius: 8px;
            --transition-fast: 0.2s ease;
            --transition-normal: 0.3s ease;
            --transition-slow: 0.5s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-body);
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: var(--text-light);
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(ellipse at center, rgba(44, 62, 80, 0.9) 0%, rgba(44, 62, 80, 1) 100%);
        }

        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all var(--transition-normal);
            transform: scale(0.95);
        }

        .screen.active {
            opacity: 1;
            visibility: visible;
            transform: scale(1);
        }

        .menu-content {
            text-align: center;
        }

        .game-title {
            margin-bottom: 3rem;
        }

        .title-main {
            display: block;
            font-family: var(--font-title);
            font-size: clamp(2rem, 5vw, 3rem);
            color: var(--accent-color);
            text-shadow: 3px 3px 0px var(--ui-border);
            margin-bottom: 0.5rem;
        }

        .title-sub {
            display: block;
            font-family: var(--font-body);
            font-size: clamp(1rem, 2.5vw, 1.5rem);
            color: var(--text-light);
            opacity: 0.9;
        }

        .menu-buttons {
            margin: 2rem 0;
        }

        .high-score-display {
            margin: 2rem 0;
            padding: 1rem 2rem;
            background: rgba(255, 255, 255, 0.1);
            border-radius: var(--border-radius);
            border: 2px solid var(--accent-color);
        }

        .score-label {
            display: block;
            font-size: 1rem;
            margin-bottom: 0.5rem;
            opacity: 0.8;
        }

        .score-value {
            display: block;
            font-family: var(--font-title);
            font-size: 1.5rem;
            color: var(--accent-color);
        }

        .game-instructions {
            margin-top: 2rem;
            opacity: 0.7;
            font-size: 0.9rem;
            line-height: 1.6;
        }

        .game-button {
            font-family: var(--font-body);
            font-weight: 700;
            font-size: 1.1rem;
            padding: 1rem 2rem;
            margin: 0.5rem;
            border: none;
            border-radius: var(--border-radius);
            cursor: pointer;
            transition: all var(--transition-fast);
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }

        .game-button.primary {
            background: var(--ui-primary);
            color: var(--text-light);
            border: 3px solid var(--ui-border);
            box-shadow: 0 4px 15px rgba(52, 152, 219, 0.3);
        }

        .game-button.primary:hover {
            background: var(--ui-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(93, 173, 226, 0.4);
        }

        .game-button.secondary {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-light);
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .game-button.secondary:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.5);
        }

        .game-button:active {
            transform: translateY(1px);
        }

        .game-hud {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            z-index: 10;
            pointer-events: none;
        }

        .hud-left, .hud-right {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .score-display, .time-display {
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 15px;
            border-radius: var(--border-radius);
            border: 2px solid var(--accent-color);
            min-width: 120px;
        }

        .hud-label {
            display: block;
            font-size: 0.8rem;
            opacity: 0.8;
            margin-bottom: 2px;
        }

        .hud-value {
            display: block;
            font-family: var(--font-title);
            font-size: 1.2rem;
            color: var(--accent-color);
        }

        .canvas-container {
            position: relative;
            border: 4px solid var(--accent-color);
            border-radius: var(--border-radius);
            overflow: hidden;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
        }

        #game-canvas {
            display: block;
            background: var(--background-color);
        }

        .game-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 20;
        }

        .game-overlay.hidden {
            display: none;
        }

        .overlay-content {
            text-align: center;
            color: var(--text-light);
            font-size: 1.5rem;
        }

        .control-guide {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 0.8rem;
            opacity: 0.8;
        }

        .control-item {
            white-space: nowrap;
        }

        .gameover-content {
            text-align: center;
        }

        .gameover-title {
            font-family: var(--font-title);
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            color: var(--secondary-color);
            margin-bottom: 2rem;
            text-shadow: 2px 2px 0px rgba(0, 0, 0, 0.5);
        }

        .final-stats {
            margin: 2rem 0;
            padding: 2rem;
            background: rgba(0, 0, 0, 0.3);
            border-radius: var(--border-radius);
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 1rem 0;
            padding: 0.5rem 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stat-item:last-child {
            border-bottom: none;
        }

        .stat-label {
            font-size: 1rem;
            opacity: 0.8;
        }

        .stat-value {
            font-family: var(--font-title);
            font-size: 1.2rem;
            color: var(--accent-color);
        }

        .new-record {
            justify-content: center !important;
            border: 2px solid var(--accent-color) !important;
            background: rgba(255, 215, 0, 0.1) !important;
            border-radius: var(--border-radius);
        }

        .new-record.hidden {
            display: none !important;
        }

        .record-text {
            font-family: var(--font-title);
            color: var(--accent-color);
            font-size: 1rem;
        }

        .gameover-buttons {
            margin-top: 2rem;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            visibility: hidden;
            transition: all var(--transition-normal);
        }

        .modal:not(.hidden) {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background: var(--background-color);
            padding: 2rem;
            border-radius: var(--border-radius);
            border: 3px solid var(--accent-color);
            text-align: center;
            min-width: 300px;
        }

        .modal-title {
            font-family: var(--font-title);
            font-size: 1.2rem;
            margin-bottom: 1.5rem;
            color: var(--accent-color);
        }

        .modal-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }

        .particle-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 50;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--accent-color);
            border-radius: 50%;
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 900px) {
            :root {
                --canvas-width: 90vw;
                --canvas-height: calc(90vw * 0.75);
            }
            
            #game-canvas {
                width: var(--canvas-width);
                height: var(--canvas-height);
            }
            
            .control-guide {
                flex-direction: column;
                gap: 5px;
                font-size: 0.7rem;
            }
        }

        @media (max-width: 600px) {
            .game-hud {
                left: 10px;
                right: 10px;
                top: 10px;
            }
            
            .score-display, .time-display {
                padding: 8px 12px;
                min-width: 100px;
            }
            
            .hud-value {
                font-size: 1rem;
            }
            
            .game-button {
                font-size: 1rem;
                padding: 0.8rem 1.5rem;
            }
            
            .modal-content {
                margin: 1rem;
                padding: 1.5rem;
            }
            
            .modal-buttons {
                flex-direction: column;
            }
        }

        @media (max-height: 700px) {
            .menu-content {
                transform: scale(0.9);
            }
            
            .gameover-content {
                transform: scale(0.9);
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <!-- 메인 메뉴 화면 -->
        <div id="menu-screen" class="screen active">
            <div class="menu-content">
                <h1 class="game-title">
                    <span class="title-main">방구차 레이싱</span>
                    <span class="title-sub">💨 Fart Car Racing 🚗</span>
                </h1>
                
                <div class="menu-buttons">
                    <button id="start-button" class="game-button primary">
                        🎮 START GAME
                    </button>
                </div>
                
                <div class="high-score-display">
                    <span class="score-label">🏆 최고 점수</span>
                    <span id="high-score-value" class="score-value">0</span>
                </div>
                
                <div class="game-instructions">
                    <p>🎯 조작법: 방향키로 이동, 스페이스바로 방구 발사!</p>
                    <p>💥 적 차량을 피하고 방구로 공격하세요!</p>
                </div>
            </div>
        </div>

        <!-- 게임 플레이 화면 -->
        <div id="game-screen" class="screen">
            <div class="game-hud">
                <div class="hud-left">
                    <div class="score-display">
                        <span class="hud-label">점수</span>
                        <span id="current-score" class="hud-value">0</span>
                    </div>
                </div>
                
                <div class="hud-right">
                    <div class="time-display">
                        <span class="hud-label">시간</span>
                        <span id="survival-time" class="hud-value">0:00</span>
                    </div>
                </div>
            </div>

            <div class="canvas-container">
                <canvas id="game-canvas" width="800" height="600"></canvas>
                
                <div id="game-overlay" class="game-overlay hidden">
                    <div class="overlay-content">
                        <p id="overlay-message">게임 준비 중...</p>
                    </div>
                </div>
            </div>

            <div class="control-guide">
                <span class="control-item">⬅️➡️⬆️⬇️ 이동</span>
                <span class="control-item">🚀 스페이스바: 방구 발사</span>
                <span class="control-item">⏸️ ESC: 일시정지</span>
            </div>
        </div>

        <!-- 게임 오버 화면 -->
        <div id="gameover-screen" class="screen">
            <div class="gameover-content">
                <h2 class="gameover-title">💥 GAME OVER 💥</h2>
                
                <div class="final-stats">
                    <div class="stat-item">
                        <span class="stat-label">최종 점수</span>
                        <span id="final-score" class="stat-value">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">생존 시간</span>
                        <span id="final-time" class="stat-value">0:00</span>
                    </div>
                    <div class="stat-item new-record hidden" id="new-record">
                        <span class="record-text">🎉 신기록 달성! 🎉</span>
                    </div>
                </div>
                
                <div class="gameover-buttons">
                    <button id="restart-button" class="game-button primary">
                        🔄 다시 시작
                    </button>
                    <button id="menu-button" class="game-button secondary">
                        🏠 메인 메뉴
                    </button>
                </div>
            </div>
        </div>

        <!-- 일시정지 모달 -->
        <div id="pause-modal" class="modal hidden">
            <div class="modal-content">
                <h3 class="modal-title">⏸️ 게임 일시정지</h3>
                <div class="modal-buttons">
                    <button id="resume-button" class="game-button primary">
                        ▶️ 계속하기
                    </button>
                    <button id="quit-button" class="game-button secondary">
                        🚪 그만두기
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="particle-container" class="particle-container"></div>

    <script>
        // 방구차 레이싱 게임 - 메인 JavaScript 로직
        class GameEngine {
            constructor() {
                this.canvas = document.getElementById('game-canvas');
                this.ctx = this.canvas.getContext('2d');
                this.canvas.width = 800;
                this.canvas.height = 600;
                
                // 게임 상태 관리
                this.gameState = {
                    scene: 'menu',
                    score: 0,
                    time: 0,
                    enemySpawnRate: 2000,
                    enemySpeed: 2,
                    lastEnemySpawn: 0,
                    gameStartTime: 0
                };
                
                // 키 입력 상태 관리
                this.keys = {
                    ArrowUp: false,
                    ArrowDown: false,
                    ArrowLeft: false,
                    ArrowRight: false,
                    Space: false
                };
                
                // 게임 객체들
                this.player = null;
                this.enemies = [];
                this.farts = [];
                this.particles = [];
                
                // 도로 애니메이션
                this.roadOffset = 0;
                
                // 연속 처치 카운터
                this.killStreak = 0;
                this.lastKillTime = 0;
                
                // 최고 점수 로드
                this.highScore = parseInt(localStorage.getItem('fartCarHighScore') || '0');
                
                this.init();
            }
            
            init() {
                this.setupEventListeners();
                this.loadFont();
                this.gameLoop();
                this.updateUI();
            }
            
            loadFont() {
                const font = new FontFace('PressStart2P', 'url(https://fonts.gstatic.com/s/pressstart2p/v14/e3t4euO8T-267oIAQAu6jDQyK3nVivNm4I81.woff2)');
                font.load().then(() => {
                    document.fonts.add(font);
                }).catch(() => {
                    console.warn('폰트 로드 실패, 기본 폰트 사용');
                });
            }
            
            setupEventListeners() {
                // 키보드 이벤트
                document.addEventListener('keydown', (e) => {
                    if (e.code in this.keys) {
                        e.preventDefault();
                        this.keys[e.code] = true;
                    }
                    
                    // 게임 상태별 키 처리
                    if (this.gameState.scene === 'menu' && e.code === 'Space') {
                        this.startGame();
                    } else if (this.gameState.scene === 'gameover' && e.code === 'Space') {
                        this.restartGame();
                    }
                });
                
                document.addEventListener('keyup', (e) => {
                    if (e.code in this.keys) {
                        e.preventDefault();
                        this.keys[e.code] = false;
                    }
                });
                
                // 버튼 이벤트
                document.getElementById('start-button').addEventListener('click', () => this.startGame());
                document.getElementById('restart-button').addEventListener('click', () => this.restartGame());
                document.getElementById('menu-button').addEventListener('click', () => this.goToMenu());
                
                // 터치 이벤트 (모바일 지원)
                this.canvas.addEventListener('touchstart', this.handleTouch.bind(this));
                this.canvas.addEventListener('touchmove', this.handleTouch.bind(this));
            }
            
            handleTouch(e) {
                e.preventDefault();
                if (!this.player || this.gameState.scene !== 'playing') return;
                
                const rect = this.canvas.getBoundingClientRect();
                const touch = e.touches[0];
                const touchX = touch.clientX - rect.left;
                const touchY = touch.clientY - rect.top;
                
                // 터치 위치로 플레이어 이동
                const targetX = touchX - this.player.width / 2;
                const targetY = touchY - this.player.height / 2;
                
                this.player.x = Math.max(0, Math.min(this.canvas.width - this.player.width, targetX));
                this.player.y = Math.max(0, Math.min(this.canvas.height - this.player.height, targetY));
            }
            
            startGame() {
                this.switchScreen('game-screen');
                this.gameState.scene = 'playing';
                this.gameState.score = 0;
                this.gameState.time = 0;
                this.gameState.enemySpawnRate = 2000;
                this.gameState.enemySpeed = 2;
                this.gameState.lastEnemySpawn = 0;
                this.gameState.gameStartTime = Date.now();
                
                this.killStreak = 0;
                this.lastKillTime = 0;
                
                // 게임 객체 초기화
                this.player = new Player(this.canvas.width / 2 - 20, this.canvas.height - 80);
                this.enemies = [];
                this.farts = [];
                this.particles = [];
                
                this.updateUI();
                this.playSound('start');
            }
            
            restartGame() {
                this.startGame();
            }
            
            goToMenu() {
                this.switchScreen('menu-screen');
                this.gameState.scene = 'menu';
                this.updateUI();
            }
            
            switchScreen(targetScreenId) {
                document.querySelectorAll('.screen').forEach(screen => {
                    screen.classList.remove('active');
                });
                document.getElementById(targetScreenId).classList.add('active');
            }
            
            gameOver() {
                this.switchScreen('gameover-screen');
                this.gameState.scene = 'gameover';
                
                // 최고 점수 업데이트
                const isNewRecord = this.gameState.score > this.highScore;
                if (isNewRecord) {
                    this.highScore = this.gameState.score;
                    localStorage.setItem('fartCarHighScore', this.highScore.toString());
                    document.getElementById('new-record').classList.remove('hidden');
                } else {
                    document.getElementById('new-record').classList.add('hidden');
                }
                
                this.updateUI();
                this.playSound('gameover');
            }
            
            updateUI() {
                // 최고 점수 업데이트
                document.getElementById('high-score-value').textContent = this.highScore;
                
                if (this.gameState.scene === 'playing') {
                    // 게임 중 점수 및 시간 업데이트
                    document.getElementById('current-score').textContent = this.gameState.score;
                    const minutes = Math.floor(this.gameState.time / 60000);
                    const seconds = Math.floor((this.gameState.time % 60000) / 1000);
                    document.getElementById('survival-time').textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
                } else if (this.gameState.scene === 'gameover') {
                    // 게임오버 화면 업데이트
                    document.getElementById('final-score').textContent = this.gameState.score;
                    const minutes = Math.floor(this.gameState.time / 60000);
                    const seconds = Math.floor((this.gameState.time % 60000) / 1000);
                    document.getElementById('final-time').textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
                }
            }
            
            update(deltaTime) {
                if (this.gameState.scene !== 'playing') return;
                
                this.gameState.time += deltaTime;
                
                // 플레이어 업데이트
                if (this.player) {
                    this.player.update(this.keys, deltaTime);
                    
                    // 방구 발사
                    if (this.keys.Space && this.player.canShoot()) {
                        const fart = this.player.shoot();
                        if (fart) {
                            this.farts.push(fart);
                            this.playSound('shoot');
                        }
                    }
                }
                
                // 적 생성
                this.spawnEnemies(deltaTime);
                
                // 적 업데이트
                this.enemies.forEach(enemy => enemy.update(this.player, deltaTime));
                
                // 방구 업데이트
                this.farts.forEach(fart => fart.update(deltaTime));
                
                // 파티클 업데이트
                this.particles.forEach(particle => particle.update(deltaTime));
                
                // 충돌 감지
                this.checkCollisions();
                
                // 화면 밖 객체 제거
                this.cleanupObjects();
                
                // 난이도 조절
                this.adjustDifficulty();
                
                // 연속 처치 리셋
                if (Date.now() - this.lastKillTime > 3000) {
                    this.killStreak = 0;
                }
                
                // 도로 애니메이션
                this.roadOffset += 3;
                if (this.roadOffset >= 40) this.roadOffset = 0;
                
                // UI 업데이트
                this.updateUI();
            }
            
            spawnEnemies(deltaTime) {
                const now = Date.now();
                if (now - this.gameState.lastEnemySpawn > this.gameState.enemySpawnRate) {
                    const x = Math.random() * (this.canvas.width - 35);
                    const trackingChance = Math.random() < 0.3;
                    this.enemies.push(new Enemy(x, -50, this.gameState.enemySpeed, trackingChance));
                    this.gameState.lastEnemySpawn = now;
                }
            }
            
            checkCollisions() {
                // 방구-적 충돌
                for (let i = this.farts.length - 1; i >= 0; i--) {
                    for (let j = this.enemies.length - 1; j >= 0; j--) {
                        if (this.checkAABB(this.farts[i], this.enemies[j])) {
                            // 폭발 이펙트 생성
                            this.createExplosion(this.enemies[j].x + this.enemies[j].width / 2, 
                                               this.enemies[j].y + this.enemies[j].height / 2);
                            
                            // 점수 추가
                            this.gameState.score += 100;
                            this.killStreak++;
                            this.lastKillTime = Date.now();
                            
                            // 연속 처치 보너스
                            if (this.killStreak >= 3 && this.killStreak % 3 === 0) {
                                this.gameState.score += 300;
                                this.createBonusText(this.enemies[j].x, this.enemies[j].y);
                            }
                            
                            // 객체 제거
                            this.farts.splice(i, 1);
                            this.enemies.splice(j, 1);
                            
                            this.playSound('hit');
                            break;
                        }
                    }
                }
                
                // 플레이어-적 충돌
                if (this.player) {
                    for (let enemy of this.enemies) {
                        if (this.checkAABB(this.player, enemy)) {
                            this.createExplosion(this.player.x + this.player.width / 2, 
                                               this.player.y + this.player.height / 2);
                            this.gameOver();
                            return;
                        }
                    }
                }
            }
            
            checkAABB(obj1, obj2) {
                return obj1.x < obj2.x + obj2.width &&
                       obj1.x + obj1.width > obj2.x &&
                       obj1.y < obj2.y + obj2.height &&
                       obj1.y + obj1.height > obj2.y;
            }
            
            createExplosion(x, y) {
                for (let i = 0; i < 12; i++) {
                    const angle = (i * 30) * Math.PI / 180;
                    const speed = 2 + Math.random() * 3;
                    this.particles.push(new Particle(x, y, angle, speed));
                }
            }
            
            createBonusText(x, y) {
                this.particles.push(new BonusText(x, y, '+300'));
            }
            
            cleanupObjects() {
                this.farts = this.farts.filter(fart => fart.y > -20);
                this.enemies = this.enemies.filter(enemy => enemy.y < this.canvas.height + 50);
                this.particles = this.particles.filter(particle => particle.life > 0);
            }
            
            adjustDifficulty() {
                const timeInSeconds = this.gameState.time / 1000;
                
                // 30초마다 적 생성 속도 증가
                if (Math.floor(timeInSeconds / 30) > Math.floor((timeInSeconds - 1/60) / 30)) {
                    this.gameState.enemySpawnRate = Math.max(500, this.gameState.enemySpawnRate - 200);
                }
                
                // 60초마다 적 이동 속도 증가
                if (Math.floor(timeInSeconds / 60) > Math.floor((timeInSeconds - 1/60) / 60)) {
                    this.gameState.enemySpeed += 0.5;
                }
                
                // 생존 시간 점수
                if (Math.floor(timeInSeconds) > Math.floor((timeInSeconds - 1/60))) {
                    this.gameState.score += 10;
                }
            }
            
            render() {
                // 화면 클리어
                this.ctx.fillStyle = '#2C3E50';
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                
                if (this.gameState.scene === 'playing') {
                    this.renderGame();
                }
            }
            
            renderGame() {
                // 도로 차선 그리기
                this.ctx.strokeStyle = '#FFFFFF';
                this.ctx.lineWidth = 3;
                this.ctx.setLineDash([10, 10]);
                this.ctx.lineDashOffset = -this.roadOffset;
                this.ctx.beginPath();
                this.ctx.moveTo(this.canvas.width / 2, 0);
                this.ctx.lineTo(this.canvas.width / 2, this.canvas.height);
                this.ctx.stroke();
                this.ctx.setLineDash([]);
                
                // 도로 경계선
                this.ctx.strokeStyle = '#FFD700';
                this.ctx.lineWidth = 3;
                this.ctx.beginPath();
                this.ctx.moveTo(10, 0);
                this.ctx.lineTo(10, this.canvas.height);
                this.ctx.moveTo(this.canvas.width - 10, 0);
                this.ctx.lineTo(this.canvas.width - 10, this.canvas.height);
                this.ctx.stroke();
                
                // 게임 객체들 렌더링
                if (this.player) this.player.render(this.ctx);
                this.enemies.forEach(enemy => enemy.render(this.ctx));
                this.farts.forEach(fart => fart.render(this.ctx));
                this.particles.forEach(particle => particle.render(this.ctx));
                
                // 연속 처치 표시
                if (this.killStreak >= 3) {
                    this.ctx.font = '16px PressStart2P, monospace';
                    this.ctx.fillStyle = '#FF6B35';
                    this.ctx.textAlign = 'center';
                    this.ctx.fillText(`${this.killStreak} 연속!`, this.canvas.width / 2, 50);
                }
            }
            
            playSound(type) {
                try {
                    const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    const oscillator = audioContext.createOscillator();
                    const gainNode = audioContext.createGain();
                    
                    oscillator.connect(gainNode);
                    gainNode.connect(audioContext.destination);
                    
                    switch (type) {
                        case 'shoot':
                            oscillator.frequency.setValueAtTime(300, audioContext.currentTime);
                            oscillator.frequency.exponentialRampToValueAtTime(100, audioContext.currentTime + 0.1);
                            gainNode.gain.setValueAtTime(0.1, audioContext.currentTime);
                            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);
                            oscillator.start();
                            oscillator.stop(audioContext.currentTime + 0.1);
                            break;
                        case 'hit':
                            oscillator.frequency.setValueAtTime(150, audioContext.currentTime);
                            gainNode.gain.setValueAtTime(0.2, audioContext.currentTime);
                            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.2);
                            oscillator.start();
                            oscillator.stop(audioContext.currentTime + 0.2);
                            break;
                        case 'gameover':
                            oscillator.frequency.setValueAtTime(200, audioContext.currentTime);
                            oscillator.frequency.exponentialRampToValueAtTime(50, audioContext.currentTime + 1);
                            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
                            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 1);
                            oscillator.start();
                            oscillator.stop(audioContext.currentTime + 1);
                            break;
                    }
                } catch (error) {
                    console.warn('사운드 재생 실패:', error);
                }
            }
            
            gameLoop() {
                const now = Date.now();
                const deltaTime = now - (this.lastTime || now);
                this.lastTime = now;
                
                this.update(deltaTime);
                this.render();
                
                requestAnimationFrame(() => this.gameLoop());
            }
        }

        // 플레이어 클래스
        class Player {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.width = 40;
                this.height = 60;
                this.speed = 5;
                this.lastShot = 0;
                this.shootCooldown = 300;
            }
            
            update(keys, deltaTime) {
                if (keys.ArrowLeft && this.x > 10) this.x -= this.speed;
                if (keys.ArrowRight && this.x < 800 - this.width - 10) this.x += this.speed;
                if (keys.ArrowUp && this.y > 0) this.y -= this.speed;
                if (keys.ArrowDown && this.y < 600 - this.height) this.y += this.speed;
            }
            
            canShoot() {
                return Date.now() - this.lastShot > this.shootCooldown;
            }
            
            shoot() {
                if (!this.canShoot()) return null;
                
                this.lastShot = Date.now();
                return new Fart(this.x + this.width / 2 - 7.5, this.y - 10);
            }
            
            render(ctx) {
                ctx.fillStyle = '#4CAF50';
                this.roundRect(ctx, this.x, this.y, this.width, this.height, 5);
                
                ctx.fillStyle = '#FFFFFF';
                ctx.beginPath();
                ctx.arc(this.x + 10, this.y + 10, 4, 0, Math.PI * 2);
                ctx.arc(this.x + 30, this.y + 10, 4, 0, Math.PI * 2);
                ctx.fill();
            }
            
            roundRect(ctx, x, y, width, height, radius) {
                ctx.beginPath();
                ctx.moveTo(x + radius, y);
                ctx.lineTo(x + width - radius, y);
                ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
                ctx.lineTo(x + width, y + height - radius);
                ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
                ctx.lineTo(x + radius, y + height);
                ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
                ctx.lineTo(x, y + radius);
                ctx.quadraticCurveTo(x, y, x + radius, y);
                ctx.closePath();
                ctx.fill();
            }
        }

        // 적 클래스
        class Enemy {
            constructor(x, y, speed, tracking = false) {
                this.x = x;
                this.y = y;
                this.width = 35;
                this.height = 50;
                this.speed = speed;
                this.tracking = tracking;
            }
            
            update(player, deltaTime) {
                if (this.tracking && player) {
                    const dx = player.x - this.x;
                    const trackingSpeed = this.speed * 0.3;
                    
                    if (Math.abs(dx) > 5) {
                        this.x += dx > 0 ? trackingSpeed : -trackingSpeed;
                    }
                }
                
                this.y += this.speed;
            }
            
            render(ctx) {
                ctx.fillStyle = '#F44336';
                this.roundRect(ctx, this.x, this.y, this.width, this.height, 3);
                
                ctx.fillStyle = '#FFD700';
                ctx.beginPath();
                ctx.arc(this.x + 8, this.y + 8, 3, 0, Math.PI * 2);
                ctx.arc(this.x + 27, this.y + 8, 3, 0, Math.PI * 2);
                ctx.fill();
            }
            
            roundRect(ctx, x, y, width, height, radius) {
                ctx.beginPath();
                ctx.moveTo(x + radius, y);
                ctx.lineTo(x + width - radius, y);
                ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
                ctx.lineTo(x + width, y + height - radius);
                ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
                ctx.lineTo(x + radius, y + height);
                ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
                ctx.lineTo(x, y + radius);
                ctx.quadraticCurveTo(x, y, x + radius, y);
                ctx.closePath();
                ctx.fill();
            }
        }

        // 방구 클래스
        class Fart {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.width = 15;
                this.height = 10;
                this.speed = 8;
            }
            
            update(deltaTime) {
                this.y -= this.speed;
            }
            
            render(ctx) {
                const gradient = ctx.createRadialGradient(
                    this.x + this.width/2, this.y + this.height/2, 0,
                    this.x + this.width/2, this.y + this.height/2, this.width/2
                );
                gradient.addColorStop(0, '#FFD700');
                gradient.addColorStop(0.5, '#FFA500');
                gradient.addColorStop(1, '#8B4513');
                
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.ellipse(this.x + this.width/2, this.y + this.height/2, 
                           this.width/2, this.height/2, 0, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // 파티클 클래스
        class Particle {
            constructor(x, y, angle, speed) {
                this.x = x;
                this.y = y;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.life = 30;
                this.maxLife = 30;
            }
            
            update(deltaTime) {
                this.x += this.vx;
                this.y += this.vy;
                this.life--;
            }
            
            render(ctx) {
                const alpha = this.life / this.maxLife;
                ctx.fillStyle = `rgba(255, 107, 53, ${alpha})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // 보너스 텍스트 클래스
        class BonusText {
            constructor(x, y, text) {
                this.x = x;
                this.y = y;
                this.text = text;
                this.life = 60;
                this.maxLife = 60;
            }
            
            update(deltaTime) {
                this.y -= 1;
                this.life--;
            }
            
            render(ctx) {
                const alpha = this.life / this.maxLife;
                ctx.font = '16px PressStart2P, monospace';
                ctx.fillStyle = `rgba(255, 215, 0, ${alpha})`;
                ctx.textAlign = 'center';
                ctx.fillText(this.text, this.x, this.y);
            }
        }

        // 게임 초기화
        document.addEventListener('DOMContentLoaded', () => {
            try {
                window.game = new GameEngine();
                console.log('방구차 레이싱 게임이 성공적으로 로드되었습니다!');
            } catch (error) {
                console.error('게임 초기화 실패:', error);
                alert('게임 로드 중 오류가 발생했습니다. 페이지를 새로고침해 주세요.');
            }
        });
    </script>
