<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>룰렛 게임</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gold: #FFD700;
            --secondary-silver: #C0C0C0;
            --tertiary-bronze: #CD7F32;
            --miss-gray: #808080;
            --bg-dark: #1a1a2e;
            --accent-blue: #16213e;
            --text-white: #ffffff;
            --neon-glow: 0 0 10px currentColor, 0 0 20px currentColor, 0 0 30px currentColor;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg-dark);
            color: var(--text-white);
            font-family: 'Roboto', sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--bg-dark) 0%, var(--accent-blue) 100%);
        }

        .star-particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: var(--text-white);
            border-radius: 50%;
            animation: twinkle 4s infinite ease-in-out alternate;
            box-shadow: 0 0 6px var(--text-white);
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.5); }
        }

        .game-header {
            position: absolute;
            top: 20px;
            z-index: 10;
        }

        .game-title {
            font-family: 'Orbitron', monospace;
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--primary-gold);
            text-shadow: var(--neon-glow);
            animation: pulse-glow 2s infinite ease-in-out alternate;
        }

        @keyframes pulse-glow {
            0% { text-shadow: 0 0 10px var(--primary-gold), 0 0 20px var(--primary-gold); }
            100% { text-shadow: 0 0 15px var(--primary-gold), 0 0 30px var(--primary-gold), 0 0 45px var(--primary-gold); }
        }

        .history-panel {
            position: absolute;
            top: 100px;
            left: 30px;
            background: rgba(0, 0, 0, 0.6);
            padding: 15px;
            border-radius: 10px;
            border: 2px solid var(--primary-gold);
            z-index: 10;
        }

        .history-panel h3 {
            font-family: 'Orbitron', monospace;
            font-size: 1rem;
            color: var(--primary-gold);
            margin-bottom: 10px;
            text-align: center;
        }

        .history-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .history-item {
            display: block;
            padding: 8px 12px;
            border-radius: 6px;
            text-align: center;
            font-weight: bold;
            font-size: 1.2rem;
            min-width: 50px;
            transition: all 0.3s ease;
        }

        .history-item.empty {
            background: rgba(128, 128, 128, 0.3);
            color: var(--miss-gray);
        }

        .history-item.first {
            background: linear-gradient(45deg, var(--primary-gold), #ffed4e);
            color: #000;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
        }

        .history-item.second {
            background: linear-gradient(45deg, var(--secondary-silver), #e6e6e6);
            color: #000;
            box-shadow: 0 0 15px rgba(192, 192, 192, 0.5);
        }

        .history-item.third {
            background: linear-gradient(45deg, var(--tertiary-bronze), #d4925a);
            color: #fff;
            box-shadow: 0 0 15px rgba(205, 127, 50, 0.5);
        }

        .history-item.miss {
            background: linear-gradient(45deg, var(--miss-gray), #999);
            color: #fff;
        }

        .roulette-container {
            position: relative;
            z-index: 5;
            margin: 20px 0;
        }

        .pointer {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 25px solid #ff4444;
            z-index: 10;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
            animation: pointer-glow 1s infinite ease-in-out alternate;
        }

        @keyframes pointer-glow {
            0% { filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5)); }
            100% { filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5)) drop-shadow(0 0 10px #ff4444); }
        }

        #rouletteCanvas {
            border-radius: 50%;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
            transition: all 0.3s ease;
        }

        #rouletteCanvas:hover {
            box-shadow: 0 0 50px rgba(255, 215, 0, 0.6);
        }

        .roulette-shadow {
            position: absolute;
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 280px;
            height: 40px;
            background: radial-gradient(ellipse, rgba(0,0,0,0.4) 0%, transparent 70%);
            border-radius: 50%;
            z-index: 1;
        }

        .game-status {
            z-index: 5;
            margin-top: 30px;
        }

        .status-text {
            font-family: 'Orbitron', monospace;
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text-white);
            text-align: center;
            text-shadow: 0 0 10px currentColor;
            transition: all 0.3s ease;
        }

        .status-text.spinning {
            color: var(--primary-gold);
            animation: spin-pulse 0.5s infinite ease-in-out alternate;
        }

        @keyframes spin-pulse {
            0% { transform: scale(1); }
            100% { transform: scale(1.1); }
        }

        .result-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: all 0.5s ease;
        }

        .result-overlay.hidden {
            opacity: 0;
            visibility: hidden;
            transform: scale(0.8);
        }

        .result-overlay.visible {
            opacity: 1;
            visibility: visible;
            transform: scale(1);
        }

        .result-content {
            text-align: center;
            z-index: 101;
        }

        .result-text {
            font-family: 'Orbitron', monospace;
            font-size: 4rem;
            font-weight: 900;
            margin-bottom: 30px;
            animation: result-entrance 0.8s ease-out;
        }

        @keyframes result-entrance {
            0% {
                opacity: 0;
                transform: scale(0.5) rotateY(180deg);
            }
            50% {
                transform: scale(1.2) rotateY(90deg);
            }
            100% {
                opacity: 1;
                transform: scale(1) rotateY(0deg);
            }
        }

        .result-text.jackpot {
            color: var(--primary-gold);
            text-shadow: 0 0 20px var(--primary-gold), 0 0 40px var(--primary-gold);
            animation: result-entrance 0.8s ease-out, jackpot-glow 1s infinite ease-in-out alternate;
        }

        @keyframes jackpot-glow {
            0% { text-shadow: 0 0 20px var(--primary-gold), 0 0 40px var(--primary-gold); }
            100% { text-shadow: 0 0 30px var(--primary-gold), 0 0 60px var(--primary-gold), 0 0 90px var(--primary-gold); }
        }

        .result-text.great {
            color: var(--secondary-silver);
            text-shadow: 0 0 20px var(--secondary-silver);
        }

        .result-text.good {
            color: var(--tertiary-bronze);
            text-shadow: 0 0 20px var(--tertiary-bronze);
        }

        .result-text.miss {
            color: var(--miss-gray);
            text-shadow: 0 0 20px var(--miss-gray);
        }

        .restart-btn {
            font-family: 'Orbitron', monospace;
            font-size: 1.2rem;
            font-weight: 700;
            padding: 15px 30px;
            background: linear-gradient(45deg, var(--accent-blue), var(--bg-dark));
            color: var(--primary-gold);
            border: 2px solid var(--primary-gold);
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .restart-btn:hover {
            background: linear-gradient(45deg, var(--primary-gold), #ffed4e);
            color: var(--bg-dark);
            box-shadow: 0 0 25px var(--primary-gold);
            transform: translateY(-2px);
        }

        .particles-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 99;
        }

        .particle {
            position: absolute;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            animation: particle-burst 2s ease-out forwards;
        }

        @keyframes particle-burst {
            0% {
                opacity: 1;
                transform: translate(0, 0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translate(var(--x), var(--y)) scale(0.2);
            }
        }

        .controls {
            position: absolute;
            bottom: 30px;
            z-index: 10;
        }

        .control-hint {
            display: flex;
            align-items: center;
            gap: 15px;
            font-family: 'Orbitron', monospace;
        }

        .key-icon {
            background: linear-gradient(45deg, var(--primary-gold), #ffed4e);
            color: var(--bg-dark);
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 1rem;
            box-shadow: 0 4px 8px rgba(255, 215, 0, 0.3);
            animation: key-pulse 2s infinite ease-in-out alternate;
        }

        @keyframes key-pulse {
            0% { transform: scale(1); }
            100% { transform: scale(1.05); }
        }

        .hint-text {
            font-size: 1.1rem;
            color: var(--text-white);
            font-weight: 500;
        }

        @media (max-width: 768px) {
            .game-title {
                font-size: 2rem;
            }
            
            .history-panel {
                left: 10px;
                top: 80px;
                padding: 10px;
            }
            
            .result-text {
                font-size: 3rem;
            }
            
            .status-text {
                font-size: 1.4rem;
            }
            
            #rouletteCanvas {
                width: 250px !important;
                height: 250px !important;
            }
        }

        @media (max-width: 480px) {
            .game-title {
                font-size: 1.5rem;
            }
            
            .result-text {
                font-size: 2.5rem;
            }
            
            .status-text {
                font-size: 1.2rem;
            }
            
            #rouletteCanvas {
                width: 200px !important;
                height: 200px !important;
            }
            
            .history-panel {
                left: 5px;
                top: 70px;
                padding: 8px;
            }
            
            .history-item {
                padding: 6px 8px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="star-particles">
            <div class="star" style="top: 10%; left: 15%; animation-delay: 0s;"></div>
            <div class="star" style="top: 20%; left: 80%; animation-delay: 0.5s;"></div>
            <div class="star" style="top: 30%; left: 25%; animation-delay: 1s;"></div>
            <div class="star" style="top: 40%; left: 70%; animation-delay: 1.5s;"></div>
            <div class="star" style="top: 50%; left: 10%; animation-delay: 2s;"></div>
            <div class="star" style="top: 60%; left: 90%; animation-delay: 2.5s;"></div>
            <div class="star" style="top: 70%; left: 35%; animation-delay: 3s;"></div>
            <div class="star" style="top: 80%; left: 60%; animation-delay: 3.5s;"></div>
            <div class="star" style="top: 15%; left: 45%; animation-delay: 4s;"></div>
            <div class="star" style="top: 85%; left: 20%; animation-delay: 4.5s;"></div>
        </div>

        <header class="game-header">
            <h1 class="game-title">🎰 CASINO ROULETTE</h1>
        </header>

        <div class="history-panel">
            <h3>최근 결과</h3>
            <div id="history-list" class="history-list">
                <span class="history-item empty">-</span>
                <span class="history-item empty">-</span>
                <span class="history-item empty">-</span>
            </div>
        </div>

        <div class="roulette-container">
            <div class="pointer"></div>
            <canvas id="rouletteCanvas" width="300" height="300"></canvas>
            <div class="roulette-shadow"></div>
        </div>

        <div class="game-status">
            <p id="status-text" class="status-text">SPACE를 눌러 멈추세요!</p>
        </div>

        <div id="result-overlay" class="result-overlay hidden">
            <div class="result-content">
                <div id="result-text" class="result-text"></div>
                <button id="restart-btn" class="restart-btn">다시 하기</button>
            </div>
            <div id="particles-container" class="particles-container"></div>
        </div>

        <div class="controls">
            <div class="control-hint">
                <span class="key-icon">SPACE</span>
                <span class="hint-text">룰렛 시작/정지</span>
            </div>
        </div>
    </div>

    <script>
        (() => {
            'use strict';

            const CONFIG = {
                CANVAS_SIZE: 300,
                SEGMENTS: 12,
                SEGMENT_ANGLE: 30,
                MIN_SPIN_SPEED: 15,
                DECELERATION: 0.98,
                MIN_ROTATIONS: 3
            };

            const PRIZE_TYPES = {
                FIRST: { name: '1ST', color: '#FFD700', text: '🏆 JACKPOT!', cssClass: 'jackpot', historyClass: 'first', emoji: '🏆' },
                SECOND: { name: '2ND', color: '#C0C0C0', text: '🥈 GREAT!', cssClass: 'great', historyClass: 'second', emoji: '🥈' },
                THIRD: { name: '3RD', color: '#CD7F32', text: '🥉 GOOD!', cssClass: 'good', historyClass: 'third', emoji: '🥉' },
                MISS: { name: 'MISS', color: '#808080', text: '💨 TRY AGAIN', cssClass: 'miss', historyClass: 'miss', emoji: '💨' }
            };

            const SEGMENTS_DATA = [
                PRIZE_TYPES.FIRST,
                PRIZE_TYPES.MISS,
                PRIZE_TYPES.SECOND,
                PRIZE_TYPES.MISS,
                PRIZE_TYPES.THIRD,
                PRIZE_TYPES.MISS,
                PRIZE_TYPES.SECOND,
                PRIZE_TYPES.MISS,
                PRIZE_TYPES.THIRD,
                PRIZE_TYPES.MISS,
                PRIZE_TYPES.THIRD,
                PRIZE_TYPES.MISS
            ];

            let gameState = {
                isSpinning: false,
                currentAngle: 0,
                spinSpeed: 0,
                canStop: false,
                totalRotations: 0,
                animationId: null
            };

            let gameHistory = [];
            let particles = [];

            const canvas = document.getElementById('rouletteCanvas');
            const ctx = canvas.getContext('2d');
            const statusText = document.getElementById('status-text');
            const resultOverlay = document.getElementById('result-overlay');
            const resultTextEl = document.getElementById('result-text');
            const restartBtn = document.getElementById('restart-btn');
            const historyList = document.getElementById('history-list');
            const particlesContainer = document.getElementById('particles-container');

            function initCanvas() {
                const rect = canvas.getBoundingClientRect();
                const scale = window.devicePixelRatio || 1;
                canvas.width = 300 * scale;
                canvas.height = 300 * scale;
                canvas.style.width = '300px';
                canvas.style.height = '300px';
                ctx.scale(scale, scale);
            }

            function drawRoulette() {
                const centerX = 150;
                const centerY = 150;
                const radius = 140;

                ctx.clearRect(0, 0, 300, 300);

                SEGMENTS_DATA.forEach((segment, index) => {
                    const startAngle = (index * CONFIG.SEGMENT_ANGLE - 90 + gameState.currentAngle) * Math.PI / 180;
                    const endAngle = ((index + 1) * CONFIG.SEGMENT_ANGLE - 90 + gameState.currentAngle) * Math.PI / 180;

                    const gradient = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, radius);
                    gradient.addColorStop(0, segment.color);
                    gradient.addColorStop(1, adjustBrightness(segment.color, -20));

                    ctx.beginPath();
                    ctx.arc(centerX, centerY, radius, startAngle, endAngle);
                    ctx.lineTo(centerX, centerY);
                    ctx.closePath();
                    ctx.fillStyle = gradient;
                    ctx.fill();

                    ctx.strokeStyle = '#000';
                    ctx.lineWidth = 2;
                    ctx.stroke();

                    const textAngle = startAngle + (endAngle - startAngle) / 2;
                    const textX = centerX + Math.cos(textAngle) * (radius * 0.7);
                    const textY = centerY + Math.sin(textAngle) * (radius * 0.7);

                    ctx.save();
                    ctx.translate(textX, textY);
                    ctx.rotate(textAngle + Math.PI / 2);
                    ctx.fillStyle = '#fff';
                    ctx.font = 'bold 12px Orbitron';
                    ctx.textAlign = 'center';
                    ctx.strokeStyle = '#000';
                    ctx.lineWidth = 2;
                    ctx.strokeText(segment.name, 0, 0);
                    ctx.fillText(segment.name, 0, 0);
                    ctx.restore();
                });

                const centerGradient = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, 30);
                centerGradient.addColorStop(0, '#333');
                centerGradient.addColorStop(1, '#000');
                ctx.beginPath();
                ctx.arc(centerX, centerY, 30, 0, 2 * Math.PI);
                ctx.fillStyle = centerGradient;
                ctx.fill();
                ctx.strokeStyle = '#FFD700';
                ctx.lineWidth = 3;
                ctx.stroke();
            }

            function adjustBrightness(hex, amount) {
                const usePound = hex[0] === '#';
                const col = hex.slice(usePound ? 1 : 0);
                const num = parseInt(col, 16);
                let r = (num >> 16) + amount;
                let g = (num >> 8 & 0x00FF) + amount;
                let b = (num & 0x0000FF) + amount;
                r = Math.max(Math.min(255, r), 0);
                g = Math.max(Math.min(255, g), 0);
                b = Math.max(Math.min(255, b), 0);
                return (usePound ? '#' : '') + (r << 16 | g << 8 | b).toString(16).padStart(6, '0');
            }

            function animateRoulette() {
                if (!gameState.isSpinning) return;

                gameState.currentAngle += gameState.spinSpeed;
                gameState.spinSpeed *= CONFIG.DECELERATION;
                gameState.totalRotations = Math.abs(gameState.currentAngle) / 360;

                if (gameState.totalRotations >= CONFIG.MIN_ROTATIONS && !gameState.canStop) {
                    gameState.canStop = true;
                    statusText.textContent = 'SPACE로 정지!';
                }

                if (gameState.spinSpeed < 0.1) {
                    stopRoulette();
                    return;
                }

                drawRoulette();
                gameState.animationId = requestAnimationFrame(animateRoulette);
            }

            function startRoulette() {
                if (gameState.isSpinning) return;

                gameState.isSpinning = true;
                gameState.spinSpeed = CONFIG.MIN_SPIN_SPEED;
                gameState.canStop = false;
                gameState.currentAngle = 0;
                gameState.totalRotations = 0;
                
                statusText.textContent = '회전 중...';
                statusText.className = 'status-text spinning';
                
                animateRoulette();
            }

            function stopRoulette() {
                gameState.isSpinning = false;
                if (gameState.animationId) {
                    cancelAnimationFrame(gameState.animationId);
                }

                const normalizedAngle = gameState.currentAngle % 360;
                const segmentIndex = Math.floor((360 - normalizedAngle + 15) / 30) % 12;
                const result = SEGMENTS_DATA[segmentIndex];

                showResult(result);
                updateHistory(result);
            }

            function showResult(result) {
                resultTextEl.textContent = result.text;
                resultTextEl.className = `result-text ${result.cssClass}`;
                resultOverlay.className = 'result-overlay visible';

                createParticles(result.color, result.name);
                statusText.style.opacity = '0';
            }

            function createParticles(color, type) {
                particlesContainer.innerHTML = '';
                
                const particleCount = type === '1ST' ? 50 : type === '2ND' ? 30 : type === '3RD' ? 20 : 10;

                for (let i = 0; i < particleCount; i++) {
                    const particle = document.createElement('div');
                    particle.className = 'particle';
                    
                    const angle = (360 / particleCount) * i;
                    const distance = Math.random() * 200 + 100;
                    const x = Math.cos(angle * Math.PI / 180) * distance;
                    const y = Math.sin(angle * Math.PI / 180) * distance;

                    particle.style.backgroundColor = color;
                    particle.style.setProperty('--x', x + 'px');
                    particle.style.setProperty('--y', y + 'px');
                    particle.style.animationDelay = Math.random() * 0.5 + 's';

                    particlesContainer.appendChild(particle);
                }

                setTimeout(() => {
                    particlesContainer.innerHTML = '';
                }, 2000);
            }

            function updateHistory(result) {
                gameHistory.unshift(result);
                if (gameHistory.length > 3) {
                    gameHistory.pop();
                }

                try {
                    localStorage.setItem('rouletteHistory', JSON.stringify(gameHistory.map(r => r.name)));
                } catch (e) {
                    console.warn('LocalStorage not available');
                }

                const historyItems = historyList.querySelectorAll('.history-item');
                historyItems.forEach((item, index) => {
                    if (gameHistory[index]) {
                        item.textContent = gameHistory[index].emoji;
                        item.className = `history-item ${gameHistory[index].historyClass}`;
                    } else {
                        item.textContent = '-';
                        item.className = 'history-item empty';
                    }
                });
            }

            function restartGame() {
                resultOverlay.className = 'result-overlay hidden';
                statusText.style.opacity = '1';
                statusText.textContent = 'SPACE를 눌러 멈추세요!';
                statusText.className = 'status-text';
                particlesContainer.innerHTML = '';
            }

            function loadHistory() {
                try {
                    const saved = localStorage.getItem('rouletteHistory');
                    if (saved) {
                        const savedNames = JSON.parse(saved);
                        gameHistory = savedNames.map(name => {
                            return Object.values(PRIZE_TYPES).find(type => type.name === name) || PRIZE_TYPES.MISS;
                        });
                        
                        const historyItems = historyList.querySelectorAll('.history-item');
                        historyItems.forEach((item, index) => {
                            if (gameHistory[index]) {
                                item.textContent = gameHistory[index].emoji;
                                item.className = `history-item ${gameHistory[index].historyClass}`;
                            }
                        });
                    }
                } catch (e) {
                    console.warn('Could not load history');
                }
            }

            document.addEventListener('keydown', function(event) {
                if (event.code === 'Space') {
                    event.preventDefault();
                    if (!gameState.isSpinning) {
                        startRoulette();
                    } else if (gameState.canStop) {
                        gameState.spinSpeed *= 0.5;
                    }
                }
            });

            canvas.addEventListener('touchstart', function(event) {
                event.preventDefault();
                if (!gameState.isSpinning) {
                    startRoulette();
                } else if (gameState.canStop) {
                    gameState.spinSpeed *= 0.5;
                }
            }, { passive: false });

            restartBtn.addEventListener('click', restartGame);

            initCanvas();
            drawRoulette();
            loadHistory();

        })();
    </script>
</body>
</html>
