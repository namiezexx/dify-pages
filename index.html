<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>두더지 게임 - Whack-a-Mole</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One:wght@400&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-brown: #8B4513;
            --secondary-brown: #D2691E;
            --background-green: #90EE90;
            --grass-green: #7CFC00;
            --accent-tomato: #FF6347;
            --hole-dark: #2F4F2F;
            --white: #FFFFFF;
            --black: #000000;
            --pink-nose: #FFB6C1;
            --star-yellow: #FFD700;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Fredoka One', cursive;
            background: linear-gradient(135deg, var(--background-green) 0%, var(--grass-green) 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
        }

        .game-container {
            width: 400px;
            height: 600px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .game-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .game-screen.active {
            display: flex;
        }

        /* 시작 화면 */
        .start-screen {
            text-align: center;
            padding: 40px 20px;
        }

        .start-screen h1 {
            font-size: 36px;
            color: var(--primary-brown);
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        .game-instructions {
            background: var(--background-green);
            padding: 20px;
            border-radius: 15px;
            margin: 20px 0;
            max-width: 300px;
        }

        .game-instructions h3 {
            color: var(--primary-brown);
            margin-bottom: 10px;
            font-size: 18px;
        }

        .game-instructions ul {
            text-align: left;
            list-style: none;
            font-size: 14px;
            line-height: 1.6;
        }

        .game-instructions li {
            margin: 8px 0;
            position: relative;
            padding-left: 25px;
        }

        .game-instructions li::before {
            content: '🎯';
            position: absolute;
            left: 0;
            top: 0;
        }

        /* 플레이 화면 */
        .playing-screen {
            background: none;
        }

        .game-header {
            width: 100%;
            padding: 20px;
            background: var(--primary-brown);
            color: var(--white);
            text-align: center;
            border-radius: 20px 20px 0 0;
        }

        .game-title {
            font-size: 24px;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .hud {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
        }

        .score-display, .timer-display {
            background: rgba(255, 255, 255, 0.2);
            padding: 8px 16px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            backdrop-filter: blur(10px);
        }

        .high-score {
            font-size: 12px;
            opacity: 0.8;
            margin-top: 5px;
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 10px;
            width: 360px;
            height: 360px;
            margin: 20px 0;
            padding: 20px;
            background: var(--grass-green);
            border-radius: 15px;
            position: relative;
            box-shadow: inset 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        .hole {
            width: 100px;
            height: 100px;
            background: var(--hole-dark);
            border-radius: 50%;
            position: relative;
            cursor: pointer;
            box-shadow: 
                inset 0 0 20px rgba(0, 0, 0, 0.8),
                0 4px 8px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            border: 4px solid var(--primary-brown);
            transition: transform 0.1s ease;
            touch-action: manipulation;
        }

        .hole:active {
            transform: scale(0.95);
        }

        .mole {
            width: 70px;
            height: 50px;
            background: var(--secondary-brown);
            border-radius: 50% 50% 40% 40%;
            position: absolute;
            bottom: -50px;
            left: 50%;
            transform: translateX(-50%);
            transition: bottom 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 2;
        }

        .mole::before {
            content: '';
            position: absolute;
            top: 12px;
            left: 18px;
            width: 6px;
            height: 6px;
            background: var(--black);
            border-radius: 50%;
            box-shadow: 16px 0 0 var(--black);
        }

        .mole::after {
            content: '';
            position: absolute;
            top: 20px;
            left: 30px;
            width: 8px;
            height: 5px;
            background: var(--pink-nose);
            border-radius: 50%;
        }

        .mole.show {
            bottom: 15px;
            animation: mole-wiggle 0.8s ease-in-out infinite alternate;
        }

        .mole.active {
            bottom: 15px;
            animation: mole-wiggle 0.8s ease-in-out infinite alternate;
        }

        @keyframes mole-wiggle {
            0% { transform: translateX(-50%) rotate(-2deg); }
            100% { transform: translateX(-50%) rotate(2deg); }
        }

        /* 결과 화면 */
        .result-screen {
            text-align: center;
            padding: 40px 20px;
        }

        .result-screen h2 {
            font-size: 28px;
            color: var(--primary-brown);
            margin-bottom: 20px;
        }

        .final-score {
            font-size: 48px;
            color: var(--accent-tomato);
            margin: 20px 0;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            animation: score-pulse 2s ease-in-out infinite alternate;
        }

        @keyframes score-pulse {
            0% { transform: scale(1); }
            100% { transform: scale(1.05); }
        }

        .result-message {
            font-size: 18px;
            color: var(--primary-brown);
            margin: 15px 0;
        }

        .new-record {
            background: linear-gradient(45deg, var(--star-yellow), #FFA500);
            color: var(--primary-brown);
            padding: 12px 24px;
            border-radius: 20px;
            font-size: 16px;
            margin: 15px 0;
            animation: glow-pulse 1s ease-in-out infinite alternate;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.4);
        }

        @keyframes glow-pulse {
            0% { 
                box-shadow: 0 4px 15px rgba(255, 215, 0, 0.4);
                transform: scale(1);
            }
            100% { 
                box-shadow: 0 8px 25px rgba(255, 215, 0, 0.7);
                transform: scale(1.02);
            }
        }

        /* 버튼 스타일 */
        .game-controls {
            display: flex;
            gap: 15px;
            margin-top: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            padding: 12px 24px;
            font-family: 'Fredoka One', cursive;
            font-size: 16px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            position: relative;
            overflow: hidden;
            touch-action: manipulation;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s ease;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn-primary {
            background: linear-gradient(45deg, var(--accent-tomato), #FF4500);
            color: var(--white);
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(255, 99, 71, 0.4);
        }

        .btn-secondary {
            background: linear-gradient(45deg, var(--primary-brown), #A0522D);
            color: var(--white);
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.3);
        }

        .btn-secondary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(139, 69, 19, 0.4);
        }

        /* 이펙트 */
        .hit-effect {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 100;
        }

        .star-particle {
            position: absolute;
            width: 15px;
            height: 15px;
            background: var(--star-yellow);
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
        }

        .star-1 { animation: star-burst-1 0.8s ease-out forwards; }
        .star-2 { animation: star-burst-2 0.8s ease-out forwards; }
        .star-3 { animation: star-burst-3 0.8s ease-out forwards; }
        .star-4 { animation: star-burst-4 0.8s ease-out forwards; }
        .star-5 { animation: star-burst-5 0.8s ease-out forwards; }

        @keyframes star-burst-1 {
            0% { transform: translate(-50%, -50%) scale(0) rotate(0deg); opacity: 1; }
            100% { transform: translate(-80px, -80px) scale(1) rotate(360deg); opacity: 0; }
        }
        @keyframes star-burst-2 {
            0% { transform: translate(-50%, -50%) scale(0) rotate(0deg); opacity: 1; }
            100% { transform: translate(80px, -80px) scale(1) rotate(360deg); opacity: 0; }
        }
        @keyframes star-burst-3 {
            0% { transform: translate(-50%, -50%) scale(0) rotate(0deg); opacity: 1; }
            100% { transform: translate(-80px, 80px) scale(1) rotate(360deg); opacity: 0; }
        }
        @keyframes star-burst-4 {
            0% { transform: translate(-50%, -50%) scale(0) rotate(0deg); opacity: 1; }
            100% { transform: translate(80px, 80px) scale(1) rotate(360deg); opacity: 0; }
        }
        @keyframes star-burst-5 {
            0% { transform: translate(-50%, -50%) scale(0) rotate(0deg); opacity: 1; }
            100% { transform: translate(0px, -100px) scale(1.2) rotate(360deg); opacity: 0; }
        }

        .score-popup {
            position: absolute;
            top: -30px;
            left: 50%;
            transform: translateX(-50%);
            color: var(--star-yellow);
            font-weight: bold;
            font-size: 18px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            animation: score-float 1s ease-out forwards;
            pointer-events: none;
            z-index: 101;
        }

        @keyframes score-float {
            0% { 
                opacity: 1; 
                transform: translateX(-50%) translateY(0px) scale(1); 
            }
            100% { 
                opacity: 0; 
                transform: translateX(-50%) translateY(-50px) scale(1.2); 
            }
        }

        .miss-effect {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 101;
        }

        .miss-x {
            color: #FF0000;
            font-weight: bold;
            font-size: 24px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            animation: miss-shake 0.6s ease-out forwards;
        }

        @keyframes miss-shake {
            0%, 100% { transform: rotate(0deg); opacity: 1; }
            25% { transform: rotate(-10deg); }
            75% { transform: rotate(10deg); }
            100% { opacity: 0; }
        }

        .combo-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 50;
            border: 8px solid transparent;
            border-image: linear-gradient(45deg, 
                #ff0000, #ff8000, #ffff00, #80ff00, #00ff00, 
                #00ff80, #00ffff, #0080ff, #0000ff, #8000ff, 
                #ff00ff, #ff0080) 1;
            animation: rainbow-pulse 1s linear infinite;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .combo-overlay.active {
            opacity: 1;
        }

        @keyframes rainbow-pulse {
            0%, 100% { filter: brightness(1) saturate(1); }
            50% { filter: brightness(1.3) saturate(1.5); }
        }

        /* 콤보 효과 추가 */
        @keyframes scorePopup {
            0% { opacity: 1; transform: translateX(-50%) translateY(0) scale(0.5); }
            50% { opacity: 1; transform: translateX(-50%) translateY(-10px) scale(1.2); }
            100% { opacity: 0; transform: translateX(-50%) translateY(-30px) scale(1); }
        }
        
        @keyframes missShake {
            0%, 100% { transform: translate(-50%, -50%) rotate(0deg); }
            25% { transform: translate(-50%, -50%) rotate(-10deg); }
            75% { transform: translate(-50%, -50%) rotate(10deg); }
        }
        
        @keyframes comboFlash {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            50% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 0; }
        }

        /* 모바일 반응형 */
        @media (max-width: 480px) {
            .game-container {
                width: 95vw;
                height: 95vh;
                max-width: 360px;
                max-height: 640px;
            }
            
            .game-board {
                width: 300px;
                height: 300px;
                gap: 8px;
                padding: 15px;
            }
            
            .hole {
                width: 85px;
                height: 85px;
                border-width: 3px;
            }
            
            .mole {
                width: 60px;
                height: 42px;
            }
            
            .mole::before {
                top: 10px;
                left: 15px;
                width: 5px;
                height: 5px;
                box-shadow: 14px 0 0 var(--black);
            }
            
            .mole::after {
                top: 16px;
                left: 26px;
                width: 6px;
                height: 4px;
            }
            
            .game-title {
                font-size: 20px;
            }
            
            .score-display, .timer-display {
                font-size: 14px;
                padding: 6px 12px;
            }
            
            .start-screen h1 {
                font-size: 28px;
            }
            
            .game-instructions {
                max-width: 280px;
                padding: 15px;
            }
            
            .btn {
                font-size: 14px;
                padding: 10px 20px;
            }
            
            .final-score {
                font-size: 36px;
            }
        }

        @media (max-width: 320px) {
            .game-board {
                width: 270px;
                height: 270px;
            }
            
            .hole {
                width: 75px;
                height: 75px;
            }
            
            .mole {
                width: 50px;
                height: 35px;
            }
        }

        /* 터치 디바이스 최적화 */
        @media (hover: none) {
            .btn:hover {
                transform: none;
                box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            }
            
            .btn:active {
                transform: scale(0.95);
            }
            
            .hole:hover {
                transform: none;
            }
        }
    </style>
</head>
<body>
    <div class="combo-overlay" id="comboOverlay"></div>

    <div class="game-container">
        <!-- 시작 화면 -->
        <div class="game-screen start-screen active" id="startScreen">
            <h1>🐹 두더지 게임</h1>
            <div class="game-instructions">
                <h3>🎯 게임 방법</h3>
                <ul>
                    <li>나타나는 두더지를 클릭하세요!</li>
                    <li>두더지 히트: +10점</li>
                    <li>빈 구멍 클릭: -5점</li>
                    <li>3연속 히트 시 점수 2배!</li>
                    <li>제한시간: 60초</li>
                </ul>
            </div>
            <div class="high-score">
                🏆 최고 점수: <span id="displayHighScore">0</span>점
            </div>
            <div class="game-controls">
                <button class="btn btn-primary" id="startBtn">🎮 게임 시작</button>
            </div>
        </div>

        <!-- 플레이 화면 -->
        <div class="game-screen playing-screen" id="playingScreen">
            <div class="game-header">
                <div class="game-title">🐹 두더지 게임</div>
                <div class="hud">
                    <div class="score-display">
                        점수: <span id="currentScore">0</span>
                        <div class="high-score">최고: <span id="currentHighScore">0</span></div>
                    </div>
                    <div class="timer-display">
                        ⏰ <span id="timeLeft">60</span>초
                    </div>
                </div>
            </div>

            <div class="game-board" id="gameBoard">
                <div class="hole" data-hole="0">
                    <div class="mole"></div>
                </div>
                <div class="hole" data-hole="1">
                    <div class="mole"></div>
                </div>
                <div class="hole" data-hole="2">
                    <div class="mole"></div>
                </div>
                <div class="hole" data-hole="3">
                    <div class="mole"></div>
                </div>
                <div class="hole" data-hole="4">
                    <div class="mole"></div>
                </div>
                <div class="hole" data-hole="5">
                    <div class="mole"></div>
                </div>
                <div class="hole" data-hole="6">
                    <div class="mole"></div>
                </div>
                <div class="hole" data-hole="7">
                    <div class="mole"></div>
                </div>
                <div class="hole" data-hole="8">
                    <div class="mole"></div>
                </div>
            </div>

            <div class="game-controls">
                <button class="btn btn-secondary" id="pauseBtn">⏸️ 일시정지</button>
            </div>
        </div>

        <!-- 결과 화면 -->
        <div class="game-screen result-screen" id="resultScreen">
            <h2>🎯 게임 결과</h2>
            <div class="final-score" id="finalScore">0</div>
            <div class="result-message" id="resultMessage">잘했어요!</div>
            <div class="new-record" id="newRecord" style="display: none;">
                🌟 새로운 최고 점수! 🌟
            </div>
            <div class="game-controls">
                <button class="btn btn-primary" id="restartBtn">🔄 다시하기</button>
                <button class="btn btn-secondary" id="menuBtn">🏠 메인으로</button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            'use strict';

            // 게임 설정 상수
            const GAME_CONFIG = {
                GAME_TIME: 60,
                MOLE_SHOW_TIME: 2000,
                HIT_SCORE: 10,
                MISS_PENALTY: 5,
                COMBO_THRESHOLD: 3,
                MIN_SPAWN_INTERVAL: 500,
                BASE_SPAWN_INTERVAL: 1500,
                DIFFICULTY_INCREASE_RATE: 10
            };

            const GameState = {
                READY: 'ready',
                PLAYING: 'playing',
                PAUSED: 'paused',
                FINISHED: 'finished'
            };

            class WhackAMoleGame {
                constructor() {
                    this.initializeProperties();
                    this.setupElements();
                    this.setupEventListeners();
                    this.loadHighScore();
                    this.setState(GameState.READY);
                }

                initializeProperties() {
                    this.state = GameState.READY;
                    this.score = 0;
                    this.timeLeft = GAME_CONFIG.GAME_TIME;
                    this.highScore = 0;
                    this.comboCount = 0;
                    this.gameTimer = null;
                    this.moleSpawnTimer = null;
                    this.activeMoles = new Set();
                    this.moleTimeouts = new Map();
                    this.isPaused = false;
                }

                setupElements() {
                    // 게임 화면 요소들
                    this.startScreen = document.getElementById('startScreen');
                    this.playingScreen = document.getElementById('playingScreen');
                    this.resultScreen = document.getElementById('resultScreen');
                    
                    // 버튼 요소들
                    this.startBtn = document.getElementById('startBtn');
                    this.pauseBtn = document.getElementById('pauseBtn');
                    this.restartBtn = document.getElementById('restartBtn');
                    this.menuBtn = document.getElementById('menuBtn');
                    
                    // 게임 요소들
                    this.holes = document.querySelectorAll('.hole');
                    this.moles = document.querySelectorAll('.mole');
                    this.comboOverlay = document.getElementById('comboOverlay');
                    
                    // 디스플레이 요소들
                    this.currentScore = document.getElementById('currentScore');
                    this.currentHighScore = document.getElementById('currentHighScore');
                    this.displayHighScore = document.getElementById('displayHighScore');
                    this.timeLeftDisplay = document.getElementById('timeLeft');
                    this.finalScore = document.getElementById('finalScore');
                    this.resultMessage = document.getElementById('resultMessage');
                    this.newRecord = document.getElementById('newRecord');
                }

                setupEventListeners() {
                    this.startBtn.addEventListener('click', () => this.startGame());
                    this.restartBtn.addEventListener('click', () => this.startGame());
                    this.menuBtn.addEventListener('click', () => this.showScreen('ready'));
                    this.pauseBtn.addEventListener('click', () => this.pauseGame());
                    
                    this.holes.forEach((hole, index) => {
                        hole.addEventListener('click', (e) => {
                            e.preventDefault();
                            this.hitHole(index);
                        });
                        
                        // 터치 이벤트 추가
                        hole.addEventListener('touchstart', (e) => {
                            e.preventDefault();
                            this.hitHole(index);
                        });
                    });
                    
                    // 터치 디바이스에서 더블탭 확대 방지
                    document.addEventListener('touchstart', (e) => {
                        if (e.touches.length > 1) {
                            e.preventDefault();
                        }
                    });
                    
                    let lastTouchEnd = 0;
                    document.addEventListener('touchend', (e) => {
                        const now = Date.now();
                        if (now - lastTouchEnd <= 300) {
                            e.preventDefault();
                        }
                        lastTouchEnd = now;
                    });
                }

                showScreen(screen) {
                    document.querySelectorAll('.game-screen').forEach(s => s.classList.remove('active'));
                    
                    switch(screen) {
                        case 'ready':
                            this.startScreen.classList.add('active');
                            this.state = GameState.READY;
                            break;
                        case 'playing':
                            this.playingScreen.classList.add('active');
                            this.state = GameState.PLAYING;
                            break;
                        case 'finished':
                            this.resultScreen.classList.add('active');
                            this.state = GameState.FINISHED;
                            break;
                    }
                }

                setState(newState) {
                    this.state = newState;
                    this.showScreen(newState);
                }

                startGame() {
                    this.score = 0;
                    this.timeLeft = GAME_CONFIG.GAME_TIME;
                    this.comboCount = 0;
                    this.activeMoles.clear();
                    this.clearAllTimeouts();
                    this.hideAllMoles();
                    
                    this.showScreen('playing');
                    this.updateDisplay();
                    this.startGameTimer();
                    this.startMoleSpawning();
                }

                startGameTimer() {
                    this.gameTimer = setInterval(() => {
                        if (this.isPaused) return;
                        
                        this.timeLeft--;
                        this.updateDisplay();
                        
                        if (this.timeLeft <= 0) {
                            this.endGame();
                        }
                    }, 1000);
                }

                startMoleSpawning() {
                    const spawn = () => {
                        if (this.state !== GameState.PLAYING || this.isPaused) {
                            this.moleSpawnTimer = setTimeout(spawn, 100);
                            return;
                        }
                        
                        const availableHoles = [];
                        for (let i = 0; i < 9; i++) {
                            if (!this.activeMoles.has(i)) {
                                availableHoles.push(i);
                            }
                        }
                        
                        if (availableHoles.length > 0) {
                            const spawnCount = Math.min(
                                Math.random() < 0.7 ? 1 : 2,
                                availableHoles.length
                            );
                            
                            for (let i = 0; i < spawnCount; i++) {
                                const randomIndex = Math.floor(Math.random() * availableHoles.length);
                                const holeIndex = availableHoles.splice(randomIndex, 1)[0];
                                this.showMole(holeIndex);
                            }
                        }
                        
                        const difficultyMultiplier = Math.max(0.5, 1 - ((60 - this.timeLeft) / 120));
                        const nextSpawnDelay = 800 + Math.random() * 1200 * difficultyMultiplier;
                        
                        this.moleSpawnTimer = setTimeout(spawn, nextSpawnDelay);
                    };
                    
                    this.moleSpawnTimer = setTimeout(spawn, 1000);
                }

                showMole(holeIndex) {
                    this.activeMoles.add(holeIndex);
                    this.moles[holeIndex].classList.add('show');
                    this.moles[holeIndex].classList.add('active');
                    
                    const hideTimeout = setTimeout(() => {
                        this.hideMole(holeIndex);
                        this.comboCount = 0;
                    }, 1500 + Math.random() * 1000);
                    
                    this.moleTimeouts.set(holeIndex, hideTimeout);
                }

                hideMole(holeIndex) {
                    this.activeMoles.delete(holeIndex);
                    this.moles[holeIndex].classList.remove('show');
                    this.moles[holeIndex].classList.remove('active');
                    this.moleTimeouts.delete(holeIndex);
                }

                hitHole(holeIndex) {
                    if (this.state !== GameState.PLAYING || this.isPaused) return;
                    
                    if (this.activeMoles.has(holeIndex)) {
                        this.hitMole(holeIndex);
                    } else {
                        this.missMole(holeIndex);
                    }
                }

                hitMole(holeIndex) {
                    this.hideMole(holeIndex);
                    
                    if (this.moleTimeouts.has(holeIndex)) {
                        clearTimeout(this.moleTimeouts.get(holeIndex));
                        this.moleTimeouts.delete(holeIndex);
                    }
                    
                    this.comboCount++;
                    let points = GAME_CONFIG.HIT_SCORE;
                    
                    if (this.comboCount >= GAME_CONFIG.COMBO_THRESHOLD) {
                        points *= 2;
                        this.showComboEffect();
                    }
                    
                    this.score += points;
                    this.showHitEffect(holeIndex, points);
                    this.updateDisplay();
                }

                missMole(holeIndex) {
                    this.score = Math.max(0, this.score - GAME_CONFIG.MISS_PENALTY);
                    this.comboCount = 0;
                    this.showMissEffect(holeIndex);
                    this.updateDisplay();
                }

                showHitEffect(holeIndex, points) {
                    const hole = this.holes[holeIndex];
                    
                    const starContainer = document.createElement('div');
                    starContainer.className = 'hit-effect';
                    
                    for (let i = 1; i <= 5; i++) {
                        const star = document.createElement('div');
                        star.className = `star-particle star-${i}`;
                        starContainer.appendChild(star);
                    }
                    
                    const scorePopup = document.createElement('div');
                    scorePopup.className = 'score-popup';
                    scorePopup.textContent = `+${points}`;
                    
                    hole.appendChild(starContainer);
                    hole.appendChild(scorePopup);
                    
                    setTimeout(() => {
                        if (starContainer.parentNode) starContainer.remove();
                        if (scorePopup.parentNode) scorePopup.remove();
                    }, 1000);
                }

                showMissEffect(holeIndex) {
                    const hole = this.holes[holeIndex];
                    
                    const missEffect = document.createElement('div');
                    missEffect.className = 'miss-effect';
                    missEffect.innerHTML = `
                        <div class="miss-x">✗</div>
                        <div class="score-popup" style="color: #FF0000;">-${GAME_CONFIG.MISS_PENALTY}</div>
                    `;
                    
                    hole.appendChild(missEffect);
                    
                    setTimeout(() => {
                        if (missEffect.parentNode) missEffect.remove();
                    }, 600);
                }

                showComboEffect() {
                    this.comboOverlay.classList.add('active');
                    
                    const comboMessage = document.createElement('div');
                    comboMessage.innerHTML = `
                        <div style="position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
                             font-size: 32px; font-weight: bold; color: #FFD700; z-index: 30; 
                             text-shadow: 2px 2px 4px rgba(0,0,0,0.8); animation: comboFlash 1s ease-out;">
                            🔥 COMBO x${this.comboCount}! 🔥
                        </div>
                    `;
                    document.body.appendChild(comboMessage);
                    
                    setTimeout(() => {
                        this.comboOverlay.classList.remove('active');
                        if (comboMessage.parentNode) {
                            comboMessage.remove();
                        }
                    }, 1000);
                }

                pauseGame() {
                    if (this.state !== GameState.PLAYING) return;
                    
                    this.isPaused = !this.isPaused;
                    
                    if (this.isPaused) {
                        this.pauseBtn.textContent = '▶️ 계속하기';
                        this.showPauseOverlay();
                    } else {
                        this.pauseBtn.textContent = '⏸️ 일시정지';
                        this.hidePauseOverlay();
                    }
                }

                showPauseOverlay() {
                    const overlay = document.createElement('div');
                    overlay.id = 'pauseOverlay';
                    overlay.style.cssText = `
                        position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
                        background: rgba(0,0,0,0.8); z-index: 25; display: flex;
                        justify-content: center; align-items: center; color: white;
                        font-family: 'Fredoka One', cursive; font-size: 24px;
                    `;
                    overlay.innerHTML = '⏸️ 게임이 일시정지되었습니다';
                    document.body.appendChild(overlay);
                }

                hidePauseOverlay() {
                    const overlay = document.getElementById('pauseOverlay');
                    if (overlay) {
                        overlay.remove();
                    }
                }

                endGame() {
                    this.state = GameState.FINISHED;
                    this.clearAllTimeouts();
                    this.hideAllMoles();
                    
                    let isNewRecord = false;
                    if (this.score > this.highScore) {
                        this.highScore = this.score;
                        this.saveHighScore();
                        isNewRecord = true;
                    }
                    
                    this.showGameResult(isNewRecord);
                    this.showScreen('finished');
                }

                showGameResult(isNewRecord) {
                    this.finalScore.textContent = this.score;
                    
                    let message = '';
                    if (this.score >= 300) {
                        message = '🏆 전설적인 실력입니다!';
                    } else if (this.score >= 200) {
                        message = '🎉 환상적입니다!';
                    } else if (this.score >= 100) {
                        message = '👍 훌륭해요!';
                    } else if (this.score >= 50) {
                        message = '😊 좋아요!';
                    } else {
                        message = '💪 다시 도전해보세요!';
                    }
                    
                    this.resultMessage.textContent = message;
                    this.newRecord.style.display = isNewRecord ? 'block' : 'none';
                    this.updateDisplay();
                }

                clearAllTimeouts() {
                    if (this.gameTimer) {
                        clearInterval(this.gameTimer);
                        this.gameTimer = null;
                    }
                    
                    if (this.moleSpawnTimer) {
                        clearTimeout(this.moleSpawnTimer);
                        this.moleSpawnTimer = null;
                    }
                    
                    this.moleTimeouts.forEach(timeout => clearTimeout(timeout));
                    this.moleTimeouts.clear();
                    
                    this.hidePauseOverlay();
                }

                hideAllMoles() {
                    this.moles.forEach(mole => {
                        mole.classList.remove('show');
                        mole.classList.remove('active');
                    });
                    this.activeMoles.clear();
                }

                updateDisplay() {
                    if (this.currentScore) this.currentScore.textContent = this.score;
                    if (this.currentHighScore) this.currentHighScore.textContent = this.highScore;
                    if (this.displayHighScore) this.displayHighScore.textContent = this.highScore;
                    if (this.timeLeftDisplay) this.timeLeftDisplay.textContent = this.timeLeft;
                }

                loadHighScore() {
                    try {
                        this.highScore = parseInt(localStorage.getItem('whack-a-mole-highscore')) || 0;
                    } catch (e) {
                        this.highScore = 0;
                    }
                    this.updateDisplay();
                }

                saveHighScore() {
                    try {
                        localStorage.setItem('whack-a-mole-highscore', this.highScore.toString());
                    } catch (e) {
                        console.warn('최고점수 저장 실패');
                    }
                }
            }

            // 게임 초기화
            function initializeGame() {
                try {
                    new WhackAMoleGame();
                } catch (error) {
                    console.error('게임 초기화 실패:', error);
                }
            }

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', initializeGame);
            } else {
                initializeGame();
            }
        })();
    </script>
</body>
</html>
