<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>룰렛게임</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #FF6B6B;
            --secondary-color: #4ECDC4;
            --tertiary-color: #45B7D1;
            --accent-color: #FFA726;
            --white: #FFFFFF;
            --light-gray: #F0F0F0;
            --dark-text: #333333;
            --medium-text: #666666;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            overflow: hidden;
            user-select: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        h1 {
            color: white;
            text-align: center;
            font-family: 'Fredoka One', cursive;
            font-size: 2.5em;
            margin: 0 0 10px 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        
        .game-info {
            color: white;
            text-align: center;
            margin-bottom: 20px;
            font-size: 1.1em;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }
        
        .controls {
            color: white;
            text-align: center;
            margin-top: 20px;
            font-size: 0.9em;
            opacity: 0.8;
        }

        #gameCanvas {
            border: 3px solid #333;
            border-radius: 50%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            background: radial-gradient(circle, #ffffff 0%, #f0f0f0 100%);
            cursor: pointer;
        }

        @media (max-width: 768px) {
            body { padding: 10px; }
            h1 { font-size: 2em; }
            .game-info { font-size: 1em; }
            #gameCanvas {
                max-width: 90vw;
                max-height: 90vw;
            }
        }

        @media (max-width: 480px) {
            h1 { font-size: 1.5em; }
            .game-info { font-size: 0.9em; }
            .controls { font-size: 0.8em; }
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <h1>🎰 LUCKY ROULETTE</h1>
    <div class="game-info">
        <p>스페이스바를 눌러 룰렛을 돌리고 정지시키세요!</p>
        <p>1등(100점) • 2등(50점) • 3등(20점) • 꽝(0점)</p>
    </div>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <div class="controls">
        <p>💡 조작법: SPACE (시작/정지) | Y (재시작) | N (종료) | 클릭으로도 조작 가능</p>
    </div>

    <script>
        // 룰렛 게임 - Canvas 기반 웹 게임
        (function() {
            'use strict';

            // 게임 상수 정의
            const GAME_CONFIG = {
                CANVAS_SIZE: 400,
                ROULETTE_RADIUS: 180,
                CENTER_RADIUS: 30,
                POINTER_SIZE: 15,
                SECTORS: 12,
                MIN_SPIN_TIME: 3000,
                MAX_SPIN_TIME: 6000,
                MIN_ROTATIONS: 3,
                PARTICLE_COUNT: 25,
                ANIMATION_DURATION: 2000
            };

            // 게임 상태 열거형
            const GAME_STATE = {
                IDLE: 'idle',
                SPINNING: 'spinning',
                STOPPED: 'stopped',
                RESULT: 'result'
            };

            // 상금 및 색상 설정
            const PRIZE_CONFIG = [
                { type: '1ST', prize: 100, color: '#FF6B6B', count: 1 },
                { type: '2ND', prize: 50, color: '#4ECDC4', count: 2 },
                { type: '3RD', prize: 20, color: '#45B7D1', count: 3 },
                { type: 'TRY', prize: 0, color: '#FFA726', count: 6 }
            ];

            // 룰렛 게임 클래스
            class RouletteGame {
                constructor() {
                    this.canvas = document.getElementById('gameCanvas');
                    this.ctx = this.canvas.getContext('2d');
                    this.currentState = GAME_STATE.IDLE;
                    this.currentAngle = 0;
                    this.spinStartTime = 0;
                    this.spinDuration = 0;
                    this.targetAngle = 0;
                    this.totalScore = 0;
                    this.lastPrize = null;
                    this.particles = [];
                    this.animationId = null;
                    this.sectors = [];
                    this.audioContext = null;
                    
                    this.initializeGame();
                }

                initializeGame() {
                    try {
                        this.setupCanvas();
                        this.setupSectors();
                        this.loadScore();
                        this.initializeAudio();
                        this.bindEvents();
                        this.startGameLoop();
                        console.log('🎮 룰렛 게임이 성공적으로 초기화되었습니다.');
                    } catch (error) {
                        console.error('❌ 게임 초기화 중 오류 발생:', error);
                    }
                }

                setupCanvas() {
                    // 고해상도 디스플레이 지원
                    const devicePixelRatio = window.devicePixelRatio || 1;
                    const rect = this.canvas.getBoundingClientRect();
                    
                    this.canvas.width = GAME_CONFIG.CANVAS_SIZE * devicePixelRatio;
                    this.canvas.height = GAME_CONFIG.CANVAS_SIZE * devicePixelRatio;
                    this.canvas.style.width = GAME_CONFIG.CANVAS_SIZE + 'px';
                    this.canvas.style.height = GAME_CONFIG.CANVAS_SIZE + 'px';
                    
                    this.ctx.scale(devicePixelRatio, devicePixelRatio);
                }

                setupSectors() {
                    this.sectors = [];
                    let sectorIndex = 0;

                    for (const prize of PRIZE_CONFIG) {
                        for (let i = 0; i < prize.count; i++) {
                            this.sectors.push({
                                startAngle: (sectorIndex * 360) / GAME_CONFIG.SECTORS,
                                endAngle: ((sectorIndex + 1) * 360) / GAME_CONFIG.SECTORS,
                                type: prize.type,
                                prize: prize.prize,
                                color: prize.color
                            });
                            sectorIndex++;
                        }
                    }

                    // 구역 순서 랜덤화
                    for (let i = this.sectors.length - 1; i > 0; i--) {
                        const j = Math.floor(Math.random() * (i + 1));
                        [this.sectors[i], this.sectors[j]] = [this.sectors[j], this.sectors[i]];
                    }
                }

                initializeAudio() {
                    try {
                        this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    } catch (error) {
                        console.warn('⚠️ 오디오 시스템 초기화 실패:', error);
                        this.audioContext = null;
                    }
                }

                playSound(frequency, duration, type = 'sine') {
                    if (!this.audioContext) return;

                    try {
                        const oscillator = this.audioContext.createOscillator();
                        const gainNode = this.audioContext.createGain();

                        oscillator.connect(gainNode);
                        gainNode.connect(this.audioContext.destination);

                        oscillator.frequency.value = frequency;
                        oscillator.type = type;
                        gainNode.gain.setValueAtTime(0.1, this.audioContext.currentTime);
                        gainNode.gain.exponentialRampToValueAtTime(0.01, this.audioContext.currentTime + duration);

                        oscillator.start(this.audioContext.currentTime);
                        oscillator.stop(this.audioContext.currentTime + duration);
                    } catch (error) {
                        console.warn('⚠️ 사운드 재생 오류:', error);
                    }
                }

                bindEvents() {
                    document.addEventListener('keydown', (e) => {
                        if (e.code === 'Space') {
                            e.preventDefault();
                            this.handleSpacePress();
                        }
                    });

                    document.addEventListener('keydown', (e) => {
                        if (this.currentState === GAME_STATE.RESULT) {
                            if (e.code === 'KeyY') {
                                this.restartGame();
                            } else if (e.code === 'KeyN') {
                                this.endGame();
                            }
                        }
                    });

                    this.canvas.addEventListener('click', () => {
                        if (this.audioContext && this.audioContext.state === 'suspended') {
                            this.audioContext.resume();
                        }
                        this.handleSpacePress();
                    });

                    // 터치 이벤트 지원
                    this.canvas.addEventListener('touchstart', (e) => {
                        e.preventDefault();
                        this.handleSpacePress();
                    });

                    window.addEventListener('resize', () => {
                        this.resizeCanvas();
                    });
                }

                handleSpacePress() {
                    switch (this.currentState) {
                        case GAME_STATE.IDLE:
                            this.startSpin();
                            break;
                        case GAME_STATE.SPINNING:
                            this.stopSpin();
                            break;
                        case GAME_STATE.RESULT:
                            this.restartGame();
                            break;
                    }
                }

                startSpin() {
                    this.currentState = GAME_STATE.SPINNING;
                    this.spinStartTime = Date.now();
                    this.spinDuration = GAME_CONFIG.MIN_SPIN_TIME + 
                                       Math.random() * (GAME_CONFIG.MAX_SPIN_TIME - GAME_CONFIG.MIN_SPIN_TIME);
                    
                    const randomRotations = GAME_CONFIG.MIN_ROTATIONS + Math.random() * 5;
                    const randomAngle = Math.random() * 360;
                    this.targetAngle = this.currentAngle + (randomRotations * 360) + randomAngle;

                    this.playSound(200, 0.1);
                }

                stopSpin() {
                    if (this.currentState !== GAME_STATE.SPINNING) return;

                    const currentTime = Date.now();
                    const elapsedTime = currentTime - this.spinStartTime;

                    if (elapsedTime < 1000) {
                        return;
                    }

                    this.currentState = GAME_STATE.STOPPED;
                    
                    const remainingTime = Math.max(500, this.spinDuration - elapsedTime);
                    this.spinDuration = elapsedTime + remainingTime;

                    this.playSound(150, 0.2);
                }

                startGameLoop() {
                    const gameLoop = () => {
                        this.update();
                        this.render();
                        this.animationId = requestAnimationFrame(gameLoop);
                    };
                    gameLoop();
                }

                update() {
                    const currentTime = Date.now();

                    switch (this.currentState) {
                        case GAME_STATE.SPINNING:
                        case GAME_STATE.STOPPED:
                            this.updateSpin(currentTime);
                            break;
                        case GAME_STATE.RESULT:
                            this.updateParticles();
                            break;
                    }
                }

                updateSpin(currentTime) {
                    const elapsedTime = currentTime - this.spinStartTime;
                    
                    if (elapsedTime >= this.spinDuration) {
                        this.currentAngle = this.targetAngle % 360;
                        this.currentState = GAME_STATE.RESULT;
                        this.calculateResult();
                        this.createParticles();
                        return;
                    }

                    const progress = elapsedTime / this.spinDuration;
                    const easedProgress = 1 - Math.pow(1 - progress, 3);
                    
                    this.currentAngle = this.lerp(
                        this.currentAngle,
                        this.targetAngle,
                        easedProgress
                    ) % 360;
                }

                lerp(start, end, factor) {
                    return start + (end - start) * factor;
                }

                calculateResult() {
                    const normalizedAngle = (360 - this.currentAngle) % 360;
                    const sectorAngle = 360 / GAME_CONFIG.SECTORS;
                    const sectorIndex = Math.floor(normalizedAngle / sectorAngle);
                    
                    this.lastPrize = this.sectors[sectorIndex];
                    this.totalScore += this.lastPrize.prize;
                    
                    this.saveScore();
                    
                    if (this.lastPrize.prize > 0) {
                        this.playSound(440 + this.lastPrize.prize, 0.5, 'square');
                    } else {
                        this.playSound(100, 0.3, 'sawtooth');
                    }
                }

                createParticles() {
                    this.particles = [];
                    const centerX = GAME_CONFIG.CANVAS_SIZE / 2;
                    const centerY = GAME_CONFIG.CANVAS_SIZE / 2;

                    for (let i = 0; i < GAME_CONFIG.PARTICLE_COUNT; i++) {
                        const angle = (i / GAME_CONFIG.PARTICLE_COUNT) * Math.PI * 2;
                        const velocity = 2 + Math.random() * 3;
                        
                        this.particles.push({
                            x: centerX,
                            y: centerY,
                            vx: Math.cos(angle) * velocity,
                            vy: Math.sin(angle) * velocity,
                            life: 1.0,
                            decay: 0.02 + Math.random() * 0.02,
                            color: this.lastPrize.color,
                            size: 3 + Math.random() * 4
                        });
                    }
                }

                updateParticles() {
                    for (let i = this.particles.length - 1; i >= 0; i--) {
                        const particle = this.particles[i];
                        
                        particle.x += particle.vx;
                        particle.y += particle.vy;
                        particle.vx *= 0.98;
                        particle.vy *= 0.98;
                        particle.life -= particle.decay;
                        
                        if (particle.life <= 0) {
                            this.particles.splice(i, 1);
                        }
                    }
                }

                render() {
                    this.ctx.clearRect(0, 0, GAME_CONFIG.CANVAS_SIZE, GAME_CONFIG.CANVAS_SIZE);
                    
                    this.drawBackground();
                    this.drawRoulette();
                    this.drawPointer();
                    this.drawUI();
                    
                    if (this.currentState === GAME_STATE.RESULT) {
                        this.drawParticles();
                        this.drawResult();
                    }
                }

                drawBackground() {
                    const centerX = GAME_CONFIG.CANVAS_SIZE / 2;
                    const centerY = GAME_CONFIG.CANVAS_SIZE / 2;

                    const gradient = this.ctx.createRadialGradient(
                        centerX, centerY, 0,
                        centerX, centerY, GAME_CONFIG.CANVAS_SIZE / 2
                    );
                    gradient.addColorStop(0, '#ffffff');
                    gradient.addColorStop(1, '#f0f0f0');

                    this.ctx.fillStyle = gradient;
                    this.ctx.fillRect(0, 0, GAME_CONFIG.CANVAS_SIZE, GAME_CONFIG.CANVAS_SIZE);
                }

                drawRoulette() {
                    const centerX = GAME_CONFIG.CANVAS_SIZE / 2;
                    const centerY = GAME_CONFIG.CANVAS_SIZE / 2;

                    this.ctx.save();
                    this.ctx.translate(centerX, centerY);
                    this.ctx.rotate((this.currentAngle * Math.PI) / 180);

                    for (let i = 0; i < this.sectors.length; i++) {
                        const sector = this.sectors[i];
                        const startAngle = (i * 2 * Math.PI) / GAME_CONFIG.SECTORS;
                        const endAngle = ((i + 1) * 2 * Math.PI) / GAME_CONFIG.SECTORS;

                        this.ctx.beginPath();
                        this.ctx.moveTo(0, 0);
                        this.ctx.arc(0, 0, GAME_CONFIG.ROULETTE_RADIUS, startAngle, endAngle);
                        this.ctx.closePath();
                        this.ctx.fillStyle = sector.color;
                        this.ctx.fill();
                        
                        this.ctx.strokeStyle = '#ffffff';
                        this.ctx.lineWidth = 2;
                        this.ctx.stroke();

                        this.ctx.save();
                        this.ctx.rotate(startAngle + (endAngle - startAngle) / 2);
                        this.ctx.fillStyle = '#ffffff';
                        this.ctx.font = 'bold 16px Fredoka One, Arial';
                        this.ctx.textAlign = 'center';
                        this.ctx.textBaseline = 'middle';
                        this.ctx.fillText(sector.type, GAME_CONFIG.ROULETTE_RADIUS * 0.7, 0);
                        this.ctx.restore();
                    }

                    this.ctx.beginPath();
                    this.ctx.arc(0, 0, GAME_CONFIG.CENTER_RADIUS, 0, 2 * Math.PI);
                    this.ctx.fillStyle = '#ffffff';
                    this.ctx.fill();
                    this.ctx.strokeStyle = '#333333';
                    this.ctx.lineWidth = 3;
                    this.ctx.stroke();

                    this.ctx.fillStyle = '#333333';
                    this.ctx.font = 'bold 14px Fredoka One, Arial';
                    this.ctx.textAlign = 'center';
                    this.ctx.textBaseline = 'middle';
                    this.ctx.fillText('LUCKY', 0, 0);

                    this.ctx.restore();
                }

                drawPointer() {
                    const centerX = GAME_CONFIG.CANVAS_SIZE / 2;
                    const pointerY = centerY - GAME_CONFIG.ROULETTE_RADIUS - 10;

                    this.ctx.beginPath();
                    this.ctx.moveTo(centerX - GAME_CONFIG.POINTER_SIZE, pointerY);
                    this.ctx.lineTo(centerX + GAME_CONFIG.POINTER_SIZE, pointerY);
                    this.ctx.lineTo(centerX, pointerY + GAME_CONFIG.POINTER_SIZE);
                    this.ctx.closePath();
                    this.ctx.fillStyle = '#FF4444';
                    this.ctx.fill();
                    this.ctx.strokeStyle = '#CC0000';
                    this.ctx.lineWidth = 2;
                    this.ctx.stroke();
                }

                drawUI() {
                    this.ctx.fillStyle = '#333333';
                    this.ctx.font = 'bold 24px Fredoka One, Arial';
                    this.ctx.textAlign = 'center';
                    this.ctx.textBaseline = 'top';
                    this.ctx.fillText('점수: ' + this.totalScore, GAME_CONFIG.CANVAS_SIZE / 2, 10);

                    let message = '';
                    switch (this.currentState) {
                        case GAME_STATE.IDLE:
                            message = 'SPACE나 클릭으로 시작';
                            break;
                        case GAME_STATE.SPINNING:
                            message = 'SPACE나 클릭으로 정지';
                            break;
                        case GAME_STATE.STOPPED:
                            message = '결과를 확인하세요...';
                            break;
                        case GAME_STATE.RESULT:
                            message = '클릭하여 계속 (Y/N)';
                            break;
                    }

                    this.ctx.fillStyle = '#666666';
                    this.ctx.font = '16px Roboto, Arial';
                    this.ctx.textAlign = 'center';
                    this.ctx.textBaseline = 'bottom';
                    this.ctx.fillText(message, GAME_CONFIG.CANVAS_SIZE / 2, GAME_CONFIG.CANVAS_SIZE - 10);
                }

                drawParticles() {
                    for (const particle of this.particles) {
                        this.ctx.save();
                        this.ctx.globalAlpha = particle.life;
                        this.ctx.fillStyle = particle.color;
                        this.ctx.beginPath();
                        this.ctx.arc(particle.x, particle.y, particle.size, 0, 2 * Math.PI);
                        this.ctx.fill();
                        this.ctx.restore();
                    }
                }

                drawResult() {
                    if (!this.lastPrize) return;

                    const centerX = GAME_CONFIG.CANVAS_SIZE / 2;
                    const centerY = GAME_CONFIG.CANVAS_SIZE / 2;

                    this.ctx.save();
                    this.ctx.globalAlpha = 0.9;
                    this.ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
                    this.ctx.fillRect(centerX - 120, centerY - 60, 240, 120);
                    this.ctx.restore();

                    this.ctx.fillStyle = this.lastPrize.color;
                    this.ctx.font = 'bold 32px Fredoka One, Arial';
                    this.ctx.textAlign = 'center';
                    this.ctx.textBaseline = 'middle';
                    
                    const prizeText = this.lastPrize.prize > 0 ? 
                        this.lastPrize.type + '!' : '아쉬워요!';
                    this.ctx.fillText(prizeText, centerX, centerY - 15);

                    this.ctx.fillStyle = '#ffffff';
                    this.ctx.font = '18px Roboto, Arial';
                    this.ctx.fillText('+' + this.lastPrize.prize + '점', centerX, centerY + 15);
                }

                saveScore() {
                    try {
                        localStorage.setItem('rouletteScore', this.totalScore.toString());
                    } catch (error) {
                        console.warn('⚠️ 점수 저장 실패:', error);
                    }
                }

                loadScore() {
                    try {
                        const savedScore = localStorage.getItem('rouletteScore');
                        this.totalScore = savedScore ? parseInt(savedScore, 10) : 0;
                    } catch (error) {
                        console.warn('⚠️ 점수 로드 실패:', error);
                        this.totalScore = 0;
                    }
                }

                restartGame() {
                    this.currentState = GAME_STATE.IDLE;
                    this.currentAngle = 0;
                    this.lastPrize = null;
                    this.particles = [];
                }

                endGame() {
                    alert('게임을 종료합니다.\n최종 점수: ' + this.totalScore + '점\n\n즐거우셨나요? 🎊');
                    
                    if (this.animationId) {
                        cancelAnimationFrame(this.animationId);
                    }
                }

                resizeCanvas() {
                    const rect = this.canvas.getBoundingClientRect();
                    const maxSize = Math.min(window.innerWidth * 0.9, window.innerHeight * 0.6);
                    if (maxSize < GAME_CONFIG.CANVAS_SIZE) {
                        this.canvas.style.width = maxSize + 'px';
                        this.canvas.style.height = maxSize + 'px';
                    }
                }
            }

            // 페이지 로드 완료 후 게임 시작
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', () => {
                    window.rouletteGame = new RouletteGame();
                });
            } else {
                window.rouletteGame = new RouletteGame();
            }

            // 페이지 언로드 시 정리
            window.addEventListener('beforeunload', () => {
                if (window.rouletteGame && window.rouletteGame.animationId) {
                    cancelAnimationFrame(window.rouletteGame.animationId);
                }
            });

        })();
    </script>
</body>
</html>
