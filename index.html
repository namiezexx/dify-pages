<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bullet Rush: Last Defense</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Roboto+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #00FF41;
            --secondary-color: #FF4444;
            --background-color: #0A0A23;
            --accent-color: #FFD700;
            --dark-color: #0A0A0A;
            --grid-color: #1A1A1A;
            --text-shadow: 0 0 10px currentColor;
            --neon-glow: 0 0 20px currentColor, 0 0 40px currentColor;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto Mono', monospace;
            background: var(--background-color);
            color: var(--primary-color);
            overflow: hidden;
            height: 100vh;
            background-image: 
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px),
                linear-gradient(var(--grid-color) 1px, transparent 1px);
            background-size: 20px 20px;
            animation: backgroundMove 20s linear infinite;
        }

        @keyframes backgroundMove {
            0% { background-position: 0 0; }
            100% { background-position: 20px 20px; }
        }

        #game-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .screen {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .screen.active {
            opacity: 1;
            visibility: visible;
        }

        /* Main Menu Styles */
        #main-menu {
            flex-direction: column;
            text-align: center;
        }

        .title-section {
            margin-bottom: 3rem;
        }

        #game-title {
            font-family: 'Orbitron', monospace;
            font-size: 4rem;
            font-weight: 900;
            margin-bottom: 1rem;
            letter-spacing: 0.2em;
        }

        #game-subtitle {
            font-family: 'Orbitron', monospace;
            font-size: 1.5rem;
            font-weight: 400;
            color: var(--accent-color);
            letter-spacing: 0.3em;
        }

        .neon-text {
            text-shadow: var(--neon-glow);
            animation: neonPulse 2s ease-in-out infinite alternate;
        }

        @keyframes neonPulse {
            from { text-shadow: var(--text-shadow); }
            to { text-shadow: var(--neon-glow); }
        }

        .menu-buttons {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            align-items: center;
        }

        .neon-button {
            font-family: 'Orbitron', monospace;
            font-size: 1.2rem;
            font-weight: 700;
            padding: 1rem 2rem;
            background: transparent;
            border: 2px solid currentColor;
            color: var(--primary-color);
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .neon-button.primary {
            color: var(--primary-color);
        }

        .neon-button.secondary {
            color: var(--secondary-color);
        }

        .neon-button:hover {
            box-shadow: var(--neon-glow);
            text-shadow: var(--text-shadow);
            transform: scale(1.05);
        }

        .neon-button:active {
            transform: scale(0.95);
        }

        .score-display {
            font-family: 'Roboto Mono', monospace;
            font-size: 1rem;
            color: var(--accent-color);
            text-shadow: var(--text-shadow);
        }

        /* Game Screen Styles */
        #game-screen {
            flex-direction: column;
            padding: 0;
        }

        .hud {
            width: 100%;
            max-width: 800px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 1rem;
            background: rgba(10, 10, 35, 0.8);
            border-bottom: 1px solid var(--primary-color);
            position: relative;
        }

        .hud-left, .hud-right {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .hud-item {
            font-family: 'Roboto Mono', monospace;
            font-size: 0.9rem;
            font-weight: 500;
            text-shadow: var(--text-shadow);
            text-transform: uppercase;
        }

        .pause-button {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: transparent;
            border: 1px solid var(--primary-color);
            color: var(--primary-color);
            font-size: 1rem;
            padding: 0.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .pause-button:hover {
            box-shadow: 0 0 10px var(--primary-color);
        }

        #game-area {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #game-canvas {
            border: 2px solid var(--primary-color);
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.3);
            background: var(--dark-color);
        }

        /* Result Screens Styles */
        .result-section, .pause-section {
            text-align: center;
            max-width: 500px;
            padding: 2rem;
            background: rgba(10, 10, 35, 0.9);
            border: 2px solid var(--primary-color);
            border-radius: 10px;
            box-shadow: var(--neon-glow);
        }

        .result-stats, .clear-stats {
            margin: 2rem 0;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem 0;
            border-bottom: 1px solid rgba(0, 255, 65, 0.3);
        }

        .stat-label {
            font-family: 'Roboto Mono', monospace;
            font-size: 0.9rem;
            color: var(--primary-color);
        }

        .stat-value {
            font-family: 'Orbitron', monospace;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--accent-color);
            text-shadow: var(--text-shadow);
        }

        .result-buttons, .pause-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }

        /* Animation Classes */
        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }

        .fade-out {
            animation: fadeOut 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeOut {
            from { opacity: 1; transform: translateY(0); }
            to { opacity: 0; transform: translateY(-20px); }
        }

        .button-pressed {
            transform: scale(0.9);
            box-shadow: inset 0 0 10px rgba(0, 255, 65, 0.5);
        }

        .hud-update {
            animation: hudFlash 0.3s ease;
        }

        @keyframes hudFlash {
            0% { color: var(--primary-color); }
            50% { color: var(--accent-color); }
            100% { color: var(--primary-color); }
        }

        .damage-flash {
            animation: damageFlash 0.2s ease;
        }

        @keyframes damageFlash {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .upgrade-glow {
            animation: upgradeGlow 0.5s ease;
        }

        @keyframes upgradeGlow {
            0% { box-shadow: 0 0 10px var(--primary-color); }
            50% { box-shadow: 0 0 30px var(--accent-color); }
            100% { box-shadow: 0 0 10px var(--primary-color); }
        }

        /* Responsive Design */
        @media (max-width: 900px) {
            #game-canvas {
                width: 90vw;
                height: calc(90vw * 0.75);
                max-width: 800px;
                max-height: 600px;
            }
            
            .hud {
                max-width: 90vw;
            }
            
            #game-title {
                font-size: 3rem;
            }
        }

        @media (max-width: 600px) {
            #game-title {
                font-size: 2.5rem;
            }
            
            #game-subtitle {
                font-size: 1.2rem;
            }
            
            .neon-button {
                font-size: 1rem;
                padding: 0.8rem 1.5rem;
            }
            
            .hud-item {
                font-size: 0.8rem;
            }
            
            .result-buttons, .pause-buttons {
                flex-direction: column;
                align-items: center;
            }
        }
    </style>
</head>
<body>
    <div id="game-container">
        <!-- Main Menu Screen -->
        <div id="main-menu" class="screen active">
            <div class="title-section">
                <h1 id="game-title" class="neon-text">BULLET RUSH</h1>
                <h2 id="game-subtitle">LAST DEFENSE</h2>
            </div>
            <div class="menu-buttons">
                <button id="start-btn" class="neon-button primary">GAME START</button>
                <div id="high-score" class="score-display">BEST: <span id="best-score">0</span></div>
            </div>
        </div>

        <!-- Game Screen -->
        <div id="game-screen" class="screen">
            <div id="game-hud" class="hud">
                <div class="hud-left">
                    <div id="stage-display" class="hud-item">STAGE <span id="current-stage">1</span></div>
                    <div id="weapon-level" class="hud-item">WEAPON LV.<span id="weapon-lv">1</span></div>
                </div>
                <div class="hud-right">
                    <div id="kill-count" class="hud-item"><span id="current-kills">0</span>/1000</div>
                    <div id="score-display" class="hud-item">SCORE: <span id="current-score">0</span></div>
                </div>
                <button id="pause-btn" class="pause-button">⏸</button>
            </div>
            <div id="game-area">
                <canvas id="game-canvas" width="800" height="600"></canvas>
            </div>
        </div>

        <!-- Game Over Screen -->
        <div id="game-over" class="screen">
            <div class="result-section">
                <h1 id="game-over-title" class="neon-text">GAME OVER</h1>
                <div class="result-stats">
                    <div class="stat-item">
                        <span class="stat-label">FINAL STAGE:</span>
                        <span id="final-stage" class="stat-value">1</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">TOTAL KILLS:</span>
                        <span id="total-kills" class="stat-value">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">FINAL SCORE:</span>
                        <span id="final-score" class="stat-value">0</span>
                    </div>
                </div>
                <div class="result-buttons">
                    <button id="restart-btn" class="neon-button primary">RESTART</button>
                    <button id="main-menu-btn" class="neon-button secondary">MAIN MENU</button>
                </div>
            </div>
        </div>

        <!-- Stage Clear Screen -->
        <div id="stage-clear" class="screen">
            <div class="result-section">
                <h1 class="neon-text">STAGE CLEAR!</h1>
                <div class="clear-stats">
                    <div class="stat-item">
                        <span class="stat-label">STAGE:</span>
                        <span id="cleared-stage" class="stat-value">1</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">BONUS:</span>
                        <span class="stat-value">+1000</span>
                    </div>
                </div>
                <button id="next-stage-btn" class="neon-button primary">NEXT STAGE</button>
            </div>
        </div>

        <!-- Pause Screen -->
        <div id="pause-screen" class="screen">
            <div class="pause-section">
                <h1 class="neon-text">PAUSED</h1>
                <div class="pause-buttons">
                    <button id="resume-btn" class="neon-button primary">RESUME</button>
                    <button id="pause-menu-btn" class="neon-button secondary">MAIN MENU</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            'use strict';
            
            // 게임 설정 상수
            const GAME_CONFIG = {
                CANVAS_WIDTH: 800,
                CANVAS_HEIGHT: 600,
                PLAYER_SPEED: 5,
                BULLET_SPEED: 8,
                ENEMY_BASE_SPEED: 2,
                BULLET_INTERVAL: 200,
                ENEMY_SPAWN_INTERVAL: 1000,
                KILLS_PER_STAGE: 1000,
                SPEED_INCREASE_PER_STAGE: 0.1,
                UPGRADE_DROP_CHANCE: 0.05,
                COLORS: {
                    PRIMARY: '#00FF41',
                    SECONDARY: '#FF4444',
                    BACKGROUND: '#0A0A23',
                    ACCENT: '#FFD700',
                    WHITE: '#FFFFFF'
                }
            };

            // 게임 상태
            const GAME_STATE = {
                MENU: 'menu',
                PLAYING: 'playing',
                PAUSED: 'paused',
                STAGE_CLEAR: 'stage_clear',
                GAME_OVER: 'game_over'
            };

            // 무기 레벨
            const WEAPON_LEVELS = {
                1: { bullets: 1, size: 1 },
                2: { bullets: 2, size: 1 },
                3: { bullets: 3, size: 1 },
                4: { bullets: 3, size: 2 }
            };

            // 메인 게임 클래스
            class Game {
                constructor() {
                    this.canvas = document.getElementById('game-canvas');
                    this.ctx = this.canvas.getContext('2d');
                    this.canvas.width = GAME_CONFIG.CANVAS_WIDTH;
                    this.canvas.height = GAME_CONFIG.CANVAS_HEIGHT;
                    
                    // DOM 요소들
                    this.screens = {
                        menu: document.getElementById('main-menu'),
                        game: document.getElementById('game-screen'),
                        gameOver: document.getElementById('game-over'),
                        stageClear: document.getElementById('stage-clear'),
                        pause: document.getElementById('pause-screen')
                    };
                    
                    // 게임 상태
                    this.gameState = GAME_STATE.MENU;
                    this.score = 0;
                    this.stage = 1;
                    this.kills = 0;
                    this.weaponLevel = 1;
                    this.highScore = this.loadHighScore();
                    
                    // 게임 객체
                    this.player = null;
                    this.bullets = [];
                    this.enemies = [];
                    this.items = [];
                    this.particles = [];
                    this.stars = [];
                    
                    // 타이머
                    this.lastBulletTime = 0;
                    this.lastEnemySpawn = 0;
                    
                    // 입력
                    this.keys = {};
                    this.touchX = null;
                    
                    // 오디오
                    this.audioCtx = null;
                    
                    this.init();
                }

                init() {
                    this.setupEventListeners();
                    this.createStars();
                    this.setupAudio();
                    this.updateUI();
                    this.gameLoop();
                }

                setupEventListeners() {
                    // 버튼 이벤트
                    document.getElementById('start-btn').addEventListener('click', () => this.startGame());
                    document.getElementById('restart-btn').addEventListener('click', () => this.startGame());
                    document.getElementById('main-menu-btn').addEventListener('click', () => this.showMenu());
                    document.getElementById('pause-menu-btn').addEventListener('click', () => this.showMenu());
                    document.getElementById('pause-btn').addEventListener('click', () => this.pauseGame());
                    document.getElementById('resume-btn').addEventListener('click', () => this.resumeGame());
                    document.getElementById('next-stage-btn').addEventListener('click', () => this.nextStage());
                    
                    // 키보드 이벤트
                    document.addEventListener('keydown', (e) => {
                        this.keys[e.code] = true;
                        if (e.code === 'Escape' && this.gameState === GAME_STATE.PLAYING) {
                            this.pauseGame();
                        }
                        e.preventDefault();
                    });

                    document.addEventListener('keyup', (e) => {
                        this.keys[e.code] = false;
                    });

                    // 터치 이벤트
                    this.canvas.addEventListener('touchstart', (e) => {
                        e.preventDefault();
                        const rect = this.canvas.getBoundingClientRect();
                        this.touchX = e.touches[0].clientX - rect.left;
                    });

                    this.canvas.addEventListener('touchmove', (e) => {
                        e.preventDefault();
                        const rect = this.canvas.getBoundingClientRect();
                        this.touchX = e.touches[0].clientX - rect.left;
                    });

                    this.canvas.addEventListener('touchend', (e) => {
                        e.preventDefault();
                        this.touchX = null;
                    });
                }

                setupAudio() {
                    try {
                        this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    } catch (e) {
                        console.warn('Web Audio API not supported');
                    }
                }

                playSound(frequency, duration, type = 'sine') {
                    if (!this.audioCtx) return;
                    
                    try {
                        const oscillator = this.audioCtx.createOscillator();
                        const gainNode = this.audioCtx.createGain();
                        
                        oscillator.connect(gainNode);
                        gainNode.connect(this.audioCtx.destination);
                        
                        oscillator.frequency.value = frequency;
                        oscillator.type = type;
                        
                        gainNode.gain.setValueAtTime(0.1, this.audioCtx.currentTime);
                        gainNode.gain.exponentialRampToValueAtTime(0.001, this.audioCtx.currentTime + duration);
                        
                        oscillator.start(this.audioCtx.currentTime);
                        oscillator.stop(this.audioCtx.currentTime + duration);
                    } catch (e) {
                        console.warn('Audio playback failed');
                    }
                }

                createStars() {
                    for (let i = 0; i < 100; i++) {
                        this.stars.push({
                            x: Math.random() * GAME_CONFIG.CANVAS_WIDTH,
                            y: Math.random() * GAME_CONFIG.CANVAS_HEIGHT,
                            speed: Math.random() * 2 + 1
                        });
                    }
                }

                showScreen(screenName) {
                    Object.values(this.screens).forEach(screen => {
                        screen.classList.remove('active');
                    });
                    
                    if (this.screens[screenName]) {
                        this.screens[screenName].classList.add('active', 'fade-in');
                        setTimeout(() => {
                            this.screens[screenName].classList.remove('fade-in');
                        }, 500);
                    }
                }

                showMenu() {
                    this.gameState = GAME_STATE.MENU;
                    this.showScreen('menu');
                    this.updateUI();
                }

                startGame() {
                    this.gameState = GAME_STATE.PLAYING;
                    this.score = 0;
                    this.stage = 1;
                    this.kills = 0;
                    this.weaponLevel = 1;
                    
                    this.bullets = [];
                    this.enemies = [];
                    this.items = [];
                    this.particles = [];
                    
                    this.player = new Player(GAME_CONFIG.CANVAS_WIDTH / 2, GAME_CONFIG.CANVAS_HEIGHT - 50);
                    
                    this.lastBulletTime = Date.now();
                    this.lastEnemySpawn = Date.now();
                    
                    this.showScreen('game');
                    this.updateUI();
                    
                    // 시작 효과음
                    this.playSound(600, 0.5);
                }

                pauseGame() {
                    if (this.gameState === GAME_STATE.PLAYING) {
                        this.gameState = GAME_STATE.PAUSED;
                        this.showScreen('pause');
                    }
                }

                resumeGame() {
                    if (this.gameState === GAME_STATE.PAUSED) {
                        this.gameState = GAME_STATE.PLAYING;
                        this.showScreen('game');
                        this.lastBulletTime = Date.now();
                        this.lastEnemySpawn = Date.now();
                    }
                }

                nextStage() {
                    this.gameState = GAME_STATE.PLAYING;
                    this.showScreen('game');
                    this.lastBulletTime = Date.now();
                    this.lastEnemySpawn = Date.now();
                }

                gameLoop() {
                    this.update();
                    this.render();
                    requestAnimationFrame(() => this.gameLoop());
                }

                update() {
                    if (this.gameState !== GAME_STATE.PLAYING) return;
                    
                    const now = Date.now();
                    
                    this.updatePlayer();
                    
                    if (now - this.lastBulletTime > GAME_CONFIG.BULLET_INTERVAL) {
                        this.shootBullets();
                        this.lastBulletTime = now;
                    }
                    
                    if (now - this.lastEnemySpawn > GAME_CONFIG.ENEMY_SPAWN_INTERVAL) {
                        this.spawnEnemies();
                        this.lastEnemySpawn = now;
                    }
                    
                    this.updateBullets();
                    this.updateEnemies();
                    this.updateItems();
                    this.updateParticles();
                    this.updateStars();
                    
                    this.checkCollisions();
                    this.checkStageProgress();
                    this.updateUI();
                }

                updatePlayer() {
                    if (!this.player) return;
                    
                    if (this.keys['ArrowLeft'] || this.keys['KeyA']) {
                        this.player.moveLeft();
                    }
                    if (this.keys['ArrowRight'] || this.keys['KeyD']) {
                        this.player.moveRight();
                    }
                    
                    if (this.touchX !== null) {
                        this.player.moveToward(this.touchX);
                    }
                }

                shootBullets() {
                    const weapon = WEAPON_LEVELS[this.weaponLevel];
                    const bulletCount = weapon.bullets;
                    const bulletSize = weapon.size;
                    
                    for (let i = 0; i < bulletCount; i++) {
                        let offsetX = 0;
                        if (bulletCount > 1) {
                            offsetX = (i - (bulletCount - 1) / 2) * 20;
                        }
                        
                        this.bullets.push(new Bullet(
                            this.player.x + offsetX,
                            this.player.y - 10,
                            bulletSize
                        ));
                    }
                    
                    this.playSound(800, 0.1, 'square');
                }

                spawnEnemies() {
                    const enemyCount = Math.floor(Math.random() * 3) + 1;
                    
                    for (let i = 0; i < enemyCount; i++) {
                        const x = Math.random() * (GAME_CONFIG.CANVAS_WIDTH - 40) + 20;
                        this.enemies.push(new Enemy(x, -20, this.stage));
                        
                        if (Math.random() < GAME_CONFIG.UPGRADE_DROP_CHANCE && this.weaponLevel < 4) {
                            this.items.push(new UpgradeItem(x + Math.random() * 40 - 20, -40));
                        }
                    }
                }

                updateBullets() {
                    for (let i = this.bullets.length - 1; i >= 0; i--) {
                        this.bullets[i].update();
                        
                        if (this.bullets[i].y < 0) {
                            this.bullets.splice(i, 1);
                        }
                    }
                }

                updateEnemies() {
                    for (let i = this.enemies.length - 1; i >= 0; i--) {
                        this.enemies[i].update();
                        
                        if (this.enemies[i].y > GAME_CONFIG.CANVAS_HEIGHT) {
                            this.gameOver();
                            return;
                        }
                    }
                }

                updateItems() {
                    for (let i = this.items.length - 1; i >= 0; i--) {
                        this.items[i].update();
                        
                        if (this.items[i].y > GAME_CONFIG.CANVAS_HEIGHT) {
                            this.items.splice(i, 1);
                        }
                    }
                }

                updateParticles() {
                    for (let i = this.particles.length - 1; i >= 0; i--) {
                        this.particles[i].update();
                        
                        if (this.particles[i].life <= 0) {
                            this.particles.splice(i, 1);
                        }
                    }
                }

                updateStars() {
                    for (let star of this.stars) {
                        star.y += star.speed;
                        if (star.y > GAME_CONFIG.CANVAS_HEIGHT) {
                            star.y = 0;
                            star.x = Math.random() * GAME_CONFIG.CANVAS_WIDTH;
                        }
                    }
                }

                checkCollisions() {
                    // 총알과 적군 충돌
                    for (let i = this.bullets.length - 1; i >= 0; i--) {
                        for (let j = this.enemies.length - 1; j >= 0; j--) {
                            if (this.checkCircleCollision(this.bullets[i], this.enemies[j])) {
                                this.createParticles(this.enemies[j].x, this.enemies[j].y, GAME_CONFIG.COLORS.SECONDARY);
                                
                                this.score += 10;
                                this.kills++;
                                
                                this.bullets.splice(i, 1);
                                this.enemies.splice(j, 1);
                                
                                this.playSound(300, 0.15, 'sawtooth');
                                break;
                            }
                        }
                    }
                    
                    // 플레이어와 아이템 충돌
                    for (let i = this.items.length - 1; i >= 0; i--) {
                        if (this.checkCircleCollision(this.player, this.items[i])) {
                            if (this.weaponLevel < 4) {
                                this.weaponLevel++;
                                
                                // 업그레이드 애니메이션
                                const weaponElement = document.getElementById('weapon-level');
                                weaponElement.classList.add('upgrade-glow');
                                setTimeout(() => {
                                    weaponElement.classList.remove('upgrade-glow');
                                }, 500);
                            }
                            
                            this.score += 50;
                            
                            this.createParticles(this.items[i].x, this.items[i].y, GAME_CONFIG.COLORS.ACCENT);
                            
                            this.items.splice(i, 1);
                            
                            this.playSound(600, 0.3, 'sine');
                        }
                    }
                }

                checkCircleCollision(obj1, obj2) {
                    const dx = obj1.x - obj2.x;
                    const dy = obj1.y - obj2.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    return distance < (obj1.radius + obj2.radius);
                }

                createParticles(x, y, color) {
                    const particleCount = color === GAME_CONFIG.COLORS.ACCENT ? 8 : 5;
                    
                    for (let i = 0; i < particleCount; i++) {
                        const angle = (Math.PI * 2 * i) / particleCount;
                        const speed = Math.random() * 3 + 2;
                        
                        this.particles.push(new Particle(
                            x, y,
                            Math.cos(angle) * speed,
                            Math.sin(angle) * speed,
                            color
                        ));
                    }
                }

                checkStageProgress() {
                    const targetKills = GAME_CONFIG.KILLS_PER_STAGE * this.stage;
                    if (this.kills >= targetKills) {
                        this.stageClear();
                    }
                }

                stageClear() {
                    this.gameState = GAME_STATE.STAGE_CLEAR;
                    this.stage++;
                    this.score += 1000; // 스테이지 클리어 보너스
                    
                    document.getElementById('cleared-stage').textContent = this.stage - 1;
                    
                    this.showScreen('stageClear');
                    this.playSound(900, 0.5, 'sine');
                }

                gameOver() {
                    this.gameState = GAME_STATE.GAME_OVER;
                    
                    if (this.score > this.highScore) {
                        this.highScore = this.score;
                        this.saveHighScore();
                    }
                    
                    // 게임오버 화면 업데이트
                    document.getElementById('final-stage').textContent = this.stage;
                    document.getElementById('total-kills').textContent = this.kills;
                    document.getElementById('final-score').textContent = this.score;
                    
                    this.showScreen('gameOver');
                    this.playSound(150, 1.0, 'sawtooth');
                    
                    // 캔버스에 피격 효과
                    this.canvas.classList.add('damage-flash');
                    setTimeout(() => {
                        this.canvas.classList.remove('damage-flash');
                    }, 200);
                }

                updateUI() {
                    // HUD 업데이트
                    document.getElementById('current-stage').textContent = this.stage;
                    document.getElementById('current-kills').textContent = this.kills;
                    document.getElementById('current-score').textContent = this.score;
                    document.getElementById('weapon-lv').textContent = this.weaponLevel;
                    document.getElementById('best-score').textContent = this.highScore;
                    
                    // HUD 애니메이션
                    const killElement = document.getElementById('current-kills');
                    const scoreElement = document.getElementById('current-score');
                    
                    if (this.lastKills !== this.kills) {
                        killElement.classList.add('hud-update');
                        setTimeout(() => killElement.classList.remove('hud-update'), 300);
                        this.lastKills = this.kills;
                    }
                    
                    if (this.lastScore !== this.score) {
                        scoreElement.classList.add('hud-update');
                        setTimeout(() => scoreElement.classList.remove('hud-update'), 300);
                        this.lastScore = this.score;
                    }
                }

                saveHighScore() {
                    try {
                        localStorage.setItem('bulletRushHighScore', this.highScore.toString());
                    } catch (e) {
                        console.warn('Could not save high score to localStorage');
                    }
                }

                loadHighScore() {
                    try {
                        const saved = localStorage.getItem('bulletRushHighScore');
                        return saved ? parseInt(saved) : 0;
                    } catch (e) {
                        console.warn('Could not load high score from localStorage');
                        return 0;
                    }
                }

                render() {
                    this.ctx.fillStyle = GAME_CONFIG.COLORS.BACKGROUND;
                    this.ctx.fillRect(0, 0, GAME_CONFIG.CANVAS_WIDTH, GAME_CONFIG.CANVAS_HEIGHT);
                    
                    this.renderStars();
                    
                    if (this.gameState === GAME_STATE.PLAYING || this.gameState === GAME_STATE.PAUSED) {
                        this.renderGame();
                    }
                }

                renderStars() {
                    this.ctx.fillStyle = GAME_CONFIG.COLORS.WHITE;
                    for (let star of this.stars) {
                        this.ctx.fillRect(star.x, star.y, 2, 2);
                    }
                }

                renderGame() {
                    if (this.player) this.player.render(this.ctx);
                    
                    this.bullets.forEach(bullet => bullet.render(this.ctx));
                    this.enemies.forEach(enemy => enemy.render(this.ctx));
                    this.items.forEach(item => item.render(this.ctx));
                    this.particles.forEach(particle => particle.render(this.ctx));
                }
            }

            // 플레이어 클래스
            class Player {
                constructor(x, y) {
                    this.x = x;
                    this.y = y;
                    this.radius = 15;
                    this.speed = GAME_CONFIG.PLAYER_SPEED;
                }

                moveLeft() {
                    this.x = Math.max(this.radius, this.x - this.speed);
                }

                moveRight() {
                    this.x = Math.min(GAME_CONFIG.CANVAS_WIDTH - this.radius, this.x + this.speed);
                }

                moveToward(targetX) {
                    const diff = targetX - this.x;
                    if (Math.abs(diff) > this.speed) {
                        this.x += diff > 0 ? this.speed : -this.speed;
                    }
                    this.x = Math.max(this.radius, Math.min(GAME_CONFIG.CANVAS_WIDTH - this.radius, this.x));
                }

                render(ctx) {
                    ctx.fillStyle = GAME_CONFIG.COLORS.PRIMARY;
                    ctx.beginPath();
                    ctx.moveTo(this.x, this.y - this.radius);
                    ctx.lineTo(this.x - this.radius, this.y + this.radius);
                    ctx.lineTo(this.x + this.radius, this.y + this.radius);
                    ctx.closePath();
                    ctx.fill();
                }
            }

            // 총알 클래스
            class Bullet {
                constructor(x, y, size = 1) {
                    this.x = x;
                    this.y = y;
                    this.radius = 3 * size;
                    this.speed = GAME_CONFIG.BULLET_SPEED;
                    this.size = size;
                }

                update() {
                    this.y -= this.speed;
                }

                render(ctx) {
                    ctx.fillStyle = GAME_CONFIG.COLORS.WHITE;
                    ctx.fillRect(this.x - this.radius/2, this.y - 6, this.radius, 6);
                }
            }

            // 적군 클래스
            class Enemy {
                constructor(x, y, stage) {
                    this.x = x;
                    this.y = y;
                    this.radius = 10;
                    this.speed = GAME_CONFIG.ENEMY_BASE_SPEED * (1 + (stage - 1) * GAME_CONFIG.SPEED_INCREASE_PER_STAGE);
                }

                update() {
                    this.y += this.speed;
                }

                render(ctx) {
                    ctx.fillStyle = GAME_CONFIG.COLORS.SECONDARY;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            // 업그레이드 아이템 클래스
            class UpgradeItem {
                constructor(x, y) {
                    this.x = x;
                    this.y = y;
                    this.radius = 8;
                    this.speed = GAME_CONFIG.ENEMY_BASE_SPEED * 0.5;
                }

                update() {
                    this.y += this.speed;
                }

                render(ctx) {
                    ctx.fillStyle = GAME_CONFIG.COLORS.ACCENT;
                    ctx.beginPath();
                    ctx.moveTo(this.x, this.y - this.radius);
                    ctx.lineTo(this.x + this.radius, this.y);
                    ctx.lineTo(this.x, this.y + this.radius);
                    ctx.lineTo(this.x - this.radius, this.y);
                    ctx.closePath();
                    ctx.fill();
                }
            }

            // 파티클 클래스
            class Particle {
                constructor(x, y, vx, vy, color) {
                    this.x = x;
                    this.y = y;
                    this.vx = vx;
                    this.vy = vy;
                    this.color = color;
                    this.life = 1.0;
                    this.decay = 0.02;
                }

                update() {
                    this.x += this.vx;
                    this.y += this.vy;
                    this.life -= this.decay;
                    this.vx *= 0.98;
                    this.vy *= 0.98;
                }

                render(ctx) {
                    ctx.globalAlpha = this.life;
                    ctx.fillStyle = this.color;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.globalAlpha = 1.0;
                }
            }

            // 게임 시작
            window.addEventListener('DOMContentLoaded', () => {
                new Game();
            });

        })();
    </script>
</body>
</html>
