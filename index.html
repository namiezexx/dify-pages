<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>길진이 테트리스</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">

  <style>
    /* 기본 리셋 */
    :root{
      /* --- 색상 팔레트 (기획서 기준) --- */
      --color-primary: #2E86AB;    /* 보드 테두리, 버튼 */
      --color-secondary: #A23B72;  /* 다음 블록, 강조 텍스트 */
      --color-bg: #F18F01;         /* 메인 배경 */
      --color-accent: #C73E1D;     /* 점수/스테이지 강조 */
      --color-board-empty: #F5F5F5;/* 빈 셀 */
      --color-cell-border: #333333;/* 채워진 셀 테두리 */
      --line-flash: #FFFFFF;       /* 라인 클리어 플래시 */
      --shadow: rgba(0,0,0,0.2);

      /* 테트로미노 색상 */
      --color-I: #00F5FF;
      --color-O: #FFFF00;
      --color-T: #800080;
      --color-S: #00FF00;
      --color-Z: #FF0000;
      --color-J: #0000FF;
      --color-L: #FFA500;

      /* 사이즈 */
      --cell-size: 30px;
      --board-cols: 10;
      --board-rows: 20;
      --board-width: calc(var(--cell-size) * var(--board-cols));
      --board-height: calc(var(--cell-size) * var(--board-rows));

      /* 폰트 */
      --font-title: 'Press Start 2P', monospace;
      --font-mono: 'Roboto Mono', monospace;

      /* 애니메이션 타이밍 */
      --anim-fast: 0.1s;
      --anim-medium: 0.3s;
      --anim-slow: 0.5s;
    }

    *{box-sizing:border-box}
    html,body{
      height:100%;
      margin:0;
      font-family: var(--font-mono);
      background: linear-gradient(180deg, var(--color-bg), #ffb86b 100%);
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
      color:#222;
    }

    .app{
      min-height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:32px;
      gap:32px;
    }

    .game-wrap{
      display:flex;
      gap:28px;
      align-items:flex-start;
      width:100%;
      max-width:1100px;
      margin-inline:auto;
    }

    header.app-header{
      position:fixed;
      top:20px;
      left:50%;
      transform:translateX(-50%);
      text-align:center;
      z-index:40;
      width:100%;
      max-width:1100px;
      pointer-events:none;
    }
    header .title{
      pointer-events:auto;
      font-family:var(--font-title);
      color:var(--color-primary);
      font-size:20px;
      letter-spacing:1px;
      background:rgba(255,255,255,0.08);
      display:inline-block;
      padding:10px 18px;
      border-radius:8px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.1);
    }

    .board-area{
      background:linear-gradient(180deg, #ffffff 0%, var(--color-board-empty) 100%);
      padding:12px;
      border-radius:10px;
      box-shadow: 8px 8px 24px var(--shadow);
      border: 3px solid var(--color-primary);
      width:fit-content;
      position:relative;
    }

    .board-scale{
      width:var(--board-width);
      height:var(--board-height);
      transform-origin: top left;
    }

    #game-canvas{
      display:block;
      background: repeating-linear-gradient(
        to right,
        rgba(0,0,0,0.02) 0 calc(100% / var(--board-cols) - 1px),
        transparent calc(100% / var(--board-cols) - 1px) calc(100% / var(--board-cols))
      ), repeating-linear-gradient(
        to bottom,
        rgba(0,0,0,0.02) 0 calc(100% / var(--board-rows) - 1px),
        transparent calc(100% / var(--board-rows) - 1px) calc(100% / var(--board-rows))
      );
      width:100%;
      height:100%;
      border-radius:6px;
      background-color: var(--color-board-empty);
      image-rendering: pixelated;
      box-shadow: 5px 8px 18px rgba(0,0,0,0.08);
    }

    .board-area::after{
      content:'';
      position:absolute;
      right:-8px;
      bottom:-8px;
      width:100%;
      height:100%;
      border-radius:12px;
      box-shadow: 0 12px 24px rgba(0,0,0,0.12);
      z-index:-1;
    }

    .row-overlay{
      position:absolute;
      left:12px;
      top:12px;
      width:var(--board-width);
      height:var(--board-height);
      pointer-events:none;
      overflow:hidden;
    }
    .row-overlay .flash{
      position:absolute;
      left:0;
      width:100%;
      background:var(--line-flash);
      opacity:0;
      transform:translateY(0);
    }
    .row-overlay .line-flash{
      animation: lineFlash var(--anim-medium) ease-in;
    }
    @keyframes lineFlash{
      0%{opacity:0; transform:scaleY(0.8)}
      30%{opacity:1; transform:scaleY(1.02)}
      100%{opacity:0; transform:scaleY(0.8)}
    }

    aside.sidebar{
      width:320px;
      display:flex;
      flex-direction:column;
      gap:18px;
      align-self:flex-start;
    }

    .panel{
      background:rgba(255,255,255,0.95);
      padding:12px;
      border-radius:10px;
      box-shadow: 6px 8px 20px rgba(0,0,0,0.06);
      border:2px solid rgba(0,0,0,0.04);
    }

    .next-block{
      width:120px;
      height:120px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:var(--color-board-empty);
      border-radius:8px;
      border:2px solid rgba(0,0,0,0.04);
    }
    #next-canvas{
      width:88px;
      height:88px;
      image-rendering: pixelated;
      background:transparent;
    }

    .stat{
      display:flex;
      flex-direction:column;
      gap:6px;
      font-family:var(--font-mono);
    }
    .stat .label{ font-size:12px; color:#666; }
    .stat .value{
      font-size:20px;
      color:var(--color-accent);
      font-weight:700;
      letter-spacing:0.5px;
    }

    .progress-wrap{
      display:flex;
      flex-direction:column;
      gap:8px;
    }
    .progress-bar{
      width:100%;
      height:18px;
      background:var(--color-board-empty);
      border-radius:12px;
      overflow:hidden;
      border:1px solid rgba(0,0,0,0.05);
    }
    .progress-bar .fill{
      height:100%;
      width:var(--progress, 0%);
      background: linear-gradient(90deg, var(--color-secondary), #6b2a5b);
      transition: width 300ms ease;
    }

    .target-label{
      font-size:12px;
      color:#333;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      padding:10px 14px;
      border-radius:8px;
      background:var(--color-primary);
      color:#fff;
      border:none;
      cursor:pointer;
      font-weight:700;
      text-transform:none;
      font-family:var(--font-mono);
      box-shadow: 0 6px 14px rgba(0,0,0,0.12);
      transition: transform 0.12s ease, box-shadow 0.12s ease, opacity 0.12s ease;
    }
    .btn:active{ transform: translateY(2px) }
    .btn.secondary{
      background:var(--color-secondary);
    }
    .btn.ghost{
      background:transparent;
      color:var(--color-primary);
      border:2px solid rgba(0,0,0,0.04);
    }

    #pause-btn{
      width:100%;
      margin-top:6px;
      background:#fff;
      color:var(--color-primary);
      border:2px solid var(--color-primary);
    }

    .start-overlay{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      background: linear-gradient(180deg, rgba(0,0,0,0.25), rgba(0,0,0,0.35));
      border-radius:10px;
      z-index:30;
      transition: opacity var(--anim-slow) ease, transform var(--anim-slow) ease;
    }
    .start-overlay.hidden{ opacity:0; visibility:hidden; transform:scale(0.98); pointer-events:none; }

    .start-panel{
      text-align:center;
      padding:20px;
      background:rgba(255,255,255,0.96);
      border-radius:12px;
      width:320px;
      box-shadow: 8px 12px 28px rgba(0,0,0,0.16);
    }
    .start-panel h2{
      margin:6px 0 12px;
      font-family:var(--font-title);
      color:var(--color-primary);
      font-size:18px;
    }
    .start-panel p{ font-size:12px; color:#444; margin:0 0 12px; }

    .modal{
      position:fixed;
      left:50%;
      top:50%;
      transform:translate(-50%,-50%) translateY(20px);
      width:min(420px,90%);
      background:#fff;
      padding:20px;
      border-radius:12px;
      box-shadow: 0 18px 40px rgba(0,0,0,0.28);
      z-index:80;
      opacity:0;
      visibility:hidden;
      transition: opacity var(--anim-medium) ease, transform var(--anim-medium) ease;
    }
    .modal.show{
      opacity:1;
      visibility:visible;
      transform:translate(-50%,-50%) translateY(0);
    }
    .modal h3{
      margin:0 0 12px;
      font-family:var(--font-title);
      color:var(--color-primary);
      font-size:16px;
      text-align:center;
    }
    .modal .modal-body{
      text-align:center;
      margin-bottom:12px;
    }

    .stage-clear{
      animation: stageClear var(--anim-slow) ease forwards;
    }
    @keyframes stageClear{
      0%{opacity:0; transform:scale(0.98)}
      50%{opacity:1; transform:scale(1.02)}
      100%{opacity:1; transform:scale(1)}
    }

    .game-over-flash::before{
      content:'';
      position:fixed;
      inset:0;
      background: rgba(199,62,29,0.0);
      animation: gameOverFlash 0.3s ease forwards;
      pointer-events:none;
      z-index:90;
    }
    @keyframes gameOverFlash{
      0%{background:rgba(199,62,29,0.6)}
      100%{background:rgba(199,62,29,0)}
    }

    .block-land{
      animation: blockLand var(--anim-fast) ease;
    }
    @keyframes blockLand{
      0%{ transform: scale(1) }
      50%{ transform: scale(1.06) }
      100%{ transform: scale(1) }
    }

    @media (max-width:900px){
      .game-wrap{ flex-direction:column; align-items:center; }
      aside.sidebar{ width:90%; max-width:420px; }
      header.app-header{ top:12px; }
      .board-area{ transform-origin: top center; }
      .board-scale{ transform: scale(0.85); }
    }
    @media (max-width:520px){
      .board-scale{ transform: scale(0.7); }
      header .title{ font-size:12px; padding:8px 12px; }
    }
  </style>
</head>
<body>
  <div class="app">

    <header class="app-header" role="banner">
      <div class="title" aria-hidden="false">길진이 테트리스 🎮</div>
    </header>

    <main class="game-wrap" role="main">
      <section class="board-area" aria-label="게임 보드 섹션">
        <div id="start-overlay" class="start-overlay">
          <div class="start-panel">
            <h2>길진이 테트리스</h2>
            <p>목표: 각 스테이지 3000점 달성 | 조작: A/D ←/→, W 회전, S 빠른 낙하</p>
            <button id="start-btn" class="btn" type="button">시작하기 ▶</button>
            <div style="margin-top:10px; display:flex; gap:8px; justify-content:center;">
              <div id="best-record" class="btn ghost" style="padding:8px 10px;">최고: 0</div>
              <button id="settings-btn" class="btn secondary" type="button">설정 ⚙️</button>
            </div>
          </div>
        </div>

        <div class="board-scale" style="width:var(--board-width); height:var(--board-height);">
          <canvas id="game-canvas" width="300" height="600" aria-label="테트리스 게임 보드"></canvas>
          <div class="row-overlay" id="row-overlay" aria-hidden="true"></div>
        </div>
      </section>

      <aside class="sidebar" role="complementary" aria-label="게임 정보 및 컨트롤">
        <div class="panel" aria-labelledby="next-label">
          <div id="next-label" class="label" style="font-size:12px; color:#444; margin-bottom:8px;">다음 블록</div>
          <div class="next-block" aria-hidden="false">
            <canvas id="next-canvas" width="88" height="88" aria-label="다음 블록 미리보기"></canvas>
          </div>
        </div>

        <div class="panel stat" aria-live="polite">
          <div class="label">현재 점수</div>
          <div id="score-value" class="value">0</div>
          <div class="label" style="margin-top:8px;">스테이지</div>
          <div id="stage-value" class="value" style="color:var(--color-secondary)">1</div>
        </div>

        <div class="panel progress-wrap" aria-label="목표 진행바">
          <div class="target-label">
            <div style="font-size:13px; color:#444;">목표 진행도</div>
            <div id="target-score" style="font-size:13px; color:#444;">3000</div>
          </div>
          <div class="progress-bar" aria-hidden="false">
            <div class="fill" id="progress-fill" style="--progress:0%; width:var(--progress, 0%);"></div>
          </div>
        </div>

        <div class="panel" style="display:flex; flex-direction:column; gap:8px;">
          <button id="pause-btn" class="btn" type="button">일시정지 ⏸️</button>
          <button id="restart-btn" class="btn secondary" type="button">재시작 ↻</button>
        </div>

        <div class="panel" style="display:flex; justify-content:space-between; align-items:center;">
          <div style="font-size:12px; color:#666;">최고 기록</div>
          <div id="best-score" style="font-weight:700; color:var(--color-primary);">0</div>
        </div>
      </aside>
    </main>

    <div id="result-modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="result-title" aria-hidden="true">
      <h3 id="result-title">결과</h3>
      <div class="modal-body">
        <div id="result-message" style="font-size:14px; margin-bottom:8px;">스테이지 클리어!</div>
        <div id="result-score" style="font-size:18px; color:var(--color-accent); font-weight:700;">획득 점수: 0</div>
      </div>
      <div style="display:flex; gap:8px; justify-content:center;">
        <button id="next-stage-btn" class="btn">다음 스테이지 ▶</button>
        <button id="result-restart-btn" class="btn ghost">다시하기 ↺</button>
      </div>
    </div>

    <div style="display:none" aria-hidden="true">
      <span style="color:var(--color-I)"></span>
    </div>
  </div>

  <script>
    // 길진이 테트리스 게임 - QA 검수 및 통합 버전
    class TetrisGame {
        constructor() {
            // HTML과 일치하는 ID로 수정
            this.canvas = document.getElementById('game-canvas');
            this.ctx = this.canvas.getContext('2d');
            this.nextCanvas = document.getElementById('next-canvas');
            this.nextCtx = this.nextCanvas.getContext('2d');
            
            // 게임 상수
            this.BOARD_WIDTH = 10;
            this.BOARD_HEIGHT = 20;
            this.CELL_SIZE = 30;
            this.COLORS = {
                I: '#00F5FF', O: '#FFFF00', T: '#800080', S: '#00FF00',
                Z: '#FF0000', J: '#0000FF', L: '#FFA500'
            };
            
            // 게임 상태
            this.gameState = {
                stage: 1,
                score: 0,
                targetScore: 3000,
                currentBlock: null,
                nextBlock: null,
                board: Array(20).fill().map(() => Array(10).fill(0)),
                isPaused: false,
                isGameOver: false,
                dropTime: 0,
                dropInterval: 1000,
                lines: 0,
                isPlaying: false
            };
            
            this.lastTime = 0;
            this.animationId = null;
            
            // 테트로미노 정의
            this.tetrominoes = {
                I: { shape: [[1,1,1,1]], color: 'I' },
                O: { shape: [[1,1],[1,1]], color: 'O' },
                T: { shape: [[0,1,0],[1,1,1]], color: 'T' },
                S: { shape: [[0,1,1],[1,1,0]], color: 'S' },
                Z: { shape: [[1,1,0],[0,1,1]], color: 'Z' },
                J: { shape: [[1,0,0],[1,1,1]], color: 'J' },
                L: { shape: [[0,0,1],[1,1,1]], color: 'L' }
            };
            
            this.init();
        }
        
        init() {
            this.setupCanvas();
            this.bindEvents();
            this.loadHighScore();
            this.render();
        }
        
        setupCanvas() {
            // HiDPI 지원
            const ratio = window.devicePixelRatio || 1;
            
            // 메인 캔버스
            this.canvas.width = this.BOARD_WIDTH * this.CELL_SIZE * ratio;
            this.canvas.height = this.BOARD_HEIGHT * this.CELL_SIZE * ratio;
            this.canvas.style.width = this.BOARD_WIDTH * this.CELL_SIZE + 'px';
            this.canvas.style.height = this.BOARD_HEIGHT * this.CELL_SIZE + 'px';
            this.ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
            
            // 다음 블록 캔버스
            this.nextCanvas.width = 88 * ratio;
            this.nextCanvas.height = 88 * ratio;
            this.nextCanvas.style.width = '88px';
            this.nextCanvas.style.height = '88px';
            this.nextCtx.setTransform(ratio, 0, 0, ratio, 0, 0);
        }
        
        bindEvents() {
            // HTML과 일치하는 ID로 수정
            const startBtn = document.getElementById('start-btn');
            const pauseBtn = document.getElementById('pause-btn');
            const restartBtn = document.getElementById('restart-btn');
            const nextStageBtn = document.getElementById('next-stage-btn');
            const resultRestartBtn = document.getElementById('result-restart-btn');
            
            if (startBtn) startBtn.addEventListener('click', () => this.startGame());
            if (pauseBtn) pauseBtn.addEventListener('click', () => this.togglePause());
            if (restartBtn) restartBtn.addEventListener('click', () => this.restartGame());
            if (nextStageBtn) nextStageBtn.addEventListener('click', () => this.nextStage());
            if (resultRestartBtn) resultRestartBtn.addEventListener('click', () => this.restartGame());
            
            // 키보드 입력
            document.addEventListener('keydown', (e) => this.handleInput(e));
            
            // 터치 컨트롤
            this.setupTouchControls();
        }
        
        setupTouchControls() {
            let touchStartX = 0;
            let touchStartY = 0;
            
            this.canvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                touchStartX = e.touches[0].clientX;
                touchStartY = e.touches[0].clientY;
            });
            
            this.canvas.addEventListener('touchend', (e) => {
                e.preventDefault();
                const touchEndX = e.changedTouches[0].clientX;
                const touchEndY = e.changedTouches[0].clientY;
                
                const deltaX = touchEndX - touchStartX;
                const deltaY = touchEndY - touchStartY;
                
                if (Math.abs(deltaX) > Math.abs(deltaY)) {
                    if (Math.abs(deltaX) > 50) {
                        if (deltaX > 0) this.moveBlock('right');
                        else this.moveBlock('left');
                    }
                } else {
                    if (deltaY > 50) this.moveBlock('down');
                    else if (Math.abs(deltaX) < 30 && Math.abs(deltaY) < 30) {
                        this.rotateBlock();
                    }
                }
            });
        }
        
        handleInput(event) {
            if (!this.gameState.isPlaying || this.gameState.isPaused) return;
            
            switch(event.key.toLowerCase()) {
                case 'a':
                case 'arrowleft':
                    this.moveBlock('left');
                    break;
                case 'd':
                case 'arrowright':
                    this.moveBlock('right');
                    break;
                case 's':
                case 'arrowdown':
                    this.moveBlock('down');
                    break;
                case 'w':
                case 'arrowup':
                    this.rotateBlock();
                    break;
                case ' ':
                    this.dropBlock();
                    break;
                case 'p':
                    this.togglePause();
                    break;
            }
            event.preventDefault();
        }
        
        startGame() {
            this.resetGame();
            this.spawnNewBlock();
            this.spawnNextBlock();
            this.hideStartOverlay();
            this.gameLoop();
        }
        
        resetGame() {
            this.gameState = {
                stage: 1,
                score: 0,
                targetScore: 3000,
                currentBlock: null,
                nextBlock: null,
                board: Array(20).fill().map(() => Array(10).fill(0)),
                isPaused: false,
                isGameOver: false,
                dropTime: 0,
                dropInterval: 1000,
                lines: 0,
                isPlaying: true
            };
            
            // 모달 숨기기
            this.hideModal();
        }
        
        hideStartOverlay() {
            const overlay = document.getElementById('start-overlay');
            if (overlay) overlay.classList.add('hidden');
        }
        
        showStartOverlay() {
            const overlay = document.getElementById('start-overlay');
            if (overlay) overlay.classList.remove('hidden');
        }
        
        hideModal() {
            const modal = document.getElementById('result-modal');
            if (modal) modal.classList.remove('show');
        }
        
        showModal(title, message, score, showNextStage = false) {
            const modal = document.getElementById('result-modal');
            const titleEl = document.getElementById('result-title');
            const messageEl = document.getElementById('result-message');
            const scoreEl = document.getElementById('result-score');
            const nextStageBtn = document.getElementById('next-stage-btn');
            
            if (modal) {
                modal.classList.add('show');
                if (titleEl) titleEl.textContent = title;
                if (messageEl) messageEl.textContent = message;
                if (scoreEl) scoreEl.textContent = `획득 점수: ${score.toLocaleString()}`;
                if (nextStageBtn) {
                    nextStageBtn.style.display = showNextStage ? 'inline-flex' : 'none';
                }
            }
        }
        
        spawnNewBlock() {
            if (this.gameState.nextBlock) {
                this.gameState.currentBlock = this.gameState.nextBlock;
            } else {
                this.gameState.currentBlock = this.createRandomBlock();
            }
            
            this.gameState.currentBlock.x = Math.floor(this.BOARD_WIDTH / 2) - 1;
            this.gameState.currentBlock.y = 0;
            
            if (this.checkCollision(this.gameState.currentBlock, 0, 0)) {
                this.gameOver();
                return;
            }
            
            this.spawnNextBlock();
        }
        
        spawnNextBlock() {
            this.gameState.nextBlock = this.createRandomBlock();
            this.drawNextBlock();
        }
        
        createRandomBlock() {
            const types = Object.keys(this.tetrominoes);
            const randomType = types[Math.floor(Math.random() * types.length)];
            const tetromino = this.tetrominoes[randomType];
            
            return {
                shape: JSON.parse(JSON.stringify(tetromino.shape)),
                color: tetromino.color,
                x: 0,
                y: 0
            };
        }
        
        moveBlock(direction) {
            if (!this.gameState.currentBlock) return;
            
            let newX = this.gameState.currentBlock.x;
            let newY = this.gameState.currentBlock.y;
            
            switch(direction) {
                case 'left': newX -= 1; break;
                case 'right': newX += 1; break;
                case 'down': newY += 1; break;
            }
            
            if (!this.checkCollision(this.gameState.currentBlock, newX - this.gameState.currentBlock.x, newY - this.gameState.currentBlock.y)) {
                this.gameState.currentBlock.x = newX;
                this.gameState.currentBlock.y = newY;
                
                if (direction === 'down') {
                    this.gameState.score += 1;
                }
            } else if (direction === 'down') {
                this.lockBlock();
            }
        }
        
        rotateBlock() {
            if (!this.gameState.currentBlock) return;
            
            const rotated = this.rotateMatrix(this.gameState.currentBlock.shape);
            const originalShape = this.gameState.currentBlock.shape;
            
            this.gameState.currentBlock.shape = rotated;
            
            let kicked = false;
            for (let kick = 0; kick <= 2 && !kicked; kick++) {
                for (let direction of [-kick, kick]) {
                    if (direction === 0 && kick > 0) continue;
                    
                    if (!this.checkCollision(this.gameState.currentBlock, direction, 0)) {
                        this.gameState.currentBlock.x += direction;
                        kicked = true;
                        break;
                    }
                }
            }
            
            if (!kicked) {
                this.gameState.currentBlock.shape = originalShape;
            }
        }
        
        rotateMatrix(matrix) {
            const rows = matrix.length;
            const cols = matrix[0].length;
            const rotated = Array(cols).fill().map(() => Array(rows).fill(0));
            
            for (let i = 0; i < rows; i++) {
                for (let j = 0; j < cols; j++) {
                    rotated[j][rows - 1 - i] = matrix[i][j];
                }
            }
            
            return rotated;
        }
        
        dropBlock() {
            if (!this.gameState.currentBlock) return;
            
            while (!this.checkCollision(this.gameState.currentBlock, 0, 1)) {
                this.gameState.currentBlock.y += 1;
                this.gameState.score += 2;
            }
            
            this.lockBlock();
        }
        
        checkCollision(block, deltaX, deltaY) {
            const newX = block.x + deltaX;
            const newY = block.y + deltaY;
            
            for (let y = 0; y < block.shape.length; y++) {
                for (let x = 0; x < block.shape[y].length; x++) {
                    if (block.shape[y][x]) {
                        const boardX = newX + x;
                        const boardY = newY + y;
                        
                        if (boardX < 0 || boardX >= this.BOARD_WIDTH || boardY >= this.BOARD_HEIGHT) {
                            return true;
                        }
                        
                        if (boardY >= 0 && this.gameState.board[boardY][boardX]) {
                            return true;
                        }
                    }
                }
            }
            
            return false;
        }
        
        lockBlock() {
            const block = this.gameState.currentBlock;
            
            for (let y = 0; y < block.shape.length; y++) {
                for (let x = 0; x < block.shape[y].length; x++) {
                    if (block.shape[y][x]) {
                        const boardX = block.x + x;
                        const boardY = block.y + y;
                        
                        if (boardY >= 0) {
                            this.gameState.board[boardY][boardX] = block.color;
                        }
                    }
                }
            }
            
            this.checkLineComplete();
            this.spawnNewBlock();
        }
        
        checkLineComplete() {
            let linesCleared = 0;
            
            for (let y = this.BOARD_HEIGHT - 1; y >= 0; y--) {
                if (this.gameState.board[y].every(cell => cell !== 0)) {
                    this.showLineClearEffect(y);
                    this.gameState.board.splice(y, 1);
                    this.gameState.board.unshift(Array(this.BOARD_WIDTH).fill(0));
                    linesCleared++;
                    y++;
                }
            }
            
            if (linesCleared > 0) {
                const baseScore = 100;
                const multiplier = [0, 1, 3, 5, 8][linesCleared] || 8;
                const stageBonus = this.gameState.stage;
                
                const lineScore = baseScore * multiplier * stageBonus;
                this.gameState.score += lineScore;
                this.gameState.lines += linesCleared;
                
                if (this.gameState.score >= this.gameState.targetScore) {
                    this.stageClear();
                }
                
                this.updateUI();
            }
        }
        
        showLineClearEffect(lineY) {
            const overlay = document.getElementById('row-overlay');
            if (!overlay) return;
            
            const flash = document.createElement('div');
            flash.className = 'flash line-flash';
            flash.style.height = this.CELL_SIZE + 'px';
            flash.style.top = (lineY * this.CELL_SIZE) + 'px';
            
            overlay.appendChild(flash);
            
            setTimeout(() => {
                if (overlay.contains(flash)) {
                    overlay.removeChild(flash);
                }
            }, 300);
        }
        
        stageClear() {
            this.gameState.isPlaying = false;
            this.updateHighScore();
            this.showModal('스테이지 클리어!', `스테이지 ${this.gameState.stage} 클리어!`, this.gameState.score, true);
        }
        
        nextStage() {
            this.gameState.stage++;
            this.gameState.targetScore += 3000;
            this.gameState.dropInterval = Math.max(100, this.gameState.dropInterval - 50);
            this.gameState.isPlaying = true;
            
            this.hideModal();
            this.updateUI();
            this.gameLoop();
        }
        
        gameOver() {
            this.gameState.isGameOver = true;
            this.gameState.isPlaying = false;
            
            // 게임오버 플래시 효과
            document.body.classList.add('game-over-flash');
            setTimeout(() => {
                document.body.classList.remove('game-over-flash');
            }, 300);
            
            this.updateHighScore();
            this.showModal('게임 오버', `스테이지 ${this.gameState.stage}에서 게임 종료`, this.gameState.score, false);
            
            if (this.animationId) {
                cancelAnimationFrame(this.animationId);
            }
        }
        
        restartGame() {
            this.hideModal();
            this.startGame();
        }
        
        togglePause() {
            if (this.gameState.isGameOver) return;
            
            this.gameState.isPaused = !this.gameState.isPaused;
            
            const pauseBtn = document.getElementById('pause-btn');
            if (this.gameState.isPaused) {
                this.showStartOverlay();
                if (pauseBtn) pauseBtn.textContent = '계속하기 ▶️';
            } else {
                this.hideStartOverlay();
                if (pauseBtn) pauseBtn.textContent = '일시정지 ⏸️';
                this.gameLoop();
            }
        }
        
        gameLoop(currentTime = 0) {
            if (this.gameState.isPaused || this.gameState.isGameOver || !this.gameState.isPlaying) return;
            
            const deltaTime = currentTime - this.lastTime;
            this.lastTime = currentTime;
            
            this.gameState.dropTime += deltaTime;
            if (this.gameState.dropTime >= this.gameState.dropInterval) {
                this.moveBlock('down');
                this.gameState.dropTime = 0;
            }
            
            this.render();
            this.animationId = requestAnimationFrame((time) => this.gameLoop(time));
        }
        
        render() {
            this.ctx.fillStyle = '#F5F5F5';
            this.ctx.fillRect(0, 0, this.BOARD_WIDTH * this.CELL_SIZE, this.BOARD_HEIGHT * this.CELL_SIZE);
            
            this.drawGrid();
            this.drawBoard();
            
            if (this.gameState.currentBlock) {
                this.drawBlock(this.gameState.currentBlock);
            }
            
            this.updateUI();
        }
        
        drawGrid() {
            this.ctx.strokeStyle = 'rgba(0,0,0,0.06)';
            this.ctx.lineWidth = 1;
            
            for (let x = 0; x <= this.BOARD_WIDTH; x++) {
                this.ctx.beginPath();
                this.ctx.moveTo(x * this.CELL_SIZE, 0);
                this.ctx.lineTo(x * this.CELL_SIZE, this.BOARD_HEIGHT * this.CELL_SIZE);
                this.ctx.stroke();
            }
            
            for (let y = 0; y <= this.BOARD_HEIGHT; y++) {
                this.ctx.beginPath();
                this.ctx.moveTo(0, y * this.CELL_SIZE);
                this.ctx.lineTo(this.BOARD_WIDTH * this.CELL_SIZE, y * this.CELL_SIZE);
                this.ctx.stroke();
            }
        }
        
        drawBoard() {
            for (let y = 0; y < this.BOARD_HEIGHT; y++) {
                for (let x = 0; x < this.BOARD_WIDTH; x++) {
                    if (this.gameState.board[y][x]) {
                        this.drawCell(x, y, this.gameState.board[y][x]);
                    }
                }
            }
        }
        
        drawBlock(block) {
            for (let y = 0; y < block.shape.length; y++) {
                for (let x = 0; x < block.shape[y].length; x++) {
                    if (block.shape[y][x]) {
                        this.drawCell(block.x + x, block.y + y, block.color);
                    }
                }
            }
        }
        
        drawCell(x, y, colorType) {
            const pixelX = x * this.CELL_SIZE;
            const pixelY = y * this.CELL_SIZE;
            
            const gradient = this.ctx.createLinearGradient(pixelX, pixelY, pixelX, pixelY + this.CELL_SIZE);
            gradient.addColorStop(0, this.lightenColor(this.COLORS[colorType], 20));
            gradient.addColorStop(1, this.darkenColor(this.COLORS[colorType], 20));
            
            this.ctx.fillStyle = gradient;
            this.ctx.fillRect(pixelX + 1, pixelY + 1, this.CELL_SIZE - 2, this.CELL_SIZE - 2);
            
            this.ctx.strokeStyle = '#333333';
            this.ctx.lineWidth = 1;
            this.ctx.strokeRect(pixelX + 1, pixelY + 1, this.CELL_SIZE - 2, this.CELL_SIZE - 2);
        }
        
        drawNextBlock() {
            if (!this.gameState.nextBlock) return;
            
            this.nextCtx.fillStyle = '#F5F5F5';
            this.nextCtx.fillRect(0, 0, 88, 88);
            
            const block = this.gameState.nextBlock;
            const cellSize = 16;
            const offsetX = (88 - block.shape[0].length * cellSize) / 2;
            const offsetY = (88 - block.shape.length * cellSize) / 2;
            
            for (let y = 0; y < block.shape.length; y++) {
                for (let x = 0; x < block.shape[y].length; x++) {
                    if (block.shape[y][x]) {
                        const pixelX = offsetX + x * cellSize;
                        const pixelY = offsetY + y * cellSize;
                        
                        this.nextCtx.fillStyle = this.COLORS[block.color];
                        this.nextCtx.fillRect(pixelX, pixelY, cellSize - 1, cellSize - 1);
                        
                        this.nextCtx.strokeStyle = '#333333';
                        this.nextCtx.strokeRect(pixelX, pixelY, cellSize - 1, cellSize - 1);
                    }
                }
            }
        }
        
        updateUI() {
            const scoreEl = document.getElementById('score-value');
            const stageEl = document.getElementById('stage-value');
            const targetEl = document.getElementById('target-score');
            const progressEl = document.getElementById('progress-fill');
            const bestScoreEl = document.getElementById('best-score');
            
            if (scoreEl) scoreEl.textContent = this.gameState.score.toLocaleString();
            if (stageEl) stageEl.textContent = this.gameState.stage;
            if (targetEl) targetEl.textContent = this.gameState.targetScore.toLocaleString();
            
            if (progressEl) {
                const currentStageScore = this.gameState.score % 3000;
                const progress = (currentStageScore / 3000) * 100;
                progressEl.style.setProperty('--progress', `${progress}%`);
                progressEl.style.width = `${progress}%`;
            }
        }
        
        loadHighScore() {
            const highScore = localStorage.getItem('giljin_tetris_best') || 0;
            const bestScoreEl = document.getElementById('best-score');
            const bestRecordEl = document.getElementById('best-record');
            
            if (bestScoreEl) bestScoreEl.textContent = parseInt(highScore).toLocaleString();
            if (bestRecordEl) bestRecordEl.textContent = `최고: ${parseInt(highScore).toLocaleString()}`;
        }
        
        updateHighScore() {
            const currentHighScore = parseInt(localStorage.getItem('giljin_tetris_best') || 0);
            
            if (this.gameState.score > currentHighScore) {
                localStorage.setItem('giljin_tetris_best', this.gameState.score);
                this.loadHighScore();
            }
        }
        
        lightenColor(color, percent) {
            const num = parseInt(color.replace('#', ''), 16);
            const amt = Math.round(2.55 * percent);
            const R = Math.min(255, (num >> 16) + amt);
            const G = Math.min(255, ((num >> 8) & 0x00FF) + amt);
            const B = Math.min(255, (num & 0x0000FF) + amt);
            return `#${((1 << 24) + (R << 16) + (G << 8) + B).toString(16).slice(1)}`;
        }
        
        darkenColor(color, percent) {
            const num = parseInt(color.replace('#', ''), 16);
            const amt = Math.round(2.55 * percent);
            const R = Math.max(0, (num >> 16) - amt);
            const G = Math.max(0, ((num >> 8) & 0x00FF) - amt);
            const B = Math.max(0, (num & 0x0000FF) - amt);
            return `#${((1 << 24) + (R << 16) + (G << 8) + B).toString(16).slice(1)}`;
        }
    }

    // 게임 인스턴스 생성
    document.addEventListener('DOMContentLoaded', () => {
        window.tetrisGame = new TetrisGame();
    });

    // 페이지 언로드 시 정리
    window.addEventListener('beforeunload', () => {
        if (window.tetrisGame && window.tetrisGame.animationId) {
            cancelAnimationFrame(window.tetrisGame.animationId);
        }
    });
  </script>
