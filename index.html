  <style>
/* Publisher CSS */
:root{
  /* Colors */
  --color-bg: #0A0A23;
  --color-primary: #00BFFF;
  --color-secondary: #FF4500;
  --color-accent: #FFD700;
  --color-white: #ffffff;
  --color-muted: #9aa4b2;
  --hud-height: 64px;

  /* Sizes */
  --canvas-w: 800px;
  --canvas-h: 600px;
  --scale-max-width: 90vw;

  /* Effects */
  --btn-hover-bg: #001a33;
  --transition-fast: 180ms;
  --transition-smooth: 400ms;
  --explosion-duration: 0.5s;
}

/* Reset & base */
*{box-sizing:border-box;margin:0;padding:0}
html,body,#game-canvas{height:100%}
body{
  min-height:100vh;
  background:var(--color-bg);
  color:var(--color-white);
  font-family:"Roboto Mono", monospace;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  overflow:hidden;
}

/* Game shell layout - fullscreen centered column */
.game-shell{
  position:relative;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  min-height:100vh;
  width:100%;
  padding:24px;
}

/* Star field decorative layer */
.star-field{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:0;
}
.star{
  position:absolute;
  width:2px;
  height:2px;
  background:var(--color-white);
  border-radius:50%;
  opacity:0.6;
  animation:star-twinkle var(--star-duration,1.2s) infinite ease-in-out;
  animation-direction:alternate;
  /* allow inline styles to set animation-delay and duration */
}
@keyframes star-twinkle{
  from{opacity:0.3; transform:scale(0.9)}
  to{opacity:1; transform:scale(1.1)}
}

/* HUD */
.hud{
  position:relative;
  z-index:5;
  display:flex;
  align-items:center;
  justify-content:space-between;
  width: min(var(--scale-max-width), var(--canvas-w));
  max-width:var(--canvas-w);
  height:var(--hud-height);
  padding:8px 12px;
  margin-bottom:12px;
  color:var(--color-white);
  font-size:14px;
  gap:12px;
}
.hud-item{display:flex;flex-direction:column;align-items:flex-start}
.hud-center{align-items:center;margin:auto}
.hud-right{align-items:flex-end}
.hud-label{font-size:12px;color:var(--color-muted)}
.hud-value{font-family:"Orbitron",sans-serif;font-weight:700;font-size:18px;letter-spacing:1px}
.hearts{color:var(--color-accent); font-size:18px}

/* Play area with canvas wrapper - responsive maintaining 4:3 ratio */
.play-area{
  position:relative;
  z-index:2;
  display:flex;
  flex-direction:column;
  align-items:center;
  width:100%;
  max-width:var(--canvas-w);
  flex:0 0 auto;
}
.canvas-wrap{
  position:relative;
  width: min(var(--scale-max-width), var(--canvas-w));
  aspect-ratio: 4 / 3; /* keeps 800x600 proportion */
  max-width:var(--canvas-w);
  background: linear-gradient(180deg, rgba(10,10,35,0.02), rgba(0,0,0,0.02));
  border: 2px solid rgba(255,255,255,0.04);
  box-shadow: 0 6px 24px rgba(0,0,0,0.8), inset 0 -20px 40px rgba(0,0,0,0.6);
  overflow:hidden;
  display:block;
  border-radius:6px;
}

/* Canvas styling - occupies wrapper fully */
#game-canvas{
  display:block;
  width:100%;
  height:100%;
  background:var(--color-bg);
  image-rendering:pixelated; /* retro vibe */
  outline:none;
}

/* Small UI previews (player/enemy/missile) - decorative */
.ui-previews{
  position:absolute;
  right:8px;
  bottom:8px;
  display:flex;
  gap:8px;
  pointer-events:none;
  z-index:6;
}
.preview{width:44px;height:36px;display:inline-block;transform-origin:center;opacity:0.95}
.player-preview{
  width:40px;height:30px;
  clip-path: polygon(50% 0%, 0% 100%, 100% 100%); /* upright triangle */
  background:var(--color-primary);
  box-shadow:0 0 8px rgba(0,191,255,0.25);
}
.enemy-preview{
  width:30px;height:25px;
  clip-path: polygon(50% 100%, 0% 0%, 100% 0%); /* inverted triangle */
  background:var(--color-secondary);
  box-shadow:0 0 8px rgba(255,69,0,0.25);
}
.missile-preview{
  width:8px;height:24px;
  background:var(--color-accent);
  border-radius:2px;
  transform:translateY(-6px);
  box-shadow:0 0 6px rgba(255,215,0,0.3);
}

/* Controls aside */
.controls{
  margin-top:12px;
  color:var(--color-muted);
  font-size:13px;
  text-align:center;
  z-index:5;
}

/* Footer */
.footer{margin-top:12px;color:var(--color-muted);font-size:12px;z-index:5;display:flex;flex-direction:column;align-items:center;gap:4px}

/* Modals */
.modal{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:10;
  pointer-events:none;
}
.modal-center .modal-box{
  width: min(560px, 92vw);
  background: rgba(255,255,255,0.03);
  border-radius:8px;
  padding:22px;
  text-align:center;
  box-shadow:0 8px 40px rgba(0,0,0,0.7);
  border:1px solid rgba(255,255,255,0.04);
  pointer-events:auto;
}
.modal .game-title{font-family:"Orbitron",sans-serif;font-size:36px;color:var(--color-primary);margin-bottom:8px}
.modal .lead{color:var(--color-muted);margin-bottom:12px}
.menu-info{color:var(--color-muted);font-size:13px;margin-top:12px}

/* Buttons */
.btn{
  display:inline-block;
  min-width:120px;
  padding:10px 14px;
  border-radius:6px;
  border:2px solid var(--color-primary);
  color:var(--color-white);
  background:transparent;
  cursor:pointer;
  font-weight:700;
  letter-spacing:0.6px;
  transition:background var(--transition-fast), transform var(--transition-fast);
  font-family:"Roboto Mono", monospace;
  margin:6px;
}
.btn.primary{background:transparent}
.btn.primary:hover{background:var(--btn-hover-bg); transform:translateY(-3px)}
.btn.secondary{border-color:rgba(255,255,255,0.12); color:var(--color-muted)}
.btn.secondary:hover{background:rgba(255,255,255,0.03); transform:translateY(-2px)}

/* Gameover specific */
.modal-gameover .modal-box{background:rgba(0,0,0,0.6);border:1px solid rgba(255,255,255,0.06)}
.modal-gameover h2{font-family:"Orbitron",sans-serif;color:var(--color-secondary)}

/* Stage overlay (central big "STAGE X") */
.stage-overlay{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9;
  pointer-events:none;
  opacity:0;
  transition:opacity var(--transition-fast) ease;
}
.stage-overlay.show{opacity:1}
.stage-box{
  pointer-events:none;
  background:transparent;
}
.stage-text{
  font-family:"Orbitron",sans-serif;
  font-size:64px;
  color:var(--color-white);
  text-shadow: 0 8px 30px rgba(0,0,0,0.7);
  animation:stage-pop 1s ease forwards;
}
@keyframes stage-pop{
  0%{transform:scale(0.8);opacity:0}
  20%{transform:scale(1.15);opacity:1}
  100%{transform:scale(1);opacity:0}
}

/* VFX layer for CSS-explosions (fallback) */
.vfx-layer{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:8;
}
.explosion{
  position:absolute;
  width:0;height:0;
  pointer-events:none;
}
.explosion .particle{
  position:absolute;
  width:8px;height:8px;border-radius:50%;
  opacity:1;
  transform-origin:center;
  will-change:transform,opacity;
}
@keyframes explode-move{
  to{transform:translate(var(--tx), var(--ty)) scale(0.2); opacity:0}
}
/* When .show is added, animate each particle with its custom --tx/--ty variables and random delay */
.explosion.show .particle{
  animation: explode-move var(--explosion-duration, 0.5s) ease-out forwards;
}

/* Flash red outline when player is hit (toggle .flash-red on canvas-wrap or canvas container) */
.flash-red{
  box-shadow: 0 0 0 4px rgba(255,0,0,0.15), inset 0 0 10px rgba(255,0,0,0.08);
  animation:hit-flash 300ms ease-out;
}
@keyframes hit-flash{
  from{opacity:1}
  to{opacity:0.3}
}

/* Responsive tweaks */
@media (max-width:520px){
  .hud{font-size:12px}
  .hud-value{font-size:14px}
  .modal .game-title{font-size:28px}
  .stage-text{font-size:42px}
}

/* State-based visibility */
.state-MENU #menu-modal { pointer-events: auto; }
.state-PLAYING #menu-modal { display: none; }
.state-GAMEOVER #gameover-modal { display: flex; pointer-events: auto; }
  </style>

  <script>
// 교보 갤럭시 게임 - 통합된 JavaScript 로직
class KyoboGalaxyGame {
    constructor() {
        // 게임 상태 관리
        this.gameState = 'MENU'; // MENU, PLAYING, GAMEOVER
        
        // Canvas 설정 - 올바른 ID 사용
        this.canvas = document.getElementById('game-canvas');
        this.ctx = this.canvas.getContext('2d');
        this.canvas.width = 800;
        this.canvas.height = 600;
        
        // 게임 데이터
        this.score = 0;
        this.stage = 1;
        this.playerHP = 3;
        this.enemiesKilled = 0;
        this.totalEnemiesPerStage = 30;
        
        // 게임 객체들
        this.player = null;
        this.enemies = [];
        this.missiles = [];
        this.explosions = [];
        this.stars = [];
        
        // 키 입력 상태
        this.keys = {
            left: false,
            right: false,
            space: false
        };
        
        // 게임 타이밍
        this.lastTime = 0;
        this.missileTimer = 0;
        this.stageTransition = false;
        this.stageTransitionTimer = 0;
        
        // 최고점수
        this.highScore = parseInt(localStorage.getItem('kyoboGalaxyHighScore')) || 0;
        
        this.init();
    }
    
    init() {
        this.setupEventListeners();
        this.createStars();
        this.showMainMenu();
        this.gameLoop();
    }
    
    // 이벤트 리스너 설정
    setupEventListeners() {
        // 키보드 이벤트
        document.addEventListener('keydown', (e) => {
            switch(e.code) {
                case 'ArrowLeft':
                    this.keys.left = true;
                    e.preventDefault();
                    break;
                case 'ArrowRight':
                    this.keys.right = true;
                    e.preventDefault();
                    break;
                case 'Space':
                    this.keys.space = true;
                    e.preventDefault();
                    break;
                case 'Enter':
                    if (this.gameState === 'MENU' || this.gameState === 'GAMEOVER') {
                        this.startGame();
                    }
                    e.preventDefault();
                    break;
            }
        });
        
        document.addEventListener('keyup', (e) => {
            switch(e.code) {
                case 'ArrowLeft':
                    this.keys.left = false;
                    break;
                case 'ArrowRight':
                    this.keys.right = false;
                    break;
                case 'Space':
                    this.keys.space = false;
                    break;
            }
        });
        
        // 버튼 이벤트
        const startBtn = document.getElementById('btn-start');
        if (startBtn) {
            startBtn.addEventListener('click', () => this.startGame());
        }
        
        const restartBtn = document.getElementById('btn-restart');
        if (restartBtn) {
            restartBtn.addEventListener('click', () => this.startGame());
        }
        
        const menuBtn = document.getElementById('btn-to-menu');
        if (menuBtn) {
            menuBtn.addEventListener('click', () => this.showMainMenu());
        }
    }
    
    // 별 배경 생성
    createStars() {
        this.stars = [];
        for (let i = 0; i < 80; i++) {
            this.stars.push({
                x: Math.random() * this.canvas.width,
                y: Math.random() * this.canvas.height,
                alpha: Math.random() * 0.7 + 0.3,
                blinkSpeed: Math.random() * 0.02 + 0.01,
                direction: 1
            });
        }
    }
    
    // 플레이어 생성
    createPlayer() {
        this.player = {
            x: this.canvas.width / 2 - 20,
            y: this.canvas.height - 60,
            width: 40,
            height: 30,
            speed: 5,
            hitTimer: 0 // 피격 시 깜빡임 효과용
        };
    }
    
    // 적군 생성
    createEnemies() {
        this.enemies = [];
        const rows = 5;
        const cols = 6;
        const enemyWidth = 30;
        const enemyHeight = 25;
        const spacing = 80;
        const startX = (this.canvas.width - (cols * spacing)) / 2;
        const startY = 80;
        
        for (let row = 0; row < rows; row++) {
            for (let col = 0; col < cols; col++) {
                this.enemies.push({
                    x: startX + col * spacing,
                    y: startY + row * 50,
                    width: enemyWidth,
                    height: enemyHeight,
                    speed: this.stage, // 스테이지별 속도 증가
                    direction: 1,
                    alive: true
                });
            }
        }
    }
    
    // 게임 시작
    startGame() {
        this.gameState = 'PLAYING';
        this.score = 0;
        this.stage = 1;
        this.playerHP = 3;
        this.enemiesKilled = 0;
        this.missiles = [];
        this.explosions = [];
        this.stageTransition = false;
        
        this.createPlayer();
        this.createEnemies();
        
        // Body 상태 변경
        document.body.className = 'state-PLAYING';
        
        // UI 업데이트
        this.updateUI();
    }
    
    // 메인 메뉴 표시
    showMainMenu() {
        this.gameState = 'MENU';
        document.body.className = 'state-MENU';
    }
    
    // 게임 오버 처리
    gameOver() {
        this.gameState = 'GAMEOVER';
        
        // 최고점수 업데이트
        if (this.score > this.highScore) {
            this.highScore = this.score;
            localStorage.setItem('kyoboGalaxyHighScore', this.highScore.toString());
        }
        
        // Body 상태 변경
        document.body.className = 'state-GAMEOVER';
        
        // 최종 점수 표시
        const finalScoreElement = document.getElementById('final-score');
        const finalStageElement = document.getElementById('final-stage');
        
        if (finalScoreElement) finalScoreElement.textContent = this.score.toString().padStart(5, '0');
        if (finalStageElement) finalStageElement.textContent = `${this.stage} / 5`;
    }
    
    // 다음 스테이지로 진행
    nextStage() {
        this.stage++;
        this.enemiesKilled = 0;
        this.score += 1000; // 스테이지 클리어 보너스
        
        if (this.stage > 5) {
            // 게임 클리어
            this.gameOver();
            return;
        }
        
        // 스테이지 전환 애니메이션
        this.stageTransition = true;
        this.stageTransitionTimer = 60; // 1초 (60프레임)
        
        // 스테이지 오버레이 표시
        const stageOverlay = document.getElementById('stage-overlay');
        const stageOverlayText = document.getElementById('stage-overlay-text');
        
        if (stageOverlay && stageOverlayText) {
            stageOverlayText.textContent = `STAGE ${this.stage}`;
            stageOverlay.classList.add('show');
            
            setTimeout(() => {
                stageOverlay.classList.remove('show');
            }, 1000);
        }
        
        // 새로운 적군 생성
        setTimeout(() => {
            this.createEnemies();
            this.stageTransition = false;
        }, 1000);
        
        this.updateUI();
    }
    
    // UI 업데이트
    updateUI() {
        const scoreElement = document.getElementById('score');
        const stageElement = document.getElementById('stage');
        const hpElement = document.getElementById('hp');
        
        if (scoreElement) scoreElement.textContent = this.score.toString().padStart(5, '0');
        if (stageElement) stageElement.textContent = `${this.stage} / 5`;
        if (hpElement) {
            hpElement.textContent = '♥︎ '.repeat(this.playerHP).trim();
        }
    }
    
    // 충돌 감지 (AABB)
    checkCollision(rect1, rect2) {
        return rect1.x < rect2.x + rect2.width &&
               rect1.x + rect1.width > rect2.x &&
               rect1.y < rect2.y + rect2.height &&
               rect1.y + rect1.height > rect2.y;
    }
    
    // 미사일 발사
    fireMissile() {
        if (this.missileTimer <= 0) {
            this.missiles.push({
                x: this.player.x + this.player.width / 2 - 2,
                y: this.player.y,
                width: 4,
                height: 12,
                speed: 8
            });
            this.missileTimer = 10; // 발사 간격 제한
        }
    }
    
    // 폭발 효과 생성
    createExplosion(x, y) {
        for (let i = 0; i < 12; i++) {
            const angle = (Math.PI * 2 / 12) * i;
            this.explosions.push({
                x: x,
                y: y,
                vx: Math.cos(angle) * 5,
                vy: Math.sin(angle) * 5,
                life: 30, // 0.5초 (30프레임)
                maxLife: 30
            });
        }
    }
    
    // 플레이어 피격 효과
    playerHit() {
        const canvasWrap = document.querySelector('.canvas-wrap');
        if (canvasWrap) {
            canvasWrap.classList.add('flash-red');
            setTimeout(() => {
                canvasWrap.classList.remove('flash-red');
            }, 300);
        }
    }
    
    // 게임 업데이트 로직
    update(deltaTime) {
        if (this.gameState !== 'PLAYING') return;
        
        // 타이머 업데이트
        if (this.missileTimer > 0) this.missileTimer--;
        if (this.player.hitTimer > 0) this.player.hitTimer--;
        if (this.stageTransitionTimer > 0) this.stageTransitionTimer--;
        
        // 스테이지 전환 중이면 업데이트 중단
        if (this.stageTransition) return;
        
        // 플레이어 이동
        if (this.keys.left && this.player.x > 0) {
            this.player.x -= this.player.speed;
        }
        if (this.keys.right && this.player.x < this.canvas.width - this.player.width) {
            this.player.x += this.player.speed;
        }
        
        // 미사일 발사
        if (this.keys.space) {
            this.fireMissile();
        }
        
        // 미사일 업데이트
        this.missiles = this.missiles.filter(missile => {
            missile.y -= missile.speed;
            return missile.y > -missile.height;
        });
        
        // 적군 이동
        let shouldMoveDown = false;
        this.enemies.forEach(enemy => {
            if (!enemy.alive) return;
            
            enemy.x += enemy.speed * enemy.direction;
            
            // 화면 끝에 도달하면 방향 전환 신호
            if (enemy.x <= 0 || enemy.x >= this.canvas.width - enemy.width) {
                shouldMoveDown = true;
            }
        });
        
        // 모든 적군 방향 전환 및 하강
        if (shouldMoveDown) {
            this.enemies.forEach(enemy => {
                if (!enemy.alive) return;
                enemy.direction *= -1;
                enemy.y += 30;
            });
        }
        
        // 충돌 감지 - 미사일과 적군
        this.missiles.forEach((missile, mIndex) => {
            this.enemies.forEach((enemy, eIndex) => {
                if (!enemy.alive) return;
                
                if (this.checkCollision(missile, enemy)) {
                    // 적군 제거
                    enemy.alive = false;
                    this.enemiesKilled++;
                    this.score += 100;
                    
                    // 폭발 효과
                    this.createExplosion(enemy.x + enemy.width/2, enemy.y + enemy.height/2);
                    
                    // 미사일 제거
                    this.missiles.splice(mIndex, 1);
                    
                    // 스테이지 클리어 체크
                    if (this.enemiesKilled >= this.totalEnemiesPerStage) {
                        this.nextStage();
                    }
                }
            });
        });
        
        // 충돌 감지 - 플레이어와 적군
        this.enemies.forEach(enemy => {
            if (!enemy.alive) return;
            
            if (this.checkCollision(this.player, enemy)) {
                // 플레이어 피격
                this.playerHP--;
                this.player.hitTimer = 18; // 0.3초 깜빡임
                this.playerHit(); // 화면 깜빡임 효과
                
                // 적군도 제거
                enemy.alive = false;
                this.createExplosion(enemy.x + enemy.width/2, enemy.y + enemy.height/2);
                
                if (this.playerHP <= 0) {
                    this.gameOver();
                }
            }
        });
        
        // 폭발 효과 업데이트
        this.explosions = this.explosions.filter(explosion => {
            explosion.x += explosion.vx;
            explosion.y += explosion.vy;
            explosion.life--;
            return explosion.life > 0;
        });
        
        // 별 깜빡임 효과
        this.stars.forEach(star => {
            star.alpha += star.blinkSpeed * star.direction;
            if (star.alpha >= 1.0 || star.alpha <= 0.3) {
                star.direction *= -1;
            }
        });
        
        this.updateUI();
    }
    
    // 렌더링
    render() {
        // 화면 클리어
        this.ctx.fillStyle = '#0A0A23';
        this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
        
        // 별 그리기
        this.stars.forEach(star => {
            this.ctx.globalAlpha = star.alpha;
            this.ctx.fillStyle = '#FFFFFF';
            this.ctx.fillRect(star.x, star.y, 2, 2);
        });
        this.ctx.globalAlpha = 1.0;
        
        if (this.gameState === 'MENU') {
            this.renderMenu();
        } else if (this.gameState === 'PLAYING') {
            this.renderGame();
        } else if (this.gameState === 'GAMEOVER') {
            this.renderGameOver();
        }
    }
    
    renderMenu() {
        this.ctx.fillStyle = '#00BFFF';
        this.ctx.font = 'bold 48px Orbitron, monospace';
        this.ctx.textAlign = 'center';
        this.ctx.fillText('KYOBO GALAXY', this.canvas.width/2, 200);
        
        this.ctx.fillStyle = '#FFFFFF';
        this.ctx.font = '24px Roboto Mono, monospace';
        this.ctx.fillText('Press START or ENTER', this.canvas.width/2, 300);
        
        this.ctx.font = '16px Roboto Mono, monospace';
        this.ctx.fillText('← → Arrow Keys: Move', this.canvas.width/2, 380);
        this.ctx.fillText('SPACE: Fire Missile', this.canvas.width/2, 410);
        
        if (this.highScore > 0) {
            this.ctx.fillStyle = '#FFD700';
            this.ctx.fillText(`High Score: ${this.highScore}`, this.canvas.width/2, 500);
        }
    }
    
    renderGame() {
        // 플레이어 그리기
        if (this.player) {
            // 피격 시 깜빡임 효과
            if (this.player.hitTimer > 0 && Math.floor(this.player.hitTimer / 3) % 2 === 0) {
                this.ctx.strokeStyle = '#FF0000';
                this.ctx.lineWidth = 2;
                this.ctx.strokeRect(this.player.x - 2, this.player.y - 2, this.player.width + 4, this.player.height + 4);
            }
            
            this.ctx.fillStyle = '#00BFFF';
            this.ctx.beginPath();
            this.ctx.moveTo(this.player.x + this.player.width/2, this.player.y);
            this.ctx.lineTo(this.player.x, this.player.y + this.player.height);
            this.ctx.lineTo(this.player.x + this.player.width, this.player.y + this.player.height);
            this.ctx.closePath();
            this.ctx.fill();
        }
        
        // 적군 그리기
        this.ctx.fillStyle = '#FF4500';
        this.enemies.forEach(enemy => {
            if (!enemy.alive) return;
            
            this.ctx.beginPath();
            this.ctx.moveTo(enemy.x, enemy.y);
            this.ctx.lineTo(enemy.x + enemy.width, enemy.y);
            this.ctx.lineTo(enemy.x + enemy.width/2, enemy.y + enemy.height);
            this.ctx.closePath();
            this.ctx.fill();
        });
        
        // 미사일 그리기
        this.ctx.fillStyle = '#FFD700';
        this.missiles.forEach(missile => {
            this.ctx.fillRect(missile.x, missile.y, missile.width, missile.height);
        });
        
        // 폭발 효과 그리기
        this.explosions.forEach(explosion => {
            const alpha = explosion.life / explosion.maxLife;
            this.ctx.globalAlpha = alpha;
            
            if (explosion.life > explosion.maxLife * 0.5) {
                this.ctx.fillStyle = '#FFD700';
            } else {
                this.ctx.fillStyle = '#FF4500';
            }
            
            this.ctx.beginPath();
            this.ctx.arc(explosion.x, explosion.y, 3, 0, Math.PI * 2);
            this.ctx.fill();
        });
        this.ctx.globalAlpha = 1.0;
        
        // 스테이지 전환 텍스트
        if (this.stageTransition && this.stageTransitionTimer > 0) {
            this.ctx.fillStyle = '#FFFFFF';
            this.ctx.font = 'bold 36px Orbitron, monospace';
            this.ctx.textAlign = 'center';
            this.ctx.fillText(`STAGE ${this.stage}`, this.canvas.width/2, this.canvas.height/2);
        }
    }
    
    renderGameOver() {
        this.ctx.fillStyle = '#FF4500';
        this.ctx.font = 'bold 48px Orbitron, monospace';
        this.ctx.textAlign = 'center';
        this.ctx.fillText('GAME OVER', this.canvas.width/2, 250);
        
        this.ctx.fillStyle = '#FFFFFF';
        this.ctx.font = '24px Roboto Mono, monospace';
        this.ctx.fillText(`Final Score: ${this.score}`, this.canvas.width/2, 320);
        this.ctx.fillText(`Stage Cleared: ${this.stage}/5`, this.canvas.width/2, 360);
        
        if (this.score === this.highScore && this.highScore > 0) {
            this.ctx.fillStyle = '#FFD700';
            this.ctx.fillText('NEW HIGH SCORE!', this.canvas.width/2, 420);
        }
    }
    
    // 메인 게임 루프
    gameLoop(currentTime = 0) {
        const deltaTime = currentTime - this.lastTime;
        this.lastTime = currentTime;
        
        this.update(deltaTime);
        this.render();
        
        requestAnimationFrame((time) => this.gameLoop(time));
    }
}

// 게임 인스턴스 생성 및 시작
document.addEventListener('DOMContentLoaded', () => {
    const game = new KyoboGalaxyGame();
});
