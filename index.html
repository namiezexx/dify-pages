<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucky Roulette - 네온 카지노</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gold: #FFD700;
            --primary-gold-dark: #FFA500;
            --secondary-red: #FF6B6B;
            --secondary-red-dark: #CC3333;
            --accent-blue: #00D4FF;
            --accent-blue-dark: #0099CC;
            --accent-purple: #9B59B6;
            --accent-purple-dark: #7B4397;
            --bg-navy: #1A1A2E;
            --bg-navy-light: #0f0f23;
            --white: #FFFFFF;
            --gray-light: #CCCCCC;
            --black-alpha: rgba(0, 0, 0, 0.8);
            --shadow-glow: rgba(0, 212, 255, 0.6);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, var(--bg-navy-light) 0%, var(--bg-navy) 100%);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        .game-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }

        /* 배경 별 파티클 */
        .stars-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .star {
            position: absolute;
            width: 3px;
            height: 3px;
            background: var(--white);
            border-radius: 50%;
            animation: starTwinkle 3s ease-in-out infinite;
        }

        .star:nth-child(1) { top: 10%; left: 15%; animation-delay: 0s; }
        .star:nth-child(2) { top: 20%; left: 80%; animation-delay: 0.5s; }
        .star:nth-child(3) { top: 30%; left: 25%; animation-delay: 1s; }
        .star:nth-child(4) { top: 15%; left: 70%; animation-delay: 1.5s; }
        .star:nth-child(5) { top: 45%; left: 10%; animation-delay: 2s; }
        .star:nth-child(6) { top: 60%; left: 90%; animation-delay: 0.3s; }
        .star:nth-child(7) { top: 70%; left: 20%; animation-delay: 0.8s; }
        .star:nth-child(8) { top: 80%; left: 60%; animation-delay: 1.3s; }
        .star:nth-child(9) { top: 25%; left: 50%; animation-delay: 1.8s; }
        .star:nth-child(10) { top: 35%; left: 85%; animation-delay: 2.3s; }
        .star:nth-child(11) { top: 55%; left: 35%; animation-delay: 0.2s; }
        .star:nth-child(12) { top: 75%; left: 75%; animation-delay: 0.7s; }
        .star:nth-child(13) { top: 5%; left: 45%; animation-delay: 1.2s; }
        .star:nth-child(14) { top: 85%; left: 15%; animation-delay: 1.7s; }
        .star:nth-child(15) { top: 40%; left: 65%; animation-delay: 2.2s; }
        .star:nth-child(16) { top: 90%; left: 40%; animation-delay: 0.1s; }
        .star:nth-child(17) { top: 12%; left: 30%; animation-delay: 0.6s; }
        .star:nth-child(18) { top: 65%; left: 55%; animation-delay: 1.1s; }
        .star:nth-child(19) { top: 22%; left: 95%; animation-delay: 1.6s; }
        .star:nth-child(20) { top: 88%; left: 5%; animation-delay: 2.1s; }
        .star:nth-child(21) { top: 50%; left: 78%; animation-delay: 0.4s; }
        .star:nth-child(22) { top: 18%; left: 58%; animation-delay: 0.9s; }
        .star:nth-child(23) { top: 77%; left: 32%; animation-delay: 1.4s; }
        .star:nth-child(24) { top: 33%; left: 12%; animation-delay: 1.9s; }
        .star:nth-child(25) { top: 95%; left: 85%; animation-delay: 2.4s; }
        .star:nth-child(26) { top: 8%; left: 62%; animation-delay: 0.35s; }
        .star:nth-child(27) { top: 42%; left: 88%; animation-delay: 0.85s; }
        .star:nth-child(28) { top: 67%; left: 8%; animation-delay: 1.35s; }
        .star:nth-child(29) { top: 28%; left: 38%; animation-delay: 1.85s; }
        .star:nth-child(30) { top: 82%; left: 92%; animation-delay: 2.35s; }

        @keyframes starTwinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* 게임 헤더 */
        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 500px;
            margin-bottom: 30px;
            z-index: 10;
            position: relative;
        }

        .game-title {
            font-family: 'Orbitron', monospace;
            font-size: 48px;
            font-weight: 900;
            color: var(--white);
            text-shadow: 0 0 20px var(--accent-blue), 0 0 40px var(--accent-blue);
            letter-spacing: 3px;
            animation: titleGlow 2s ease-in-out infinite alternate;
        }

        @keyframes titleGlow {
            from { text-shadow: 0 0 20px var(--accent-blue), 0 0 40px var(--accent-blue); }
            to { text-shadow: 0 0 30px var(--accent-blue), 0 0 60px var(--accent-blue); }
        }

        .speed-indicator {
            font-family: 'Roboto', sans-serif;
            color: var(--gray-light);
            font-size: 14px;
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 12px;
            border-radius: 20px;
            border: 1px solid var(--accent-blue);
        }

        .speed-value {
            color: var(--accent-blue);
            font-weight: 500;
            margin-left: 5px;
        }

        /* 메인 게임 영역 */
        .game-main {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
            z-index: 10;
            position: relative;
        }

        /* 룰렛 컨테이너 */
        .roulette-container {
            position: relative;
            width: 400px;
            height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .roulette-shadow {
            position: absolute;
            bottom: -30px;
            left: 50%;
            transform: translateX(-50%);
            width: 450px;
            height: 50px;
            background: radial-gradient(ellipse, rgba(0, 0, 0, 0.3) 0%, transparent 70%);
            border-radius: 50%;
        }

        .roulette-canvas {
            border-radius: 50%;
            box-shadow: 
                0 0 30px var(--shadow-glow),
                0 0 60px var(--shadow-glow),
                inset 0 0 20px rgba(0, 0, 0, 0.3);
            animation: rouletteGlow 3s ease-in-out infinite alternate;
            transition: transform 0.1s ease-out;
        }

        @keyframes rouletteGlow {
            from { box-shadow: 0 0 30px var(--shadow-glow), 0 0 60px var(--shadow-glow), inset 0 0 20px rgba(0, 0, 0, 0.3); }
            to { box-shadow: 0 0 40px var(--shadow-glow), 0 0 80px var(--shadow-glow), inset 0 0 20px rgba(0, 0, 0, 0.3); }
        }

        .pointer {
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-top: 30px solid var(--white);
            filter: drop-shadow(0 3px 6px rgba(0, 0, 0, 0.5));
            z-index: 20;
        }

        /* 조작 안내 */
        .control-guide {
            text-align: center;
        }

        .guide-text {
            font-family: 'Roboto', sans-serif;
            font-size: 24px;
            color: var(--gray-light);
            animation: guidePulse 2s ease-in-out infinite;
        }

        @keyframes guidePulse {
            0%, 100% { opacity: 0.7; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
        }

        /* 결과 오버레이 */
        .result-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            animation: fadeIn 0.3s ease-out;
        }

        .result-overlay.show {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .result-popup {
            background: linear-gradient(135deg, rgba(26, 26, 46, 0.95) 0%, rgba(15, 15, 35, 0.95) 100%);
            border: 2px solid var(--accent-blue);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 0 40px var(--shadow-glow);
            animation: popupScale 0.5s ease-out;
        }

        @keyframes popupScale {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .result-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .result-title {
            font-family: 'Orbitron', monospace;
            font-size: 48px;
            font-weight: 900;
            margin-bottom: 10px;
            animation: resultTitleScale 0.7s ease-out;
        }

        @keyframes resultTitleScale {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .result-title.rank-1 {
            color: var(--primary-gold);
            text-shadow: 0 0 20px var(--primary-gold);
        }

        .result-title.rank-2 {
            color: var(--accent-blue);
            text-shadow: 0 0 20px var(--accent-blue);
        }

        .result-title.rank-3 {
            color: var(--accent-purple);
            text-shadow: 0 0 20px var(--accent-purple);
        }

        .result-title.rank-fail {
            color: var(--secondary-red);
            text-shadow: 0 0 20px var(--secondary-red);
        }

        .result-message {
            font-family: 'Roboto', sans-serif;
            font-size: 18px;
            color: var(--gray-light);
            margin-bottom: 10px;
        }

        .play-again-btn {
            font-family: 'Roboto', sans-serif;
            font-size: 18px;
            font-weight: 500;
            color: var(--white);
            background: transparent;
            border: 2px solid var(--accent-blue);
            padding: 12px 30px;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .play-again-btn:hover {
            background: var(--accent-blue);
            color: var(--bg-navy);
            box-shadow: 0 0 20px var(--accent-blue);
            transform: translateY(-2px);
        }

        /* 파티클 이펙트 */
        .particles-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 900;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            animation: particleExplode 2s ease-out forwards;
        }

        @keyframes particleExplode {
            0% {
                transform: scale(1) translate(0, 0);
                opacity: 1;
            }
            100% {
                transform: scale(0) translate(var(--dx), var(--dy));
                opacity: 0;
            }
        }

        .particle.gold {
            background: radial-gradient(circle, var(--primary-gold) 0%, var(--primary-gold-dark) 100%);
            box-shadow: 0 0 10px var(--primary-gold);
        }

        .particle.blue {
            background: radial-gradient(circle, var(--accent-blue) 0%, var(--accent-blue-dark) 100%);
            box-shadow: 0 0 10px var(--accent-blue);
        }

        .particle.purple {
            background: radial-gradient(circle, var(--accent-purple) 0%, var(--accent-purple-dark) 100%);
            box-shadow: 0 0 10px var(--accent-purple);
        }

        .particle.red {
            background: radial-gradient(circle, var(--secondary-red) 0%, var(--secondary-red-dark) 100%);
            box-shadow: 0 0 10px var(--secondary-red);
        }

        /* 화면 이펙트 */
        .screen-effect {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 950;
            opacity: 0;
        }

        .screen-effect.flash-gold {
            background: radial-gradient(circle, rgba(255, 215, 0, 0.3) 0%, transparent 70%);
            animation: flashEffect 0.5s ease-out;
        }

        .screen-effect.flash-blue {
            background: radial-gradient(circle, rgba(0, 212, 255, 0.2) 0%, transparent 70%);
            animation: flashEffect 0.7s ease-out;
        }

        .screen-effect.flash-purple {
            background: radial-gradient(circle, rgba(155, 89, 182, 0.2) 0%, transparent 70%);
            animation: flashEffect 0.5s ease-out;
        }

        .screen-effect.shake {
            animation: screenShake 0.3s ease-out;
        }

        @keyframes flashEffect {
            0% { opacity: 0; }
            50% { opacity: 1; }
            100% { opacity: 0; }
        }

        @keyframes screenShake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        /* 게임 상태별 스타일 */
        .roulette-canvas.spinning {
            animation: rouletteGlow 3s ease-in-out infinite alternate;
        }

        .roulette-canvas.stopping {
            animation: rouletteGlow 3s ease-in-out infinite alternate, slowRotation 3s ease-out;
        }

        @keyframes slowRotation {
            from { transform: rotate(0deg); }
            to { transform: rotate(1080deg); }
        }

        /* 반응형 디자인 */
        @media (max-width: 768px) {
            .game-container {
                padding: 15px;
            }
            
            .game-title {
                font-size: 32px;
                letter-spacing: 2px;
            }
            
            .game-header {
                flex-direction: column;
                gap: 15px;
                margin-bottom: 20px;
            }
            
            .roulette-container {
                width: 300px;
                height: 300px;
            }
            
            .roulette-canvas {
                width: 300px;
                height: 300px;
            }
            
            .guide-text {
                font-size: 20px;
            }
            
            .result-title {
                font-size: 36px;
            }
            
            .result-popup {
                padding: 30px 20px;
                margin: 20px;
            }
        }

        @media (max-width: 480px) {
            .game-title {
                font-size: 24px;
                letter-spacing: 1px;
            }
            
            .roulette-container {
                width: 250px;
                height: 250px;
            }
            
            .roulette-canvas {
                width: 250px;
                height: 250px;
            }
            
            .guide-text {
                font-size: 18px;
            }
            
            .result-title {
                font-size: 28px;
            }
            
            .speed-indicator {
                font-size: 12px;
                padding: 6px 10px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <!-- 배경 별 파티클들 -->
        <div class="stars-container">
            <div class="star"></div>
            <div class="star"></div>
            <div class="star"></div>
            <div class="star"></div>
            <div class="star"></div>
            <div class="star"></div>
            <div class="star"></div>
            <div class="star"></div>
            <div class="star"></div>
            <div class="star"></div>
            <div class="star"></div>
            <div class="star"></div>
            <div class="star"></div>
            <div class="star"></div>
            <div class="star"></div>
            <div class="star"></div>
            <div class="star"></div>
            <div class="star"></div>
            <div class="star"></div>
            <div class="star"></div>
            <div class="star"></div>
            <div class="star"></div>
            <div class="star"></div>
            <div class="star"></div>
            <div class="star"></div>
            <div class="star"></div>
            <div class="star"></div>
            <div class="star"></div>
            <div class="star"></div>
            <div class="star"></div>
        </div>

        <!-- 게임 헤더 -->
        <header class="game-header">
            <h1 class="game-title">LUCKY ROULETTE</h1>
            <div class="speed-indicator">
                <span class="speed-label">속도:</span>
                <span class="speed-value" id="speedValue">8 RPM</span>
            </div>
        </header>

        <!-- 메인 게임 영역 -->
        <main class="game-main">
            <!-- 룰렛 컨테이너 -->
            <div class="roulette-container">
                <div class="roulette-shadow"></div>
                <canvas id="rouletteCanvas" class="roulette-canvas" width="400" height="400"></canvas>
                <div class="pointer"></div>
            </div>

            <!-- 조작 안내 -->
            <div class="control-guide">
                <p class="guide-text" id="guideText">SPACE키를 눌러 멈춰보세요!</p>
            </div>
        </main>

        <!-- 결과 오버레이 -->
        <div class="result-overlay" id="resultOverlay">
            <div class="result-popup">
                <div class="result-content">
                    <h2 class="result-title" id="resultTitle">1등!</h2>
                    <p class="result-message" id="resultMessage">축하합니다!</p>
                    <button class="play-again-btn" id="playAgainBtn">다시하기</button>
                </div>
            </div>
        </div>

        <!-- 파티클 컨테이너 -->
        <div class="particles-container" id="particlesContainer"></div>

        <!-- 화면 이펙트 -->
        <div class="screen-effect" id="screenEffect"></div>
    </div>

    <script>
        /**
         * 룰렛 게임 메인 클래스
         * 네온 카지노 스타일의 10칸 룰렛 게임
         */
        class RouletteGame {
            constructor() {
                // Canvas 요소 및 컨텍스트 초기화
                this.canvas = document.getElementById('rouletteCanvas');
                if (!this.canvas) {
                    throw new Error('Canvas element not found');
                }
                this.ctx = this.canvas.getContext('2d');
                
                // HTML 요소 참조
                this.speedValue = document.getElementById('speedValue');
                this.guideText = document.getElementById('guideText');
                this.resultOverlay = document.getElementById('resultOverlay');
                this.resultTitle = document.getElementById('resultTitle');
                this.resultMessage = document.getElementById('resultMessage');
                this.playAgainBtn = document.getElementById('playAgainBtn');
                this.particlesContainer = document.getElementById('particlesContainer');
                this.screenEffect = document.getElementById('screenEffect');
                
                // 게임 상태 관리 (상태머신 패턴)
                this.gameState = 'READY'; // READY, SPINNING, STOPPING, RESULT
                
                // 룰렛 설정
                this.rouletteRadius = 200;
                this.centerX = this.canvas.width / 2;
                this.centerY = this.canvas.height / 2;
                this.currentAngle = 0;
                this.rotationSpeed = 0;
                this.targetSpeed = 8; // 초기 회전 속도 (RPM)
                
                // 룰렛 섹터 정의 (10칸: 1등 1칸, 2등 2칸, 3등 3칸, 꽝 4칸)
                this.sectors = [
                    { type: 1, color: '#FFD700', gradient: '#FFA500', label: '1등' }, // 1등 1칸
                    { type: 2, color: '#00D4FF', gradient: '#0099CC', label: '2등' }, // 2등 2칸
                    { type: 2, color: '#00D4FF', gradient: '#0099CC', label: '2등' },
                    { type: 3, color: '#9B59B6', gradient: '#7B4397', label: '3등' }, // 3등 3칸
                    { type: 3, color: '#9B59B6', gradient: '#7B4397', label: '3등' },
                    { type: 3, color: '#9B59B6', gradient: '#7B4397', label: '3등' },
                    { type: 0, color: '#FF6B6B', gradient: '#CC3333', label: '꽝' }, // 꽝 4칸
                    { type: 0, color: '#FF6B6B', gradient: '#CC3333', label: '꽝' },
                    { type: 0, color: '#FF6B6B', gradient: '#CC3333', label: '꽝' },
                    { type: 0, color: '#FF6B6B', gradient: '#CC3333', label: '꽝' }
                ];
                
                // 파티클 시스템
                this.particles = [];
                
                // 게임 통계 (localStorage 연동)
                this.stats = this.loadStats();
                
                // 별 배경 파티클
                this.stars = this.generateStars(30);
                
                // 애니메이션 프레임 ID
                this.animationId = null;
                
                // 결과 표시 관련
                this.resultText = '';
                this.resultStartTime = 0;
                
                // 이벤트 리스너 등록
                this.initEventListeners();
                
                // 게임 시작
                this.startGame();
            }
            
            /**
             * 별 파티클 생성
             */
            generateStars(count) {
                const stars = [];
                for (let i = 0; i < count; i++) {
                    stars.push({
                        x: Math.random() * this.canvas.width,
                        y: Math.random() * this.canvas.height,
                        size: Math.random() * 3 + 2,
                        alpha: Math.random() * 0.7 + 0.3,
                        twinkleSpeed: Math.random() * 0.02 + 0.01
                    });
                }
                return stars;
            }
            
            /**
             * 통계 데이터 로드 (localStorage)
             */
            loadStats() {
                try {
                    const saved = localStorage.getItem('rouletteStats');
                    if (saved) {
                        return JSON.parse(saved);
                    }
                } catch (error) {
                    console.warn('Failed to load stats from localStorage:', error);
                }
                return {
                    totalGames: 0,
                    results: { 1: 0, 2: 0, 3: 0, 0: 0 } // 1등, 2등, 3등, 꽝
                };
            }
            
            /**
             * 통계 데이터 저장 (localStorage)
             */
            saveStats() {
                try {
                    localStorage.setItem('rouletteStats', JSON.stringify(this.stats));
                } catch (error) {
                    console.warn('Failed to save stats to localStorage:', error);
                }
            }
            
            /**
             * 이벤트 리스너 초기화
             */
            initEventListeners() {
                // 스페이스바 입력 처리
                this.keyDownHandler = (event) => {
                    if (event.code === 'Space' && this.gameState === 'SPINNING') {
                        event.preventDefault();
                        this.stopRoulette();
                    }
                };
                
                // 모바일 터치 지원
                this.touchHandler = (event) => {
                    if (this.gameState === 'SPINNING') {
                        event.preventDefault();
                        this.stopRoulette();
                    }
                };
                
                // 다시하기 버튼
                this.playAgainHandler = () => {
                    this.hideResult();
                    this.startGame();
                };
                
                document.addEventListener('keydown', this.keyDownHandler);
                this.canvas.addEventListener('touchstart', this.touchHandler, { passive: false });
                this.playAgainBtn.addEventListener('click', this.playAgainHandler);
                
                // 창 크기 변경 대응
                window.addEventListener('resize', () => {
                    this.resizeCanvas();
                });
            }
            
            /**
             * Canvas 크기 조정 (반응형)
             */
            resizeCanvas() {
                this.centerX = this.canvas.width / 2;
                this.centerY = this.canvas.height / 2;
            }
            
            /**
             * 게임 시작
             */
            startGame() {
                this.gameState = 'SPINNING';
                this.rotationSpeed = this.targetSpeed;
                this.currentAngle = 0;
                this.particles = [];
                this.resultText = '';
                
                // UI 업데이트
                this.updateUI();
                this.canvas.classList.add('spinning');
                this.canvas.classList.remove('stopping');
                
                // 게임 루프 시작
                this.gameLoop();
            }
            
            /**
             * 룰렛 정지 요청
             */
            stopRoulette() {
                if (this.gameState === 'SPINNING') {
                    this.gameState = 'STOPPING';
                    this.canvas.classList.replace('spinning', 'stopping');
                    this.updateUI();
                    
                    // 이벤트 리스너 임시 제거 (중복 입력 방지)
                    document.removeEventListener('keydown', this.keyDownHandler);
                    this.canvas.removeEventListener('touchstart', this.touchHandler);
                }
            }
            
            /**
             * 메인 게임 루프 (60FPS)
             */
            gameLoop() {
                this.update();
                this.render();
                
                // 게임이 계속 진행중이면 다음 프레임 요청
                if (this.gameState !== 'IDLE') {
                    this.animationId = requestAnimationFrame(() => this.gameLoop());
                }
            }
            
            /**
             * 게임 상태 업데이트
             */
            update() {
                // 별 반짝임 효과 업데이트
                this.stars.forEach(star => {
                    star.alpha += star.twinkleSpeed;
                    if (star.alpha >= 1 || star.alpha <= 0.3) {
                        star.twinkleSpeed *= -1;
                    }
                });
                
                // 게임 상태별 로직 처리
                switch (this.gameState) {
                    case 'SPINNING':
                        // 룰렛 회전
                        this.currentAngle += (this.rotationSpeed * Math.PI * 2) / (60 * 60); // 60FPS 기준 각속도 변환
                        this.speedValue.textContent = `${this.rotationSpeed.toFixed(1)} RPM`;
                        break;
                        
                    case 'STOPPING':
                        // easeOut 감속 알고리즘
                        this.rotationSpeed *= 0.98;
                        this.currentAngle += (this.rotationSpeed * Math.PI * 2) / (60 * 60);
                        this.speedValue.textContent = `${this.rotationSpeed.toFixed(1)} RPM`;
                        
                        // 완전히 정지하면 결과 판정
                        if (this.rotationSpeed < 0.1) {
                            this.rotationSpeed = 0;
                            this.gameState = 'RESULT';
                            this.showResult();
                        }
                        break;
                        
                    case 'RESULT':
                        // 결과 표시 상태에서는 특별한 업데이트 없음
                        break;
                }
                
                // 파티클 업데이트
                this.updateParticles();
            }
            
            /**
             * UI 업데이트
             */
            updateUI() {
                switch (this.gameState) {
                    case 'SPINNING':
                        this.guideText.textContent = 'SPACE키를 눌러 멈춰보세요!';
                        break;
                    case 'STOPPING':
                        this.guideText.textContent = '룰렛이 멈추고 있습니다...';
                        break;
                    case 'RESULT':
                        this.guideText.textContent = '결과를 확인하세요!';
                        break;
                    default:
                        this.guideText.textContent = 'SPACE키를 눌러 멈춰보세요!';
                }
            }
            
            /**
             * 결과 판정 및 표시
             */
            showResult() {
                // 포인터 각도 (12시 방향)
                const pointerAngle = -Math.PI / 2;
                
                // 현재 룰렛 각도에서 포인터가 가리키는 섹터 계산
                const normalizedAngle = ((this.currentAngle % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
                const sectorAngle = (Math.PI * 2) / this.sectors.length;
                const sectorIndex = Math.floor((normalizedAngle + sectorAngle / 2) / sectorAngle) % this.sectors.length;
                
                const result = this.sectors[sectorIndex];
                this.resultText = result.label;
                this.resultStartTime = Date.now();
                
                // 통계 업데이트
                this.stats.totalGames++;
                this.stats.results[result.type]++;
                this.saveStats();
                
                // 결과 UI 업데이트
                this.resultTitle.textContent = result.label;
                this.resultTitle.className = 'result-title ' + this.getRankClass(result.type);
                this.resultMessage.textContent = this.getResultMessage(result.type);
                
                // 결과별 파티클 이펙트 생성
                this.createResultEffect(result.type);
                
                // 화면 이펙트
                this.createScreenEffect(result.type);
                
                // 결과 오버레이 표시
                this.resultOverlay.classList.add('show');
                
                // UI 업데이트
                this.updateUI();
                
                // 이벤트 리스너 다시 등록
                setTimeout(() => {
                    document.addEventListener('keydown', this.keyDownHandler);
                    this.canvas.addEventListener('touchstart', this.touchHandler, { passive: false });
                }, 1000);
            }
            
            /**
             * 결과 숨기기
             */
            hideResult() {
                this.resultOverlay.classList.remove('show');
                this.clearParticles();
            }
            
            /**
             * 결과별 클래스 반환
             */
            getRankClass(type) {
                switch(type) {
                    case 1: return 'rank-1';
                    case 2: return 'rank-2';
                    case 3: return 'rank-3';
                    default: return 'rank-fail';
                }
            }
            
            /**
             * 결과별 메시지 반환
             */
            getResultMessage(type) {
                switch(type) {
                    case 1: return '🏆 대박! 1등 당첨!';
                    case 2: return '🥈 축하합니다! 2등!';
                    case 3: return '🥉 좋아요! 3등!';
                    default: return '😅 아쉽네요. 다시 도전!';
                }
            }
            
            /**
             * 결과별 파티클 이펙트 생성
             */
            createResultEffect(resultType) {
                const particleCount = resultType === 1 ? 30 : resultType === 2 ? 20 : resultType === 3 ? 15 : 10;
                const colors = {
                    1: 'gold', // 1등: 골드
                    2: 'blue', // 2등: 블루
                    3: 'purple', // 3등: 퍼플
                    0: 'red'  // 꽝: 레드
                };
                
                const centerX = window.innerWidth / 2;
                const centerY = window.innerHeight / 2;
                
                for (let i = 0; i < particleCount; i++) {
                    const particle = document.createElement('div');
                    particle.className = `particle ${colors[resultType]}`;
                    particle.style.left = centerX + 'px';
                    particle.style.top = centerY + 'px';
                    particle.style.width = (Math.random() * 8 + 4) + 'px';
                    particle.style.height = particle.style.width;
                    
                    const dx = (Math.random() - 0.5) * 400 + 'px';
                    const dy = (Math.random() - 0.5) * 400 + 'px';
                    particle.style.setProperty('--dx', dx);
                    particle.style.setProperty('--dy', dy);
                    
                    this.particlesContainer.appendChild(particle);
                    
                    // 파티클 제거
                    setTimeout(() => {
                        if (particle.parentNode) {
                            particle.parentNode.removeChild(particle);
                        }
                    }, 2000);
                }
            }
            
            /**
             * 화면 이펙트 생성
             */
            createScreenEffect(resultType) {
                let effectClass = '';
                switch(resultType) {
                    case 1: effectClass = 'flash-gold'; break;
                    case 2: effectClass = 'flash-blue'; break;
                    case 3: effectClass = 'flash-purple'; break;
                    case 0: effectClass = 'shake'; break;
                }
                
                this.screenEffect.className = 'screen-effect ' + effectClass;
                
                // 이펙트 제거
                setTimeout(() => {
                    this.screenEffect.className = 'screen-effect';
                }, 1000);
            }
            
            /**
             * 파티클 업데이트
             */
            updateParticles() {
                // HTML 파티클 시스템을 사용하므로 별도 업데이트 불필요
            }
            
            /**
             * 파티클 정리
             */
            clearParticles() {
                this.particlesContainer.innerHTML = '';
            }
            
            /**
             * 렌더링
             */
            render() {
                // 캔버스 초기화
                this.ctx.fillStyle = '#1A1A2E';
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                
                // 배경 별 그리기
                this.drawStars();
                
                // 룰렛 그리기
                this.drawRoulette();
                
                // 포인터는 HTML/CSS로 구현되어 있으므로 생략
            }
            
            /**
             * 배경 별 그리기
             */
            drawStars() {
                this.stars.forEach(star => {
                    this.ctx.save();
                    this.ctx.globalAlpha = star.alpha;
                    this.ctx.fillStyle = '#FFFFFF';
                    this.ctx.beginPath();
                    this.ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                    this.ctx.fill();
                    this.ctx.restore();
                });
            }
            
            /**
             * 룰렛 그리기
             */
            drawRoulette() {
                const sectorAngle = (Math.PI * 2) / this.sectors.length;
                
                // 각 섹터 그리기
                this.sectors.forEach((sector, index) => {
                    const startAngle = this.currentAngle + index * sectorAngle;
                    const endAngle = startAngle + sectorAngle;
                    
                    // 그라디언트 생성
                    const gradient = this.ctx.createRadialGradient(
                        this.centerX, this.centerY, 0,
                        this.centerX, this.centerY, this.rouletteRadius
                    );
                    gradient.addColorStop(0, sector.color);
                    gradient.addColorStop(1, sector.gradient);
                    
                    // 섹터 그리기
                    this.ctx.beginPath();
                    this.ctx.arc(this.centerX, this.centerY, this.rouletteRadius, startAngle, endAngle);
                    this.ctx.lineTo(this.centerX, this.centerY);
                    this.ctx.closePath();
                    this.ctx.fillStyle = gradient;
                    this.ctx.fill();
                    
                    // 섹터 테두리
                    this.ctx.strokeStyle = '#FFFFFF';
                    this.ctx.lineWidth = 2;
                    this.ctx.stroke();
                    
                    // 섹터 텍스트
                    const textAngle = startAngle + sectorAngle / 2;
                    const textX = this.centerX + Math.cos(textAngle) * (this.rouletteRadius * 0.7);
                    const textY = this.centerY + Math.sin(textAngle) * (this.rouletteRadius * 0.7);
                    
                    this.ctx.save();
                    this.ctx.translate(textX, textY);
                    this.ctx.rotate(textAngle + Math.PI / 2);
                    this.ctx.fillStyle = '#FFFFFF';
                    this.ctx.font = 'bold 18px Orbitron';
                    this.ctx.textAlign = 'center';
                    this.ctx.shadowColor = 'rgba(0, 0, 0, 0.8)';
                    this.ctx.shadowBlur = 4;
                    this.ctx.fillText(sector.label, 0, 6);
                    this.ctx.restore();
                });
            }
            
            /**
             * 게임 종료 및 정리
             */
            destroy() {
                if (this.animationId) {
                    cancelAnimationFrame(this.animationId);
                }
                
                document.removeEventListener('keydown', this.keyDownHandler);
                this.canvas.removeEventListener('touchstart', this.touchHandler);
                this.playAgainBtn.removeEventListener('click', this.playAgainHandler);
                window.removeEventListener('resize', this.resizeCanvas);
                
                this.clearParticles();
            }
        }

        // 페이지 로드 완료 후 게임 시작
        document.addEventListener('DOMContentLoaded', () => {
            try {
                // 게임 인스턴스 생성
                window.rouletteGame = new RouletteGame();
            } catch (error) {
                console.error('Failed to initialize roulette game:', error);
            }
        });

        // 전역 함수로 게임 재시작 기능 제공
        function restartGame() {
            try {
                if (window.rouletteGame) {
                    window.rouletteGame.destroy();
                }
                window.rouletteGame = new RouletteGame();
            } catch (error) {
                console.error('Failed to restart game:', error);
            }
        }

        // 통계 초기화 기능
        function resetStats() {
            if (confirm('통계를 초기화하시겠습니까?')) {
                try {
                    localStorage.removeItem('rouletteStats');
                    if (window.rouletteGame) {
                        window.rouletteGame.stats = window.rouletteGame.loadStats();
                    }
                    alert('통계가 초기화되었습니다.');
                } catch (error) {
                    console.error('Failed to reset stats:', error);
                }
            }
        }
    </script>
</body>
