<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>PING PONG BATTLE</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
  <style>
:root{
  --color-bg: #000000;
  --color-primary: #FFFFFF;
  --color-secondary: #00FF41;
  --color-accent: #FF6B35;
  --overlay-bg: rgba(0,0,0,0.8);
  --font-title: 'Orbitron', 'Courier New', monospace;
  --font-body: 'Courier New', monospace;
  --canvas-w: 800px;
  --canvas-h: 400px;
  --paddle-w: 20px;
  --paddle-h: 80px;
  --ball-size: 15px;
  --dur-fast: 0.1s;
  --dur-mid: 0.2s;
  --dur-long: 0.3s;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body,#app{height:100%}
body{
  background:var(--color-bg);
  color:var(--color-primary);
  font-family:var(--font-body);
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  overflow:hidden;
}
.app{
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  padding:24px;
}
.screen{
  width:100%;
  max-width:var(--canvas-w);
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:20px;
  position:relative;
}
.is-hidden{display:none}
.is-visible{display:flex}
.title{
  font-family:var(--font-title);
  font-weight:700;
  font-size:48px;
  color:var(--color-primary);
  letter-spacing:4px;
  text-align:center;
  text-shadow:0 0 8px rgba(255,255,255,0.06);
}
.menu-actions{
  display:flex;
  gap:16px;
  align-items:center;
}
.menu-btn{
  width:60px;
  height:40px;
  background:transparent;
  color:var(--color-primary);
  border:2px solid var(--color-accent);
  border-radius:6px;
  cursor:pointer;
  font-family:var(--font-title);
  font-size:16px;
  transition:transform var(--dur-fast), box-shadow var(--dur-fast);
}
.menu-btn:active{transform:translateY(1px)}
.menu-btn:hover{box-shadow:0 6px 18px rgba(255,107,53,0.12)}
.controls-hint{
  position:relative;
  bottom:0;
  color:rgba(255,255,255,0.8);
  font-size:14px;
  font-family:var(--font-body);
}
.hud{
  width:100%;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:8px 12px;
  box-sizing:border-box;
  pointer-events:none;
}
.score{
  font-family:var(--font-title);
  font-size:32px;
  color:var(--color-primary);
  min-width:80px;
  text-align:center;
}
.hud-center{
  font-size:12px;
  color:rgba(255,255,255,0.6);
}
.arena{
  width:var(--canvas-w);
  max-width:90vw;
  aspect-ratio: 800 / 400;
  position:relative;
  display:block;
  background:var(--color-bg);
  border-radius:4px;
  overflow:visible;
}
.game-canvas{
  display:block;
  width:100%;
  height:100%;
  background:transparent;
  image-rendering:optimizeSpeed;
  outline:none;
  border-radius:0;
  box-shadow:0 10px 40px rgba(0,0,0,0.6);
}
.center-line{
  pointer-events:none;
  position:absolute;
  top:0;
  bottom:0;
  left:50%;
  width:0;
  border-left:5px dashed rgba(255,255,255,0.12);
  transform:translateX(-50%);
  mix-blend-mode:screen;
}
.boundary{
  position:absolute;
  left:0;
  right:0;
  height:2px;
  background:var(--color-primary);
  opacity:0.08;
}
.top-boundary{top:0}
.bottom-boundary{bottom:0}
.particle-layer{
  position:absolute;
  inset:0;
  pointer-events:none;
  overflow:visible;
}
.particle{
  position:absolute;
  width:6px;
  height:6px;
  background:var(--color-primary);
  border-radius:50%;
  transform:translate(-50%,-50%);
  opacity:1;
  will-change:transform, opacity;
  animation:particle-burst var(--dur-mid) linear forwards;
}
@keyframes particle-burst{
  to{
    transform:translate(-50%,-50%) translate(var(--tx,0px), var(--ty,0px));
    opacity:0;
  }
}
.score-flash{
  position:absolute;
  inset:0;
  background:var(--color-secondary);
  opacity:0;
  pointer-events:none;
  transition:opacity var(--dur-fast) linear;
  z-index:8;
}
.score-flash.flash--show{
  opacity:0.18;
  transition:opacity var(--dur-fast) linear;
}
.game-controls{
  margin-top:10px;
}
.control-btn{
  background:transparent;
  border:2px solid var(--color-accent);
  color:var(--color-primary);
  padding:8px 12px;
  border-radius:6px;
  cursor:pointer;
  font-family:var(--font-body);
}
.overlay{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  z-index:20;
  pointer-events:none;
}
.overlay.is-visible{display:flex; pointer-events:auto}
.overlay-panel{
  width:min(520px,calc(90vw));
  background:var(--overlay-bg);
  color:var(--color-primary);
  padding:24px;
  border-radius:8px;
  text-align:center;
  box-shadow:0 20px 60px rgba(0,0,0,0.6);
}
.overlay-title{
  font-family:var(--font-title);
  font-size:24px;
  margin-bottom:12px;
}
.result-winner{
  font-family:var(--font-title);
  font-size:28px;
  color:var(--color-secondary);
  margin-bottom:8px;
}
.result-score{
  font-family:var(--font-title);
  font-size:20px;
  color:var(--color-primary);
  margin-bottom:16px;
}
.primary-btn{
  width:120px;
  height:50px;
  border-radius:6px;
  border:2px solid var(--color-accent);
  background:transparent;
  color:var(--color-primary);
  cursor:pointer;
  margin:8px;
  font-family:var(--font-title);
}
.primary-btn:hover{box-shadow:0 8px 24px rgba(255,107,53,0.12)}
.overlay-actions{display:flex; gap:12px; justify-content:center; flex-wrap:wrap;}
.settings-form fieldset{
  border:none;
  margin:16px 0;
}
.settings-form legend{
  font-family:var(--font-title);
  font-size:18px;
  margin-bottom:8px;
}
.settings-form label{
  display:block;
  margin:8px 0;
  cursor:pointer;
}
.settings-form input[type="radio"]{
  margin-right:8px;
}
@media (max-width:520px){
  .title{font-size:36px}
  .menu-btn{width:64px;height:44px;font-size:14px}
  .primary-btn{width:100px;height:44px;font-size:14px}
}
.sr-only{
  position:absolute;left:-9999px;width:1px;height:1px;overflow:hidden;
}
.app.state-paused .game-screen{filter:blur(0.0)}
  </style>
</head>
<body>
  <div id="app" class="app">
    <main id="main-menu" class="screen menu-screen">
      <h1 id="title" class="title">PING PONG BATTLE</h1>
      <nav class="menu-actions" aria-label="메인 메뉴">
        <button id="btn-1v1" class="menu-btn" type="button">1 vs 1</button>
        <button id="btn-vsai" class="menu-btn" type="button">vs AI</button>
        <button id="btn-settings" class="menu-btn" type="button">설정</button>
      </nav>
      <div id="controls-hint" class="controls-hint">
        Player1: W / S &nbsp;&nbsp; | &nbsp;&nbsp; Player2: ↑ / ↓
      </div>
    </main>

    <section id="game-screen" class="screen game-screen is-hidden" aria-label="게임 화면">
      <header class="hud">
        <div id="score-left" class="score score-left" aria-live="polite">0</div>
        <div class="hud-center" aria-hidden="true">FIRST TO 11</div>
        <div id="score-right" class="score score-right" aria-live="polite">0</div>
      </header>

      <div id="arena" class="arena">
        <canvas id="game-canvas" width="800" height="400" class="game-canvas" aria-label="게임 캔버스"></canvas>
        <div class="center-line" aria-hidden="true"></div>
        <div class="boundary top-boundary" aria-hidden="true"></div>
        <div class="boundary bottom-boundary" aria-hidden="true"></div>
        <div id="particle-layer" class="particle-layer" aria-hidden="true"></div>
        <div id="score-flash" class="score-flash" aria-hidden="true"></div>
      </div>

      <div class="game-controls">
        <button id="btn-pause" class="control-btn" type="button">일시정지</button>
      </div>
    </section>

    <div id="pause-overlay" class="overlay pause-overlay is-hidden" role="dialog" aria-modal="true" aria-hidden="true">
      <div class="overlay-panel">
        <h2 class="overlay-title">일시정지</h2>
        <div class="overlay-actions">
          <button id="btn-resume" class="primary-btn" type="button">계속하기</button>
          <button id="btn-restart" class="primary-btn" type="button">다시 시작</button>
          <button id="btn-back-to-menu" class="primary-btn" type="button">메인으로</button>
        </div>
      </div>
    </div>

    <div id="result-modal" class="overlay result-modal is-hidden" role="dialog" aria-modal="true" aria-hidden="true">
      <div class="overlay-panel">
        <h2 id="result-winner" class="result-winner">Player 1 승리!</h2>
        <div id="result-score" class="result-score">11 : 8</div>
        <div class="overlay-actions">
          <button id="btn-replay" class="primary-btn" type="button">다시하기</button>
          <button id="btn-mainmenu" class="primary-btn" type="button">메인으로</button>
        </div>
      </div>
    </div>

    <div id="settings-modal" class="overlay settings-modal is-hidden" role="dialog" aria-modal="true" aria-hidden="true">
      <div class="overlay-panel">
        <h2 class="overlay-title">설정</h2>
        <form id="settings-form" class="settings-form" aria-label="게임 설정">
          <fieldset>
            <legend>AI 난이도</legend>
            <label><input type="radio" name="ai-diff" value="easy"> 쉬움</label>
            <label><input type="radio" name="ai-diff" value="normal" checked> 보통</label>
            <label><input type="radio" name="ai-diff" value="hard"> 어려움</label>
          </fieldset>
          <div class="overlay-actions">
            <button id="btn-save-settings" class="primary-btn" type="button">저장</button>
            <button id="btn-close-settings" class="primary-btn" type="button">닫기</button>
          </div>
        </form>
      </div>
    </div>

    <div class="sr-only" aria-hidden="true">Screen reader helper</div>
  </div>

  <script>
class PingPongGame {
    constructor() {
        this.canvas = document.getElementById('game-canvas');
        this.ctx = this.canvas.getContext('2d');
        this.canvas.width = 800;
        this.canvas.height = 400;
        
        this.gameState = {
            current: 'MENU',
            mode: null,
            aiDifficulty: 'normal'
        };
        
        this.initGameObjects();
        this.keys = {};
        this.setupEventListeners();
        this.lastTime = 0;
        this.gameLoop = this.gameLoop.bind(this);
        this.initAudio();
        this.loadHighScores();
        this.showMenuScreen();
    }
    
    initGameObjects() {
        this.ball = {
            x: this.canvas.width / 2,
            y: this.canvas.height / 2,
            dx: Math.random() > 0.5 ? 5 : -5,
            dy: (Math.random() - 0.5) * 4,
            speed: 5,
            size: 15,
            maxSpeed: 12,
            rallyCount: 0
        };
        
        this.paddle1 = {
            x: 20,
            y: this.canvas.height / 2 - 40,
            width: 20,
            height: 80,
            dy: 0,
            speed: 8
        };
        
        this.paddle2 = {
            x: this.canvas.width - 40,
            y: this.canvas.height / 2 - 40,
            width: 20,
            height: 80,
            dy: 0,
            speed: 8
        };
        
        this.score = {
            player1: 0,
            player2: 0
        };
        
        this.particles = [];
        
        this.flash = {
            active: false,
            timer: 0,
            color: '#00FF41'
        };
    }
    
    initAudio() {
        this.audioContext = null;
        try {
            this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
        } catch (e) {
            console.warn('Web Audio API not supported');
        }
    }
    
    playSound(frequency, duration = 0.1) {
        if (!this.audioContext) return;
        
        const oscillator = this.audioContext.createOscillator();
        const gainNode = this.audioContext.createGain();
        
        oscillator.connect(gainNode);
        gainNode.connect(this.audioContext.destination);
        
        oscillator.frequency.value = frequency;
        oscillator.type = 'square';
        
        gainNode.gain.setValueAtTime(0.1, this.audioContext.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, this.audioContext.currentTime + duration);
        
        oscillator.start();
        oscillator.stop(this.audioContext.currentTime + duration);
    }
    
    setupEventListeners() {
        document.addEventListener('keydown', (e) => {
            this.keys[e.key] = true;
            this.handleKeyDown(e);
        });
        
        document.addEventListener('keyup', (e) => {
            this.keys[e.key] = false;
        });
        
        document.getElementById('btn-1v1').addEventListener('click', () => {
            this.startGame('1v1');
        });
        
        document.getElementById('btn-vsai').addEventListener('click', () => {
            this.startGame('AI');
        });
        
        document.getElementById('btn-settings').addEventListener('click', () => {
            this.showSettings();
        });
        
        document.getElementById('btn-pause').addEventListener('click', () => {
            this.pauseGame();
        });
        
        document.getElementById('btn-resume').addEventListener('click', () => {
            this.resumeGame();
        });
        
        document.getElementById('btn-restart').addEventListener('click', () => {
            this.restartGame();
        });
        
        document.getElementById('btn-back-to-menu').addEventListener('click', () => {
            this.returnToMenu();
        });
        
        document.getElementById('btn-replay').addEventListener('click', () => {
            this.restartGame();
        });
        
        document.getElementById('btn-mainmenu').addEventListener('click', () => {
            this.returnToMenu();
        });
        
        document.getElementById('btn-save-settings').addEventListener('click', () => {
            this.saveSettings();
        });
        
        document.getElementById('btn-close-settings').addEventListener('click', () => {
            this.hideSettings();
        });
    }
    
    handleKeyDown(e) {
        switch (e.key) {
            case 'Escape':
                if (this.gameState.current === 'PLAYING') {
                    this.pauseGame();
                } else if (this.gameState.current === 'PAUSED') {
                    this.resumeGame();
                }
                break;
            case 'Enter':
                if (this.gameState.current === 'GAME_OVER') {
                    this.restartGame();
                }
                break;
        }
    }
    
    startGame(mode) {
        this.gameState.current = 'PLAYING';
        this.gameState.mode = mode;
        this.initGameObjects();
        this.showGameScreen();
        this.updateScoreDisplay();
        requestAnimationFrame(this.gameLoop);
    }
    
    pauseGame() {
        this.gameState.current = 'PAUSED';
        document.getElementById('pause-overlay').classList.add('is-visible');
        document.getElementById('pause-overlay').setAttribute('aria-hidden', 'false');
    }
    
    resumeGame() {
        this.gameState.current = 'PLAYING';
        document.getElementById('pause-overlay').classList.remove('is-visible');
        document.getElementById('pause-overlay').setAttribute('aria-hidden', 'true');
        requestAnimationFrame(this.gameLoop);
    }
    
    restartGame() {
        this.initGameObjects();
        this.gameState.current = 'PLAYING';
        document.getElementById('result-modal').classList.remove('is-visible');
        document.getElementById('result-modal').setAttribute('aria-hidden', 'true');
        document.getElementById('pause-overlay').classList.remove('is-visible');
        document.getElementById('pause-overlay').setAttribute('aria-hidden', 'true');
        this.updateScoreDisplay();
        requestAnimationFrame(this.gameLoop);
    }
    
    returnToMenu() {
        this.gameState.current = 'MENU';
        this.showMenuScreen();
        document.getElementById('pause-overlay').classList.remove('is-visible');
        document.getElementById('pause-overlay').setAttribute('aria-hidden', 'true');
        document.getElementById('result-modal').classList.remove('is-visible');
        document.getElementById('result-modal').setAttribute('aria-hidden', 'true');
    }
    
    gameLoop(currentTime) {
        if (this.gameState.current !== 'PLAYING') return;
        
        const deltaTime = currentTime - this.lastTime;
        this.lastTime = currentTime;
        
        this.update(deltaTime);
        this.render();
        
        requestAnimationFrame(this.gameLoop);
    }
    
    update(deltaTime) {
        this.updatePaddles();
        this.updateBall();
        this.updateParticles();
        this.updateFlash();
        this.checkCollisions();
        this.checkScore();
    }
    
    updatePaddles() {
        if (this.keys['w'] || this.keys['W']) {
            this.paddle1.dy = -this.paddle1.speed;
        } else if (this.keys['s'] || this.keys['S']) {
            this.paddle1.dy = this.paddle1.speed;
        } else {
            this.paddle1.dy = 0;
        }
        
        if (this.gameState.mode === '1v1') {
            if (this.keys['ArrowUp']) {
                this.paddle2.dy = -this.paddle2.speed;
            } else if (this.keys['ArrowDown']) {
                this.paddle2.dy = this.paddle2.speed;
            } else {
                this.paddle2.dy = 0;
            }
        } else if (this.gameState.mode === 'AI') {
            this.updateAI();
        }
        
        this.paddle1.y += this.paddle1.dy;
        this.paddle2.y += this.paddle2.dy;
        
        this.paddle1.y = Math.max(0, Math.min(this.canvas.height - this.paddle1.height, this.paddle1.y));
        this.paddle2.y = Math.max(0, Math.min(this.canvas.height - this.paddle2.height, this.paddle2.y));
    }
    
    updateAI() {
        const difficulty = this.gameState.aiDifficulty;
        let reactionSpeed, predictError;
        
        switch (difficulty) {
            case 'easy':
                reactionSpeed = 0.7;
                predictError = 30;
                break;
            case 'normal':
                reactionSpeed = 0.85;
                predictError = 15;
                break;
            case 'hard':
                reactionSpeed = 0.95;
                predictError = 5;
                break;
        }
        
        const targetY = this.ball.y + (Math.random() - 0.5) * predictError;
        const paddleCenter = this.paddle2.y + this.paddle2.height / 2;
        const diff = targetY - paddleCenter;
        
        if (Math.abs(diff) > 10 && Math.random() < reactionSpeed) {
            this.paddle2.dy = diff > 0 ? this.paddle2.speed : -this.paddle2.speed;
        } else {
            this.paddle2.dy = 0;
        }
    }
    
    updateBall() {
        this.ball.x += this.ball.dx;
        this.ball.y += this.ball.dy;
        
        if (this.ball.y <= this.ball.size / 2 || this.ball.y >= this.canvas.height - this.ball.size / 2) {
            this.ball.dy = -this.ball.dy;
            this.playSound(800, 0.1);
            this.createParticles(this.ball.x, this.ball.y);
        }
    }
    
    checkCollisions() {
        if (this.ballPaddleCollision(this.ball, this.paddle1)) {
            this.handlePaddleCollision(this.paddle1, 'left');
        }
        
        if (this.ballPaddleCollision(this.ball, this.paddle2)) {
            this.handlePaddleCollision(this.paddle2, 'right');
        }
    }
    
    ballPaddleCollision(ball, paddle) {
        return ball.x - ball.size / 2 < paddle.x + paddle.width &&
               ball.x + ball.size / 2 > paddle.x &&
               ball.y - ball.size / 2 < paddle.y + paddle.height &&
               ball.y + ball.size / 2 > paddle.y;
    }
    
    handlePaddleCollision(paddle, side) {
        this.ball.dx = -this.ball.dx;
        
        const paddleCenter = paddle.y + paddle.height / 2;
        const hitPosition = (this.ball.y - paddleCenter) / (paddle.height / 2);
        this.ball.dy = hitPosition * 3;
        
        if (side === 'left') {
            this.ball.x = paddle.x + paddle.width + this.ball.size / 2;
        } else {
            this.ball.x = paddle.x - this.ball.size / 2;
        }
        
        this.ball.rallyCount++;
        if (this.ball.rallyCount % 5 === 0 && this.ball.speed < this.ball.maxSpeed) {
            this.ball.speed *= 1.1;
            this.ball.dx = this.ball.dx > 0 ? this.ball.speed : -this.ball.speed;
        }
        
        this.playSound(600, 0.1);
        this.createParticles(this.ball.x, this.ball.y);
    }
    
    checkScore() {
        if (this.ball.x < 0) {
            this.score.player2++;
            this.resetBall();
            this.createFlash('#00FF41');
            this.playSound(300, 0.3);
            this.updateScoreDisplay();
        }
        
        if (this.ball.x > this.canvas.width) {
            this.score.player1++;
            this.resetBall();
            this.createFlash('#00FF41');
            this.playSound(300, 0.3);
            this.updateScoreDisplay();
        }
        
        if ((this.score.player1 >= 11 || this.score.player2 >= 11) && 
            Math.abs(this.score.player1 - this.score.player2) >= 2) {
            this.endGame();
        }
    }
    
    resetBall() {
        this.ball.x = this.canvas.width / 2;
        this.ball.y = this.canvas.height / 2;
        this.ball.dx = Math.random() > 0.5 ? 5 : -5;
        this.ball.dy = (Math.random() - 0.5) * 4;
        this.ball.speed = 5;
        this.ball.rallyCount = 0;
    }
    
    endGame() {
        this.gameState.current = 'GAME_OVER';
        this.saveScore();
        this.showGameOverScreen();
    }
    
    createParticles(x, y) {
        const particleLayer = document.getElementById('particle-layer');
        for (let i = 0; i < 4; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = x + 'px';
            particle.style.top = y + 'px';
            
            const tx = (Math.random() - 0.5) * 40;
            const ty = (Math.random() - 0.5) * 40;
            particle.style.setProperty('--tx', tx + 'px');
            particle.style.setProperty('--ty', ty + 'px');
            
            particleLayer.appendChild(particle);
            
            setTimeout(() => {
                if (particle.parentNode) {
                    particle.parentNode.removeChild(particle);
                }
            }, 200);
        }
    }
    
    updateParticles() {
        // DOM 기반 파티클은 CSS 애니메이션으로 처리
    }
    
    createFlash(color) {
        const flashElement = document.getElementById('score-flash');
        flashElement.classList.add('flash--show');
        setTimeout(() => {
            flashElement.classList.remove('flash--show');
        }, 100);
    }
    
    updateFlash() {
        // DOM 기반 플래시는 CSS 클래스로 처리
    }
    
    render() {
        this.ctx.fillStyle = '#000000';
        this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
        
        this.drawCenterLine();
        this.drawBorders();
        this.drawPaddle(this.paddle1);
        this.drawPaddle(this.paddle2);
        this.drawBall();
    }
    
    drawCenterLine() {
        this.ctx.strokeStyle = '#FFFFFF';
        this.ctx.lineWidth = 2;
        this.ctx.setLineDash([5, 5]);
        this.ctx.beginPath();
        this.ctx.moveTo(this.canvas.width / 2, 0);
        this.ctx.lineTo(this.canvas.width / 2, this.canvas.height);
        this.ctx.stroke();
        this.ctx.setLineDash([]);
    }
    
    drawBorders() {
        this.ctx.strokeStyle = '#FFFFFF';
        this.ctx.lineWidth = 2;
        this.ctx.beginPath();
        this.ctx.moveTo(0, 1);
        this.ctx.lineTo(this.canvas.width, 1);
        this.ctx.moveTo(0, this.canvas.height - 1);
        this.ctx.lineTo(this.canvas.width, this.canvas.height - 1);
        this.ctx.stroke();
    }
    
    drawPaddle(paddle) {
        this.ctx.fillStyle = '#FFFFFF';
        this.ctx.fillRect(paddle.x, paddle.y, paddle.width, paddle.height);
    }
    
    drawBall() {
        this.ctx.fillStyle = '#FFFFFF';
        this.ctx.beginPath();
        this.ctx.arc(this.ball.x, this.ball.y, this.ball.size / 2, 0, Math.PI * 2);
        this.ctx.fill();
    }
    
    updateScoreDisplay() {
        document.getElementById('score-left').textContent = this.score.player1;
        document.getElementById('score-right').textContent = this.score.player2;
    }
    
    showMenuScreen() {
        document.getElementById('main-menu').classList.remove('is-hidden');
        document.getElementById('game-screen').classList.add('is-hidden');
    }
    
    showGameScreen() {
        document.getElementById('main-menu').classList.add('is-hidden');
        document.getElementById('game-screen').classList.remove('is-hidden');
    }
    
    showGameOverScreen() {
        const winner = this.score.player1 > this.score.player2 ? 'Player 1' : 
                      (this.gameState.mode === 'AI' ? 'AI' : 'Player 2');
        document.getElementById('result-winner').textContent = `${winner} 승리!`;
        document.getElementById('result-score').textContent = `${this.score.player1} : ${this.score.player2}`;
        document.getElementById('result-modal').classList.add('is-visible');
        document.getElementById('result-modal').setAttribute('aria-hidden', 'false');
    }
    
    showSettings() {
        document.getElementById('settings-modal').classList.add('is-visible');
        document.getElementById('settings-modal').setAttribute('aria-hidden', 'false');
        this.updateDifficultyButtons();
    }
    
    hideSettings() {
        document.getElementById('settings-modal').classList.remove('is-visible');
        document.getElementById('settings-modal').setAttribute('aria-hidden', 'true');
    }
    
    saveSettings() {
        const selectedDifficulty = document.querySelector('input[name="ai-diff"]:checked')?.value;
        if (selectedDifficulty) {
            this.gameState.aiDifficulty = selectedDifficulty;
        }
        this.hideSettings();
    }
    
    updateDifficultyButtons() {
        document.querySelectorAll('input[name="ai-diff"]').forEach(radio => {
            radio.checked = radio.value === this.gameState.aiDifficulty;
        });
    }
    
    saveScore() {
        const scores = this.loadHighScores();
        const newScore = {
            player1: this.score.player1,
            player2: this.score.player2,
            mode: this.gameState.mode,
            date: new Date().toISOString()
        };
        
        scores.push(newScore);
        scores.sort((a, b) => Math.max(b.player1, b.player2) - Math.max(a.player1, a.player2));
        scores.splice(10);
        
        localStorage.setItem('pingpong_scores', JSON.stringify(scores));
    }
    
    loadHighScores() {
        try {
            return JSON.parse(localStorage.getItem('pingpong_scores') || '[]');
        } catch (e) {
            return [];
        }
    }
}

document.addEventListener('DOMContentLoaded', () => {
    const game = new PingPongGame();
});
  </script>
</body>
