<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>아름이 테트리스</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Roboto:wght@300;400;500&display=swap');
        
        :root {
            --primary-color: #2E86AB;
            --secondary-color: #A23B72;
            --background-color: #F18F01;
            --accent-color: #C73E1D;
            --board-bg: #2C3E50;
            --grid-color: #34495E;
            --text-white: #FFFFFF;
            --text-dark: #2C3E50;
            --gold: #FFD700;
            --block-size: 25px;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, var(--background-color) 0%, var(--accent-color) 100%);
            color: var(--text-white);
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        .game-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .main-screen {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.2);
        }
        
        .game-title {
            font-family: 'Orbitron', monospace;
            font-size: 3.5em;
            font-weight: 900;
            color: var(--text-white);
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
            margin-bottom: 30px;
            animation: glow 2s ease-in-out infinite alternate;
        }
        
        @keyframes glow {
            from { text-shadow: 0 0 20px rgba(255, 255, 255, 0.3); }
            to { text-shadow: 0 0 30px rgba(255, 255, 255, 0.6); }
        }
        
        .btn {
            font-family: 'Orbitron', monospace;
            font-size: 18px;
            font-weight: 700;
            background: var(--primary-color);
            color: var(--text-white);
            border: none;
            border-radius: 10px;
            padding: 15px 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            touch-action: manipulation;
        }
        
        .btn:hover {
            background: #1A5276;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(46, 134, 171, 0.4);
        }
        
        .high-score {
            font-size: 1.5em;
            margin-top: 20px;
            color: var(--gold);
            font-weight: 500;
        }
        
        .game-screen {
            display: none;
            grid-template-columns: auto 250px;
            gap: 20px;
            align-items: start;
            max-width: 800px;
            margin: 0 auto;
        }
        
        .game-board-container {
            position: relative;
        }
        
        #gameCanvas {
            background: var(--board-bg);
            border: 3px solid var(--primary-color);
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(46, 134, 171, 0.3);
            touch-action: none;
        }
        
        .side-panel {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.2);
        }
        
        .pause-btn {
            position: absolute;
            top: -50px;
            left: 0;
            background: var(--accent-color);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 10px 15px;
            cursor: pointer;
            font-family: 'Roboto', sans-serif;
            font-weight: 500;
            touch-action: manipulation;
        }
        
        .pause-btn:hover {
            background: #A12E1A;
        }
        
        .next-piece {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .next-piece h3 {
            font-family: 'Orbitron', monospace;
            font-size: 1.2em;
            margin-bottom: 10px;
            color: var(--text-white);
        }
        
        .stats {
            margin-bottom: 20px;
        }
        
        .stats h3 {
            font-family: 'Orbitron', monospace;
            font-size: 1.2em;
            margin-bottom: 15px;
            color: var(--text-white);
        }
        
        .stat-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 1.1em;
        }
        
        .stat-label {
            color: #BDC3C7;
        }
        
        .stat-value {
            color: var(--gold);
            font-weight: 500;
        }
        
        .items-container {
            text-align: center;
        }
        
        .items-container h3 {
            font-family: 'Orbitron', monospace;
            font-size: 1.2em;
            margin-bottom: 15px;
            color: var(--text-white);
        }
        
        .items-slots {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 10px;
        }
        
        .item-slot {
            width: 50px;
            height: 50px;
            border: 2px solid var(--primary-color);
            border-radius: 8px;
            background: rgba(44, 62, 80, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            cursor: pointer;
            transition: all 0.3s ease;
            touch-action: manipulation;
        }
        
        .item-slot:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(46, 134, 171, 0.5);
        }
        
        .item-slot.empty {
            border-style: dashed;
            border-color: #7F8C8D;
        }
        
        .item-slot.has-item {
            border-color: var(--gold);
            background: rgba(255, 215, 0, 0.2);
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
        }
        
        .item-icon {
            width: 30px;
            height: 30px;
            background: var(--gold);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: var(--text-dark);
            font-weight: bold;
        }
        
        .slot-number {
            position: absolute;
            bottom: -15px;
            font-size: 10px;
            color: #95A5A6;
        }
        
        .item-hint {
            font-size: 0.9em;
            color: #95A5A6;
            margin-top: 5px;
        }
        
        .game-over-screen {
            display: none;
            text-align: center;
            background: rgba(0, 0, 0, 0.9);
            border-radius: 20px;
            padding: 40px;
            backdrop-filter: blur(15px);
            border: 2px solid var(--accent-color);
        }
        
        .game-over-title {
            font-family: 'Orbitron', monospace;
            font-size: 2.5em;
            color: var(--accent-color);
            margin-bottom: 20px;
        }
        
        .final-score {
            font-size: 1.8em;
            color: var(--gold);
            margin-bottom: 15px;
        }
        
        .new-record {
            color: #E74C3C;
            font-size: 1.3em;
            margin-bottom: 20px;
            animation: pulse 1s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        
        .controls-info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.8);
            padding: 15px;
            border-radius: 10px;
            font-size: 0.9em;
            max-width: 300px;
        }
        
        .controls-info h4 {
            color: var(--gold);
            margin-bottom: 8px;
        }
        
        .controls-info div {
            margin-bottom: 3px;
        }
        
        .line-clear-effect {
            position: absolute;
            width: 100%;
            height: 25px;
            background: rgba(255, 255, 255, 0.8);
            animation: flash 0.2s ease-out;
            pointer-events: none;
        }
        
        @keyframes flash {
            0% { opacity: 0; }
            50% { opacity: 1; }
            100% { opacity: 0; }
        }
        
        .item-get-effect {
            position: absolute;
            color: var(--gold);
            font-size: 1.2em;
            font-weight: bold;
            animation: itemGet 1s ease-out forwards;
            pointer-events: none;
        }
        
        @keyframes itemGet {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(-50px) scale(1.5);
            }
        }
        
        .level-up-effect {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 5px solid var(--gold);
            animation: levelUp 0.3s ease-out;
            pointer-events: none;
            z-index: 1000;
        }
        
        @keyframes levelUp {
            0%, 100% { opacity: 0; }
            50% { opacity: 1; }
        }
        
        @media (max-width: 768px) {
            .game-container {
                padding: 10px;
            }
            
            .game-screen {
                grid-template-columns: 1fr;
                gap: 15px;
                text-align: center;
            }
            
            .side-panel {
                order: -1;
                display: grid;
                grid-template-columns: 1fr 1fr 1fr;
                gap: 15px;
                padding: 15px;
            }
            
            .game-title {
                font-size: 2.5em;
            }
            
            .controls-info {
                position: relative;
                bottom: auto;
                left: auto;
                margin-top: 20px;
            }
            
            #gameCanvas {
                max-width: 100%;
                height: auto;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div id="mainScreen" class="main-screen">
            <h1 class="game-title">아름이 테트리스</h1>
            <button class="btn" onclick="startGame()" ontouchstart="">시작하기</button>
            <div class="high-score">최고점수: <span id="displayHighScore">0</span></div>
        </div>
        
        <div id="gameScreen" class="game-screen">
            <div class="game-board-container">
                <button class="pause-btn" onclick="togglePause()" ontouchstart="">일시정지 (P)</button>
                <canvas id="gameCanvas" width="250" height="500"></canvas>
            </div>
            
            <div class="side-panel">
                <div class="next-piece">
                    <h3>다음 블록</h3>
                    <div id="nextPieceDisplay"></div>
                </div>
                
                <div class="stats">
                    <h3>게임 정보</h3>
                    <div class="stat-item">
                        <span class="stat-label">점수</span>
                        <span class="stat-value" id="score">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">레벨</span>
                        <span class="stat-value" id="level">1</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">라인</span>
                        <span class="stat-value" id="lines">0</span>
                    </div>
                </div>
                
                <div class="items-container">
                    <h3>아이템 보관함</h3>
                    <div class="items-slots">
                        <div class="item-slot empty" id="slot1" onclick="useItem(0)" ontouchstart="">
                            <span class="slot-number">1</span>
                        </div>
                        <div class="item-slot empty" id="slot2" onclick="useItem(1)" ontouchstart="">
                            <span class="slot-number">2</span>
                        </div>
                        <div class="item-slot empty" id="slot3" onclick="useItem(2)" ontouchstart="">
                            <span class="slot-number">3</span>
                        </div>
                    </div>
                    <div class="item-hint">숫자키 1-3으로 사용</div>
                </div>
            </div>
        </div>
        
        <div id="gameOverScreen" class="game-over-screen">
            <h2 class="game-over-title">게임 종료!</h2>
            <div class="final-score">점수: <span id="finalScore">0</span></div>
            <div id="newRecordMsg" class="new-record" style="display: none;">새로운 최고점수!</div>
            <button class="btn" onclick="restartGame()" ontouchstart="">다시하기</button>
            <button class="btn" onclick="goToMain()" ontouchstart="">메인으로</button>
        </div>
    </div>
    
    <div class="controls-info">
        <h4>조작법</h4>
        <div>← → : 좌우 이동</div>
        <div>↑ : 회전</div>
        <div>↓ : 빠르게 내리기</div>
        <div>스페이스 : 하드 드롭</div>
        <div>1-3 : 아이템 사용</div>
        <div>P : 일시정지</div>
    </div>

    <script>
        class TetrisGame {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                
                this.BOARD_WIDTH = 10;
                this.BOARD_HEIGHT = 20;
                this.CELL_SIZE = 25;
                
                this.GAME_STATES = {
                    MENU: 'menu',
                    PLAYING: 'playing',
                    PAUSED: 'paused',
                    GAME_OVER: 'gameOver'
                };
                
                this.currentState = this.GAME_STATES.MENU;
                this.board = this.createEmptyBoard();
                this.currentPiece = null;
                this.nextPiece = null;
                this.score = 0;
                this.level = 1;
                this.linesCleared = 0;
                this.dropTime = 1000;
                this.lastDropTime = 0;
                this.items = [];
                this.maxItems = 3;
                this.itemAcquisitionRate = 0.15;
                this.selectedRow = -1;
                this.awaitingRowSelection = false;
                this.itemPendingUse = -1;
                
                this.pieces = {
                    I: {
                        shape: [[1,1,1,1]],
                        color: '#FF6B6B'
                    },
                    O: {
                        shape: [[1,1],[1,1]],
                        color: '#4ECDC4'
                    },
                    T: {
                        shape: [[0,1,0],[1,1,1]],
                        color: '#45B7D1'
                    },
                    S: {
                        shape: [[0,1,1],[1,1,0]],
                        color: '#96CEB4'
                    },
                    Z: {
                        shape: [[1,1,0],[0,1,1]],
                        color: '#FFEAA7'
                    },
                    J: {
                        shape: [[1,0,0],[1,1,1]],
                        color: '#DDA0DD'
                    },
                    L: {
                        shape: [[0,0,1],[1,1,1]],
                        color: '#98D8C8'
                    }
                };
                
                this.keys = {};
                this.setupEventListeners();
                this.highScore = this.loadHighScore();
            }
            
            createEmptyBoard() {
                const board = [];
                for (let y = 0; y < this.BOARD_HEIGHT; y++) {
                    board[y] = [];
                    for (let x = 0; x < this.BOARD_WIDTH; x++) {
                        board[y][x] = 0;
                    }
                }
                return board;
            }
            
            setupEventListeners() {
                document.addEventListener('keydown', (e) => {
                    this.keys[e.code] = true;
                    this.handleKeyDown(e);
                });
                
                document.addEventListener('keyup', (e) => {
                    this.keys[e.code] = false;
                });
                
                this.canvas.addEventListener('click', (e) => {
                    this.handleCanvasClick(e);
                });
                
                this.canvas.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    this.handleCanvasClick(e.touches[0]);
                });
                
                document.addEventListener('visibilitychange', () => {
                    if (document.hidden && this.currentState === this.GAME_STATES.PLAYING) {
                        this.currentState = this.GAME_STATES.PAUSED;
                    }
                });
            }
            
            handleKeyDown(e) {
                if (this.currentState === this.GAME_STATES.PLAYING) {
                    switch (e.code) {
                        case 'ArrowLeft':
                            this.movePiece(-1, 0);
                            break;
                        case 'ArrowRight':
                            this.movePiece(1, 0);
                            break;
                        case 'ArrowDown':
                            this.movePiece(0, 1);
                            break;
                        case 'ArrowUp':
                            this.rotatePiece();
                            break;
                        case 'Space':
                            this.hardDrop();
                            e.preventDefault();
                            break;
                        case 'Digit1':
                            this.useItem(0);
                            break;
                        case 'Digit2':
                            this.useItem(1);
                            break;
                        case 'Digit3':
                            this.useItem(2);
                            break;
                        case 'KeyP':
                            this.togglePause();
                            break;
                    }
                } else if (this.currentState === this.GAME_STATES.PAUSED) {
                    if (e.code === 'KeyP') {
                        this.togglePause();
                    }
                }
            }
            
            handleCanvasClick(e) {
                if (this.currentState !== this.GAME_STATES.PLAYING || !this.awaitingRowSelection) return;
                
                const rect = this.canvas.getBoundingClientRect();
                const y = (e.clientY || e.pageY) - rect.top;
                const row = Math.floor(y / this.CELL_SIZE);
                
                if (row >= 0 && row < this.BOARD_HEIGHT) {
                    this.removeSelectedLine(row);
                    this.items.splice(this.itemPendingUse, 1);
                    this.updateItemsUI();
                    this.awaitingRowSelection = false;
                    this.itemPendingUse = -1;
                    this.canvas.style.cursor = 'default';
                }
            }
            
            createNewPiece() {
                const pieceTypes = Object.keys(this.pieces);
                const randomType = pieceTypes[Math.floor(Math.random() * pieceTypes.length)];
                const piece = this.pieces[randomType];
                
                return {
                    type: randomType,
                    shape: JSON.parse(JSON.stringify(piece.shape)),
                    color: piece.color,
                    x: Math.floor(this.BOARD_WIDTH / 2) - Math.floor(piece.shape[0].length / 2),
                    y: 0
                };
            }
            
            startGame() {
                this.currentState = this.GAME_STATES.PLAYING;
                this.board = this.createEmptyBoard();
                this.score = 0;
                this.level = 1;
                this.linesCleared = 0;
                this.dropTime = 1000;
                this.items = [];
                this.selectedRow = -1;
                this.awaitingRowSelection = false;
                this.currentPiece = this.createNewPiece();
                this.nextPiece = this.createNewPiece();
                this.updateUI();
                this.updateItemsUI();
            }
            
            movePiece(dx, dy) {
                if (!this.currentPiece) return false;
                
                const newX = this.currentPiece.x + dx;
                const newY = this.currentPiece.y + dy;
                
                if (this.isValidPosition(this.currentPiece.shape, newX, newY)) {
                    this.currentPiece.x = newX;
                    this.currentPiece.y = newY;
                    return true;
                }
                return false;
            }
            
            rotatePiece() {
                if (!this.currentPiece) return;
                
                const rotatedShape = this.rotateMatrix(this.currentPiece.shape);
                
                if (this.isValidPosition(rotatedShape, this.currentPiece.x, this.currentPiece.y)) {
                    this.currentPiece.shape = rotatedShape;
                }
            }
            
            rotateMatrix(matrix) {
                const rows = matrix.length;
                const cols = matrix[0].length;
                const rotated = [];
                
                for (let i = 0; i < cols; i++) {
                    rotated[i] = [];
                    for (let j = 0; j < rows; j++) {
                        rotated[i][j] = matrix[rows - 1 - j][i];
                    }
                }
                
                return rotated;
            }
            
            hardDrop() {
                if (!this.currentPiece) return;
                
                while (this.movePiece(0, 1)) {}
                this.placePiece();
            }
            
            isValidPosition(shape, x, y) {
                for (let py = 0; py < shape.length; py++) {
                    for (let px = 0; px < shape[py].length; px++) {
                        if (shape[py][px] !== 0) {
                            const newX = x + px;
                            const newY = y + py;
                            
                            if (newX < 0 || newX >= this.BOARD_WIDTH || newY >= this.BOARD_HEIGHT) {
                                return false;
                            }
                            
                            if (newY >= 0 && this.board[newY][newX] !== 0) {
                                return false;
                            }
                        }
                    }
                }
                return true;
            }
            
            placePiece() {
                if (!this.currentPiece) return;
                
                for (let py = 0; py < this.currentPiece.shape.length; py++) {
                    for (let px = 0; px < this.currentPiece.shape[py].length; px++) {
                        if (this.currentPiece.shape[py][px] !== 0) {
                            const boardX = this.currentPiece.x + px;
                            const boardY = this.currentPiece.y + py;
                            
                            if (boardY >= 0) {
                                this.board[boardY][boardX] = this.currentPiece.color;
                            }
                        }
                    }
                }
                
                const clearedLines = this.clearLines();
                this.updateScore(clearedLines);
                
                if (clearedLines > 0) {
                    this.checkItemAcquisition();
                }
                
                this.currentPiece = this.nextPiece;
                this.nextPiece = this.createNewPiece();
                
                if (!this.isValidPosition(this.currentPiece.shape, this.currentPiece.x, this.currentPiece.y)) {
                    this.gameOver();
                }
            }
            
            clearLines() {
                let linesCleared = 0;
                
                for (let y = this.BOARD_HEIGHT - 1; y >= 0; y--) {
                    if (this.isLineFull(y)) {
                        this.removeLine(y);
                        linesCleared++;
                        y++;
                    }
                }
                
                return linesCleared;
            }
            
            isLineFull(y) {
                for (let x = 0; x < this.BOARD_WIDTH; x++) {
                    if (this.board[y][x] === 0) {
                        return false;
                    }
                }
                return true;
            }
            
            removeLine(lineY) {
                for (let y = lineY; y > 0; y--) {
                    for (let x = 0; x < this.BOARD_WIDTH; x++) {
                        this.board[y][x] = this.board[y - 1][x];
                    }
                }
                
                for (let x = 0; x < this.BOARD_WIDTH; x++) {
                    this.board[0][x] = 0;
                }
            }
            
            removeSelectedLine(lineY) {
                if (lineY < 0 || lineY >= this.BOARD_HEIGHT) return;
                
                this.removeLine(lineY);
                this.score += 50;
                this.updateUI();
            }
            
            updateScore(linesCleared) {
                if (linesCleared === 0) return;
                
                const points = [0, 100, 300, 500, 800];
                this.score += points[linesCleared] * this.level;
                this.linesCleared += linesCleared;
                
                const newLevel = Math.floor(this.linesCleared / 10) + 1;
                if (newLevel > this.level) {
                    this.level = newLevel;
                    this.dropTime = Math.max(100, 1000 - (this.level - 1) * 50);
                    this.showLevelUpEffect();
                }
                
                this.updateUI();
            }
            
            showLevelUpEffect() {
                const effect = document.createElement('div');
                effect.className = 'level-up-effect';
                document.body.appendChild(effect);
                setTimeout(() => effect.remove(), 300);
            }
            
            checkItemAcquisition() {
                if (this.items.length >= this.maxItems) return;
                
                if (Math.random() < this.itemAcquisitionRate) {
                    this.items.push({
                        type: 'lineRemover',
                        name: '라인 제거',
                        icon: '×'
                    });
                    this.updateItemsUI();
                    this.showItemAcquisitionEffect();
                }
            }
            
            showItemAcquisitionEffect() {
                const effect = document.createElement('div');
                effect.className = 'item-get-effect';
                effect.textContent = 'ITEM GET!';
                effect.style.left = '50%';
                effect.style.top = '50%';
                effect.style.transform = 'translateX(-50%)';
                effect.style.position = 'fixed';
                effect.style.zIndex = '1000';
                document.body.appendChild(effect);
                setTimeout(() => effect.remove(), 1000);
            }
            
            useItem(slotIndex) {
                if (slotIndex >= this.items.length || this.currentState !== this.GAME_STATES.PLAYING) return;
                
                const item = this.items[slotIndex];
                if (item.type === 'lineRemover') {
                    this.awaitingRowSelection = true;
                    this.itemPendingUse = slotIndex;
                    this.canvas.style.cursor = 'crosshair';
                    
                    setTimeout(() => {
                        if (this.awaitingRowSelection) {
                            this.awaitingRowSelection = false;
                            this.itemPendingUse = -1;
                            this.canvas.style.cursor = 'default';
                        }
                    }, 5000);
                }
            }
            
            togglePause() {
                if (this.currentState === this.GAME_STATES.PLAYING) {
                    this.currentState = this.GAME_STATES.PAUSED;
                    document.querySelector('.pause-btn').textContent = '재개 (P)';
                } else if (this.currentState === this.GAME_STATES.PAUSED) {
                    this.currentState = this.GAME_STATES.PLAYING;
                    document.querySelector('.pause-btn').textContent = '일시정지 (P)';
                }
            }
            
            gameOver() {
                this.currentState = this.GAME_STATES.GAME_OVER;
                
                if (this.score > this.highScore) {
                    this.highScore = this.score;
                    this.saveHighScore();
                }
                
                showGameOverScreen(this.score);
            }
            
            saveHighScore() {
                try {
                    localStorage.setItem('tetris_high_score', this.highScore.toString());
                } catch (e) {
                    console.warn('최고점수 저장 실패:', e);
                }
            }
            
            loadHighScore() {
                try {
                    const saved = localStorage.getItem('tetris_high_score');
                    return saved ? parseInt(saved) : 0;
                } catch (e) {
                    console.warn('최고점수 로드 실패:', e);
                    return 0;
                }
            }
            
            update(deltaTime) {
                if (this.currentState !== this.GAME_STATES.PLAYING) return;
                
                this.lastDropTime += deltaTime;
                if (this.lastDropTime >= this.dropTime) {
                    if (!this.movePiece(0, 1)) {
                        this.placePiece();
                    }
                    this.lastDropTime = 0;
                }
            }
            
            render() {
                this.ctx.fillStyle = '#2C3E50';
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                
                this.renderBoard();
                
                if (this.currentPiece) {
                    this.renderPiece(this.currentPiece);
                    this.renderGhost();
                }
                
                if (this.currentState === this.GAME_STATES.PAUSED) {
                    this.renderPauseOverlay();
                }
            }
            
            renderBoard() {
                this.ctx.strokeStyle = '#34495E';
                this.ctx.lineWidth = 1;
                
                for (let x = 0; x <= this.BOARD_WIDTH; x++) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(x * this.CELL_SIZE, 0);
                    this.ctx.lineTo(x * this.CELL_SIZE, this.canvas.height);
                    this.ctx.stroke();
                }
                
                for (let y = 0; y <= this.BOARD_HEIGHT; y++) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(0, y * this.CELL_SIZE);
                    this.ctx.lineTo(this.canvas.width, y * this.CELL_SIZE);
                    this.ctx.stroke();
                }
                
                for (let y = 0; y < this.BOARD_HEIGHT; y++) {
                    for (let x = 0; x < this.BOARD_WIDTH; x++) {
                        if (this.board[y][x]) {
                            this.drawBlock(x * this.CELL_SIZE, y * this.CELL_SIZE, this.board[y][x]);
                        }
                    }
                }
                
                if (this.awaitingRowSelection) {
                    this.ctx.fillStyle = 'rgba(199, 62, 29, 0.3)';
                    this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                }
            }
            
            renderPiece(piece) {
                for (let y = 0; y < piece.shape.length; y++) {
                    for (let x = 0; x < piece.shape[y].length; x++) {
                        if (piece.shape[y][x]) {
                            const drawX = (piece.x + x) * this.CELL_SIZE;
                            const drawY = (piece.y + y) * this.CELL_SIZE;
                            this.drawBlock(drawX, drawY, piece.color);
                        }
                    }
                }
            }
            
            renderGhost() {
                if (!this.currentPiece) return;
                
                let ghostY = this.currentPiece.y;
                while (this.isValidPosition(this.currentPiece.shape, this.currentPiece.x, ghostY + 1)) {
                    ghostY++;
                }
                
                this.ctx.globalAlpha = 0.3;
                for (let y = 0; y < this.currentPiece.shape.length; y++) {
                    for (let x = 0; x < this.currentPiece.shape[y].length; x++) {
                        if (this.currentPiece.shape[y][x]) {
                            const drawX = (this.currentPiece.x + x) * this.CELL_SIZE;
                            const drawY = (ghostY + y) * this.CELL_SIZE;
                            this.drawBlock(drawX, drawY, this.currentPiece.color);
                        }
                    }
                }
                this.ctx.globalAlpha = 1;
            }
            
            drawBlock(x, y, color) {
                this.ctx.fillStyle = color;
                this.ctx.fillRect(x + 1, y + 1, this.CELL_SIZE - 2, this.CELL_SIZE - 2);
                
                this.ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                this.ctx.fillRect(x + 1, y + 1, this.CELL_SIZE - 2, 3);
                this.ctx.fillRect(x + 1, y + 1, 3, this.CELL_SIZE - 2);
                
                this.ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
                this.ctx.fillRect(x + this.CELL_SIZE - 4, y + 1, 3, this.CELL_SIZE - 2);
                this.ctx.fillRect(x + 1, y + this.CELL_SIZE - 4, this.CELL_SIZE - 2, 3);
            }
            
            renderPauseOverlay() {
                this.ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                
                this.ctx.fillStyle = 'white';
                this.ctx.font = 'bold 24px Arial';
                this.ctx.textAlign = 'center';
                this.ctx.fillText('일시정지', this.canvas.width / 2, this.canvas.height / 2);
                
                this.ctx.font = '16px Arial';
                this.ctx.fillText('P키를 눌러 재개', this.canvas.width / 2, this.canvas.height / 2 + 30);
            }
            
            updateUI() {
                document.getElementById('score').textContent = this.score;
                document.getElementById('level').textContent = this.level;
                document.getElementById('lines').textContent = this.linesCleared;
            }
            
            updateItemsUI() {
                for (let i = 0; i < 3; i++) {
                    const slot = document.getElementById(`slot${i + 1}`);
                    if (i < this.items.length) {
                        slot.className = 'item-slot has-item';
                        slot.innerHTML = `<div class="item-icon">${this.items[i].icon}</div><span class="slot-number">${i + 1}</span>`;
                    } else {
                        slot.className = 'item-slot empty';
                        slot.innerHTML = `<span class="slot-number">${i + 1}</span>`;
                    }
                }
            }
        }
        
        let game = null;
        let lastTime = 0;
        let animationId = null;
        
        function gameLoop(currentTime) {
            const deltaTime = currentTime - lastTime;
            lastTime = currentTime;
            
            if (game) {
                game.update(deltaTime);
                game.render();
            }
            
            animationId = requestAnimationFrame(gameLoop);
        }
        
        function startGame() {
            document.getElementById('mainScreen').style.display = 'none';
            document.getElementById('gameScreen').style.display = 'grid';
            document.getElementById('gameOverScreen').style.display = 'none';
            
            game = new TetrisGame();
            game.startGame();
            
            if (!animationId) {
                requestAnimationFrame(gameLoop);
            }
        }
        
        function restartGame() {
            startGame();
        }
        
        function goToMain() {
            if (animationId) {
                cancelAnimationFrame(animationId);
                animationId = null;
            }
            
            document.getElementById('mainScreen').style.display = 'block';
            document.getElementById('gameScreen').style.display = 'none';
            document.getElementById('gameOverScreen').style.display = 'none';
            
            updateHighScore();
            game = null;
        }
        
        function showGameOverScreen(finalScore) {
            document.getElementById('gameScreen').style.display = 'none';
            document.getElementById('gameOverScreen').style.display = 'block';
            document.getElementById('finalScore').textContent = finalScore;
            
            const highScore = game ? game.highScore : 0;
            if (finalScore > highScore) {
                document.getElementById('newRecordMsg').style.display = 'block';
            } else {
                document.getElementById('newRecordMsg').style.display = 'none';
            }
        }
        
        function togglePause() {
            if (game) {
                game.togglePause();
            }
        }
        
        function useItem(index) {
            if (game) {
                game.useItem(index);
            }
        }
        
        function updateHighScore() {
            try {
                const highScore = localStorage.getItem('tetris_high_score') || 0;
                document.getElementById('displayHighScore').textContent = highScore;
            } catch (e) {
                console.warn('최고점수 로드 실패:', e);
                document.getElementById('displayHighScore').textContent = '0';
            }
        }
        
        updateHighScore();
        
        window.addEventListener('error', (e) => {
            console.error('게임 오류:', e.error);
        });
        
        window.addEventListener('unhandledrejection', (e) => {
            console.error('처리되지 않은 Promise 에러:', e.reason);
        });
    </script>
</body>
