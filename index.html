<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>교보 전략 게임 - 턴제 전략 게임</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-bg: #0d1117;
            --secondary-bg: #161b22;
            --accent-bg: #21262d;
            --border-color: #30363d;
            --text-primary: #f0f6fc;
            --text-secondary: #8b949e;
            --blue-team: #58a6ff;
            --red-team: #ff7b72;
            --success-color: #238636;
            --warning-color: #f85149;
            --highlight-color: #ffd700;
            --canvas-size: 480px;
            --grid-size: 8;
            --cell-size: calc(var(--canvas-size) / var(--grid-size));
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Open Sans', sans-serif;
            background: linear-gradient(135deg, var(--primary-bg) 0%, var(--secondary-bg) 100%);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            line-height: 1.6;
        }

        .game-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .game-title {
            font-family: 'Roboto', sans-serif;
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--text-primary);
            text-shadow: 0 0 20px rgba(88, 166, 255, 0.5);
            margin-bottom: 10px;
        }

        .game-subtitle {
            font-size: 1.1rem;
            color: var(--text-secondary);
            font-weight: 300;
        }

        .game-container {
            display: grid;
            grid-template-columns: 200px 1fr 200px;
            gap: 30px;
            max-width: 1200px;
            width: 100%;
            align-items: start;
        }

        .team-panel {
            background: var(--secondary-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .team-title {
            font-family: 'Roboto', sans-serif;
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 15px;
            text-align: center;
            padding: 8px;
            border-radius: 8px;
        }

        .blue-team .team-title {
            background: linear-gradient(135deg, var(--blue-team), rgba(88, 166, 255, 0.3));
        }

        .red-team .team-title {
            background: linear-gradient(135deg, var(--red-team), rgba(255, 123, 114, 0.3));
        }

        .unit-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .unit-card {
            background: var(--accent-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px;
            transition: all 0.3s ease;
        }

        .unit-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(88, 166, 255, 0.2);
        }

        .unit-card.dead {
            opacity: 0.4;
            background: var(--primary-bg);
        }

        .unit-name {
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 8px;
        }

        .hp-container {
            margin-bottom: 5px;
        }

        .hp-label {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 3px;
        }

        .hp-bar {
            width: 100%;
            height: 6px;
            background: var(--primary-bg);
            border-radius: 3px;
            overflow: hidden;
            position: relative;
        }

        .hp-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--success-color), #2ea043);
            border-radius: 3px;
            transition: width 0.5s ease;
            position: relative;
            overflow: hidden;
        }

        .hp-fill::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        .hp-text {
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-align: right;
            margin-top: 2px;
        }

        .game-board-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .turn-display {
            background: var(--secondary-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 15px 25px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            min-width: 200px;
        }

        .turn-text {
            font-family: 'Roboto', sans-serif;
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .turn-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin: 0 auto;
            animation: pulse 2s infinite;
        }

        .turn-blue .turn-indicator {
            background: var(--blue-team);
            box-shadow: 0 0 15px var(--blue-team);
        }

        .turn-red .turn-indicator {
            background: var(--red-team);
            box-shadow: 0 0 15px var(--red-team);
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.7; }
        }

        .canvas-container {
            position: relative;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
        }

        #game-canvas {
            display: block;
            width: var(--canvas-size);
            height: var(--canvas-size);
            background: repeating-conic-gradient(var(--accent-bg) 0% 25%, var(--secondary-bg) 0% 50%) 50% / calc(var(--cell-size) * 2) calc(var(--cell-size) * 2);
            cursor: pointer;
        }

        .unit-info {
            background: var(--secondary-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            min-height: 120px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .info-title {
            font-family: 'Roboto', sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 15px;
            color: var(--text-primary);
        }

        .info-content {
            font-size: 0.9rem;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }

        .btn {
            background: linear-gradient(135deg, var(--blue-team), rgba(88, 166, 255, 0.8));
            color: var(--text-primary);
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-family: 'Roboto', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(88, 166, 255, 0.3);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(88, 166, 255, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .modal.show {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background: var(--secondary-bg);
            border: 2px solid var(--border-color);
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            transform: translateY(20px);
            transition: transform 0.3s ease;
        }

        .modal.show .modal-content {
            transform: translateY(0);
        }

        .modal-title {
            font-family: 'Roboto', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 15px;
            text-shadow: 0 0 20px rgba(88, 166, 255, 0.5);
        }

        .modal-text {
            font-size: 1.1rem;
            color: var(--text-secondary);
            margin-bottom: 25px;
            line-height: 1.5;
        }

        .stats {
            background: var(--accent-bg);
            border-radius: 8px;
            padding: 15px;
            margin: 15px 0;
            text-align: left;
        }

        .stats-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .stats-row:last-child {
            margin-bottom: 0;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--red-team);
            border-radius: 50%;
            pointer-events: none;
            animation: particle-explosion 0.8s ease-out forwards;
        }

        @keyframes particle-explosion {
            0% {
                transform: scale(1);
                opacity: 1;
            }
            100% {
                transform: scale(0);
                opacity: 0;
            }
        }

        @media (max-width: 768px) {
            .game-container {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .team-panel {
                order: 2;
            }

            .game-board-container {
                order: 1;
            }

            .unit-info {
                order: 3;
            }

            :root {
                --canvas-size: 300px;
            }

            .game-title {
                font-size: 2rem;
            }

            .team-panels {
                display: flex;
                gap: 15px;
            }

            .team-panel {
                flex: 1;
            }
        }

        @media (max-width: 480px) {
            :root {
                --canvas-size: 280px;
            }

            .game-title {
                font-size: 1.8rem;
            }

            .team-panels {
                flex-direction: column;
                gap: 10px;
            }

            .modal-content {
                padding: 30px 20px;
            }

            .modal-title {
                font-size: 1.6rem;
            }
        }
    </style>
</head>
<body>
    <header class="game-header">
        <h1 class="game-title">교보 전략 게임</h1>
        <p class="game-subtitle">8x8 턴제 전략 게임</p>
    </header>

    <div class="game-container">
        <div class="team-panels">
            <div class="team-panel blue-team" id="blue-team-panel">
                <div class="team-title">Blue Team</div>
                <div class="unit-list" id="blue-units"></div>
            </div>
        </div>

        <div class="game-board-container">
            <div class="turn-display" id="turn-display">
                <div class="turn-text">Blue 팀 차례</div>
                <div class="turn-indicator"></div>
            </div>

            <div class="canvas-container">
                <canvas id="game-canvas" width="480" height="480"></canvas>
            </div>

            <div class="unit-info" id="unit-info">
                <div class="info-title">게임 정보</div>
                <div class="info-content">
                    유닛을 선택하여 이동하고 적을 공격하세요!<br>
                    • 이동 범위: 3칸<br>
                    • 공격력: 30<br>
                    • 체력: 100
                </div>
            </div>
        </div>

        <div class="team-panels">
            <div class="team-panel red-team" id="red-team-panel">
                <div class="team-title">Red Team</div>
                <div class="unit-list" id="red-units"></div>
            </div>
        </div>
    </div>

    <div class="controls">
        <button class="btn" id="restart-btn">게임 재시작</button>
    </div>

    <div class="modal" id="game-modal">
        <div class="modal-content">
            <h2 class="modal-title" id="modal-title">게임 종료</h2>
            <p class="modal-text" id="modal-text">게임이 종료되었습니다.</p>
            <div class="stats" id="game-stats">
                <div class="stats-row">
                    <span>승리 팀:</span>
                    <span id="winner-team">-</span>
                </div>
                <div class="stats-row">
                    <span>게임 시간:</span>
                    <span id="game-time">-</span>
                </div>
                <div class="stats-row">
                    <span>최고 기록:</span>
                    <span id="best-time">-</span>
                </div>
            </div>
            <button class="btn" id="modal-restart-btn">다시 시작</button>
        </div>
    </div>

    <script>
        // 게임 상수
        const GAME_CONFIG = {
            BOARD_SIZE: 8,
            CANVAS_SIZE: 480,
            CELL_SIZE: 60,
            TEAMS: {
                BLUE: 'blue',
                RED: 'red'
            },
            UNIT_STATS: {
                MAX_HP: 100,
                ATTACK_DAMAGE: 30,
                MOVE_RANGE: 3
            }
        };

        // 유닛 클래스
        class Unit {
            constructor(id, team, x, y) {
                this.id = id;
                this.team = team;
                this.x = x;
                this.y = y;
                this.hp = GAME_CONFIG.UNIT_STATS.MAX_HP;
                this.maxHp = GAME_CONFIG.UNIT_STATS.MAX_HP;
                this.isAlive = true;
                this.isSelected = false;
            }

            // 유닛 이동
            moveTo(x, y) {
                if (this.isAlive) {
                    this.x = x;
                    this.y = y;
                }
            }

            // 공격 받기
            takeDamage(damage) {
                if (!this.isAlive) return false;
                
                this.hp = Math.max(0, this.hp - damage);
                if (this.hp <= 0) {
                    this.isAlive = false;
                }
                return true;
            }

            // 공격 가능 여부 확인
            canAttack(target) {
                if (!this.isAlive || !target.isAlive || this.team === target.team) {
                    return false;
                }
                const distance = Math.abs(this.x - target.x) + Math.abs(this.y - target.y);
                return distance === 1;
            }

            // 이동 가능 여부 확인
            canMoveTo(x, y, gameBoard) {
                if (!this.isAlive) return false;
                
                const distance = Math.abs(this.x - x) + Math.abs(this.y - y);
                if (distance > GAME_CONFIG.UNIT_STATS.MOVE_RANGE || distance === 0) {
                    return false;
                }
                
                return !gameBoard.getUnitAt(x, y);
            }

            // 이동 가능한 모든 위치 반환
            getValidMoves(gameBoard) {
                const moves = [];
                for (let dx = -GAME_CONFIG.UNIT_STATS.MOVE_RANGE; dx <= GAME_CONFIG.UNIT_STATS.MOVE_RANGE; dx++) {
                    for (let dy = -GAME_CONFIG.UNIT_STATS.MOVE_RANGE; dy <= GAME_CONFIG.UNIT_STATS.MOVE_RANGE; dy++) {
                        if (Math.abs(dx) + Math.abs(dy) <= GAME_CONFIG.UNIT_STATS.MOVE_RANGE && (dx !== 0 || dy !== 0)) {
                            const newX = this.x + dx;
                            const newY = this.y + dy;
                            if (newX >= 0 && newX < GAME_CONFIG.BOARD_SIZE && 
                                newY >= 0 && newY < GAME_CONFIG.BOARD_SIZE &&
                                this.canMoveTo(newX, newY, gameBoard)) {
                                moves.push({ x: newX, y: newY });
                            }
                        }
                    }
                }
                return moves;
            }
        }

        // 게임 보드 클래스
        class GameBoard {
            constructor() {
                this.units = new Map();
                this.selectedUnit = null;
                this.validMoves = [];
                this.initializeUnits();
            }

            // 유닛 초기화
            initializeUnits() {
                this.units.clear();
                
                // Blue 팀 유닛 생성 (하단)
                const bluePositions = [
                    [1, 6], [2, 6], [5, 6], [6, 6],
                    [1, 7], [2, 7], [5, 7], [6, 7]
                ];
                
                bluePositions.forEach(([x, y], index) => {
                    const unit = new Unit(`blue_${index}`, GAME_CONFIG.TEAMS.BLUE, x, y);
                    this.units.set(unit.id, unit);
                });

                // Red 팀 유닛 생성 (상단)
                const redPositions = [
                    [1, 0], [2, 0], [5, 0], [6, 0],
                    [1, 1], [2, 1], [5, 1], [6, 1]
                ];
                
                redPositions.forEach(([x, y], index) => {
                    const unit = new Unit(`red_${index}`, GAME_CONFIG.TEAMS.RED, x, y);
                    this.units.set(unit.id, unit);
                });
            }

            // 특정 위치의 유닛 반환
            getUnitAt(x, y) {
                for (const unit of this.units.values()) {
                    if (unit.x === x && unit.y === y && unit.isAlive) {
                        return unit;
                    }
                }
                return null;
            }

            // 팀별 살아있는 유닛 반환
            getAliveUnitsByTeam(team) {
                return Array.from(this.units.values()).filter(unit => 
                    unit.team === team && unit.isAlive
                );
            }

            // 유닛 선택
            selectUnit(unit) {
                // 이전 선택 해제
                if (this.selectedUnit) {
                    this.selectedUnit.isSelected = false;
                }
                
                if (unit && unit.isAlive) {
                    this.selectedUnit = unit;
                    unit.isSelected = true;
                    this.validMoves = unit.getValidMoves(this);
                } else {
                    this.selectedUnit = null;
                    this.validMoves = [];
                }
            }

            // 유닛 이동
            moveUnit(unit, x, y) {
                if (unit.canMoveTo(x, y, this)) {
                    unit.moveTo(x, y);
                    return true;
                }
                return false;
            }

            // 공격 실행
            executeAttack(attacker, target) {
                if (attacker.canAttack(target)) {
                    const damaged = target.takeDamage(GAME_CONFIG.UNIT_STATS.ATTACK_DAMAGE);
                    return damaged;
                }
                return false;
            }

            // 승리 조건 확인
            checkVictory() {
                const blueAlive = this.getAliveUnitsByTeam(GAME_CONFIG.TEAMS.BLUE).length;
                const redAlive = this.getAliveUnitsByTeam(GAME_CONFIG.TEAMS.RED).length;
                
                if (blueAlive === 0) return GAME_CONFIG.TEAMS.RED;
                if (redAlive === 0) return GAME_CONFIG.TEAMS.BLUE;
                return null;
            }
        }

        // 메인 게임 클래스
        class StrategyGame {
            constructor() {
                this.gameBoard = new GameBoard();
                this.currentTeam = GAME_CONFIG.TEAMS.BLUE;
                this.gameState = 'playing'; // 'playing', 'ended'
                this.gameStartTime = Date.now();
                this.canvas = null;
                this.ctx = null;
                this.animationId = null;
                this.particles = [];
                
                this.initializeCanvas();
                this.bindEvents();
                this.updateUI();
                this.gameLoop();
            }

            // Canvas 초기화
            initializeCanvas() {
                this.canvas = document.getElementById('game-canvas');
                this.ctx = this.canvas.getContext('2d');
                
                if (!this.canvas || !this.ctx) {
                    console.error('Canvas를 찾을 수 없습니다.');
                    return;
                }
            }

            // 이벤트 바인딩
            bindEvents() {
                // Canvas 클릭 이벤트
                if (this.canvas) {
                    this.canvas.addEventListener('click', (e) => this.handleCanvasClick(e));
                    this.canvas.addEventListener('touchend', (e) => {
                        e.preventDefault();
                        this.handleCanvasClick(e.changedTouches[0]);
                    });
                }

                // 재시작 버튼 이벤트
                const restartBtn = document.getElementById('restart-btn');
                const modalRestartBtn = document.getElementById('modal-restart-btn');
                
                if (restartBtn) {
                    restartBtn.addEventListener('click', () => this.restartGame());
                }
                if (modalRestartBtn) {
                    modalRestartBtn.addEventListener('click', () => this.restartGame());
                }
            }

            // Canvas 클릭 처리
            handleCanvasClick(e) {
                if (this.gameState !== 'playing') return;

                const rect = this.canvas.getBoundingClientRect();
                const x = Math.floor((e.clientX - rect.left) / GAME_CONFIG.CELL_SIZE);
                const y = Math.floor((e.clientY - rect.top) / GAME_CONFIG.CELL_SIZE);

                if (x < 0 || x >= GAME_CONFIG.BOARD_SIZE || y < 0 || y >= GAME_CONFIG.BOARD_SIZE) {
                    return;
                }

                const clickedUnit = this.gameBoard.getUnitAt(x, y);

                // 현재 팀의 유닛 선택
                if (clickedUnit && clickedUnit.team === this.currentTeam && clickedUnit.isAlive) {
                    this.gameBoard.selectUnit(clickedUnit);
                    this.updateUI();
                    return;
                }

                // 선택된 유닛이 있을 때
                if (this.gameBoard.selectedUnit) {
                    const selectedUnit = this.gameBoard.selectedUnit;

                    // 적 유닛 공격
                    if (clickedUnit && clickedUnit.team !== this.currentTeam) {
                        if (selectedUnit.canAttack(clickedUnit)) {
                            this.executeAttack(selectedUnit, clickedUnit, x, y);
                            this.endTurn();
                        }
                        return;
                    }

                    // 유닛 이동
                    if (!clickedUnit && selectedUnit.canMoveTo(x, y, this.gameBoard)) {
                        this.gameBoard.moveUnit(selectedUnit, x, y);
                        this.endTurn();
                    }
                }
            }

            // 공격 실행
            executeAttack(attacker, target, x, y) {
                const damaged = this.gameBoard.executeAttack(attacker, target);
                if (damaged) {
                    this.createAttackParticles(x * GAME_CONFIG.CELL_SIZE + GAME_CONFIG.CELL_SIZE / 2,
                                             y * GAME_CONFIG.CELL_SIZE + GAME_CONFIG.CELL_SIZE / 2);
                    this.updateTeamPanels();
                    
                    // 승리 확인
                    const winner = this.gameBoard.checkVictory();
                    if (winner) {
                        this.endGame(winner);
                    }
                }
            }

            // 공격 파티클 생성
            createAttackParticles(centerX, centerY) {
                for (let i = 0; i < 5; i++) {
                    const angle = (Math.PI * 2 / 5) * i;
                    const speed = 2 + Math.random() * 3;
                    
                    this.particles.push({
                        x: centerX,
                        y: centerY,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed,
                        life: 1.0,
                        decay: 0.02
                    });
                }
            }

            // 턴 종료
            endTurn() {
                this.gameBoard.selectUnit(null);
                this.currentTeam = this.currentTeam === GAME_CONFIG.TEAMS.BLUE ? 
                                  GAME_CONFIG.TEAMS.RED : GAME_CONFIG.TEAMS.BLUE;
                this.updateUI();
            }

            // 게임 종료
            endGame(winner) {
                this.gameState = 'ended';
                this.gameBoard.selectUnit(null);
                
                const gameTime = Math.floor((Date.now() - this.gameStartTime) / 1000);
                this.showEndGameModal(winner, gameTime);
            }

            // 종료 모달 표시
            showEndGameModal(winner, gameTime) {
                const modal = document.getElementById('game-modal');
                const modalTitle = document.getElementById('modal-title');
                const modalText = document.getElementById('modal-text');
                const winnerTeam = document.getElementById('winner-team');
                const gameTimeElement = document.getElementById('game-time');
                const bestTimeElement = document.getElementById('best-time');

                if (!modal || !modalTitle || !modalText) return;

                const teamName = winner === GAME_CONFIG.TEAMS.BLUE ? 'Blue 팀' : 'Red 팀';
                modalTitle.textContent = `${teamName} 승리!`;
                modalText.textContent = `축하합니다! ${teamName}이 승리했습니다.`;
                
                if (winnerTeam) winnerTeam.textContent = teamName;
                if (gameTimeElement) gameTimeElement.textContent = `${gameTime}초`;
                
                // 최고 기록 저장/표시
                const bestTime = localStorage.getItem('strategy-game-best-time');
                if (!bestTime || gameTime < parseInt(bestTime)) {
                    localStorage.setItem('strategy-game-best-time', gameTime.toString());
                    if (bestTimeElement) bestTimeElement.textContent = `${gameTime}초 (신기록!)`;
                } else {
                    if (bestTimeElement) bestTimeElement.textContent = `${bestTime}초`;
                }
                
                modal.classList.add('show');
            }

            // 게임 재시작
            restartGame() {
                // 모달 숨기기
                const modal = document.getElementById('game-modal');
                if (modal) modal.classList.remove('show');

                // 게임 상태 초기화
                this.gameBoard = new GameBoard();
                this.currentTeam = GAME_CONFIG.TEAMS.BLUE;
                this.gameState = 'playing';
                this.gameStartTime = Date.now();
                this.particles = [];
                
                this.updateUI();
            }

            // UI 업데이트
            updateUI() {
                this.updateTurnDisplay();
                this.updateUnitInfo();
                this.updateTeamPanels();
            }

            // 턴 표시 업데이트
            updateTurnDisplay() {
                const turnDisplay = document.getElementById('turn-display');
                if (!turnDisplay) return;

                const teamName = this.currentTeam === GAME_CONFIG.TEAMS.BLUE ? 'Blue' : 'Red';
                turnDisplay.className = `turn-display turn-${this.currentTeam}`;
                turnDisplay.querySelector('.turn-text').textContent = `${teamName} 팀 차례`;
            }

            // 유닛 정보 업데이트
            updateUnitInfo() {
                const unitInfo = document.getElementById('unit-info');
                if (!unitInfo) return;

                const infoContent = unitInfo.querySelector('.info-content');
                if (!infoContent) return;

                if (this.gameBoard.selectedUnit) {
                    const unit = this.gameBoard.selectedUnit;
                    const teamName = unit.team === GAME_CONFIG.TEAMS.BLUE ? 'Blue' : 'Red';
                    infoContent.innerHTML = `
                        <strong>${teamName} 팀 유닛 선택됨</strong><br>
                        • 위치: (${unit.x}, ${unit.y})<br>
                        • 체력: ${unit.hp}/${unit.maxHp}<br>
                        • 이동 가능 범위: ${GAME_CONFIG.UNIT_STATS.MOVE_RANGE}칸<br>
                        • 공격력: ${GAME_CONFIG.UNIT_STATS.ATTACK_DAMAGE}
                    `;
                } else {
                    infoContent.innerHTML = `
                        유닛을 선택하여 이동하고 적을 공격하세요!<br>
                        • 이동 범위: ${GAME_CONFIG.UNIT_STATS.MOVE_RANGE}칸<br>
                        • 공격력: ${GAME_CONFIG.UNIT_STATS.ATTACK_DAMAGE}<br>
                        • 체력: ${GAME_CONFIG.UNIT_STATS.MAX_HP}
                    `;
                }
            }

            // 팀 패널 업데이트
            updateTeamPanels() {
                this.updateTeamPanel(GAME_CONFIG.TEAMS.BLUE, 'blue-units');
                this.updateTeamPanel(GAME_CONFIG.TEAMS.RED, 'red-units');
            }

            updateTeamPanel(team, containerId) {
                const container = document.getElementById(containerId);
                if (!container) return;

                const units = this.gameBoard.getAliveUnitsByTeam(team);
                const allUnits = Array.from(this.gameBoard.units.values()).filter(u => u.team === team);
                
                container.innerHTML = '';
                
                allUnits.forEach((unit, index) => {
                    const unitCard = document.createElement('div');
                    unitCard.className = `unit-card ${!unit.isAlive ? 'dead' : ''}`;
                    
                    const hpPercentage = (unit.hp / unit.maxHp) * 100;
                    
                    unitCard.innerHTML = `
                        <div class="unit-name">유닛 ${index + 1}</div>
                        <div class="hp-container">
                            <div class="hp-label">체력</div>
                            <div class="hp-bar">
                                <div class="hp-fill" style="width: ${hpPercentage}%"></div>
                            </div>
                            <div class="hp-text">${unit.hp}/${unit.maxHp}</div>
                        </div>
                    `;
                    
                    container.appendChild(unitCard);
                });
            }

            // 게임 렌더링
            render() {
                if (!this.ctx) return;

                this.ctx.clearRect(0, 0, GAME_CONFIG.CANVAS_SIZE, GAME_CONFIG.CANVAS_SIZE);
                
                // 이동 가능 영역 하이라이트
                this.ctx.fillStyle = 'rgba(255, 215, 0, 0.3)';
                this.gameBoard.validMoves.forEach(move => {
                    this.ctx.fillRect(
                        move.x * GAME_CONFIG.CELL_SIZE,
                        move.y * GAME_CONFIG.CELL_SIZE,
                        GAME_CONFIG.CELL_SIZE,
                        GAME_CONFIG.CELL_SIZE
                    );
                });
                
                // 유닛 렌더링
                for (const unit of this.gameBoard.units.values()) {
                    if (unit.isAlive) {
                        this.renderUnit(unit);
                    }
                }
                
                // 파티클 렌더링
                this.renderParticles();
            }

            // 유닛 렌더링
            renderUnit(unit) {
                const x = unit.x * GAME_CONFIG.CELL_SIZE;
                const y = unit.y * GAME_CONFIG.CELL_SIZE;
                const centerX = x + GAME_CONFIG.CELL_SIZE / 2;
                const centerY = y + GAME_CONFIG.CELL_SIZE / 2;
                const radius = GAME_CONFIG.CELL_SIZE * 0.3;
                
                // 선택 표시
                if (unit.isSelected) {
                    this.ctx.strokeStyle = '#ffd700';
                    this.ctx.lineWidth = 3;
                    this.ctx.strokeRect(x + 2, y + 2, GAME_CONFIG.CELL_SIZE - 4, GAME_CONFIG.CELL_SIZE - 4);
                }
                
                // 유닛 원
                this.ctx.beginPath();
                this.ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
                this.ctx.fillStyle = unit.team === GAME_CONFIG.TEAMS.BLUE ? '#58a6ff' : '#ff7b72';
                this.ctx.fill();
                this.ctx.strokeStyle = '#ffffff';
                this.ctx.lineWidth = 2;
                this.ctx.stroke();
                
                // HP 바
                const hpBarWidth = GAME_CONFIG.CELL_SIZE * 0.8;
                const hpBarHeight = 4;
                const hpBarX = centerX - hpBarWidth / 2;
                const hpBarY = y + GAME_CONFIG.CELL_SIZE - 10;
                const hpPercentage = unit.hp / unit.maxHp;
                
                // HP 바 배경
                this.ctx.fillStyle = '#333';
                this.ctx.fillRect(hpBarX, hpBarY, hpBarWidth, hpBarHeight);
                
                // HP 바 현재 HP
                this.ctx.fillStyle = hpPercentage > 0.5 ? '#238636' : hpPercentage > 0.25 ? '#f85149' : '#bd2c00';
                this.ctx.fillRect(hpBarX, hpBarY, hpBarWidth * hpPercentage, hpBarHeight);
            }

            // 파티클 렌더링
            renderParticles() {
                this.particles = this.particles.filter(particle => {
                    particle.x += particle.vx;
                    particle.y += particle.vy;
                    particle.life -= particle.decay;
                    
                    if (particle.life <= 0) return false;
                    
                    this.ctx.globalAlpha = particle.life;
                    this.ctx.fillStyle = '#ff7b72';
                    this.ctx.beginPath();
                    this.ctx.arc(particle.x, particle.y, 2, 0, Math.PI * 2);
                    this.ctx.fill();
                    this.ctx.globalAlpha = 1;
                    
                    return true;
                });
            }

            // 게임 루프
            gameLoop() {
                this.render();
                this.animationId = requestAnimationFrame(() => this.gameLoop());
            }

            // 게임 정리
            destroy() {
                if (this.animationId) {
                    cancelAnimationFrame(this.animationId);
                }
            }
        }

        // 게임 시작
        let game = null;
        
        document.addEventListener('DOMContentLoaded', () => {
            game = new StrategyGame();
        });
        
        // 페이지 언로드시 정리
        window.addEventListener('beforeunload', () => {
            if (game) {
                game.destroy();
            }
        });
    </script>
</body>
</html>
