<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>룰렛 미니게임</title>
    <style>
        :root {
            --primary-red: #FF6B6B;
            --secondary-teal: #4ECDC4;
            --background-ivory: #F7F1E3;
            --text-dark: #2C3E50;
            --gold: #FFD700;
            --segment-yellow: #FFD93D;
            --segment-green: #6BCF7F;
            --segment-blue: #4D96FF;
            --segment-red: #FF6B6B;
            --segment-purple: #B983FF;
            --segment-orange: #FF8E53;
            --segment-light-blue: #5DADE2;
            --segment-dark-orange: #F39C12;
            --segment-dark-red: #E74C3C;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, var(--background-ivory) 0%, #F0E68C 100%);
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        #game-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
            padding: 30px;
            max-width: 800px;
            width: 90vw;
            text-align: center;
            position: relative;
        }

        .game-header {
            margin-bottom: 30px;
        }

        .game-title {
            font-size: 2.5rem;
            font-weight: bold;
            color: var(--primary-red);
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .score-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 15px;
            background: linear-gradient(90deg, var(--secondary-teal), var(--primary-red));
            border-radius: 15px;
            color: white;
            font-weight: bold;
        }

        .score-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .score-label {
            font-size: 0.9rem;
            opacity: 0.9;
            margin-bottom: 5px;
        }

        .score-value {
            font-size: 1.5rem;
            font-weight: bold;
        }

        .game-canvas-container {
            position: relative;
            display: inline-block;
            margin: 20px 0;
        }

        #roulette-canvas {
            border: 5px solid var(--primary-red);
            border-radius: 50%;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
            background: white;
            display: block;
            margin: 0 auto;
        }

        .roulette-pointer {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 30px solid var(--primary-red);
            z-index: 10;
            filter: drop-shadow(0 5px 10px rgba(0, 0, 0, 0.3));
        }

        .game-controls {
            margin-top: 30px;
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .game-button {
            padding: 15px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 120px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        #spin-button {
            background: linear-gradient(135deg, var(--secondary-teal), #45B7AA);
            color: white;
        }

        #spin-button:hover {
            background: linear-gradient(135deg, #45B7AA, var(--secondary-teal));
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        #spin-button:disabled {
            background: #cccccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        #reset-button {
            background: linear-gradient(135deg, var(--primary-red), #E55555);
            color: white;
        }

        #reset-button:hover {
            background: linear-gradient(135deg, #E55555, var(--primary-red));
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        .score-animation {
            animation: scorePopup 0.6s ease-in-out;
        }

        @keyframes scorePopup {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); color: var(--gold); }
            100% { transform: scale(1); }
        }

        #result-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            animation: modalFadeIn 0.3s ease-in-out;
        }

        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            animation: modalSlideIn 0.4s ease-out;
        }

        @keyframes modalFadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes modalSlideIn {
            from { transform: translateY(-50px) scale(0.8); opacity: 0; }
            to { transform: translateY(0) scale(1); opacity: 1; }
        }

        .modal-title {
            font-size: 2rem;
            color: var(--primary-red);
            margin-bottom: 20px;
            font-weight: bold;
        }

        .modal-score {
            font-size: 2.5rem;
            color: var(--gold);
            font-weight: bold;
            margin: 20px 0;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        .modal-message {
            font-size: 1.2rem;
            color: var(--text-dark);
            margin-bottom: 30px;
        }

        .modal-button {
            background: linear-gradient(135deg, var(--secondary-teal), #45B7AA);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .modal-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .segment-legend {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 10px;
            margin-top: 20px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 15px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            font-weight: bold;
        }

        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 2px solid var(--text-dark);
        }

        .jackpot-effect {
            animation: jackpotGlow 2s infinite;
        }

        @keyframes jackpotGlow {
            0%, 100% { box-shadow: 0 15px 30px rgba(255, 107, 107, 0.3); }
            50% { box-shadow: 0 15px 40px rgba(255, 107, 107, 0.8), 0 0 20px var(--gold); }
        }

        @media (max-width: 768px) {
            #game-container {
                padding: 20px;
                width: 95vw;
            }

            .game-title {
                font-size: 2rem;
            }

            .score-info {
                flex-direction: column;
                gap: 15px;
            }

            .game-controls {
                flex-direction: column;
                align-items: center;
            }

            .segment-legend {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 480px) {
            .game-title {
                font-size: 1.5rem;
            }

            .game-button {
                min-width: 100px;
                padding: 12px 24px;
            }
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div class="game-header">
            <h1 class="game-title">🎰 룰렛 게임</h1>
            
            <div class="score-info">
                <div class="score-item">
                    <div class="score-label">현재 점수</div>
                    <div id="score-display" class="score-value">0</div>
                </div>
                <div class="score-item">
                    <div class="score-label">최고 점수</div>
                    <div id="high-score-display" class="score-value">0</div>
                </div>
                <div class="score-item">
                    <div class="score-label">남은 회전</div>
                    <div id="spin-count-display" class="score-value">5</div>
                </div>
            </div>
        </div>

        <div class="game-canvas-container">
            <div class="roulette-pointer"></div>
            <canvas id="roulette-canvas" width="400" height="400"></canvas>
        </div>

        <div class="game-controls">
            <button id="spin-button" class="game-button">
                🎯 스핀!
            </button>
            <button id="reset-button" class="game-button">
                🔄 리셋
            </button>
        </div>

        <div class="segment-legend">
            <div class="legend-item">
                <div class="legend-color" style="background: #FFD93D;"></div>
                <span>100점</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: #6BCF7F;"></div>
                <span>50점</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: #4D96FF;"></div>
                <span>200점</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: #FF6B6B;"></div>
                <span>실패</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: #B983FF;"></div>
                <span>150점</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: #FF8E53;"></div>
                <span>75점</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: #5DADE2;"></div>
                <span>300점</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: #F39C12;"></div>
                <span>실패</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: #E74C3C;"></div>
                <span>잭팟 500점</span>
            </div>
        </div>
    </div>

    <div id="result-modal">
        <div class="modal-content">
            <div class="modal-title" id="modal-title">결과</div>
            <div class="modal-score" id="modal-score">+0</div>
            <div class="modal-message" id="modal-message">메시지</div>
            <button class="modal-button" onclick="handleResultModalClose()">확인</button>
        </div>
    </div>

    <script>
        const gameState = {
            currentScore: 0,
            highScore: parseInt(localStorage.getItem('rouletteHighScore')) || 0,
            spinsLeft: 5,
            isSpinning: false,
            isGameOver: false,
            currentAngle: 0,
            targetAngle: 0,
            angularVelocity: 0,
            lastResult: null,
            gameMode: 'ready'
        };

        const rouletteConfig = {
            segments: [
                { id: 1, score: 100, color: '#FFD93D', label: '100' },
                { id: 2, score: 50, color: '#6BCF7F', label: '50' },
                { id: 3, score: 200, color: '#4D96FF', label: '200' },
                { id: 4, score: 0, color: '#FF6B6B', label: 'MISS' },
                { id: 5, score: 150, color: '#B983FF', label: '150' },
                { id: 6, score: 75, color: '#FF8E53', label: '75' },
                { id: 7, score: 300, color: '#5DADE2', label: '300' },
                { id: 8, score: 0, color: '#F39C12', label: 'MISS' },
                { id: 9, score: 500, color: '#E74C3C', label: 'JACKPOT' }
            ],
            canvasSize: { width: 400, height: 400 },
            rouletteRadius: 160,
            centerX: 200,
            centerY: 200
        };

        let canvas, ctx, animationId;

        function initGame() {
            canvas = document.getElementById('roulette-canvas');
            ctx = canvas.getContext('2d');
            
            const isMobile = window.innerWidth <= 768;
            const canvasSize = isMobile ? 300 : 400;
            
            canvas.width = canvasSize;
            canvas.height = canvasSize;
            canvas.style.width = canvasSize + 'px';
            canvas.style.height = canvasSize + 'px';
            
            rouletteConfig.canvasSize = { width: canvasSize, height: canvasSize };
            rouletteConfig.centerX = canvasSize / 2;
            rouletteConfig.centerY = canvasSize / 2;
            rouletteConfig.rouletteRadius = canvasSize * 0.4;
            
            updateUI();
            renderRoulette();
        }

        function updateUI() {
            document.getElementById('score-display').textContent = gameState.currentScore;
            document.getElementById('high-score-display').textContent = gameState.highScore;
            document.getElementById('spin-count-display').textContent = gameState.spinsLeft;
            
            const spinButton = document.getElementById('spin-button');
            spinButton.disabled = gameState.isSpinning || gameState.spinsLeft <= 0 || gameState.isGameOver;
            
            if (gameState.spinsLeft <= 0 && !gameState.isSpinning && !gameState.isGameOver) {
                gameState.isGameOver = true;
                setTimeout(() => {
                    showResult('게임 종료!', '모든 회전을 사용했습니다.', gameState.currentScore);
                }, 1000);
            }
        }

        function renderRoulette() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            const { centerX, centerY, rouletteRadius } = rouletteConfig;
            const segmentAngle = 40;
            
            for (let i = 0; i < rouletteConfig.segments.length; i++) {
                const segment = rouletteConfig.segments[i];
                const startAngle = (i * segmentAngle + gameState.currentAngle) * Math.PI / 180;
                const endAngle = ((i + 1) * segmentAngle + gameState.currentAngle) * Math.PI / 180;
                
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, rouletteRadius, startAngle, endAngle);
                ctx.closePath();
                ctx.fillStyle = segment.color;
                ctx.fill();
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 3;
                ctx.stroke();
                
                const textAngle = startAngle + (endAngle - startAngle) / 2;
                const textRadius = rouletteRadius * 0.7;
                const textX = centerX + Math.cos(textAngle) * textRadius;
                const textY = centerY + Math.sin(textAngle) * textRadius;
                
                ctx.save();
                ctx.translate(textX, textY);
                ctx.rotate(textAngle);
                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold ' + Math.max(14, canvas.width / 25) + 'px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(segment.label, 0, 0);
                ctx.restore();
            }
            
            ctx.beginPath();
            ctx.arc(centerX, centerY, 25, 0, 2 * Math.PI);
            ctx.fillStyle = '#FFD700';
            ctx.fill();
            ctx.strokeStyle = '#FFA500';
            ctx.lineWidth = 3;
            ctx.stroke();
        }

        function startSpin() {
            if (gameState.isSpinning || gameState.spinsLeft <= 0) return;
            
            gameState.isSpinning = true;
            gameState.spinsLeft--;
            gameState.gameMode = 'spinning';
            
            const randomRotation = 1800 + Math.random() * 720;
            gameState.targetAngle = gameState.currentAngle + randomRotation;
            gameState.angularVelocity = 20;
            
            updateUI();
            animateRoulette();
        }

        function animateRoulette() {
            if (gameState.angularVelocity > 0.1) {
                gameState.currentAngle += gameState.angularVelocity;
                gameState.angularVelocity *= 0.98;
                
                if (gameState.currentAngle >= 360) {
                    gameState.currentAngle %= 360;
                }
                
                renderRoulette();
                animationId = requestAnimationFrame(animateRoulette);
            } else {
                gameState.isSpinning = false;
                gameState.angularVelocity = 0;
                checkResult();
            }
        }

        function checkResult() {
            const normalizedAngle = (360 - gameState.currentAngle) % 360;
            const segmentIndex = Math.floor(normalizedAngle / 40);
            const resultSegment = rouletteConfig.segments[segmentIndex];
            
            gameState.lastResult = resultSegment.id;
            gameState.currentScore += resultSegment.score;
            
            if (gameState.currentScore > gameState.highScore) {
                gameState.highScore = gameState.currentScore;
                saveHighScore();
            }
            
            updateUI();
            
            setTimeout(() => {
                let title, message;
                
                if (resultSegment.id === 9) {
                    title = '🎉 잭팟!';
                    message = '축하합니다! 최고 점수를 획득했습니다!';
                    document.getElementById('game-container').classList.add('jackpot-effect');
                } else if (resultSegment.score === 0) {
                    title = '💥 실패!';
                    message = '아쉽지만 점수를 얻지 못했습니다.';
                } else {
                    title = '🎯 성공!';
                    message = resultSegment.score + '점을 획득했습니다!';
                }
                
                showResult(title, message, resultSegment.score);
            }, 500);
        }

        function showResult(title, message, score) {
            document.getElementById('modal-title').textContent = title;
            document.getElementById('modal-score').textContent = score > 0 ? '+' + score : '0';
            document.getElementById('modal-message').textContent = message;
            document.getElementById('result-modal').style.display = 'flex';
        }

        function saveHighScore() {
            localStorage.setItem('rouletteHighScore', gameState.highScore);
        }

        function handleSpinButtonClick() {
            startSpin();
        }

        function handleResetButtonClick() {
            gameState.currentScore = 0;
            gameState.spinsLeft = 5;
            gameState.isGameOver = false;
            gameState.currentAngle = 0;
            gameState.gameMode = 'ready';
            document.getElementById('game-container').classList.remove('jackpot-effect');
            document.getElementById('result-modal').style.display = 'none';
            updateUI();
            renderRoulette();
        }

        function handleResultModalClose() {
            document.getElementById('result-modal').style.display = 'none';
            document.getElementById('game-container').classList.remove('jackpot-effect');
        }

        window.addEventListener('load', initGame);
        
        window.addEventListener('resize', () => {
            const isMobile = window.innerWidth <= 768;
            const canvasSize = isMobile ? 300 : 400;
            
            canvas.width = canvasSize;
            canvas.height = canvasSize;
            canvas.style.width = canvasSize + 'px';
            canvas.style.height = canvasSize + 'px';
            
            rouletteConfig.canvasSize = { width: canvasSize, height: canvasSize };
            rouletteConfig.centerX = canvasSize / 2;
            rouletteConfig.centerY = canvasSize / 2;
            rouletteConfig.rouletteRadius = canvasSize * 0.4;
            
            renderRoulette();
        });
        
        document.getElementById('spin-button').addEventListener('click', handleSpinButtonClick);
        document.getElementById('reset-button').addEventListener('click', handleResetButtonClick);
    </script>
</body>
</html>
