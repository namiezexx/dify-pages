<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galaxy Reunion</title>
    <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');

    :root {
        --neon-blue: #00bfff;
        --neon-red: #ff4444;
        --neon-green: #44ff44;
        --neon-yellow: #ffaa00;
        --space-black: #0a0a0a;
        --dark-blue: #001122;
        --glow-intensity: 0 0 20px;
    }

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: 'Orbitron', 'Courier New', monospace;
        background: var(--space-black);
        color: var(--neon-blue);
        overflow: hidden;
        height: 100vh;
        position: relative;
    }

    /* 별똥별 배경 애니메이션 */
    body::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: 
            radial-gradient(2px 2px at 20px 30px, var(--neon-blue), transparent),
            radial-gradient(2px 2px at 40px 70px, var(--neon-green), transparent),
            radial-gradient(1px 1px at 90px 40px, var(--neon-yellow), transparent),
            radial-gradient(1px 1px at 130px 80px, var(--neon-red), transparent),
            radial-gradient(2px 2px at 160px 30px, var(--neon-blue), transparent);
        background-repeat: repeat;
        background-size: 200px 100px;
        animation: starfield 20s linear infinite;
        opacity: 0.3;
        z-index: -1;
    }

    @keyframes starfield {
        0% { transform: translateY(-100px); }
        100% { transform: translateY(100vh); }
    }

    /* 메인 컨테이너 */
    #game-container {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 20px;
        position: relative;
    }

    /* 화면 공통 스타일 */
    .screen {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        max-width: 900px;
        width: 100%;
        transition: all 0.5s ease;
    }

    .screen.hidden {
        display: none;
    }

    /* 메뉴 화면 스타일 */
    #menu-screen h1 {
        font-size: clamp(2.5rem, 6vw, 4rem);
        font-weight: 900;
        color: var(--neon-blue);
        text-shadow: var(--glow-intensity) var(--neon-blue);
        margin-bottom: 1rem;
        letter-spacing: 4px;
        animation: titleGlow 2s ease-in-out infinite alternate;
    }

    @keyframes titleGlow {
        0% { text-shadow: var(--glow-intensity) var(--neon-blue); }
        100% { text-shadow: 0 0 40px var(--neon-blue), 0 0 60px var(--neon-blue); }
    }

    #menu-screen .subtitle {
        font-size: clamp(0.8rem, 2vw, 1.2rem);
        color: var(--neon-green);
        margin-bottom: 3rem;
        opacity: 0.8;
    }

    /* 네온 버튼 스타일 */
    .neon-btn {
        background: transparent;
        border: 2px solid var(--neon-blue);
        color: var(--neon-blue);
        font-family: 'Orbitron', monospace;
        font-size: clamp(1rem, 2.5vw, 1.4rem);
        font-weight: 700;
        padding: 15px 30px;
        margin: 10px;
        cursor: pointer;
        text-transform: uppercase;
        letter-spacing: 2px;
        transition: all 0.3s ease;
        position: relative;
        min-width: 200px;
    }

    .neon-btn:hover {
        background: var(--neon-blue);
        color: var(--space-black);
        box-shadow: 
            0 0 20px var(--neon-blue),
            0 0 40px var(--neon-blue),
            inset 0 0 20px rgba(0, 191, 255, 0.1);
        transform: scale(1.05);
    }

    .neon-btn:active {
        transform: scale(0.98);
    }

    /* 최고점수 표시 */
    #high-score-display {
        font-size: clamp(1rem, 2vw, 1.3rem);
        color: var(--neon-yellow);
        margin-top: 2rem;
        text-shadow: var(--glow-intensity) var(--neon-yellow);
    }

    /* 게임 화면 스타일 */
    #game-screen {
        gap: 20px;
    }

    #game-canvas {
        border: 3px solid var(--neon-blue);
        box-shadow: 
            var(--glow-intensity) var(--neon-blue),
            inset 0 0 20px rgba(0, 191, 255, 0.1);
        background: radial-gradient(ellipse at center, var(--dark-blue) 0%, var(--space-black) 70%);
        max-width: 100%;
        height: auto;
    }

    /* HUD 스타일 */
    #hud {
        display: flex;
        justify-content: space-between;
        align-items: center;
        width: 800px;
        max-width: 100%;
        padding: 10px 20px;
        background: linear-gradient(90deg, transparent, rgba(0, 191, 255, 0.1), transparent);
        border: 1px solid rgba(0, 191, 255, 0.3);
        border-radius: 10px;
        font-size: clamp(0.9rem, 1.8vw, 1.1rem);
        gap: 15px;
    }

    #hud > div {
        display: flex;
        align-items: center;
        gap: 10px;
    }

    #score-display {
        color: var(--neon-blue);
        text-shadow: var(--glow-intensity) var(--neon-blue);
    }

    #missiles-display {
        color: var(--neon-yellow);
        text-shadow: var(--glow-intensity) var(--neon-yellow);
    }

    #lives-display {
        color: var(--neon-green);
        text-shadow: var(--glow-intensity) var(--neon-green);
    }

    /* 컨트롤 버튼 */
    .control-btn {
        background: transparent;
        border: 1px solid var(--neon-green);
        color: var(--neon-green);
        font-family: 'Orbitron', monospace;
        font-size: clamp(0.8rem, 1.5vw, 1rem);
        padding: 8px 16px;
        cursor: pointer;
        transition: all 0.3s ease;
        border-radius: 5px;
    }

    .control-btn:hover {
        background: var(--neon-green);
        color: var(--space-black);
        box-shadow: var(--glow-intensity) var(--neon-green);
    }

    /* 게임오버 화면 */
    #gameover-screen h2 {
        font-size: clamp(2rem, 4vw, 3rem);
        color: var(--neon-red);
        text-shadow: var(--glow-intensity) var(--neon-red);
        margin-bottom: 2rem;
        animation: gameOverPulse 1.5s ease-in-out infinite alternate;
    }

    @keyframes gameOverPulse {
        0% { opacity: 0.7; transform: scale(1); }
        100% { opacity: 1; transform: scale(1.05); }
    }

    #final-score, #enemies-killed {
        font-size: clamp(1.2rem, 2.5vw, 1.6rem);
        margin: 15px 0;
        color: var(--neon-blue);
        text-shadow: var(--glow-intensity) var(--neon-blue);
    }

    #final-score span, #enemies-killed span {
        color: var(--neon-yellow);
        font-weight: 700;
    }

    /* 반응형 디자인 */
    @media (max-width: 900px) {
        #game-canvas {
            width: 100%;
            max-width: 400px;
            height: 300px;
        }
        
        #hud {
            flex-direction: column;
            gap: 10px;
            width: 100%;
            max-width: 400px;
        }
        
        .neon-btn {
            min-width: 150px;
            padding: 12px 20px;
        }
    }

    @media (max-width: 480px) {
        #game-container {
            padding: 10px;
        }
        
        #hud {
            font-size: 0.8rem;
            padding: 8px 12px;
        }
        
        .neon-btn {
            min-width: 120px;
            padding: 10px 15px;
            font-size: 1rem;
        }
    }

    /* 점수 카운트업 애니메이션 */
    @keyframes countUp {
        0% { transform: scale(1); }
        50% { transform: scale(1.2); color: var(--neon-yellow); }
        100% { transform: scale(1); }
    }

    .score-animate {
        animation: countUp 0.5s ease;
    }

    /* 로딩 및 전환 효과 */
    .screen-transition {
        opacity: 0;
        transform: translateY(20px);
        animation: fadeInUp 0.8s ease forwards;
    }

    @keyframes fadeInUp {
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    /* 추가적인 네온 효과들 */
    .neon-border {
        position: relative;
    }

    .neon-border::before {
        content: '';
        position: absolute;
        top: -2px;
        left: -2px;
        right: -2px;
        bottom: -2px;
        background: linear-gradient(45deg, var(--neon-blue), var(--neon-green), var(--neon-yellow), var(--neon-red));
        border-radius: inherit;
        z-index: -1;
        opacity: 0;
        transition: opacity 0.3s ease;
    }

    .neon-border:hover::before {
        opacity: 0.7;
    }
    </style>
</head>
<body>
    <div id="game-container">
        <!-- 메뉴 화면 -->
        <div id="menu-screen" class="screen">
            <h1>GALAXY REUNION</h1>
            <p class="subtitle">Classic Arcade Shooter Experience</p>
            <button id="start-btn" class="neon-btn neon-border">START GAME</button>
            <div id="high-score-display">HIGH SCORE: <span id="high-score">0</span></div>
        </div>
        
        <!-- 게임 화면 -->
        <div id="game-screen" class="screen hidden">
            <canvas id="game-canvas" width="800" height="600"></canvas>
            <div id="hud">
                <div id="score-display">SCORE: <span id="current-score">0</span></div>
                <div id="missiles-display">MISSILES: <span id="missile-count">0</span></div>
                <div id="lives-display">LIVES: <span id="life-count">3</span></div>
            </div>
            <button id="pause-btn" class="control-btn">PAUSE</button>
        </div>
        
        <!-- 게임오버 화면 -->
        <div id="gameover-screen" class="screen hidden">
            <h2>GAME OVER</h2>
            <div id="final-score">FINAL SCORE: <span id="game-final-score">0</span></div>
            <div id="enemies-killed">ENEMIES DESTROYED: <span id="total-kills">0</span></div>
            <button id="restart-btn" class="neon-btn neon-border">PLAY AGAIN</button>
            <button id="menu-btn" class="neon-btn">MAIN MENU</button>
        </div>
    </div>

    <script>
    // 갤럭시 리유니온 게임 - 메인 JavaScript 파일
    // 종스크롤 슈팅 게임 엔진 구현

    // 게임 설정 상수 정의
    const GAME_CONFIG = {
        CANVAS_WIDTH: 800,
        CANVAS_HEIGHT: 600,
        ENEMIES_PER_MISSILE: 10,
        MAX_MISSILES: 5,
        ENEMY_SPAWN_RATE: 60,
        PROJECTILE_SPEED: 7,
        ENEMY_SPEED: 2,
        MISSILE_SPEED: 8,
        PLAYER_SPEED: 5
    };

    // 글로벌 게임 상태 객체
    const gameState = {
        currentScreen: 'menu', // 'menu', 'playing', 'paused', 'gameover'
        score: 0,
        highScore: 0,
        lives: 3,
        missileCount: 0,
        enemiesKilled: 0,
        isGameRunning: false,
        isPaused: false,
        level: 1,
        player: {
            x: 400,
            y: 500,
            width: 25,
            height: 20,
            speed: GAME_CONFIG.PLAYER_SPEED
        },
        enemies: [],
        projectiles: [],
        missiles: [],
        enemyProjectiles: []
    };

    // 키보드 입력 상태 관리 객체
    const keyState = {
        ArrowUp: false,
        ArrowDown: false,
        ArrowLeft: false,
        ArrowRight: false,
        KeyW: false,
        KeyA: false,
        KeyS: false,
        KeyD: false,
        Space: false,
        KeyX: false
    };

    // 캔버스와 컨텍스트 변수
    let canvas, ctx;
    let gameAnimationFrame;
    let enemySpawnCounter = 0;
    let lastProjectileTime = 0;
    let lastMissileTime = 0;

    // DOM 로드 완료 후 초기화
    document.addEventListener('DOMContentLoaded', function() {
        initializeGame();
    });

    // 게임 초기화 함수
    function initializeGame() {
        try {
            // 캔버스 요소 가져오기
            canvas = document.getElementById('game-canvas');
            if (!canvas) {
                console.error('Canvas element not found');
                return;
            }
            
            ctx = canvas.getContext('2d');
            
            // 고해상도 디스플레이 대응
            const dpr = window.devicePixelRatio || 1;
            const rect = canvas.getBoundingClientRect();
            
            canvas.width = GAME_CONFIG.CANVAS_WIDTH * dpr;
            canvas.height = GAME_CONFIG.CANVAS_HEIGHT * dpr;
            canvas.style.width = GAME_CONFIG.CANVAS_WIDTH + 'px';
            canvas.style.height = GAME_CONFIG.CANVAS_HEIGHT + 'px';
            
            ctx.scale(dpr, dpr);
            
            // 저장된 최고점수 로드
            loadHighScore();
            
            // 이벤트 리스너 등록
            setupEventListeners();
            
            // 초기 화면 표시
            showScreen('menu');
            
            console.log('갤럭시 리유니온 게임 초기화 완료');
            
        } catch (error) {
            console.error('게임 초기화 중 오류 발생:', error);
        }
    }

    // 이벤트 리스너 설정
    function setupEventListeners() {
        // 키보드 이벤트 - 키 누름
        document.addEventListener('keydown', function(e) {
            if (keyState.hasOwnProperty(e.code)) {
                keyState[e.code] = true;
                e.preventDefault();
            }
        });
        
        // 키보드 이벤트 - 키 뗌
        document.addEventListener('keyup', function(e) {
            if (keyState.hasOwnProperty(e.code)) {
                keyState[e.code] = false;
                e.preventDefault();
            }
        });
        
        // 버튼 이벤트 리스너
        const startBtn = document.getElementById('start-btn');
        const pauseBtn = document.getElementById('pause-btn');
        const restartBtn = document.getElementById('restart-btn');
        const menuBtn = document.getElementById('menu-btn');
        
        if (startBtn) startBtn.addEventListener('click', handleStartGame);
        if (pauseBtn) pauseBtn.addEventListener('click', handlePauseGame);
        if (restartBtn) restartBtn.addEventListener('click', handleRestartGame);
        if (menuBtn) menuBtn.addEventListener('click', handleBackToMenu);
    }

    // 게임 시작 핸들러
    function handleStartGame() {
        try {
            resetGameState();
            gameState.currentScreen = 'playing';
            gameState.isGameRunning = true;
            gameState.isPaused = false;
            
            showScreen('game');
            startGameLoop();
            
            console.log('게임 시작됨');
        } catch (error) {
            console.error('게임 시작 중 오류:', error);
        }
    }

    // 게임 일시정지 핸들러
    function handlePauseGame() {
        if (gameState.currentScreen !== 'playing') return;
        
        if (gameState.isPaused) {
            gameState.isPaused = false;
            startGameLoop();
            const pauseBtn = document.getElementById('pause-btn');
            if (pauseBtn) pauseBtn.textContent = 'PAUSE';
        } else {
            gameState.isPaused = true;
            stopGameLoop();
            const pauseBtn = document.getElementById('pause-btn');
            if (pauseBtn) pauseBtn.textContent = 'RESUME';
        }
    }

    // 게임 재시작 핸들러
    function handleRestartGame() {
        handleStartGame();
    }

    // 메인 메뉴로 돌아가기 핸들러
    function handleBackToMenu() {
        stopGameLoop();
        gameState.currentScreen = 'menu';
        gameState.isGameRunning = false;
        showScreen('menu');
    }

    // 게임 상태 초기화
    function resetGameState() {
        gameState.score = 0;
        gameState.lives = 3;
        gameState.missileCount = 0;
        gameState.enemiesKilled = 0;
        gameState.level = 1;
        
        // 플레이어 위치 초기화
        gameState.player.x = GAME_CONFIG.CANVAS_WIDTH / 2 - gameState.player.width / 2;
        gameState.player.y = GAME_CONFIG.CANVAS_HEIGHT - 100;
        
        // 배열 초기화
        gameState.enemies = [];
        gameState.projectiles = [];
        gameState.missiles = [];
        gameState.enemyProjectiles = [];
        
        enemySpawnCounter = 0;
        lastProjectileTime = 0;
        lastMissileTime = 0;
        
        // UI 업데이트
        updateScore(0);
        updateMissileCount(0);
        updateLives(3);
    }

    // 화면 전환 함수
    function showScreen(screenId) {
        const screens = ['menu-screen', 'game-screen', 'gameover-screen'];
        
        screens.forEach(screen => {
            const element = document.getElementById(screen);
            if (element) {
                element.classList.add('hidden');
            }
        });
        
        const targetScreen = document.getElementById(screenId + '-screen');
        if (targetScreen) {
            targetScreen.classList.remove('hidden');
        }
    }

    // 게임 루프 시작
    function startGameLoop() {
        if (gameState.isPaused || !gameState.isGameRunning) return;
        
        gameAnimationFrame = requestAnimationFrame(gameLoop);
    }

    // 게임 루프 정지
    function stopGameLoop() {
        if (gameAnimationFrame) {
            cancelAnimationFrame(gameAnimationFrame);
            gameAnimationFrame = null;
        }
    }

    // 메인 게임 루프
    function gameLoop() {
        try {
            if (!gameState.isGameRunning || gameState.isPaused) {
                return;
            }
            
            // 게임 로직 업데이트
            updateGame();
            
            // 화면 렌더링
            renderGame();
            
            // 다음 프레임 예약
            gameAnimationFrame = requestAnimationFrame(gameLoop);
            
        } catch (error) {
            console.error('게임 루프 오류:', error);
            handleGameOver();
        }
    }

    // 게임 로직 업데이트
    function updateGame() {
        // 플레이어 입력 처리
        handlePlayerInput();
        
        // 적 생성
        spawnEnemies();
        
        // 오브젝트 이동 업데이트
        updateProjectiles();
        updateMissiles();
        updateEnemies();
        updateEnemyProjectiles();
        
        // 충돌 감지
        checkCollisions();
        
        // 게임 오버 체크
        if (gameState.lives <= 0) {
            handleGameOver();
        }
    }

    // 플레이어 입력 처리
    function handlePlayerInput() {
        const player = gameState.player;
        
        // 이동 처리
        if ((keyState.ArrowLeft || keyState.KeyA) && player.x > 0) {
            player.x -= player.speed;
        }
        if ((keyState.ArrowRight || keyState.KeyD) && player.x < GAME_CONFIG.CANVAS_WIDTH - player.width) {
            player.x += player.speed;
        }
        if ((keyState.ArrowUp || keyState.KeyW) && player.y > 0) {
            player.y -= player.speed;
        }
        if ((keyState.ArrowDown || keyState.KeyS) && player.y < GAME_CONFIG.CANVAS_HEIGHT - player.height) {
            player.y += player.speed;
        }
        
        // 레이저 발사 (Space 키)
        const currentTime = Date.now();
        if (keyState.Space && currentTime - lastProjectileTime > 150) {
            fireProjectile();
            lastProjectileTime = currentTime;
        }
        
        // 미사일 발사 (X 키)
        if (keyState.KeyX && gameState.missileCount > 0 && currentTime - lastMissileTime > 500) {
            fireMissile();
            lastMissileTime = currentTime;
        }
    }

    // 레이저 발사
    function fireProjectile() {
        const player = gameState.player;
        gameState.projectiles.push({
            x: player.x + player.width / 2 - 1.5,
            y: player.y,
            width: 3,
            height: 10,
            speed: GAME_CONFIG.PROJECTILE_SPEED,
            active: true
        });
    }

    // 미사일 발사
    function fireMissile() {
        const player = gameState.player;
        gameState.missiles.push({
            x: player.x + player.width / 2 - 2.5,
            y: player.y,
            width: 5,
            height: 12,
            speed: GAME_CONFIG.MISSILE_SPEED,
            active: true
        });
        
        gameState.missileCount--;
        updateMissileCount(gameState.missileCount);
    }

    // 적 생성
    function spawnEnemies() {
        enemySpawnCounter++;
        
        if (enemySpawnCounter >= GAME_CONFIG.ENEMY_SPAWN_RATE) {
            const enemy = {
                x: Math.random() * (GAME_CONFIG.CANVAS_WIDTH - 20),
                y: -20,
                width: 20,
                height: 15,
                speed: GAME_CONFIG.ENEMY_SPEED + Math.random() * 1,
                active: true,
                shootTimer: Math.random() * 120 + 60
            };
            
            gameState.enemies.push(enemy);
            enemySpawnCounter = 0;
        }
    }

    // 발사체 업데이트
    function updateProjectiles() {
        gameState.projectiles = gameState.projectiles.filter(projectile => {
            if (!projectile.active) return false;
            
            projectile.y -= projectile.speed;
            
            // 화면 밖으로 나간 발사체 제거
            if (projectile.y < -projectile.height) {
                return false;
            }
            
            return true;
        });
    }

    // 미사일 업데이트
    function updateMissiles() {
        gameState.missiles = gameState.missiles.filter(missile => {
            if (!missile.active) return false;
            
            missile.y -= missile.speed;
            
            // 화면 밖으로 나간 미사일 제거
            if (missile.y < -missile.height) {
                return false;
            }
            
            return true;
        });
    }

    // 적 업데이트
    function updateEnemies() {
        gameState.enemies = gameState.enemies.filter(enemy => {
            if (!enemy.active) return false;
            
            enemy.y += enemy.speed;
            
            // 적 발사 로직
            enemy.shootTimer--;
            if (enemy.shootTimer <= 0 && Math.random() < 0.02) {
                fireEnemyProjectile(enemy);
                enemy.shootTimer = Math.random() * 180 + 90;
            }
            
            // 화면 밖으로 나간 적 제거
            if (enemy.y > GAME_CONFIG.CANVAS_HEIGHT) {
                return false;
            }
            
            return true;
        });
    }

    // 적 발사체 생성
    function fireEnemyProjectile(enemy) {
        gameState.enemyProjectiles.push({
            x: enemy.x + enemy.width / 2 - 1,
            y: enemy.y + enemy.height,
            width: 2,
            height: 6,
            speed: 3,
            active: true
        });
    }

    // 적 발사체 업데이트
    function updateEnemyProjectiles() {
        gameState.enemyProjectiles = gameState.enemyProjectiles.filter(projectile => {
            if (!projectile.active) return false;
            
            projectile.y += projectile.speed;
            
            // 화면 밖으로 나간 발사체 제거
            if (projectile.y > GAME_CONFIG.CANVAS_HEIGHT) {
                return false;
            }
            
            return true;
        });
    }

    // 충돌 감지
    function checkCollisions() {
        // 플레이어 발사체와 적의 충돌
        gameState.projectiles.forEach(projectile => {
            if (!projectile.active) return;
            
            gameState.enemies.forEach(enemy => {
                if (!enemy.active) return;
                
                if (isColliding(projectile, enemy)) {
                    projectile.active = false;
                    enemy.active = false;
                    
                    // 점수 추가 (레이저로 격파)
                    addScore(100);
                    handleEnemyDestroyed();
                }
            });
        });
        
        // 플레이어 미사일과 적의 충돌
        gameState.missiles.forEach(missile => {
            if (!missile.active) return;
            
            gameState.enemies.forEach(enemy => {
                if (!enemy.active) return;
                
                if (isColliding(missile, enemy)) {
                    missile.active = false;
                    enemy.active = false;
                    
                    // 점수 추가 (미사일로 격파 - 보너스)
                    addScore(150);
                    handleEnemyDestroyed();
                }
            });
        });
        
        // 플레이어와 적의 충돌
        gameState.enemies.forEach(enemy => {
            if (!enemy.active) return;
            
            if (isColliding(gameState.player, enemy)) {
                enemy.active = false;
                handlePlayerHit();
            }
        });
        
        // 플레이어와 적 발사체의 충돌
        gameState.enemyProjectiles.forEach(projectile => {
            if (!projectile.active) return;
            
            if (isColliding(gameState.player, projectile)) {
                projectile.active = false;
                handlePlayerHit();
            }
        });
        
        // 비활성화된 오브젝트 필터링
        gameState.projectiles = gameState.projectiles.filter(p => p.active);
        gameState.missiles = gameState.missiles.filter(m => m.active);
        gameState.enemies = gameState.enemies.filter(e => e.active);
        gameState.enemyProjectiles = gameState.enemyProjectiles.filter(p => p.active);
    }

    // 충돌 감지 함수 (AABB 충돌 감지)
    function isColliding(rect1, rect2) {
        return rect1.x < rect2.x + rect2.width &&
               rect1.x + rect1.width > rect2.x &&
               rect1.y < rect2.y + rect2.height &&
               rect1.y + rect1.height > rect2.y;
    }

    // 적 파괴 처리
    function handleEnemyDestroyed() {
        gameState.enemiesKilled++;
        
        // 10마리마다 미사일 추가
        if (gameState.enemiesKilled % GAME_CONFIG.ENEMIES_PER_MISSILE === 0 && 
            gameState.missileCount < GAME_CONFIG.MAX_MISSILES) {
            gameState.missileCount++;
            updateMissileCount(gameState.missileCount);
        }
    }

    // 플레이어 피격 처리
    function handlePlayerHit() {
        gameState.lives--;
        updateLives(gameState.lives);
        
        if (gameState.lives <= 0) {
            handleGameOver();
        }
    }

    // 점수 추가
    function addScore(points) {
        gameState.score += points;
        updateScore(gameState.score);
        
        // 최고점수 갱신 체크
        if (gameState.score > gameState.highScore) {
            gameState.highScore = gameState.score;
            saveHighScore();
            updateHighScore();
        }
    }

    // 게임 오버 처리
    function handleGameOver() {
        stopGameLoop();
        gameState.isGameRunning = false;
        gameState.currentScreen = 'gameover';
        
        // 최종 점수 표시
        const finalScoreElement = document.getElementById('game-final-score');
        const totalKillsElement = document.getElementById('total-kills');
        
        if (finalScoreElement) finalScoreElement.textContent = gameState.score;
        if (totalKillsElement) totalKillsElement.textContent = gameState.enemiesKilled;
        
        showScreen('gameover');
    }

    // UI 업데이트 함수들
    function updateScore(newScore) {
        const scoreElement = document.getElementById('current-score');
        if (scoreElement) {
            scoreElement.textContent = newScore;
        }
    }

    function updateMissileCount(count) {
        const missileElement = document.getElementById('missile-count');
        if (missileElement) {
            missileElement.textContent = count;
        }
    }

    function updateLives(lives) {
        const livesElement = document.getElementById('life-count');
        if (livesElement) {
            livesElement.textContent = lives;
        }
    }

    function updateHighScore() {
        const highScoreElement = document.getElementById('high-score');
        if (highScoreElement) {
            highScoreElement.textContent = gameState.highScore;
        }
    }

    // 최고점수 저장/로드
    function saveHighScore() {
        try {
            localStorage.setItem('galaxyReunionHighScore', gameState.highScore.toString());
        } catch (error) {
            console.error('최고점수 저장 실패:', error);
        }
    }

    function loadHighScore() {
        try {
            const savedScore = localStorage.getItem('galaxyReunionHighScore');
            if (savedScore) {
                gameState.highScore = parseInt(savedScore, 10) || 0;
                updateHighScore();
            }
        } catch (error) {
            console.error('최고점수 로드 실패:', error);
        }
    }

    // 게임 렌더링
    function renderGame() {
        // 캔버스 지우기
        ctx.fillStyle = '#0a0a0a';
        ctx.fillRect(0, 0, GAME_CONFIG.CANVAS_WIDTH, GAME_CONFIG.CANVAS_HEIGHT);
        
        // 배경 별 그리기
        drawStars();
        
        // 플레이어 그리기
        drawPlayer();
        
        // 발사체 그리기
        drawProjectiles();
        
        // 미사일 그리기
        drawMissiles();
        
        // 적 그리기
        drawEnemies();
        
        // 적 발사체 그리기
        drawEnemyProjectiles();
    }

    // 배경 별 그리기
    function drawStars() {
        ctx.fillStyle = '#ffffff';
        
        // 간단한 별 패턴 (정적)
        for (let i = 0; i < 50; i++) {
            const x = (i * 37) % GAME_CONFIG.CANVAS_WIDTH;
            const y = (i * 73) % GAME_CONFIG.CANVAS_HEIGHT;
            const size = 1 + (i % 3);
            
            ctx.fillRect(x, y, size, size);
        }
    }

    // 플레이어 그리기 (픽셀 아트 스타일)
    function drawPlayer() {
        const p = gameState.player;
        
        // 플레이어 우주선 - 녹색 삼각형
        ctx.fillStyle = '#44ff44';
        
        // 삼각형 모양으로 그리기
        ctx.beginPath();
        ctx.moveTo(p.x + p.width / 2, p.y); // 위쪽 점
        ctx.lineTo(p.x, p.y + p.height); // 왼쪽 아래
        ctx.lineTo(p.x + p.width, p.y + p.height); // 오른쪽 아래
        ctx.closePath();
        ctx.fill();
        
        // 엔진 불꽃 효과
        ctx.fillStyle = '#ffaa00';
        ctx.fillRect(p.x + p.width / 2 - 2, p.y + p.height, 4, 6);
    }

    // 레이저 발사체 그리기
    function drawProjectiles() {
        ctx.fillStyle = '#00bfff';
        
        gameState.projectiles.forEach(projectile => {
            if (projectile.active) {
                ctx.fillRect(projectile.x, projectile.y, projectile.width, projectile.height);
            }
        });
    }

    // 미사일 그리기
    function drawMissiles() {
        ctx.fillStyle = '#ffaa00';
        
        gameState.missiles.forEach(missile => {
            if (missile.active) {
                // 미사일 몸체
                ctx.fillRect(missile.x, missile.y + 4, missile.width, missile.height - 4);
                
                // 미사일 머리 (뾰족하게)
                ctx.beginPath();
                ctx.moveTo(missile.x + missile.width / 2, missile.y);
                ctx.lineTo(missile.x, missile.y + 4);
                ctx.lineTo(missile.x + missile.width, missile.y + 4);
                ctx.closePath();
                ctx.fill();
            }
        });
    }

    // 적 우주선 그리기
    function drawEnemies() {
        ctx.fillStyle = '#ff4444';
        
        gameState.enemies.forEach(enemy => {
            if (enemy.active) {
                // 적 우주선 - 빨간색 역삼각형
                ctx.beginPath();
                ctx.moveTo(enemy.x + enemy.width / 2, enemy.y + enemy.height); // 아래쪽 점
                ctx.lineTo(enemy.x, enemy.y); // 왼쪽 위
                ctx.lineTo(enemy.x + enemy.width, enemy.y); // 오른쪽 위
                ctx.closePath();
                ctx.fill();
            }
        });
    }

    // 적 발사체 그리기
    function drawEnemyProjectiles() {
        ctx.fillStyle = '#ff6666';
        
        gameState.enemyProjectiles.forEach(projectile => {
            if (projectile.active) {
                ctx.fillRect(projectile.x, projectile.y, projectile.width, projectile.height);
            }
        });
    }
    </script>
</body>
</html>
