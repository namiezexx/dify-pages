<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>턴제 전쟁</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        /* CSS 변수 정의 */
        :root {
            --primary-blue: #3498DB;
            --secondary-red: #E74C3C;
            --background-dark: #2C3E50;
            --accent-yellow: #F1C40F;
            --light-gray: #ECF0F1;
            --medium-gray: #D5DBDB;
            --border-gray: #95A5A6;
            --move-highlight: #AED6F1;
            --attack-highlight: #F1948A;
            --unit-size: 30px;
            --cell-size: 70px;
            --board-size: 560px;
        }

        /* 전역 스타일 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Open Sans', sans-serif;
            background-color: var(--background-dark);
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 화면 전환 시스템 */
        .screen {
            display: none;
            min-height: 100vh;
            position: relative;
        }

        .screen.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 메인 화면 스타일 */
        .main-container {
            text-align: center;
            padding: 2rem;
            animation: fadeIn 1s ease-in-out;
        }

        .game-title {
            font-family: 'Roboto', sans-serif;
            font-size: 3rem;
            font-weight: 700;
            color: var(--accent-yellow);
            margin-bottom: 2rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            animation: titleGlow 2s ease-in-out infinite alternate;
        }

        .primary-button {
            background: linear-gradient(45deg, var(--primary-blue), var(--secondary-red));
            color: white;
            border: none;
            padding: 1rem 2rem;
            font-size: 1.2rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            margin-bottom: 2rem;
        }

        .primary-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }

        .game-rules {
            max-width: 500px;
            margin: 0 auto;
            text-align: left;
            background: rgba(255,255,255,0.1);
            padding: 1.5rem;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }

        .game-rules h3 {
            font-family: 'Roboto', sans-serif;
            color: var(--accent-yellow);
            margin-bottom: 1rem;
            text-align: center;
        }

        .game-rules ul {
            list-style-type: none;
        }

        .game-rules li {
            padding: 0.5rem 0;
            position: relative;
            padding-left: 1.5rem;
        }

        .game-rules li::before {
            content: "▶";
            position: absolute;
            left: 0;
            color: var(--primary-blue);
        }

        /* 게임 화면 스타일 */
        .game-container {
            width: 100%;
            max-width: 1200px;
            padding: 1rem;
            animation: slideUp 0.5s ease-out;
        }

        .turn-display {
            text-align: center;
            margin-bottom: 1rem;
            padding: 1rem;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }

        #current-turn {
            font-family: 'Roboto', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent-yellow);
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }

        .game-main {
            display: flex;
            gap: 2rem;
            justify-content: center;
            align-items: flex-start;
        }

        /* 게임 보드 스타일 */
        .game-board-container {
            flex-shrink: 0;
        }

        .game-board {
            width: var(--board-size);
            height: var(--board-size);
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(8, 1fr);
            gap: 1px;
            background-color: var(--border-gray);
            border: 2px solid var(--border-gray);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }

        .game-cell {
            width: var(--cell-size);
            height: var(--cell-size);
            position: relative;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .game-cell.light {
            background-color: var(--light-gray);
        }

        .game-cell.dark {
            background-color: var(--medium-gray);
        }

        .game-cell:hover {
            filter: brightness(1.1);
        }

        .game-cell.selectable {
            cursor: pointer;
        }

        .game-cell.selectable:hover {
            background-color: var(--accent-yellow);
            opacity: 0.8;
        }

        /* 하이라이트 효과 */
        .game-cell.move-highlight {
            background-color: var(--move-highlight) !important;
            animation: pulse 1s infinite;
        }

        .game-cell.attack-highlight {
            background-color: var(--attack-highlight) !important;
            animation: pulse 1s infinite;
        }

        .game-cell.selected {
            box-shadow: inset 0 0 0 3px var(--accent-yellow);
            animation: selectedGlow 1s ease-in-out infinite alternate;
        }

        /* 유닛 스타일 */
        .unit {
            width: var(--unit-size);
            height: var(--unit-size);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
            color: white;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            z-index: 10;
        }

        .unit.blue {
            background-color: var(--primary-blue);
            box-shadow: 0 2px 8px rgba(52, 152, 219, 0.4);
        }

        .unit.red {
            background-color: var(--secondary-red);
            box-shadow: 0 2px 8px rgba(231, 76, 60, 0.4);
        }

        .unit.selected {
            border: 3px solid var(--accent-yellow);
            box-shadow: 0 0 15px var(--accent-yellow);
        }

        .unit:hover {
            transform: scale(1.1);
        }

        .unit.moving {
            animation: unitMove 0.3s ease-in-out;
        }

        .unit.attacking {
            animation: unitAttack 0.2s ease-in-out;
        }

        .unit.damaged {
            animation: unitDamage 0.5s ease-in-out;
        }

        /* 유닛 정보 패널 */
        .unit-info-panel {
            min-width: 250px;
        }

        .unit-info {
            background: rgba(255,255,255,0.1);
            padding: 1.5rem;
            border-radius: 10px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .unit-info.hidden {
            opacity: 0.5;
            pointer-events: none;
        }

        .unit-info h3 {
            font-family: 'Roboto', sans-serif;
            color: var(--accent-yellow);
            margin-bottom: 1rem;
            text-align: center;
        }

        .unit-stats {
            margin-bottom: 1.5rem;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            padding: 0.5rem;
            background: rgba(255,255,255,0.05);
            border-radius: 5px;
        }

        .stat-label {
            font-weight: 600;
            color: var(--light-gray);
        }

        .stat-value {
            font-weight: 700;
            color: var(--accent-yellow);
        }

        .unit-actions {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .action-button {
            padding: 0.75rem;
            border: none;
            border-radius: 5px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            background-color: var(--primary-blue);
            color: white;
        }

        .action-button:hover:not(.disabled) {
            transform: translateY(-1px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .action-button.disabled {
            background-color: var(--border-gray);
            cursor: not-allowed;
            opacity: 0.6;
        }

        #end-turn-button {
            background-color: var(--secondary-red);
        }

        /* 게임 메시지 */
        .game-message {
            text-align: center;
            padding: 1rem;
            margin-top: 1rem;
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
            font-weight: 600;
            color: var(--accent-yellow);
            backdrop-filter: blur(10px);
        }

        /* 결과 화면 */
        .result-container {
            text-align: center;
            animation: bounceIn 1s ease-out;
        }

        .victory-message {
            font-family: 'Roboto', sans-serif;
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 2rem;
            animation: victoryGlow 2s ease-in-out infinite alternate;
        }

        .victory-message.blue-wins {
            color: var(--primary-blue);
        }

        .victory-message.red-wins {
            color: var(--secondary-red);
        }

        /* 애니메이션 정의 */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes titleGlow {
            from { text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
            to { text-shadow: 0 0 20px var(--accent-yellow), 2px 2px 4px rgba(0,0,0,0.3); }
        }

        @keyframes selectedGlow {
            from { box-shadow: inset 0 0 0 3px var(--accent-yellow); }
            to { box-shadow: inset 0 0 0 3px var(--accent-yellow), 0 0 15px var(--accent-yellow); }
        }

        @keyframes pulse {
            0% { opacity: 0.7; }
            50% { opacity: 1; }
            100% { opacity: 0.7; }
        }

        @keyframes unitMove {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        @keyframes unitAttack {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }

        @keyframes unitDamage {
            0% { background-color: inherit; }
            25% { background-color: #ff6b6b; }
            50% { background-color: inherit; }
            75% { background-color: #ff6b6b; }
            100% { background-color: inherit; }
        }

        @keyframes bounceIn {
            0% { opacity: 0; transform: scale(0.3); }
            50% { opacity: 1; transform: scale(1.05); }
            70% { transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1); }
        }

        @keyframes victoryGlow {
            from { transform: scale(1); }
            to { transform: scale(1.05); filter: brightness(1.2); }
        }

        /* 반응형 디자인 */
        @media (max-width: 768px) {
            .game-main {
                flex-direction: column;
                align-items: center;
            }
            
            .game-board {
                width: 100%;
                max-width: 400px;
                height: auto;
                aspect-ratio: 1;
            }
            
            .game-cell {
                width: auto;
                height: auto;
                aspect-ratio: 1;
            }
            
            .unit-info-panel {
                min-width: auto;
                width: 100%;
                max-width: 400px;
            }
            
            .game-title {
                font-size: 2rem;
            }
            
            .victory-message {
                font-size: 2rem;
            }
        }

        @media (max-width: 480px) {
            .game-container {
                padding: 0.5rem;
            }
            
            .game-title {
                font-size: 1.5rem;
            }
            
            .victory-message {
                font-size: 1.5rem;
            }
            
            #current-turn {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <!-- 메인 화면 -->
    <div id="main-screen" class="screen active">
        <div class="main-container">
            <h1 class="game-title">턴제 전쟁</h1>
            <button id="start-button" class="primary-button">게임 시작</button>
            <div class="game-rules">
                <h3>게임 규칙</h3>
                <ul>
                    <li>8x8 격자에서 블루팀과 레드팀이 전투</li>
                    <li>턴당 1개 유닛만 조작 가능</li>
                    <li>이동 또는 공격 중 하나만 선택</li>
                    <li>인접한 적 유닛 공격 가능</li>
                    <li>상대팀 전멸시 승리</li>
                </ul>
            </div>
        </div>
    </div>

    <!-- 게임 화면 -->
    <div id="game-screen" class="screen">
        <div class="game-container">
            <!-- 현재 턴 표시 -->
            <div id="turn-display" class="turn-display">
                <span id="current-turn">Blue Team Turn</span>
            </div>

            <!-- 게임 메인 영역 -->
            <div class="game-main">
                <!-- 게임 보드 -->
                <div class="game-board-container">
                    <div id="game-board" class="game-board">
                        <!-- 8x8 그리드가 JavaScript로 생성됨 -->
                    </div>
                </div>

                <!-- 유닛 정보 패널 -->
                <div class="unit-info-panel">
                    <div id="selected-unit-info" class="unit-info hidden">
                        <h3>선택된 유닛</h3>
                        <div class="unit-stats">
                            <div class="stat-item">
                                <span class="stat-label">팀:</span>
                                <span id="unit-team" class="stat-value">-</span>
                            </div>
                            <div class="stat-item">
                                <span class="stat-label">HP:</span>
                                <span id="unit-hp" class="stat-value">-</span>
                            </div>
                            <div class="stat-item">
                                <span class="stat-label">공격력:</span>
                                <span id="unit-attack" class="stat-value">30</span>
                            </div>
                        </div>
                        <div class="unit-actions">
                            <button id="move-button" class="action-button disabled">이동</button>
                            <button id="attack-button" class="action-button disabled">공격</button>
                            <button id="end-turn-button" class="action-button">턴 종료</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 게임 상태 메시지 -->
            <div id="game-message" class="game-message">
                유닛을 선택하세요
            </div>
        </div>
    </div>

    <!-- 결과 화면 -->
    <div id="result-screen" class="screen">
        <div class="result-container">
            <h1 id="victory-message" class="victory-message">Blue Team Wins!</h1>
            <button id="restart-button" class="primary-button">다시 시작</button>
        </div>
    </div>

    <script>
        // 턴제 전쟁 게임 - 메인 게임 엔진
        (function() {
            'use strict';

            // 게임 상수 정의
            const GAME_CONFIG = {
                BOARD_SIZE: 8,
                UNIT_HP: 100,
                UNIT_ATTACK_POWER: 30,
                UNIT_MOVE_RANGE: 3
            };

            // 유닛 클래스 정의
            class Unit {
                constructor(x, y, team, hp = GAME_CONFIG.UNIT_HP) {
                    this.x = x;
                    this.y = y;
                    this.team = team;
                    this.hp = hp;
                    this.maxHp = hp;
                    this.attackPower = GAME_CONFIG.UNIT_ATTACK_POWER;
                    this.moveRange = GAME_CONFIG.UNIT_MOVE_RANGE;
                    this.hasMoved = false;
                    this.hasAttacked = false;
                }

                isAlive() {
                    return this.hp > 0;
                }

                takeDamage(damage) {
                    this.hp = Math.max(0, this.hp - damage);
                }

                resetTurn() {
                    this.hasMoved = false;
                    this.hasAttacked = false;
                }

                canAct() {
                    return !this.hasMoved && !this.hasAttacked;
                }
            }

            // 게임 보드 클래스
            class GameBoard {
                constructor() {
                    this.boardElement = document.getElementById('game-board');
                    this.units = [];
                    this.selectedUnit = null;
                    this.gameMode = 'select'; // 'select', 'move', 'attack'
                    
                    this.initializeBoard();
                    this.initializeUnits();
                }

                initializeBoard() {
                    this.boardElement.innerHTML = '';
                    for (let y = 0; y < GAME_CONFIG.BOARD_SIZE; y++) {
                        for (let x = 0; x < GAME_CONFIG.BOARD_SIZE; x++) {
                            const cell = document.createElement('div');
                            cell.className = `game-cell ${(x + y) % 2 === 0 ? 'light' : 'dark'}`;
                            cell.dataset.x = x;
                            cell.dataset.y = y;
                            this.boardElement.appendChild(cell);
                        }
                    }
                }

                initializeUnits() {
                    this.units = [
                        new Unit(2, 7, 'blue'),
                        new Unit(5, 7, 'blue'),
                        new Unit(2, 0, 'red'),
                        new Unit(5, 0, 'red')
                    ];
                    this.renderUnits();
                }

                renderUnits() {
                    // 기존 유닛 제거
                    document.querySelectorAll('.unit').forEach(unit => unit.remove());
                    
                    this.units.forEach(unit => {
                        if (unit.isAlive()) {
                            const unitElement = document.createElement('div');
                            unitElement.className = `unit ${unit.team}`;
                            unitElement.textContent = unit.team === 'blue' ? 'B' : 'R';
                            unitElement.dataset.x = unit.x;
                            unitElement.dataset.y = unit.y;
                            
                            const cell = this.getCellAt(unit.x, unit.y);
                            cell.appendChild(unitElement);
                        }
                    });
                }

                getCellAt(x, y) {
                    return document.querySelector(`[data-x="${x}"][data-y="${y}"]`);
                }

                getUnitAt(x, y) {
                    return this.units.find(unit => unit.x === x && unit.y === y && unit.isAlive());
                }

                clearHighlights() {
                    document.querySelectorAll('.game-cell').forEach(cell => {
                        cell.classList.remove('move-highlight', 'attack-highlight', 'selected');
                    });
                    document.querySelectorAll('.unit').forEach(unit => {
                        unit.classList.remove('selected');
                    });
                }

                highlightValidMoves(unit) {
                    for (let dx = -unit.moveRange; dx <= unit.moveRange; dx++) {
                        for (let dy = -unit.moveRange; dy <= unit.moveRange; dy++) {
                            const newX = unit.x + dx;
                            const newY = unit.y + dy;
                            
                            if (Math.abs(dx) + Math.abs(dy) <= unit.moveRange && 
                                newX >= 0 && newX < GAME_CONFIG.BOARD_SIZE &&
                                newY >= 0 && newY < GAME_CONFIG.BOARD_SIZE &&
                                !this.getUnitAt(newX, newY)) {
                                
                                const cell = this.getCellAt(newX, newY);
                                cell.classList.add('move-highlight');
                            }
                        }
                    }
                }

                highlightValidAttacks(unit) {
                    const directions = [{x: 0, y: 1}, {x: 0, y: -1}, {x: 1, y: 0}, {x: -1, y: 0}];
                    
                    directions.forEach(dir => {
                        const targetX = unit.x + dir.x;
                        const targetY = unit.y + dir.y;
                        
                        if (targetX >= 0 && targetX < GAME_CONFIG.BOARD_SIZE &&
                            targetY >= 0 && targetY < GAME_CONFIG.BOARD_SIZE) {
                            
                            const targetUnit = this.getUnitAt(targetX, targetY);
                            if (targetUnit && targetUnit.team !== unit.team) {
                                const cell = this.getCellAt(targetX, targetY);
                                cell.classList.add('attack-highlight');
                            }
                        }
                    });
                }

                selectUnit(unit) {
                    this.clearHighlights();
                    this.selectedUnit = unit;
                    
                    const unitElement = document.querySelector(`[data-x="${unit.x}"][data-y="${unit.y}"] .unit`);
                    if (unitElement) {
                        unitElement.classList.add('selected');
                    }
                    
                    const cell = this.getCellAt(unit.x, unit.y);
                    cell.classList.add('selected');
                    
                    this.highlightValidMoves(unit);
                    this.highlightValidAttacks(unit);
                }
            }

            // 메인 게임 클래스
            class Game {
                constructor() {
                    this.board = new GameBoard();
                    this.currentTeam = 'blue';
                    this.gameState = 'playing';
                    
                    this.initializeElements();
                    this.initializeEventListeners();
                    this.updateUI();
                }

                initializeElements() {
                    this.mainScreen = document.getElementById('main-screen');
                    this.gameScreen = document.getElementById('game-screen');
                    this.resultScreen = document.getElementById('result-screen');
                    this.currentTurnElement = document.getElementById('current-turn');
                    this.gameMessageElement = document.getElementById('game-message');
                    this.unitInfoPanel = document.getElementById('selected-unit-info');
                    this.moveButton = document.getElementById('move-button');
                    this.attackButton = document.getElementById('attack-button');
                    this.endTurnButton = document.getElementById('end-turn-button');
                }

                initializeEventListeners() {
                    // 게임 시작 버튼
                    document.getElementById('start-button').addEventListener('click', () => {
                        this.showScreen('game');
                    });

                    // 다시 시작 버튼
                    document.getElementById('restart-button').addEventListener('click', () => {
                        this.startNewGame();
                    });

                    // 보드 클릭 이벤트
                    this.board.boardElement.addEventListener('click', (e) => {
                        this.handleBoardClick(e);
                    });

                    // 액션 버튼들
                    this.moveButton.addEventListener('click', () => {
                        this.board.gameMode = 'move';
                        this.updateGameMessage('이동할 위치를 선택하세요');
                    });

                    this.attackButton.addEventListener('click', () => {
                        this.board.gameMode = 'attack';
                        this.updateGameMessage('공격할 적을 선택하세요');
                    });

                    this.endTurnButton.addEventListener('click', () => {
                        this.endTurn();
                    });
                }

                handleBoardClick(e) {
                    if (this.gameState !== 'playing') return;

                    const cell = e.target.closest('.game-cell');
                    if (!cell) return;

                    const x = parseInt(cell.dataset.x);
                    const y = parseInt(cell.dataset.y);
                    const clickedUnit = this.board.getUnitAt(x, y);

                    if (this.board.gameMode === 'select') {
                        if (clickedUnit && clickedUnit.team === this.currentTeam && clickedUnit.canAct()) {
                            this.board.selectUnit(clickedUnit);
                            this.updateUnitInfo(clickedUnit);
                            this.updateActionButtons(clickedUnit);
                            this.updateGameMessage(`${clickedUnit.team} 유닛을 선택했습니다. 행동을 선택하세요.`);
                        }
                    } else if (this.board.gameMode === 'move') {
                        if (cell.classList.contains('move-highlight')) {
                            this.moveUnit(this.board.selectedUnit, x, y);
                        }
                    } else if (this.board.gameMode === 'attack') {
                        if (cell.classList.contains('attack-highlight')) {
                            const targetUnit = this.board.getUnitAt(x, y);
                            if (targetUnit) {
                                this.attackUnit(this.board.selectedUnit, targetUnit);
                            }
                        }
                    }
                }

                moveUnit(unit, targetX, targetY) {
                    unit.x = targetX;
                    unit.y = targetY;
                    unit.hasMoved = true;
                    
                    this.board.renderUnits();
                    this.board.clearHighlights();
                    this.board.gameMode = 'select';
                    this.board.selectedUnit = null;
                    
                    this.updateGameMessage(`${unit.team} 유닛이 이동했습니다.`);
                    this.hideUnitInfo();
                    this.endTurn();
                }

                attackUnit(attacker, target) {
                    target.takeDamage(attacker.attackPower);
                    attacker.hasAttacked = true;
                    
                    // 공격 애니메이션
                    const attackerElement = document.querySelector(`[data-x="${attacker.x}"][data-y="${attacker.y}"] .unit`);
                    if (attackerElement) {
                        attackerElement.classList.add('attacking');
                        setTimeout(() => attackerElement.classList.remove('attacking'), 200);
                    }

                    const targetElement = document.querySelector(`[data-x="${target.x}"][data-y="${target.y}"] .unit`);
                    if (targetElement) {
                        targetElement.classList.add('damaged');
                        setTimeout(() => targetElement.classList.remove('damaged'), 500);
                    }

                    if (target.isAlive()) {
                        this.updateGameMessage(`${attacker.team} 유닛이 ${target.team} 유닛을 공격했습니다! (HP: ${target.hp})`);
                    } else {
                        this.updateGameMessage(`${attacker.team} 유닛이 ${target.team} 유닛을 격파했습니다!`);
                    }

                    this.board.renderUnits();
                    this.board.clearHighlights();
                    this.board.gameMode = 'select';
                    this.board.selectedUnit = null;
                    
                    this.hideUnitInfo();
                    
                    if (this.checkWinCondition()) {
                        return;
                    }
                    
                    this.endTurn();
                }

                endTurn() {
                    this.currentTeam = this.currentTeam === 'blue' ? 'red' : 'blue';
                    
                    this.board.units.forEach(unit => {
                        if (unit.team === this.currentTeam) {
                            unit.resetTurn();
                        }
                    });
                    
                    this.board.clearHighlights();
                    this.board.selectedUnit = null;
                    this.board.gameMode = 'select';
                    this.hideUnitInfo();
                    this.updateUI();
                }

                checkWinCondition() {
                    const blueUnits = this.board.units.filter(unit => unit.team === 'blue' && unit.isAlive());
                    const redUnits = this.board.units.filter(unit => unit.team === 'red' && unit.isAlive());
                    
                    if (blueUnits.length === 0) {
                        this.endGame('red');
                        return true;
                    } else if (redUnits.length === 0) {
                        this.endGame('blue');
                        return true;
                    }
                    return false;
                }

                endGame(winner) {
                    this.gameState = winner + '_wins';
                    const victoryMessage = document.getElementById('victory-message');
                    victoryMessage.textContent = `${winner === 'blue' ? 'Blue' : 'Red'} Team Wins!`;
                    victoryMessage.className = `victory-message ${winner}-wins`;
                    
                    setTimeout(() => {
                        this.showScreen('result');
                    }, 2000);
                }

                startNewGame() {
                    this.board = new GameBoard();
                    this.currentTeam = 'blue';
                    this.gameState = 'playing';
                    this.showScreen('game');
                    this.updateUI();
                }

                showScreen(screen) {
                    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
                    
                    if (screen === 'main') {
                        this.mainScreen.classList.add('active');
                    } else if (screen === 'game') {
                        this.gameScreen.classList.add('active');
                    } else if (screen === 'result') {
                        this.resultScreen.classList.add('active');
                    }
                }

                updateUI() {
                    this.currentTurnElement.textContent = `${this.currentTeam === 'blue' ? 'Blue' : 'Red'} Team Turn`;
                    this.currentTurnElement.style.color = this.currentTeam === 'blue' ? '#3498DB' : '#E74C3C';
                    this.updateGameMessage('유닛을 선택하세요');
                }

                updateGameMessage(message) {
                    this.gameMessageElement.textContent = message;
                }

                updateUnitInfo(unit) {
                    document.getElementById('unit-team').textContent = unit.team.toUpperCase();
                    document.getElementById('unit-hp').textContent = `${unit.hp}/${unit.maxHp}`;
                    document.getElementById('unit-attack').textContent = unit.attackPower;
                    this.unitInfoPanel.classList.remove('hidden');
                }

                hideUnitInfo() {
                    this.unitInfoPanel.classList.add('hidden');
                }

                updateActionButtons(unit) {
                    // 이동 가능 여부 체크
                    const canMove = !unit.hasMoved && this.hasValidMoves(unit);
                    this.moveButton.classList.toggle('disabled', !canMove);
                    
                    // 공격 가능 여부 체크
                    const canAttack = !unit.hasAttacked && this.hasValidAttacks(unit);
                    this.attackButton.classList.toggle('disabled', !canAttack);
                }

                hasValidMoves(unit) {
                    for (let dx = -unit.moveRange; dx <= unit.moveRange; dx++) {
                        for (let dy = -unit.moveRange; dy <= unit.moveRange; dy++) {
                            const newX = unit.x + dx;
                            const newY = unit.y + dy;
                            
                            if (Math.abs(dx) + Math.abs(dy) <= unit.moveRange && 
                                newX >= 0 && newX < GAME_CONFIG.BOARD_SIZE &&
                                newY >= 0 && newY < GAME_CONFIG.BOARD_SIZE &&
                                !this.board.getUnitAt(newX, newY)) {
                                return true;
                            }
                        }
                    }
                    return false;
                }

                hasValidAttacks(unit) {
                    const directions = [{x: 0, y: 1}, {x: 0, y: -1}, {x: 1, y: 0}, {x: -1, y: 0}];
                    
                    return directions.some(dir => {
                        const targetX = unit.x + dir.x;
                        const targetY = unit.y + dir.y;
                        
                        if (targetX >= 0 && targetX < GAME_CONFIG.BOARD_SIZE &&
                            targetY >= 0 && targetY < GAME_CONFIG.BOARD_SIZE) {
                            
                            const targetUnit = this.board.getUnitAt(targetX, targetY);
                            return targetUnit && targetUnit.team !== unit.team;
                        }
                        return false;
                    });
                }
            }

            // 게임 시작
            document.addEventListener('DOMContentLoaded', () => {
                new Game();
            });

        })();
    </script>
</body>
</html>
