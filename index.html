<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Memory Flip - 기억력 카드 매칭 게임</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      /* CSS 커스텀 속성 (변수) 정의 */
      :root {
        /* 색상 팔레트 */
        --primary-pink: #ff6b9d;
        --primary-mint: #4ecdc4;
        --secondary-blue: #45b7d1;
        --secondary-green: #96ceb4;
        --background-light: #f8f9fa;
        --text-dark: #2c3e50;
        --text-light: #ffffff;
        --shadow-light: rgba(0, 0, 0, 0.1);
        --shadow-medium: rgba(0, 0, 0, 0.15);
        --shadow-heavy: rgba(0, 0, 0, 0.3);

        /* 그라데이션 */
        --gradient-primary: linear-gradient(
          135deg,
          var(--primary-pink),
          var(--primary-mint)
        );
        --gradient-secondary: linear-gradient(
          135deg,
          var(--secondary-blue),
          var(--secondary-green)
        );
        --gradient-success: linear-gradient(135deg, #4caf50, #8bc34a);
        --gradient-warning: linear-gradient(135deg, #ff9800, #ffc107);
        --gradient-danger: linear-gradient(135deg, #f44336, #e91e63);

        /* 애니메이션 타이밍 */
        --transition-fast: 0.2s ease;
        --transition-medium: 0.4s ease;
        --transition-slow: 0.6s ease;
        --bounce: cubic-bezier(0.68, -0.55, 0.265, 1.55);
        --ease-out-back: cubic-bezier(0.34, 1.56, 0.64, 1);

        /* 크기 단위 */
        --border-radius: 12px;
        --border-radius-large: 20px;
        --spacing-xs: 8px;
        --spacing-sm: 16px;
        --spacing-md: 24px;
        --spacing-lg: 32px;
        --spacing-xl: 48px;

        /* 카드 크기 (동적으로 조정됨) */
        --card-size: 80px;
      }

      /* 전역 스타일 */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Nunito", sans-serif;
        background: var(--gradient-primary);
        color: var(--text-dark);
        overflow: hidden;
        height: 100vh;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
      }

      /* 게임 컨테이너 */
      .game-container {
        width: 100vw;
        height: 100vh;
        position: relative;
        display: flex;
        flex-direction: column;
        padding: var(--spacing-md);
      }

      /* 메인 메뉴 스타일 */
      .main-menu {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100%;
        text-align: center;
        max-width: 600px;
        margin: 0 auto;
        width: 100%;
      }

      .game-title {
        font-size: clamp(2.5rem, 8vw, 4rem);
        font-weight: 800;
        margin-bottom: var(--spacing-sm);
        background: var(--gradient-primary);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        animation: bounce 2s infinite;
      }

      .game-subtitle {
        font-size: clamp(1rem, 3vw, 1.25rem);
        color: var(--text-dark);
        opacity: 0.8;
        margin-bottom: var(--spacing-xl);
      }

      /* 난이도 버튼들 */
      .difficulty-buttons {
        display: flex;
        flex-direction: column;
        gap: var(--spacing-md);
        margin-bottom: var(--spacing-xl);
        width: 100%;
      }

      .difficulty-btn {
        background: white;
        border: none;
        border-radius: var(--border-radius-large);
        padding: var(--spacing-md);
        box-shadow: 0 8px 25px var(--shadow-light);
        cursor: pointer;
        transition: all var(--transition-medium);
        text-align: center;
        min-height: 80px;
        font-size: 1.2rem;
        font-weight: 600;
        color: var(--text-dark);
      }

      .difficulty-btn:hover {
        transform: translateY(-5px);
        box-shadow: 0 15px 35px var(--shadow-medium);
      }

      .difficulty-btn:active {
        transform: translateY(-2px);
      }

      /* 최고 기록 섹션 */
      .high-scores {
        background: rgba(255, 255, 255, 0.9);
        border-radius: var(--border-radius-large);
        padding: var(--spacing-md);
        margin-bottom: var(--spacing-lg);
        box-shadow: 0 8px 25px var(--shadow-light);
        width: 100%;
      }

      .high-scores h3 {
        font-size: 1.25rem;
        font-weight: 700;
        margin-bottom: var(--spacing-sm);
        color: var(--text-dark);
      }

      .score-list {
        display: flex;
        flex-direction: column;
        gap: var(--spacing-xs);
      }

      .high-score-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .difficulty-name {
        font-size: 0.9rem;
        font-weight: 600;
        color: var(--text-dark);
        opacity: 0.7;
      }

      .score-value {
        font-size: 1.1rem;
        font-weight: 700;
        color: var(--primary-pink);
      }

      /* 도움말 버튼 */
      .help-btn {
        background: rgba(255, 255, 255, 0.9);
        border: none;
        border-radius: var(--border-radius);
        padding: var(--spacing-sm) var(--spacing-md);
        font-size: 1rem;
        font-weight: 600;
        color: var(--text-dark);
        cursor: pointer;
        transition: all var(--transition-fast);
      }

      .help-btn:hover {
        background: white;
        transform: translateY(-2px);
      }

      /* 게임 헤더 */
      .game-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: rgba(255, 255, 255, 0.95);
        border-radius: var(--border-radius-large);
        padding: var(--spacing-sm) var(--spacing-md);
        margin-bottom: var(--spacing-md);
        box-shadow: 0 4px 15px var(--shadow-light);
        backdrop-filter: blur(10px);
      }

      .score-board,
      .timer,
      .combo-counter {
        display: flex;
        flex-direction: column;
        align-items: center;
        flex: 1;
        font-weight: 600;
        font-size: 0.9rem;
      }

      .score,
      .time,
      .combo {
        font-size: 1.2rem;
        font-weight: 700;
        color: var(--primary-pink);
      }

      /* 콤보 활성화 상태 */
      .combo-counter.combo-active {
        animation: comboGlow 0.5s ease;
      }

      /* 게임 보드 */
      .game-board {
        flex: 1;
        display: flex;
        justify-content: center;
        align-items: center;
        margin-bottom: var(--spacing-md);
      }

      /* 카드 그리드 */
      .card-grid {
        display: grid;
        gap: clamp(4px, 1vw, 12px);
        max-width: min(90vw, 90vh);
        max-height: min(90vw, 60vh);
        aspect-ratio: 1;
      }

      /* 카드 스타일 */
      .memory-card {
        width: var(--card-size);
        height: var(--card-size);
        perspective: 1000px;
        cursor: pointer;
        position: relative;
        border-radius: var(--border-radius);
        min-height: 44px;
        min-width: 44px;
      }

      .memory-card:hover {
        transform: scale(1.05);
      }

      .memory-card:focus {
        outline: 2px solid var(--primary-pink);
        outline-offset: 2px;
      }

      .card-inner {
        position: relative;
        width: 100%;
        height: 100%;
        text-align: center;
        transition: transform var(--transition-slow);
        transform-style: preserve-3d;
      }

      .memory-card.flipped .card-inner {
        transform: rotateY(180deg);
      }

      .memory-card.matched {
        animation: matchSuccess 0.6s var(--bounce);
      }

      .card-front,
      .card-back {
        position: absolute;
        width: 100%;
        height: 100%;
        backface-visibility: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: clamp(1rem, 4vw, 2.5rem);
        border-radius: var(--border-radius);
        box-shadow: 0 4px 8px var(--shadow-light);
      }

      .card-front {
        background: var(--gradient-primary);
        color: white;
        font-weight: 700;
      }

      .card-back {
        background: white;
        transform: rotateY(180deg);
      }

      /* 게임 컨트롤 버튼들 */
      .game-controls {
        display: flex;
        justify-content: center;
        gap: var(--spacing-sm);
        flex-wrap: wrap;
      }

      .control-btn {
        background: rgba(255, 255, 255, 0.9);
        border: none;
        border-radius: var(--border-radius);
        padding: var(--spacing-sm) var(--spacing-md);
        font-size: 0.9rem;
        font-weight: 600;
        color: var(--text-dark);
        cursor: pointer;
        transition: all var(--transition-fast);
        min-height: 44px;
      }

      .control-btn:hover {
        background: white;
        transform: translateY(-2px);
        box-shadow: 0 4px 12px var(--shadow-light);
      }

      /* 파티클 컨테이너 */
      .particle-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 1000;
      }

      .particle {
        position: absolute;
        font-size: 1.5rem;
        pointer-events: none;
      }

      /* 모달 오버레이 */
      .modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(5px);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 2000;
        opacity: 1;
        visibility: visible;
        transition: all var(--transition-medium);
      }

      .modal-overlay.hidden {
        opacity: 0;
        visibility: hidden;
      }

      /* 모달 공통 스타일 */
      .modal {
        background: white;
        border-radius: var(--border-radius-large);
        box-shadow: 0 20px 60px var(--shadow-heavy);
        max-width: 90vw;
        max-height: 90vh;
        overflow-y: auto;
        transform: scale(1) translateY(0);
        transition: all var(--transition-medium);
      }

      .modal-content {
        padding: var(--spacing-xl);
        text-align: center;
      }

      /* 결과 모달 */
      .result-title {
        font-size: 2rem;
        font-weight: 700;
        margin-bottom: var(--spacing-lg);
        color: var(--text-dark);
      }

      .new-record {
        background: var(--gradient-success);
        color: white;
        padding: var(--spacing-sm) var(--spacing-md);
        border-radius: var(--border-radius);
        margin-bottom: var(--spacing-lg);
        font-weight: 600;
        animation: newRecordGlow 1s ease infinite alternate;
      }

      .result-stats {
        display: flex;
        flex-direction: column;
        gap: var(--spacing-sm);
        margin-bottom: var(--spacing-lg);
        padding: var(--spacing-md);
        background: var(--background-light);
        border-radius: var(--border-radius);
      }

      .stat {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .stat-label {
        font-weight: 600;
        color: var(--text-dark);
        opacity: 0.8;
      }

      .stat-value {
        font-weight: 700;
        font-size: 1.1rem;
        color: var(--primary-pink);
      }

      .modal-buttons {
        display: flex;
        flex-direction: column;
        gap: var(--spacing-sm);
      }

      .modal-btn {
        border: none;
        border-radius: var(--border-radius);
        padding: var(--spacing-sm) var(--spacing-md);
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: all var(--transition-fast);
        min-height: 48px;
      }

      .modal-btn.restart-btn,
      .modal-btn.resume-btn {
        background: var(--gradient-primary);
        color: white;
      }

      .modal-btn.difficulty-btn,
      .modal-btn.menu-btn,
      .modal-btn.close-btn {
        background: var(--background-light);
        color: var(--text-dark);
      }

      .modal-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 12px var(--shadow-light);
      }

      /* 도움말 모달 */
      .help-content {
        text-align: left;
        display: flex;
        flex-direction: column;
        gap: var(--spacing-lg);
      }

      .help-content h3 {
        font-size: 1.2rem;
        font-weight: 700;
        margin-bottom: var(--spacing-sm);
        color: var(--primary-pink);
      }

      .help-content ul {
        list-style: none;
        padding-left: 0;
      }

      .help-content li {
        padding: var(--spacing-xs) 0;
        color: var(--text-dark);
        opacity: 0.9;
        line-height: 1.6;
      }

      .help-content li::before {
        content: "• ";
        color: var(--primary-mint);
        font-weight: bold;
        margin-right: var(--spacing-xs);
      }

      /* 유틸리티 클래스 */
      .hidden {
        display: none !important;
      }

      /* 키프레임 애니메이션 */
      @keyframes bounce {
        0%,
        20%,
        50%,
        80%,
        100% {
          transform: translateY(0);
        }
        40% {
          transform: translateY(-10px);
        }
        60% {
          transform: translateY(-5px);
        }
      }

      @keyframes comboGlow {
        0% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.1);
          box-shadow: 0 0 20px var(--primary-pink);
        }
        100% {
          transform: scale(1);
        }
      }

      @keyframes matchSuccess {
        0% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.2);
          box-shadow: 0 0 20px var(--primary-mint);
        }
        100% {
          transform: scale(1.1);
        }
      }

      @keyframes newRecordGlow {
        0% {
          box-shadow: 0 0 10px rgba(76, 175, 80, 0.5);
        }
        100% {
          box-shadow: 0 0 20px rgba(76, 175, 80, 0.8);
        }
      }

      /* 반응형 디자인 */
      @media (max-width: 768px) {
        :root {
          --spacing-xs: 6px;
          --spacing-sm: 12px;
          --spacing-md: 18px;
          --spacing-lg: 24px;
          --spacing-xl: 36px;
        }

        .game-header {
          flex-direction: column;
          gap: var(--spacing-xs);
          padding: var(--spacing-xs) var(--spacing-sm);
        }

        .score-board,
        .timer,
        .combo-counter {
          font-size: 0.8rem;
        }

        .difficulty-btn {
          padding: var(--spacing-sm);
          min-height: 70px;
          font-size: 1rem;
        }

        .game-controls {
          gap: var(--spacing-xs);
        }

        .control-btn {
          padding: var(--spacing-xs) var(--spacing-sm);
          font-size: 0.8rem;
        }

        .modal-content {
          padding: var(--spacing-lg);
        }
      }

      @media (max-width: 480px) {
        .card-grid {
          gap: clamp(2px, 0.5vw, 6px);
        }

        .game-header {
          flex-direction: row;
          justify-content: space-around;
        }

        .score-board,
        .timer,
        .combo-counter {
          font-size: 0.7rem;
        }
      }

      /* 터치 디바이스 최적화 */
      @media (hover: none) {
        .memory-card:hover {
          transform: none;
        }

        .difficulty-btn:hover,
        .control-btn:hover,
        .modal-btn:hover {
          transform: none;
          box-shadow: initial;
        }
      }
    </style>
  </head>
  <body>
    <div class="game-container">
      <!-- 게임 내용이 JavaScript에 의해 동적으로 생성됩니다 -->
    </div>

    <script>
      // Memory Flip 게임 메인 로직
      class MemoryGame {
        constructor() {
          this.gameState = "MENU"; // MENU, PLAYING, PAUSED, GAMEOVER
          this.difficulty = "easy";
          this.gridSize = { easy: 4, normal: 6, hard: 8 };
          this.timeLimit = { easy: 120, normal: 180, hard: 240 };
          this.difficultyMultiplier = { easy: 1, normal: 1.5, hard: 2 };

          // 게임 데이터
          this.cards = [];
          this.flippedCards = [];
          this.matchedPairs = 0;
          this.totalPairs = 0;
          this.score = 0;
          this.combo = 0;
          this.maxCombo = 0;
          this.timeLeft = 0;
          this.gameTimer = null;
          this.flipTimeout = null;

          // 이모지 배열 (미리 정의로 성능 최적화)
          this.emojiSet = [
            "🐶",
            "🐱",
            "🐭",
            "🐹",
            "🐰",
            "🦊",
            "🐻",
            "🐼",
            "🐨",
            "🐯",
            "🦁",
            "🐮",
            "🐷",
            "🐸",
            "🐵",
            "🐔",
            "🦄",
            "🐝",
            "🐛",
            "🦋",
            "🐌",
            "🐞",
            "🐢",
            "🐠",
            "🌸",
            "🌺",
            "🌻",
            "🌷",
            "🌹",
            "💖",
            "⭐",
            "🌙",
          ];

          // 파티클 시스템
          this.particlePool = [];
          this.activeParticles = [];

          // DOM 요소
          this.gameContainer = null;
          this.cardGrid = null;
          this.particleContainer = null;
          this.modalOverlay = null;

          this.init();
        }

        // 게임 초기화
        init() {
          this.setupDOM();
          this.setupEventListeners();
          this.showMainMenu();
          this.initParticlePool();
        }

        // DOM 요소 설정
        setupDOM() {
          this.gameContainer = document.querySelector(".game-container");

          if (!this.gameContainer) {
            console.error("게임 컨테이너를 찾을 수 없습니다.");
            return;
          }
        }

        // 이벤트 리스너 설정
        setupEventListeners() {
          // 키보드 접근성
          document.addEventListener("keydown", (e) => {
            if (e.key === "Escape" && this.gameState === "PLAYING") {
              this.pauseGame();
            }
          });

          // 창 크기 변경 시 반응형 레이아웃 재계산
          window.addEventListener(
            "resize",
            this.debounce(() => {
              if (this.gameState === "PLAYING") {
                this.adjustCardLayout();
              }
            }, 250),
          );

          // 페이지 가시성 변경 (백그라운드 탭 처리)
          document.addEventListener("visibilitychange", () => {
            if (document.hidden && this.gameState === "PLAYING") {
              this.pauseGame();
            }
          });
        }

        // 메인 메뉴 표시
        showMainMenu() {
          this.gameState = "MENU";
          const menuHTML = `
                    <div class="main-menu">
                        <h1 class="game-title">🧠 Memory Flip 🎯</h1>
                        <p class="game-subtitle">기억력 카드 매칭 게임</p>
                        <div class="difficulty-buttons">
                            <button class="difficulty-btn" data-difficulty="easy">
                                🌟 Easy (4x4)<br><small>120초</small>
                            </button>
                            <button class="difficulty-btn" data-difficulty="normal">
                                ⚡ Normal (6x6)<br><small>180초</small>
                            </button>
                            <button class="difficulty-btn" data-difficulty="hard">
                                🔥 Hard (8x8)<br><small>240초</small>
                            </button>
                        </div>
                        <div class="high-scores">
                            <h3>🏆 최고 기록</h3>
                            <div class="score-list"></div>
                        </div>
                        <button class="help-btn">❓ 게임 설명</button>
                    </div>
                `;

          this.gameContainer.innerHTML = menuHTML;
          this.displayHighScores();

          // 난이도 선택 이벤트
          document.querySelectorAll(".difficulty-btn").forEach((btn) => {
            btn.addEventListener("click", (e) => {
              this.difficulty = e.currentTarget.dataset.difficulty;
              this.startNewGame();
            });
          });

          // 도움말 버튼
          document.querySelector(".help-btn")?.addEventListener("click", () => {
            this.showHelpModal();
          });
        }

        // 새 게임 시작
        startNewGame() {
          this.gameState = "PLAYING";
          this.resetGameData();
          this.setupGameBoard();
          this.createCards();
          this.startTimer();
          this.updateUI();
        }

        // 게임 데이터 초기화
        resetGameData() {
          const size = this.gridSize[this.difficulty];
          this.totalPairs = (size * size) / 2;
          this.matchedPairs = 0;
          this.score = 0;
          this.combo = 0;
          this.maxCombo = 0;
          this.timeLeft = this.timeLimit[this.difficulty];
          this.flippedCards = [];
          this.cards = [];

          if (this.gameTimer) {
            clearInterval(this.gameTimer);
          }
          if (this.flipTimeout) {
            clearTimeout(this.flipTimeout);
          }
        }

        // 게임 보드 설정
        setupGameBoard() {
          const gameHTML = `
                    <header class="game-header">
                        <div class="score-board">💎 점수: <span class="score">0</span></div>
                        <div class="timer">⏰ 시간: <span class="time">0</span></div>
                        <div class="combo-counter">🔥 콤보: <span class="combo">0</span></div>
                    </header>
                    <main class="game-board">
                        <div class="card-grid"></div>
                    </main>
                    <footer class="game-controls">
                        <button class="control-btn pause-btn">⏸️ 일시정지</button>
                        <button class="control-btn restart-btn">🔄 재시작</button>
                        <button class="control-btn menu-btn">🏠 메인으로</button>
                    </footer>
                    <div class="particle-container"></div>
                `;

          this.gameContainer.innerHTML = gameHTML;

          // DOM 요소 재설정
          this.cardGrid = document.querySelector(".card-grid");
          this.particleContainer = document.querySelector(
            ".particle-container",
          );

          // 컨트롤 버튼 이벤트
          document
            .querySelector(".pause-btn")
            ?.addEventListener("click", () => this.pauseGame());
          document
            .querySelector(".restart-btn")
            ?.addEventListener("click", () => this.startNewGame());
          document
            .querySelector(".menu-btn")
            ?.addEventListener("click", () => this.showMainMenu());

          // 그리드 크기 설정
          const size = this.gridSize[this.difficulty];
          this.cardGrid.style.gridTemplateColumns = `repeat(${size}, 1fr)`;
          this.cardGrid.style.gridTemplateRows = `repeat(${size}, 1fr)`;
        }

        // 카드 생성 및 배치
        createCards() {
          const size = this.gridSize[this.difficulty];
          const totalCards = size * size;
          const pairCount = totalCards / 2;

          // 필요한 이모지 선택
          const selectedEmojis = this.shuffleArray([...this.emojiSet]).slice(
            0,
            pairCount,
          );

          // 카드 쌍 생성
          const cardData = [];
          selectedEmojis.forEach((emoji) => {
            cardData.push(emoji, emoji); // 각 이모지를 2개씩
          });

          // 카드 섞기
          this.cards = this.shuffleArray(cardData);

          // DOM에 카드 생성
          this.cardGrid.innerHTML = "";
          this.cards.forEach((emoji, index) => {
            const cardElement = this.createCardElement(emoji, index);
            this.cardGrid.appendChild(cardElement);
          });

          this.adjustCardLayout();
        }

        // 개별 카드 요소 생성
        createCardElement(emoji, index) {
          const card = document.createElement("div");
          card.className = "memory-card";
          card.dataset.index = index;
          card.dataset.emoji = emoji;
          card.setAttribute("tabindex", "0");
          card.setAttribute("role", "button");
          card.setAttribute("aria-label", `카드 ${index + 1}`);

          card.innerHTML = `
                    <div class="card-inner">
                        <div class="card-front">?</div>
                        <div class="card-back">${emoji}</div>
                    </div>
                `;

          // 카드 클릭 이벤트 (터치/마우스 통합)
          const handleCardInteraction = (e) => {
            e.preventDefault();
            if (
              this.gameState === "PLAYING" &&
              !card.classList.contains("flipped") &&
              !card.classList.contains("matched") &&
              this.flippedCards.length < 2
            ) {
              this.flipCard(card);
            }
          };

          card.addEventListener("click", handleCardInteraction);
          card.addEventListener("touchend", handleCardInteraction);

          // 키보드 접근성
          card.addEventListener("keydown", (e) => {
            if (e.key === "Enter" || e.key === " ") {
              e.preventDefault();
              handleCardInteraction(e);
            }
          });

          return card;
        }

        // 카드 뒤집기
        flipCard(cardElement) {
          if (
            cardElement.classList.contains("flipped") ||
            cardElement.classList.contains("matched") ||
            this.flippedCards.length >= 2
          ) {
            return;
          }

          cardElement.classList.add("flipped");
          this.flippedCards.push(cardElement);

          // 효과음 재생
          this.playSound("flip");

          if (this.flippedCards.length === 2) {
            this.flipTimeout = setTimeout(() => {
              this.checkMatch();
            }, 600); // 카드 뒤집기 애니메이션 완료 후
          }
        }

        // 매칭 확인
        checkMatch() {
          const [card1, card2] = this.flippedCards;
          const emoji1 = card1.dataset.emoji;
          const emoji2 = card2.dataset.emoji;

          if (emoji1 === emoji2) {
            // 매칭 성공
            this.handleMatchSuccess(card1, card2);
          } else {
            // 매칭 실패
            this.handleMatchFailure(card1, card2);
          }

          this.flippedCards = [];
        }

        // 매칭 성공 처리
        handleMatchSuccess(card1, card2) {
          card1.classList.add("matched");
          card2.classList.add("matched");

          this.matchedPairs++;
          this.combo++;
          this.maxCombo = Math.max(this.maxCombo, this.combo);

          // 점수 계산
          const baseScore = 100;
          const comboBonus = Math.min(this.combo * 0.5, 3); // 최대 3배
          const difficultyBonus = this.difficultyMultiplier[this.difficulty];
          const points = Math.floor(
            baseScore * (1 + comboBonus) * difficultyBonus,
          );

          this.score += points;

          // 파티클 효과 생성
          const rect1 = card1.getBoundingClientRect();
          const rect2 = card2.getBoundingClientRect();
          this.createParticles(
            rect1.left + rect1.width / 2,
            rect1.top + rect1.height / 2,
          );
          this.createParticles(
            rect2.left + rect2.width / 2,
            rect2.top + rect2.height / 2,
          );

          // 효과음
          this.playSound("match");

          // UI 업데이트
          this.updateUI();

          // 게임 완료 확인
          if (this.matchedPairs === this.totalPairs) {
            setTimeout(() => this.gameComplete(), 1000);
          }
        }

        // 매칭 실패 처리
        handleMatchFailure(card1, card2) {
          this.combo = 0; // 콤보 리셋

          setTimeout(() => {
            card1.classList.remove("flipped");
            card2.classList.remove("flipped");
          }, 1000);

          // 효과음
          this.playSound("miss");

          this.updateUI();
        }

        // 타이머 시작
        startTimer() {
          this.gameTimer = setInterval(() => {
            this.timeLeft--;
            this.updateUI();

            if (this.timeLeft <= 0) {
              this.gameOver();
            }
          }, 1000);
        }

        // UI 업데이트
        updateUI() {
          const scoreElement = document.querySelector(".score");
          const timeElement = document.querySelector(".time");
          const comboElement = document.querySelector(".combo");
          const comboCounter = document.querySelector(".combo-counter");

          if (scoreElement)
            scoreElement.textContent = this.score.toLocaleString();
          if (timeElement) timeElement.textContent = this.timeLeft;
          if (comboElement) comboElement.textContent = this.combo;

          // 콤보 강조 효과
          if (comboCounter) {
            if (this.combo > 1) {
              comboCounter.classList.add("combo-active");
            } else {
              comboCounter.classList.remove("combo-active");
            }
          }
        }

        // 게임 완료
        gameComplete() {
          this.gameState = "GAMEOVER";
          clearInterval(this.gameTimer);

          // 시간 보너스 계산
          const timeBonus = this.timeLeft * 10;
          this.score += timeBonus;

          // 최고 기록 확인 및 저장
          const isNewRecord = this.saveHighScore();

          this.showResultModal(true, isNewRecord);
          this.playSound("win");
        }

        // 게임 오버
        gameOver() {
          this.gameState = "GAMEOVER";
          clearInterval(this.gameTimer);
          this.showResultModal(false, false);
          this.playSound("lose");
        }

        // 게임 일시정지
        pauseGame() {
          if (this.gameState === "PLAYING") {
            this.gameState = "PAUSED";
            clearInterval(this.gameTimer);
            this.showPauseModal();
          }
        }

        // 게임 재개
        resumeGame() {
          if (this.gameState === "PAUSED") {
            this.gameState = "PLAYING";
            this.startTimer();
            this.hideModal();
          }
        }

        // 결과 모달 표시
        showResultModal(isWin, isNewRecord) {
          const resultHTML = `
                    <div class="modal result-modal">
                        <div class="modal-content">
                            <h2 class="result-title">${isWin ? "🎉 게임 클리어!" : "😢 시간 초과"}</h2>
                            ${isNewRecord ? '<p class="new-record">🏆 새로운 최고 기록!</p>' : ""}
                            <div class="result-stats">
                                <div class="stat">
                                    <span class="stat-label">최종 점수:</span>
                                    <span class="stat-value">${this.score.toLocaleString()}</span>
                                </div>
                                <div class="stat">
                                    <span class="stat-label">최대 콤보:</span>
                                    <span class="stat-value">${this.maxCombo}</span>
                                </div>
                                <div class="stat">
                                    <span class="stat-label">매칭 완료:</span>
                                    <span class="stat-value">${this.matchedPairs}/${this.totalPairs}</span>
                                </div>
                            </div>
                            <div class="modal-buttons">
                                <button class="modal-btn restart-btn">🔄 다시 시작</button>
                                <button class="modal-btn difficulty-btn">⚙️ 난이도 변경</button>
                                <button class="modal-btn menu-btn">🏠 메인으로</button>
                            </div>
                        </div>
                    </div>
                `;

          this.showModal(resultHTML);

          // 버튼 이벤트
          this.modalOverlay
            .querySelector(".restart-btn")
            ?.addEventListener("click", () => {
              this.hideModal();
              this.startNewGame();
            });

          this.modalOverlay
            .querySelector(".difficulty-btn")
            ?.addEventListener("click", () => {
              this.hideModal();
              this.showMainMenu();
            });

          this.modalOverlay
            .querySelector(".menu-btn")
            ?.addEventListener("click", () => {
              this.hideModal();
              this.showMainMenu();
            });
        }

        // 일시정지 모달 표시
        showPauseModal() {
          const pauseHTML = `
                    <div class="modal pause-modal">
                        <div class="modal-content">
                            <h2>⏸️ 게임 일시정지</h2>
                            <p>게임이 일시정지되었습니다.</p>
                            <div class="modal-buttons">
                                <button class="modal-btn resume-btn">▶️ 계속하기</button>
                                <button class="modal-btn restart-btn">🔄 재시작</button>
                                <button class="modal-btn menu-btn">🏠 메인으로</button>
                            </div>
                        </div>
                    </div>
                `;

          this.showModal(pauseHTML);

          // 버튼 이벤트
          this.modalOverlay
            .querySelector(".resume-btn")
            ?.addEventListener("click", () => {
              this.resumeGame();
            });

          this.modalOverlay
            .querySelector(".restart-btn")
            ?.addEventListener("click", () => {
              this.hideModal();
              this.startNewGame();
            });

          this.modalOverlay
            .querySelector(".menu-btn")
            ?.addEventListener("click", () => {
              this.hideModal();
              this.showMainMenu();
            });
        }

        // 도움말 모달 표시
        showHelpModal() {
          const helpHTML = `
                    <div class="modal help-modal">
                        <div class="modal-content">
                            <h2>🎮 게임 설명</h2>
                            <div class="help-content">
                                <div>
                                    <h3>🎯 게임 목표</h3>
                                    <p>제한 시간 내에 모든 카드 쌍을 찾아 매칭하세요!</p>
                                </div>
                                <div>
                                    <h3>🕹️ 조작 방법</h3>
                                    <ul>
                                        <li>카드를 클릭하여 뒤집기</li>
                                        <li>같은 이모지 2장을 찾아 매칭</li>
                                        <li>틀리면 1초 후 자동으로 뒤집힘</li>
                                    </ul>
                                </div>
                                <div>
                                    <h3>💎 점수 시스템</h3>
                                    <ul>
                                        <li>기본 매칭: 100점</li>
                                        <li>연속 매칭 콤보: 최대 3배 보너스</li>
                                        <li>시간 보너스: 남은 시간 × 10점</li>
                                        <li>난이도 보너스: Easy(1배), Normal(1.5배), Hard(2배)</li>
                                    </ul>
                                </div>
                            </div>
                            <div class="modal-buttons">
                                <button class="modal-btn close-btn">✖️ 닫기</button>
                            </div>
                        </div>
                    </div>
                `;

          this.showModal(helpHTML);

          this.modalOverlay
            .querySelector(".close-btn")
            ?.addEventListener("click", () => {
              this.hideModal();
            });
        }

        // 모달 표시
        showModal(html) {
          // 모달 오버레이가 없으면 생성
          if (!this.modalOverlay) {
            this.modalOverlay = document.createElement("div");
            this.modalOverlay.className = "modal-overlay hidden";
            document.body.appendChild(this.modalOverlay);
          }

          this.modalOverlay.innerHTML = html;
          this.modalOverlay.classList.remove("hidden");

          // ESC 키로 모달 닫기
          const escHandler = (e) => {
            if (e.key === "Escape") {
              this.hideModal();
              document.removeEventListener("keydown", escHandler);
            }
          };
          document.addEventListener("keydown", escHandler);

          // 배경 클릭으로 모달 닫기 (일시정지 모달 제외)
          this.modalOverlay.addEventListener("click", (e) => {
            if (e.target === this.modalOverlay && this.gameState !== "PAUSED") {
              this.hideModal();
            }
          });
        }

        // 모달 숨기기
        hideModal() {
          if (this.modalOverlay) {
            this.modalOverlay.classList.add("hidden");
            this.modalOverlay.innerHTML = "";
          }
        }

        // 파티클 시스템 초기화
        initParticlePool() {
          for (let i = 0; i < 50; i++) {
            const particle = document.createElement("div");
            particle.className = "particle";
            particle.innerHTML = ["💖", "⭐", "✨", "🌟"][
              Math.floor(Math.random() * 4)
            ];
            this.particlePool.push(particle);
          }
        }

        // 파티클 생성
        createParticles(x, y) {
          if (!this.particleContainer) return;

          const particleCount = 8;

          for (let i = 0; i < particleCount; i++) {
            const particle = this.getParticleFromPool();
            if (!particle) continue;

            // 파티클 위치 및 애니메이션 설정
            const angle = (360 / particleCount) * i;
            const distance = 50 + Math.random() * 50;
            const duration = 1500 + Math.random() * 1000;

            particle.style.left = x + "px";
            particle.style.top = y + "px";
            particle.style.opacity = "1";
            particle.style.transform = "scale(1)";

            this.particleContainer.appendChild(particle);
            this.activeParticles.push(particle);

            // 애니메이션 실행
            const endX = x + Math.cos((angle * Math.PI) / 180) * distance;
            const endY = y + Math.sin((angle * Math.PI) / 180) * distance - 100;

            particle.animate(
              [
                {
                  transform: "translate(0, 0) scale(1)",
                  opacity: 1,
                },
                {
                  transform: `translate(${endX - x}px, ${endY - y}px) scale(0)`,
                  opacity: 0,
                },
              ],
              {
                duration: duration,
                easing: "cubic-bezier(0.25, 0.46, 0.45, 0.94)",
              },
            ).onfinish = () => {
              this.returnParticleToPool(particle);
            };
          }
        }

        // 파티클 풀에서 가져오기
        getParticleFromPool() {
          return this.particlePool.pop();
        }

        // 파티클 풀로 반환
        returnParticleToPool(particle) {
          if (particle && particle.parentNode) {
            particle.remove();
          }
          this.activeParticles = this.activeParticles.filter(
            (p) => p !== particle,
          );
          if (particle) {
            this.particlePool.push(particle);
          }
        }

        // 최고 기록 저장
        saveHighScore() {
          try {
            const scores = this.getHighScores();
            const newScore = {
              score: this.score,
              difficulty: this.difficulty,
              maxCombo: this.maxCombo,
              date: new Date().toISOString(),
            };

            scores[this.difficulty].push(newScore);
            scores[this.difficulty].sort((a, b) => b.score - a.score);
            scores[this.difficulty] = scores[this.difficulty].slice(0, 5); // 상위 5개만 저장

            localStorage.setItem("memoryFlipScores", JSON.stringify(scores));

            // 새 기록인지 확인
            return scores[this.difficulty][0].score === this.score;
          } catch (error) {
            console.error("최고 기록 저장 실패:", error);
            return false;
          }
        }

        // 최고 기록 로드
        getHighScores() {
          try {
            const saved = localStorage.getItem("memoryFlipScores");
            return saved
              ? JSON.parse(saved)
              : {
                  easy: [],
                  normal: [],
                  hard: [],
                };
          } catch (error) {
            console.error("최고 기록 로드 실패:", error);
            return { easy: [], normal: [], hard: [] };
          }
        }

        // 최고 기록 표시
        displayHighScores() {
          const scores = this.getHighScores();
          const scoreList = document.querySelector(".score-list");

          if (!scoreList) return;

          let html = "";
          ["easy", "normal", "hard"].forEach((difficulty) => {
            const difficultyName = {
              easy: "Easy",
              normal: "Normal",
              hard: "Hard",
            }[difficulty];
            const topScore = scores[difficulty][0];

            html += `
                        <div class="high-score-item">
                            <span class="difficulty-name">${difficultyName}:</span>
                            <span class="score-value">${topScore ? topScore.score.toLocaleString() : "-"}</span>
                        </div>
                    `;
          });

          scoreList.innerHTML = html;
        }

        // 카드 레이아웃 조정 (반응형)
        adjustCardLayout() {
          if (!this.cardGrid || !this.gameContainer) return;

          const containerWidth = this.gameContainer.clientWidth;
          const containerHeight = window.innerHeight * 0.6;
          const size = this.gridSize[this.difficulty];

          const maxCardSize = Math.min(
            (containerWidth - 40) / size,
            (containerHeight - 40) / size,
          );

          const cardSize = Math.max(Math.min(maxCardSize, 120), 60);

          document.documentElement.style.setProperty(
            "--card-size",
            cardSize + "px",
          );
        }

        // 배열 섞기 (Fisher-Yates 알고리즘)
        shuffleArray(array) {
          const shuffled = [...array];
          for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
          }
          return shuffled;
        }

        // 디바운스 함수
        debounce(func, wait) {
          let timeout;
          return function executedFunction(...args) {
            const later = () => {
              clearTimeout(timeout);
              func(...args);
            };
            clearTimeout(timeout);
            timeout = setTimeout(later, wait);
          };
        }

        // 간단한 사운드 효과 (Web Audio API)
        playSound(type) {
          try {
            const audioContext = new (
              window.AudioContext || window.webkitAudioContext
            )();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);

            // 사운드 타입별 주파수 설정
            const frequencies = {
              flip: 800,
              match: 1200,
              miss: 400,
              win: 1600,
              lose: 200,
            };

            oscillator.frequency.setValueAtTime(
              frequencies[type] || 600,
              audioContext.currentTime,
            );
            oscillator.type = "sine";

            // 볼륨 조절
            gainNode.gain.setValueAtTime(0.1, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(
              0.01,
              audioContext.currentTime + 0.3,
            );

            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.3);
          } catch (error) {
            // 사운드 재생 실패는 게임에 영향주지 않음
            console.warn("사운드 재생 실패:", error);
          }
        }
      }

      // 게임 인스턴스 생성 및 시작
      document.addEventListener("DOMContentLoaded", () => {
        window.memoryGame = new MemoryGame();
      });

      // 전역 에러 핸들링
      window.addEventListener("error", (e) => {
        console.error("게임 오류 발생:", e.error);
      });
    </script>
  </body>
</html>
