<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>리뉴얼 갤러그</title>
    <style>
        :root {
            --bg-space: #000014;
            --player-color: #00FF41;
            --enemy-color: #FF4136;
            --missile-color: #FFDC00;
            --ui-color: #FFFFFF;
            --neon-glow: 0 0 10px currentColor;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: var(--bg-space);
            color: var(--ui-color);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        #game-container {
            position: relative;
            width: 100%;
            max-width: 800px;
            height: 600px;
            background: linear-gradient(180deg, #000014 0%, #000028 100%);
            border: 2px solid var(--player-color);
            box-shadow: 0 0 20px var(--player-color);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #game-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            z-index: 1;
        }

        #main-menu {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 20, 0.95);
            z-index: 10;
        }

        .game-title {
            font-size: 3rem;
            font-weight: bold;
            color: var(--player-color);
            text-shadow: var(--neon-glow);
            margin-bottom: 2rem;
            animation: titleGlow 2s ease-in-out infinite alternate;
        }

        @keyframes titleGlow {
            from { text-shadow: 0 0 10px var(--player-color); }
            to { text-shadow: 0 0 25px var(--player-color), 0 0 35px var(--player-color); }
        }

        .high-score {
            font-size: 1.2rem;
            margin-bottom: 3rem;
            color: var(--missile-color);
        }

        #start-button, #restart-button {
            padding: 15px 30px;
            font-size: 1.5rem;
            font-family: inherit;
            background: transparent;
            color: var(--ui-color);
            border: 2px solid var(--player-color);
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #start-button:hover, #restart-button:hover {
            background: var(--player-color);
            color: var(--bg-space);
            box-shadow: var(--neon-glow);
            transform: scale(1.05);
        }

        #game-hud {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        #score-display {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--ui-color);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        #kill-count-display {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--missile-color);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        #level-display {
            position: absolute;
            top: 60px;
            right: 20px;
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--player-color);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        #lives-display {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
        }

        .life-icon {
            width: 20px;
            height: 15px;
            background: var(--player-color);
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
            box-shadow: 0 0 5px var(--player-color);
        }

        #game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(255, 65, 54, 0.9);
            z-index: 15;
            animation: gameOverSlide 0.5s ease-in-out;
        }

        @keyframes gameOverSlide {
            from {
                opacity: 0;
                transform: translateY(-100%);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .game-over-title {
            font-size: 4rem;
            font-weight: bold;
            color: var(--ui-color);
            text-shadow: 0 0 20px #FF4136;
            margin-bottom: 2rem;
            animation: gameOverGlow 1s ease-in-out infinite alternate;
        }

        @keyframes gameOverGlow {
            from { text-shadow: 0 0 20px #FF4136; }
            to { text-shadow: 0 0 40px #FF4136, 0 0 60px #FF4136; }
        }

        .final-stats {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 3rem;
            font-size: 1.5rem;
            gap: 10px;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            width: 300px;
            padding: 10px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--ui-color);
        }

        .buttons-container {
            display: flex;
            gap: 20px;
        }

        .main-menu-btn {
            padding: 15px 30px;
            font-size: 1.2rem;
            font-family: inherit;
            background: transparent;
            color: var(--ui-color);
            border: 2px solid var(--ui-color);
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .main-menu-btn:hover {
            background: var(--ui-color);
            color: var(--bg-space);
            transform: scale(1.05);
        }

        @media (max-width: 850px) {
            #game-container {
                width: 95vw;
                height: 71.25vw;
                max-height: 90vh;
            }
            
            .game-title {
                font-size: 2rem;
            }
            
            .game-over-title {
                font-size: 2.5rem;
            }
            
            #score-display, #kill-count-display {
                font-size: 1.2rem;
            }
            
            .final-stats {
                font-size: 1.2rem;
            }
            
            .stat-item {
                width: 250px;
            }
        }

        @media (max-width: 480px) {
            .game-title {
                font-size: 1.5rem;
            }
            
            .game-over-title {
                font-size: 2rem;
            }
            
            #start-button, #restart-button, .main-menu-btn {
                padding: 10px 20px;
                font-size: 1rem;
            }
            
            #score-display, #kill-count-display {
                font-size: 1rem;
                top: 10px;
            }
            
            #score-display {
                left: 10px;
            }
            
            #kill-count-display {
                right: 10px;
            }
            
            .life-icon {
                width: 15px;
                height: 12px;
            }
            
            .stat-item {
                width: 200px;
                font-size: 1rem;
            }
        }

        .hidden {
            display: none !important;
        }

        .show {
            display: flex !important;
        }

        .game-start {
            animation: fadeOut 0.5s ease-in-out forwards;
        }

        @keyframes fadeOut {
            from {
                opacity: 1;
            }
            to {
                opacity: 0;
                visibility: hidden;
            }
        }

        #game-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(1px 1px at 20px 30px, #fff, transparent),
                radial-gradient(1px 1px at 40px 70px, rgba(255,255,255,0.8), transparent),
                radial-gradient(1px 1px at 90px 40px, rgba(255,255,255,0.6), transparent),
                radial-gradient(1px 1px at 130px 80px, rgba(255,255,255,0.4), transparent),
                radial-gradient(1px 1px at 160px 30px, rgba(255,255,255,0.7), transparent);
            background-repeat: repeat;
            background-size: 200px 100px;
            animation: stars 20s linear infinite;
            z-index: 0;
        }

        @keyframes stars {
            from {
                transform: translateY(0);
            }
            to {
                transform: translateY(100px);
            }
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="main-menu">
            <h1 class="game-title">GALLAG RENEWAL</h1>
            <div class="high-score">HIGH SCORE: <span id="high-score-display">0</span></div>
            <button id="start-button">START GAME</button>
        </div>

        <canvas id="game-canvas" width="800" height="600"></canvas>

        <div id="game-hud" class="hidden">
            <div id="score-display">SCORE: <span id="score-value">0</span></div>
            <div id="kill-count-display">KILLS: <span id="kill-count-value">0</span></div>
            <div id="level-display">LEVEL: <span id="level-value">1</span></div>
            <div id="lives-display">
                <div class="life-icon"></div>
                <div class="life-icon"></div>
                <div class="life-icon"></div>
            </div>
        </div>

        <div id="game-over-screen">
            <h1 class="game-over-title">GAME OVER</h1>
            <div class="final-stats">
                <div class="stat-item">
                    <span>Final Score:</span>
                    <span id="final-score-display">0</span>
                </div>
                <div class="stat-item">
                    <span>Total Kills:</span>
                    <span id="final-kills-display">0</span>
                </div>
                <div class="stat-item">
                    <span>Level Reached:</span>
                    <span id="final-level-display">1</span>
                </div>
            </div>
            <div class="buttons-container">
                <button id="restart-button">RESTART</button>
                <button class="main-menu-btn" id="main-menu-button">MAIN MENU</button>
            </div>
        </div>
    </div>

    <script>
        const GAME_STATES = {
            MENU: 'MENU',
            PLAYING: 'PLAYING',
            GAME_OVER: 'GAME_OVER',
            PAUSED: 'PAUSED'
        };

        const GAME_CONFIG = {
            CANVAS_WIDTH: 800,
            CANVAS_HEIGHT: 600,
            PLAYER_SPEED: 5,
            MISSILE_SPEED: 8,
            ENEMY_SPAWN_RATE: 1000,
            SHOT_COOLDOWN: 200,
            KILLS_FOR_NEW_SHIP: 10,
            KILLS_FOR_LEVEL_UP: 20,
            MAX_SHIPS: 3,
            SCORE_PER_KILL: 100,
            COMBO_BONUS: 10
        };

        const gameState = {
            currentState: GAME_STATES.MENU,
            isGameRunning: false,
            isGameOver: false,
            isPaused: false,
            score: 0,
            killCount: 0,
            lives: 3,
            level: 1,
            combo: 0,
            highScore: parseInt(localStorage.getItem('gallagaHighScore') || '0'),
            playerShips: [
                { x: 400, y: 550, width: 20, height: 15, isActive: true }
            ],
            enemies: [],
            playerMissiles: [],
            enemyMissiles: [],
            canvasWidth: 800,
            canvasHeight: 600,
            gameSpeed: 1,
            lastEnemySpawn: 0,
            enemySpawnRate: 1000,
            lastShotTime: 0,
            shotCooldown: 200
        };

        const keys = {
            left: false,
            right: false,
            up: false,
            down: false,
            space: false
        };

        let canvas, ctx;

        function initGame() {
            try {
                canvas = document.getElementById('game-canvas');
                if (!canvas) {
                    throw new Error('Canvas 요소를 찾을 수 없습니다.');
                }
                
                ctx = canvas.getContext('2d');
                if (!ctx) {
                    throw new Error('Canvas Context를 가져올 수 없습니다.');
                }
                
                canvas.width = gameState.canvasWidth;
                canvas.height = gameState.canvasHeight;
                
                setupEventListeners();
                updateUI();
                gameLoop();
                
                console.log('게임 초기화 완료');
            } catch (error) {
                console.error('게임 초기화 중 오류:', error);
            }
        }

        function setupEventListeners() {
            try {
                document.addEventListener('keydown', handleKeyDown);
                document.addEventListener('keyup', handleKeyUp);
                
                const startButton = document.getElementById('start-button');
                if (startButton) {
                    startButton.addEventListener('click', handleStartGame);
                }
                
                const restartButton = document.getElementById('restart-button');
                if (restartButton) {
                    restartButton.addEventListener('click', handleRestartGame);
                }
                
                const mainMenuButton = document.getElementById('main-menu-button');
                if (mainMenuButton) {
                    mainMenuButton.addEventListener('click', handleMainMenu);
                }
                
                setupTouchControls();
            } catch (error) {
                console.error('이벤트 리스너 설정 중 오류:', error);
            }
        }

        function setupTouchControls() {
            let touchStartX = 0;
            let touchStartY = 0;
            let isTouching = false;

            document.addEventListener('touchstart', function(event) {
                if (gameState.currentState !== GAME_STATES.PLAYING) return;
                
                touchStartX = event.touches[0].clientX;
                touchStartY = event.touches[0].clientY;
                isTouching = true;
                event.preventDefault();
            }, { passive: false });

            document.addEventListener('touchmove', function(event) {
                if (gameState.currentState !== GAME_STATES.PLAYING || !isTouching) return;
                
                const touchX = event.touches[0].clientX;
                const touchY = event.touches[0].clientY;
                const deltaX = touchX - touchStartX;
                const deltaY = touchY - touchStartY;
                
                const threshold = 30;
                
                keys.left = deltaX < -threshold;
                keys.right = deltaX > threshold;
                keys.up = deltaY < -threshold;
                keys.down = deltaY > threshold;
                
                event.preventDefault();
            }, { passive: false });

            document.addEventListener('touchend', function(event) {
                if (gameState.currentState !== GAME_STATES.PLAYING) return;
                
                keys.left = false;
                keys.right = false;
                keys.up = false;
                keys.down = false;
                keys.space = true;
                
                setTimeout(() => {
                    keys.space = false;
                }, 100);
                
                isTouching = false;
                event.preventDefault();
            }, { passive: false });
        }

        function handleStartGame() {
            try {
                gameState.currentState = GAME_STATES.PLAYING;
                gameState.isGameRunning = true;
                gameState.isGameOver = false;
                resetGameState();
                updateUI();
            } catch (error) {
                console.error('게임 시작 중 오류:', error);
            }
        }

        function handleRestartGame() {
            handleStartGame();
        }

        function handleMainMenu() {
            try {
                gameState.currentState = GAME_STATES.MENU;
                gameState.isGameRunning = false;
                gameState.isGameOver = false;
                updateUI();
            } catch (error) {
                console.error('메인 메뉴 이동 중 오류:', error);
            }
        }

        function resetGameState() {
            gameState.score = 0;
            gameState.killCount = 0;
            gameState.lives = 3;
            gameState.level = 1;
            gameState.combo = 0;
            
            gameState.playerShips = [
                { x: 400, y: 550, width: 20, height: 15, isActive: true }
            ];
            
            gameState.enemies = [];
            gameState.playerMissiles = [];
            gameState.enemyMissiles = [];
            
            gameState.lastEnemySpawn = 0;
            gameState.lastShotTime = 0;
            gameState.enemySpawnRate = 1000;
        }

        function handleKeyDown(event) {
            try {
                switch(event.code) {
                    case 'KeyW':
                    case 'ArrowUp':
                        keys.up = true;
                        event.preventDefault();
                        break;
                    case 'KeyS':
                    case 'ArrowDown':
                        keys.down = true;
                        event.preventDefault();
                        break;
                    case 'KeyA':
                    case 'ArrowLeft':
                        keys.left = true;
                        event.preventDefault();
                        break;
                    case 'KeyD':
                    case 'ArrowRight':
                        keys.right = true;
                        event.preventDefault();
                        break;
                    case 'Space':
                        keys.space = true;
                        event.preventDefault();
                        break;
                    case 'Escape':
                        if (gameState.currentState === GAME_STATES.PLAYING) {
                            togglePause();
                        }
                        break;
                }
            } catch (error) {
                console.error('키 입력 처리 중 오류:', error);
            }
        }

        function handleKeyUp(event) {
            try {
                switch(event.code) {
                    case 'KeyW':
                    case 'ArrowUp':
                        keys.up = false;
                        break;
                    case 'KeyS':
                    case 'ArrowDown':
                        keys.down = false;
                        break;
                    case 'KeyA':
                    case 'ArrowLeft':
                        keys.left = false;
                        break;
                    case 'KeyD':
                    case 'ArrowRight':
                        keys.right = false;
                        break;
                    case 'Space':
                        keys.space = false;
                        break;
                }
            } catch (error) {
                console.error('키 해제 처리 중 오류:', error);
            }
        }

        function togglePause() {
            gameState.isPaused = !gameState.isPaused;
            if (gameState.isPaused) {
                gameState.currentState = GAME_STATES.PAUSED;
            } else {
                gameState.currentState = GAME_STATES.PLAYING;
            }
        }

        function updateGameState() {
            try {
                if (gameState.currentState !== GAME_STATES.PLAYING) return;
                
                const currentTime = Date.now();
                
                updatePlayerMovement();
                handlePlayerShooting(currentTime);
                spawnEnemies(currentTime);
                updatePlayerMissiles();
                updateEnemies();
                updateEnemyMissiles();
                checkCollisions();
                cleanupObjects();
                checkGameOver();
                updateHUD();
            } catch (error) {
                console.error('게임 상태 업데이트 중 오류:', error);
            }
        }

        function updatePlayerMovement() {
            const speed = 5;
            
            gameState.playerShips.forEach(ship => {
                if (!ship.isActive) return;
                
                if (keys.left && ship.x > ship.width / 2) {
                    ship.x -= speed;
                }
                if (keys.right && ship.x < gameState.canvasWidth - ship.width / 2) {
                    ship.x += speed;
                }
                if (keys.up && ship.y > ship.height / 2) {
                    ship.y -= speed;
                }
                if (keys.down && ship.y < gameState.canvasHeight - ship.height / 2) {
                    ship.y += speed;
                }
            });
        }

        function handlePlayerShooting(currentTime) {
            if (keys.space && currentTime - gameState.lastShotTime > gameState.shotCooldown) {
                gameState.playerShips.forEach(ship => {
                    if (ship.isActive) {
                        gameState.playerMissiles.push({
                            x: ship.x,
                            y: ship.y - ship.height / 2,
                            width: 4,
                            height: 8,
                            speed: 8
                        });
                    }
                });
                gameState.lastShotTime = currentTime;
            }
        }

        function spawnEnemies(currentTime) {
            const adjustedSpawnRate = Math.max(500, gameState.enemySpawnRate - (gameState.level * 50));
            
            if (currentTime - gameState.lastEnemySpawn > adjustedSpawnRate) {
                const enemyX = Math.random() * (gameState.canvasWidth - 36) + 18;
                gameState.enemies.push({
                    x: enemyX,
                    y: -12,
                    width: 18,
                    height: 12,
                    speed: 2 + Math.random() * 2 + (gameState.level * 0.5),
                    health: 1
                });
                gameState.lastEnemySpawn = currentTime;
            }
        }

        function updatePlayerMissiles() {
            for (let i = gameState.playerMissiles.length - 1; i >= 0; i--) {
                const missile = gameState.playerMissiles[i];
                missile.y -= missile.speed;
                
                if (missile.y < -missile.height) {
                    gameState.playerMissiles.splice(i, 1);
                }
            }
        }

        function updateEnemies() {
            for (let i = gameState.enemies.length - 1; i >= 0; i--) {
                const enemy = gameState.enemies[i];
                enemy.y += enemy.speed;
                
                if (enemy.y > gameState.canvasHeight + enemy.height) {
                    gameState.enemies.splice(i, 1);
                    gameState.combo = 0;
                }
            }
        }

        function updateEnemyMissiles() {
            for (let i = gameState.enemyMissiles.length - 1; i >= 0; i--) {
                const missile = gameState.enemyMissiles[i];
                missile.y += missile.speed;
                
                if (missile.y > gameState.canvasHeight + missile.height) {
                    gameState.enemyMissiles.splice(i, 1);
                }
            }
        }

        function checkCollisions() {
            for (let i = gameState.playerMissiles.length - 1; i >= 0; i--) {
                const missile = gameState.playerMissiles[i];
                
                for (let j = gameState.enemies.length - 1; j >= 0; j--) {
                    const enemy = gameState.enemies[j];
                    
                    if (isColliding(missile, enemy)) {
                        gameState.enemies.splice(j, 1);
                        gameState.playerMissiles.splice(i, 1);
                        
                        gameState.score += 100;
                        gameState.killCount++;
                        gameState.combo++;
                        
                        if (gameState.combo > 1) {
                            gameState.score += gameState.combo * 10;
                        }
                        
                        if (gameState.killCount % GAME_CONFIG.KILLS_FOR_NEW_SHIP === 0 && 
                            gameState.playerShips.length < GAME_CONFIG.MAX_SHIPS) {
                            const newShip = {
                                x: 400 + ((gameState.playerShips.length - 1) * 30),
                                y: 550,
                                width: 20,
                                height: 15,
                                isActive: true
                            };
                            gameState.playerShips.push(newShip);
                        }
                        
                        if (gameState.killCount % GAME_CONFIG.KILLS_FOR_LEVEL_UP === 0) {
                            gameState.level++;
                        }
                        
                        if (gameState.score > gameState.highScore) {
                            gameState.highScore = gameState.score;
                            localStorage.setItem('gallagaHighScore', gameState.highScore.toString());
                        }
                        break;
                    }
                }
            }
            
            for (let i = 0; i < gameState.playerShips.length; i++) {
                const ship = gameState.playerShips[i];
                if (!ship.isActive) continue;
                
                for (let j = gameState.enemies.length - 1; j >= 0; j--) {
                    const enemy = gameState.enemies[j];
                    
                    if (isColliding(ship, enemy)) {
                        ship.isActive = false;
                        gameState.enemies.splice(j, 1);
                        gameState.lives--;
                        gameState.combo = 0;
                        
                        const activeShips = gameState.playerShips.filter(s => s.isActive);
                        if (activeShips.length === 0 || gameState.lives <= 0) {
                            gameState.currentState = GAME_STATES.GAME_OVER;
                            gameState.isGameOver = true;
                            gameState.isGameRunning = false;
                            updateUI();
                        }
                        break;
                    }
                }
            }
        }

        function isColliding(obj1, obj2) {
            return obj1.x - obj1.width/2 < obj2.x + obj2.width/2 &&
                   obj1.x + obj1.width/2 > obj2.x - obj2.width/2 &&
                   obj1.y - obj1.height/2 < obj2.y + obj2.height/2 &&
                   obj1.y + obj1.height/2 > obj2.y - obj2.height/2;
        }

        function cleanupObjects() {
            gameState.playerMissiles = gameState.playerMissiles.filter(missile => 
                missile.y > -missile.height && missile.y < gameState.canvasHeight + missile.height
            );
            
            gameState.enemies = gameState.enemies.filter(enemy => 
                enemy.y > -enemy.height && enemy.y < gameState.canvasHeight + enemy.height
            );
            
            gameState.enemyMissiles = gameState.enemyMissiles.filter(missile => 
                missile.y > -missile.height && missile.y < gameState.canvasHeight + missile.height
            );
        }

        function checkGameOver() {
            const activeShips = gameState.playerShips.filter(ship => ship.isActive);
            if (activeShips.length === 0 || gameState.lives <= 0) {
                gameState.currentState = GAME_STATES.GAME_OVER;
                gameState.isGameOver = true;
                gameState.isGameRunning = false;
                updateUI();
            }
        }

        function updateHUD() {
            try {
                const scoreValue = document.getElementById('score-value');
                if (scoreValue) {
                    scoreValue.textContent = gameState.score.toLocaleString();
                }
                
                const killCountValue = document.getElementById('kill-count-value');
                if (killCountValue) {
                    killCountValue.textContent = gameState.killCount;
                }
                
                const levelValue = document.getElementById('level-value');
                if (levelValue) {
                    levelValue.textContent = gameState.level;
                }
                
                const livesDisplay = document.getElementById('lives-display');
                if (livesDisplay) {
                    const activeShips = gameState.playerShips.filter(ship => ship.isActive).length;
                    livesDisplay.innerHTML = '';
                    for (let i = 0; i < activeShips; i++) {
                        const lifeIcon = document.createElement('div');
                        lifeIcon.className = 'life-icon';
                        livesDisplay.appendChild(lifeIcon);
                    }
                }
            } catch (error) {
                console.error('HUD 업데이트 중 오류:', error);
            }
        }

        function updateUI() {
            try {
                const mainMenu = document.getElementById('main-menu');
                const gameHud = document.getElementById('game-hud');
                const gameOverScreen = document.getElementById('game-over-screen');
                
                if (mainMenu) mainMenu.style.display = 'none';
                if (gameHud) gameHud.classList.add('hidden');
                if (gameOverScreen) gameOverScreen.style.display = 'none';
                
                switch (gameState.currentState) {
                    case GAME_STATES.MENU:
                        if (mainMenu) {
                            mainMenu.style.display = 'flex';
                            const highScoreElement = document.getElementById('high-score-display');
                            if (highScoreElement) {
                                highScoreElement.textContent = gameState.highScore.toLocaleString();
                            }
                        }
                        break;
                    case GAME_STATES.PLAYING:
                    case GAME_STATES.PAUSED:
                        if (gameHud) gameHud.classList.remove('hidden');
                        break;
                    case GAME_STATES.GAME_OVER:
                        if (gameOverScreen) {
                            gameOverScreen.style.display = 'flex';
                            const finalScoreElement = document.getElementById('final-score-display');
                            if (finalScoreElement) {
                                finalScoreElement.textContent = gameState.score.toLocaleString();
                            }
                            const finalKillsElement = document.getElementById('final-kills-display');
                            if (finalKillsElement) {
                                finalKillsElement.textContent = gameState.killCount;
                            }
                            const finalLevelElement = document.getElementById('final-level-display');
                            if (finalLevelElement) {
                                finalLevelElement.textContent = gameState.level;
                            }
                        }
                        break;
                }
            } catch (error) {
                console.error('UI 업데이트 중 오류:', error);
            }
        }

        function renderGame() {
            try {
                if (!ctx) return;
                
                ctx.fillStyle = '#000014';
                ctx.fillRect(0, 0, gameState.canvasWidth, gameState.canvasHeight);
                
                if (gameState.currentState === GAME_STATES.PLAYING || gameState.currentState === GAME_STATES.PAUSED) {
                    renderStars();
                    renderPlayerShips();
                    renderPlayerMissiles();
                    renderEnemies();
                    renderEnemyMissiles();
                    
                    if (gameState.currentState === GAME_STATES.PAUSED) {
                        renderPauseOverlay();
                    }
                } else if (gameState.currentState === GAME_STATES.MENU) {
                    renderMenuBackground();
                }
            } catch (error) {
                console.error('렌더링 중 오류:', error);
            }
        }

        function renderStars() {
            ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
            for (let i = 0; i < 100; i++) {
                const x = (i * 137) % gameState.canvasWidth;
                const y = (i * 73 + Date.now() * 0.02) % gameState.canvasHeight;
                const size = Math.sin(Date.now() * 0.001 + i) * 0.5 + 1;
                ctx.fillRect(x, y, size, size);
            }
        }

        function renderPlayerShips() {
            gameState.playerShips.forEach(ship => {
                if (!ship.isActive) return;
                
                ctx.fillStyle = '#00FF41';
                ctx.shadowColor = '#00FF41';
                ctx.shadowBlur = 5;
                
                ctx.beginPath();
                ctx.moveTo(ship.x, ship.y - ship.height / 2);
                ctx.lineTo(ship.x - ship.width / 2, ship.y + ship.height / 2);
                ctx.lineTo(ship.x + ship.width / 2, ship.y + ship.height / 2);
                ctx.closePath();
                ctx.fill();
                
                ctx.shadowBlur = 0;
                
                ctx.fillStyle = '#40FF71';
                ctx.fillRect(ship.x - 2, ship.y + 3, 4, 3);
            });
        }

        function renderPlayerMissiles() {
            gameState.playerMissiles.forEach(missile => {
                ctx.fillStyle = '#FFDC00';
                ctx.shadowColor = '#FFDC00';
                ctx.shadowBlur = 3;
                
                ctx.beginPath();
                ctx.arc(missile.x, missile.y, missile.width / 2, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.shadowBlur = 0;
            });
        }

        function renderEnemies() {
            gameState.enemies.forEach(enemy => {
                ctx.fillStyle = '#FF4136';
                ctx.shadowColor = '#FF4136';
                ctx.shadowBlur = 3;
                
                ctx.beginPath();
                ctx.moveTo(enemy.x, enemy.y + enemy.height / 2);
                ctx.lineTo(enemy.x - enemy.width / 2, enemy.y - enemy.height / 2);
                ctx.lineTo(enemy.x + enemy.width / 2, enemy.y - enemy.height / 2);
                ctx.closePath();
                ctx.fill();
                
                ctx.shadowBlur = 0;
                
                ctx.fillStyle = '#FFFFFF';
                ctx.fillRect(enemy.x - 3, enemy.y - 2, 2, 2);
                ctx.fillRect(enemy.x + 1, enemy.y - 2, 2, 2);
            });
        }

        function renderEnemyMissiles() {
            gameState.enemyMissiles.forEach(missile => {
                ctx.fillStyle = '#FF4136';
                ctx.shadowColor = '#FF4136';
                ctx.shadowBlur = 2;
                
                ctx.beginPath();
                ctx.arc(missile.x, missile.y, missile.width / 2, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.shadowBlur = 0;
            });
        }

        function renderPauseOverlay() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.fillRect(0, 0, gameState.canvasWidth, gameState.canvasHeight);
            
            ctx.fillStyle = '#FFFFFF';
            ctx.font = '48px "Courier New", monospace';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('PAUSED', gameState.canvasWidth / 2, gameState.canvasHeight / 2);
            
            ctx.font = '24px "Courier New", monospace';
            ctx.fillText('Press ESC to continue', gameState.canvasWidth / 2, gameState.canvasHeight / 2 + 50);
        }

        function renderMenuBackground() {
            renderStars();
        }

        function gameLoop() {
            try {
                updateGameState();
                renderGame();
                requestAnimationFrame(gameLoop);
            } catch (error) {
                console.error('게임 루프 중 오류:', error);
                setTimeout(() => {
                    requestAnimationFrame(gameLoop);
                }, 1000/60);
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            initGame();
        });

        window.addEventListener('error', function(event) {
            console.error('런타임 오류 발생:', event.error);
        });

        window.addEventListener('beforeunload', function() {
            try {
                if (gameState.score > gameState.highScore) {
                    localStorage.setItem('gallagaHighScore', gameState.score.toString());
                }
            } catch (error) {
                console.error('게임 종료 처리 중 오류:', error);
            }
        });
    </script>
</body>
</html>
