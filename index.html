<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>웹 두더지 게임</title>
    <style>
        :root {
            --bg-color: #2E8B57;
            --hole-color: #8B4513;
            --mole-color: #D2691E;
            --golden-mole-color: #FFD700;
            --text-color: #FFFFFF;
            --accent-color: #FF4500;
            --button-bg: #228B22;
            --button-hover: #32CD32;
            --shadow-dark: rgba(0, 0, 0, 0.3);
            --shadow-light: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Comic Sans MS', cursive, Arial, sans-serif;
            background: linear-gradient(135deg, var(--bg-color) 0%, #32CD32 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        #game-container {
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
        }

        .screen {
            display: none;
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 32px var(--shadow-dark);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .screen.active {
            display: block;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #main-menu {
            display: block;
        }

        #main-menu h1 {
            font-size: clamp(2rem, 5vw, 3.5rem);
            color: var(--text-color);
            text-shadow: 3px 3px 0px var(--shadow-dark);
            margin-bottom: 30px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-10px); }
            60% { transform: translateY(-5px); }
        }

        .best-score {
            font-size: 1.2rem;
            color: var(--accent-color);
            margin-bottom: 30px;
            font-weight: bold;
        }

        .game-button {
            background: var(--button-bg);
            color: var(--text-color);
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            font-family: inherit;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px var(--shadow-dark);
            transition: all 0.3s ease;
            margin: 10px;
            min-width: 150px;
        }

        .game-button:hover {
            background: var(--button-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px var(--shadow-dark);
        }

        .game-button:active {
            transform: translateY(0);
            box-shadow: 0 2px 10px var(--shadow-dark);
        }

        #game-screen {
            padding: 20px;
        }

        .hud {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .hud-item {
            background: rgba(0, 0, 0, 0.3);
            padding: 10px 20px;
            border-radius: 25px;
            color: var(--text-color);
            font-weight: bold;
            font-size: 1.1rem;
            min-width: 120px;
            text-align: center;
        }

        .hud-item.score {
            color: var(--accent-color);
            font-size: 1.3rem;
        }

        #game-board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            max-width: 500px;
            margin: 0 auto 30px auto;
            aspect-ratio: 1;
        }

        .hole-container {
            position: relative;
            background: var(--hole-color);
            border-radius: 50%;
            box-shadow: 
                inset 0 8px 16px rgba(0, 0, 0, 0.4),
                0 4px 8px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.1s ease;
        }

        .hole-container:active {
            transform: scale(0.95);
        }

        .mole {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%) translateY(100%);
            width: 80px;
            height: 60px;
            background: var(--mole-color);
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            transition: transform 0.2s ease-out;
            cursor: pointer;
            z-index: 2;
        }

        .mole.visible {
            transform: translateX(-50%) translateY(0);
            transition: transform 0.2s ease-out;
        }

        .mole::before {
            content: '';
            position: absolute;
            top: 15px;
            left: 20px;
            width: 8px;
            height: 8px;
            background: #000;
            border-radius: 50%;
            box-shadow: 20px 0 0 #000, 10px 15px 0 -2px #FF69B4;
        }

        .mole.golden {
            background: var(--golden-mole-color);
            width: 90px;
            height: 70px;
            animation: shimmer 1s infinite alternate;
        }

        .mole.golden::before {
            box-shadow: 24px 0 0 #000, 12px 18px 0 -2px #FF69B4;
        }

        @keyframes shimmer {
            0% { 
                box-shadow: 0 0 20px rgba(255, 215, 0, 0.8);
                filter: brightness(1);
            }
            100% { 
                box-shadow: 0 0 40px rgba(255, 215, 0, 1);
                filter: brightness(1.2);
            }
        }

        .mole.hit {
            animation: hitEffect 0.3s ease-out;
        }

        @keyframes hitEffect {
            0% { transform: translateX(-50%) translateY(0) scale(1); }
            50% { transform: translateX(-50%) translateY(-10px) scale(1.2); }
            100% { transform: translateX(-50%) translateY(100%) scale(0.8); }
        }

        #result-screen h2 {
            font-size: 2.5rem;
            color: var(--text-color);
            margin-bottom: 20px;
        }

        .final-score {
            font-size: 3rem;
            color: var(--accent-color);
            font-weight: bold;
            margin: 20px 0;
        }

        .new-record {
            color: var(--golden-mole-color);
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 20px;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .game-paused {
            opacity: 0.5;
            pointer-events: none;
        }

        .game-over {
            filter: grayscale(50%);
        }

        @keyframes scorePopup {
            0% { opacity: 1; transform: translateX(-50%) translateY(0); }
            100% { opacity: 0; transform: translateX(-50%) translateY(-50px); }
        }

        @media (max-width: 768px) {
            #game-container {
                padding: 10px;
            }

            .screen {
                padding: 20px;
                border-radius: 15px;
            }

            #main-menu h1 {
                font-size: 2.5rem;
                margin-bottom: 20px;
            }

            .hud {
                justify-content: center;
            }

            .hud-item {
                padding: 8px 15px;
                font-size: 1rem;
                min-width: 100px;
            }

            #game-board {
                gap: 15px;
                max-width: 350px;
            }

            .mole {
                width: 60px;
                height: 45px;
            }

            .mole.golden {
                width: 70px;
                height: 55px;
            }

            .game-button {
                padding: 12px 25px;
                font-size: 1rem;
                min-width: 120px;
            }
        }

        @media (max-width: 480px) {
            .screen {
                padding: 15px;
            }

            #main-menu h1 {
                font-size: 2rem;
            }

            #game-board {
                gap: 10px;
                max-width: 280px;
            }

            .mole {
                width: 50px;
                height: 38px;
            }

            .mole.golden {
                width: 60px;
                height: 46px;
            }

            .hud-item {
                padding: 6px 12px;
                font-size: 0.9rem;
                min-width: 90px;
            }
        }

        @media (max-width: 320px) {
            #game-container {
                padding: 5px;
            }

            .screen {
                padding: 10px;
            }

            #main-menu h1 {
                font-size: 1.8rem;
            }

            #game-board {
                gap: 8px;
                max-width: 250px;
            }

            .mole {
                width: 40px;
                height: 30px;
            }

            .mole.golden {
                width: 48px;
                height: 36px;
            }
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="main-menu" class="screen active">
            <h1>🎯 웹 두더지 게임</h1>
            <div class="best-score">
                🏆 최고 기록: <span id="best-score-display">0</span>점
            </div>
            <button id="start-button" class="game-button">게임 시작</button>
            <div style="margin-top: 20px; color: var(--text-color); font-size: 0.9rem;">
                <p>일반 두더지: 클릭 (10점)</p>
                <p>황금 두더지: 더블클릭 (50점)</p>
            </div>
        </div>

        <div id="game-screen" class="screen">
            <div class="hud">
                <div class="hud-item score">
                    점수: <span id="score-display">0</span>
                </div>
                <div class="hud-item">
                    시간: <span id="time-display">60</span>초
                </div>
                <div class="hud-item">
                    잡은 두더지: <span id="mole-count-display">0</span>마리
                </div>
            </div>

            <div id="game-board">
                <div class="hole-container" data-hole-index="0"></div>
                <div class="hole-container" data-hole-index="1"></div>
                <div class="hole-container" data-hole-index="2"></div>
                <div class="hole-container" data-hole-index="3"></div>
                <div class="hole-container" data-hole-index="4"></div>
                <div class="hole-container" data-hole-index="5"></div>
                <div class="hole-container" data-hole-index="6"></div>
                <div class="hole-container" data-hole-index="7"></div>
                <div class="hole-container" data-hole-index="8"></div>
            </div>

            <button id="pause-button" class="game-button">일시정지</button>
        </div>

        <div id="result-screen" class="screen">
            <h2>🎮 게임 종료!</h2>
            <div class="final-score" id="final-score-display">0</div>
            <div id="new-record-message" class="new-record" style="display: none;">
                🎉 새로운 기록입니다! 🎉
            </div>
            <div style="color: var(--text-color); margin: 20px 0;">
                <p>잡은 두더지: <span id="final-mole-count">0</span>마리</p>
                <p>게임 시간: 60초</p>
            </div>
            <button id="restart-button" class="game-button">다시 하기</button>
            <button id="menu-button" class="game-button">메인 메뉴</button>
        </div>
    </div>

    <script>
    (function() {
        'use strict';

        const gameState = {
            isPlaying: false,
            isPaused: false,
            isGameOver: false,
            score: 0,
            timeLeft: 60,
            molesCaught: 0,
            molesAppeared: 0,
            currentMoles: [],
            spawnTimer: null,
            gameTimer: null,
            spawnInterval: {min: 1500, max: 3000},
            moleLifetime: 1000,
            goldenMoleLifetime: 1500,
            goldenMoleThreshold: 10,
            lastClickTime: 0,
            doubleClickThreshold: 300
        };

        const domElements = {};
        let isInitialized = false;

        function initializeGame() {
            try {
                domElements.gameContainer = document.getElementById('game-container');
                domElements.mainMenu = document.getElementById('main-menu');
                domElements.gameScreen = document.getElementById('game-screen');
                domElements.resultScreen = document.getElementById('result-screen');
                domElements.scoreDisplay = document.getElementById('score-display');
                domElements.timeDisplay = document.getElementById('time-display');
                domElements.moleCountDisplay = document.getElementById('mole-count-display');
                domElements.gameBoard = document.getElementById('game-board');
                domElements.startButton = document.getElementById('start-button');
                domElements.pauseButton = document.getElementById('pause-button');
                domElements.restartButton = document.getElementById('restart-button');
                domElements.menuButton = document.getElementById('menu-button');
                domElements.bestScoreDisplay = document.getElementById('best-score-display');
                domElements.finalScoreDisplay = document.getElementById('final-score-display');
                domElements.newRecordMessage = document.getElementById('new-record-message');
                domElements.finalMoleCount = document.getElementById('final-mole-count');

                const requiredElements = ['gameContainer', 'mainMenu', 'gameScreen', 'gameBoard', 'startButton'];
                for (const element of requiredElements) {
                    if (!domElements[element]) {
                        throw new Error(`필수 DOM 요소를 찾을 수 없습니다: ${element}`);
                    }
                }

                domElements.holes = document.querySelectorAll('.hole-container');
                if (domElements.holes.length !== 9) {
                    throw new Error('9개의 구멍 컨테이너가 필요합니다.');
                }

                setupEventListeners();
                loadHighScore();
                isInitialized = true;
                console.log('게임 초기화 완료');

            } catch (error) {
                console.error('게임 초기화 실패:', error);
                alert('게임 초기화에 실패했습니다. 페이지를 새로고침해주세요.');
            }
        }

        function setupEventListeners() {
            if (domElements.startButton) {
                domElements.startButton.addEventListener('click', handleStartGame);
            }

            if (domElements.pauseButton) {
                domElements.pauseButton.addEventListener('click', handlePauseGame);
            }

            if (domElements.restartButton) {
                domElements.restartButton.addEventListener('click', handleRestartGame);
            }

            if (domElements.menuButton) {
                domElements.menuButton.addEventListener('click', handleReturnToMenu);
            }

            domElements.gameBoard.addEventListener('click', handleMoleClick);

            document.addEventListener('keydown', function(event) {
                if (event.code === 'Space') {
                    event.preventDefault();
                    if (gameState.isPlaying && !gameState.isGameOver) {
                        handlePauseGame();
                    }
                }
            });

            window.addEventListener('beforeunload', cleanup);
        }

        function handleStartGame() {
            try {
                gameState.isPlaying = true;
                gameState.isPaused = false;
                gameState.isGameOver = false;
                gameState.score = 0;
                gameState.timeLeft = 60;
                gameState.molesCaught = 0;
                gameState.molesAppeared = 0;
                gameState.currentMoles = [];

                hideAllScreens();
                domElements.gameScreen.style.display = 'block';

                updateScoreDisplay(gameState.score);
                updateTimeDisplay(gameState.timeLeft);
                updateMoleCountDisplay(gameState.molesCaught);

                startGameLoop();
                startMoleSpawning();

                console.log('게임 시작');

            } catch (error) {
                console.error('게임 시작 실패:', error);
                handleGameOver();
            }
        }

        function handlePauseGame() {
            try {
                if (gameState.isGameOver) return;

                gameState.isPaused = !gameState.isPaused;

                if (gameState.isPaused) {
                    clearTimeout(gameState.spawnTimer);
                    clearInterval(gameState.gameTimer);
                    domElements.gameContainer.classList.add('game-paused');
                    
                    if (domElements.pauseButton) {
                        domElements.pauseButton.textContent = '재개';
                    }

                } else {
                    domElements.gameContainer.classList.remove('game-paused');
                    startGameLoop();
                    startMoleSpawning();
                    
                    if (domElements.pauseButton) {
                        domElements.pauseButton.textContent = '일시정지';
                    }
                }

            } catch (error) {
                console.error('일시정지 처리 실패:', error);
            }
        }

        function handleRestartGame() {
            try {
                cleanup();
                handleStartGame();
            } catch (error) {
                console.error('게임 재시작 실패:', error);
            }
        }

        function handleReturnToMenu() {
            try {
                cleanup();
                hideAllScreens();
                domElements.mainMenu.style.display = 'block';
                loadHighScore();
            } catch (error) {
                console.error('메인 메뉴 이동 실패:', error);
            }
        }

        function handleGameOver() {
            try {
                gameState.isPlaying = false;
                gameState.isGameOver = true;

                cleanup();
                clearAllMoles();

                const highScore = getHighScore();
                let isNewRecord = false;

                if (gameState.score > highScore) {
                    saveHighScore(gameState.score);
                    isNewRecord = true;
                }

                showGameResult(isNewRecord);

                console.log('게임 종료 - 최종 점수:', gameState.score);

            } catch (error) {
                console.error('게임 종료 처리 실패:', error);
            }
        }

        function handleMoleClick(event) {
            try {
                const moleElement = event.target.closest('.mole.visible');
                if (!moleElement || !gameState.isPlaying || gameState.isPaused) {
                    return;
                }

                const moleId = moleElement.dataset.moleId;
                const mole = gameState.currentMoles.find(m => m.id === moleId);
                
                if (!mole) return;

                const currentTime = Date.now();
                const timeDiff = currentTime - gameState.lastClickTime;
                gameState.lastClickTime = currentTime;

                const isDoubleClick = timeDiff < gameState.doubleClickThreshold;

                if (mole.isGolden) {
                    if (isDoubleClick) {
                        handleMoleHit(mole, true);
                    } else {
                        moleElement.style.transform = 'scale(1.1)';
                        setTimeout(() => {
                            if (moleElement.style) {
                                moleElement.style.transform = 'scale(1.0)';
                            }
                        }, 100);
                    }
                } else {
                    handleMoleHit(mole, false);
                }

            } catch (error) {
                console.error('두더지 클릭 처리 실패:', error);
            }
        }

        function handleMoleHit(mole, isGolden) {
            try {
                const points = isGolden ? 50 : 10;
                gameState.score += points;
                gameState.molesCaught++;

                showHitFeedback(mole.element, points);
                removeMole(mole.id);

                updateScoreDisplay(gameState.score);
                updateMoleCountDisplay(gameState.molesCaught);

                console.log(`두더지 적중! ${isGolden ? '황금' : '일반'} - 점수: ${points}`);

            } catch (error) {
                console.error('두더지 적중 처리 실패:', error);
            }
        }

        function startGameLoop() {
            if (gameState.gameTimer) {
                clearInterval(gameState.gameTimer);
            }

            gameState.gameTimer = setInterval(function() {
                try {
                    if (!gameState.isPlaying || gameState.isPaused || gameState.isGameOver) {
                        return;
                    }

                    gameState.timeLeft--;
                    updateTimeDisplay(gameState.timeLeft);

                    if (gameState.timeLeft <= 0) {
                        handleGameOver();
                    }

                } catch (error) {
                    console.error('게임 루프 에러:', error);
                    handleGameOver();
                }
            }, 1000);
        }

        function startMoleSpawning() {
            if (!gameState.isPlaying || gameState.isPaused) return;

            const spawnDelay = Math.random() * 
                (gameState.spawnInterval.max - gameState.spawnInterval.min) + 
                gameState.spawnInterval.min;

            gameState.spawnTimer = setTimeout(function() {
                try {
                    if (gameState.isPlaying && !gameState.isPaused && !gameState.isGameOver) {
                        spawnRandomMole();
                        startMoleSpawning();
                    }
                } catch (error) {
                    console.error('두더지 스폰 에러:', error);
                }
            }, spawnDelay);
        }

        function spawnRandomMole() {
            try {
                const availableHoles = [];
                for (let i = 0; i < 9; i++) {
                    const hasActiveMole = gameState.currentMoles.some(m => m.holeIndex === i && m.isVisible);
                    if (!hasActiveMole) {
                        availableHoles.push(i);
                    }
                }

                if (availableHoles.length === 0) return;

                const randomHoleIndex = availableHoles[Math.floor(Math.random() * availableHoles.length)];
                const shouldSpawnGolden = checkGoldenMoleSpawn();

                spawnMole(randomHoleIndex, shouldSpawnGolden);

            } catch (error) {
                console.error('랜덤 두더지 스폰 실패:', error);
            }
        }

        function spawnMole(holeIndex, isGolden) {
            try {
                const holeContainer = domElements.holes[holeIndex];
                if (!holeContainer) return;

                const moleId = 'mole_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
                const moleElement = document.createElement('div');
                
                moleElement.className = isGolden ? 'mole golden visible' : 'mole visible';
                moleElement.dataset.moleId = moleId;
                
                if (isGolden) {
                    moleElement.style.cssText = `
                        width: 90px;
                        height: 70px;
                        background: linear-gradient(45deg, #FFD700, #FFA500);
                        border-radius: 50%;
                        position: absolute;
                        bottom: 0;
                        left: 50%;
                        transform: translateX(-50%) translateY(100%);
                        cursor: pointer;
                        box-shadow: 0 4px 8px rgba(0,0,0,0.3), 0 0 20px rgba(255,215,0,0.6);
                        transition: transform 0.2s ease-out;
                        animation: shimmer 1s infinite alternate;
                    `;
                } else {
                    moleElement.style.cssText = `
                        width: 80px;
                        height: 60px;
                        background: linear-gradient(45deg, #D2691E, #8B4513);
                        border-radius: 50%;
                        position: absolute;
                        bottom: 0;
                        left: 50%;
                        transform: translateX(-50%) translateY(100%);
                        cursor: pointer;
                        box-shadow: 0 4px 8px rgba(0,0,0,0.3);
                        transition: transform 0.2s ease-out;
                    `;
                }

                const eyes = document.createElement('div');
                eyes.style.cssText = `
                    position: absolute;
                    top: 20%;
                    left: 20%;
                    width: 60%;
                    height: 30%;
                    display: flex;
                    justify-content: space-between;
                    align-items: center;
                `;
                
                const leftEye = document.createElement('div');
                const rightEye = document.createElement('div');
                [leftEye, rightEye].forEach(eye => {
                    eye.style.cssText = `
                        width: 8px;
                        height: 8px;
                        background: black;
                        border-radius: 50%;
                    `;
                });
                
                const nose = document.createElement('div');
                nose.style.cssText = `
                    position: absolute;
                    top: 60%;
                    left: 50%;
                    transform: translateX(-50%);
                    width: 6px;
                    height: 6px;
                    background: #FF69B4;
                    border-radius: 50%;
                `;

                eyes.appendChild(leftEye);
                eyes.appendChild(rightEye);
                moleElement.appendChild(eyes);
                moleElement.appendChild(nose);

                const moleObject = {
                    id: moleId,
                    holeIndex: holeIndex,
                    isGolden: isGolden,
                    isVisible: true,
                    spawnTime: Date.now(),
                    element: moleElement
                };

                gameState.currentMoles.push(moleObject);
                gameState.molesAppeared++;

                holeContainer.appendChild(moleElement);

                setTimeout(() => {
                    if (moleElement.style) {
                        moleElement.style.transform = 'translateX(-50%) translateY(0)';
                    }
                }, 50);

                const lifetime = isGolden ? gameState.goldenMoleLifetime : gameState.moleLifetime;
                setTimeout(() => {
                    if (gameState.currentMoles.some(m => m.id === moleId)) {
                        handleMoleMiss(moleId);
                    }
                }, lifetime);

                console.log(`두더지 스폰: ${isGolden ? '황금' : '일반'} - 구멍 ${holeIndex}`);

            } catch (error) {
                console.error('두더지 스폰 실패:', error);
            }
        }

        function handleMoleMiss(moleId) {
            try {
                const mole = gameState.currentMoles.find(m => m.id === moleId);
                if (!mole) return;

                gameState.score = Math.max(0, gameState.score - 5);
                updateScoreDisplay(gameState.score);

                removeMole(moleId);

                console.log('두더지 놓침 - 점수 -5');

            } catch (error) {
                console.error('두더지 놓침 처리 실패:', error);
            }
        }

        function removeMole(moleId) {
            try {
                const moleIndex = gameState.currentMoles.findIndex(m => m.id === moleId);
                if (moleIndex === -1) return;

                const mole = gameState.currentMoles[moleIndex];
                
                if (mole.element && mole.element.style) {
                    mole.element.style.transform = 'translateX(-50%) translateY(100%)';
                    mole.element.style.transition = 'transform 0.3s ease-in';
                }

                setTimeout(() => {
                    if (mole.element && mole.element.parentNode) {
                        mole.element.parentNode.removeChild(mole.element);
                    }
                }, 300);

                gameState.currentMoles.splice(moleIndex, 1);

            } catch (error) {
                console.error('두더지 제거 실패:', error);
            }
        }

        function checkGoldenMoleSpawn() {
            return gameState.molesAppeared > 0 && 
                   gameState.molesAppeared % gameState.goldenMoleThreshold === 0;
        }

        function clearAllMoles() {
            try {
                const molesCopy = [...gameState.currentMoles];
                molesCopy.forEach(mole => {
                    removeMole(mole.id);
                });
                gameState.currentMoles = [];
            } catch (error) {
                console.error('모든 두더지 제거 실패:', error);
            }
        }

        function showHitFeedback(moleElement, points) {
            try {
                const scorePopup = document.createElement('div');
                scorePopup.textContent = '+' + points;
                scorePopup.style.cssText = `
                    position: absolute;
                    top: -30px;
                    left: 50%;
                    transform: translateX(-50%);
                    color: ${points > 10 ? '#FFD700' : '#FF4500'};
                    font-weight: bold;
                    font-size: 18px;
                    pointer-events: none;
                    z-index: 1000;
                    animation: scorePopup 1s ease-out forwards;
                `;

                if (!document.querySelector('#score-popup-style')) {
                    const style = document.createElement('style');
                    style.id = 'score-popup-style';
                    style.textContent = `
                        @keyframes scorePopup {
                            0% { opacity: 1; transform: translateX(-50%) translateY(0); }
                            100% { opacity: 0; transform: translateX(-50%) translateY(-50px); }
                        }
                    `;
                    document.head.appendChild(style);
                }

                if (moleElement && moleElement.parentNode) {
                    moleElement.parentNode.appendChild(scorePopup);

                    setTimeout(() => {
                        if (scorePopup.parentNode) {
                            scorePopup.parentNode.removeChild(scorePopup);
                        }
                    }, 1000);
                }

            } catch (error) {
                console.error('적중 피드백 표시 실패:', error);
            }
        }

        function updateScoreDisplay(newScore) {
            if (domElements.scoreDisplay) {
                domElements.scoreDisplay.textContent = newScore.toLocaleString();
            }
        }

        function updateTimeDisplay(timeLeft) {
            if (domElements.timeDisplay) {
                domElements.timeDisplay.textContent = timeLeft + 's';
                
                if (timeLeft <= 10) {
                    domElements.timeDisplay.style.color = '#FF4500';
                } else {
                    domElements.timeDisplay.style.color = '#FFFFFF';
                }
            }
        }

        function updateMoleCountDisplay(count) {
            if (domElements.moleCountDisplay) {
                domElements.moleCountDisplay.textContent = count;
            }
        }

        function hideAllScreens() {
            [domElements.mainMenu, domElements.gameScreen, domElements.resultScreen].forEach(screen => {
                if (screen) {
                    screen.style.display = 'none';
                }
            });
        }

        function showGameResult(isNewRecord) {
            try {
                hideAllScreens();
                
                if (domElements.resultScreen) {
                    domElements.resultScreen.style.display = 'block';
                    
                    if (domElements.finalScoreDisplay) {
                        domElements.finalScoreDisplay.textContent = gameState.score.toLocaleString();
                    }

                    if (domElements.newRecordMessage) {
                        domElements.newRecordMessage.style.display = isNewRecord ? 'block' : 'none';
                    }

                    if (domElements.finalMoleCount) {
                        domElements.finalMoleCount.textContent = gameState.molesCaught;
                    }

                } else {
                    const message = `게임 종료!\n최종 점수: ${gameState.score.toLocaleString()}\n잡은 두더지: ${gameState.molesCaught}마리` +
                        (isNewRecord ? '\n🎉 새로운 기록입니다!' : '');
                    alert(message);
                    
                    hideAllScreens();
                    if (domElements.mainMenu) {
                        domElements.mainMenu.style.display = 'block';
                    }
                }

            } catch (error) {
                console.error('결과 화면 표시 실패:', error);
            }
        }

        function getHighScore() {
            try {
                const stored = localStorage.getItem('whack-a-mole-highscore');
                return stored ? parseInt(stored, 10) : 0;
            } catch (error) {
                console.error('최고기록 로드 실패:', error);
                return 0;
            }
        }

        function saveHighScore(score) {
            try {
                localStorage.setItem('whack-a-mole-highscore', score.toString());
                console.log('새로운 최고기록 저장:', score);
            } catch (error) {
                console.error('최고기록 저장 실패:', error);
            }
        }

        function loadHighScore() {
            try {
                const highScore = getHighScore();
                if (domElements.bestScoreDisplay) {
                    domElements.bestScoreDisplay.textContent = highScore.toLocaleString();
                }
            } catch (error) {
                console.error('최고기록 표시 실패:', error);
            }
        }

        function cleanup() {
            try {
                if (gameState.spawnTimer) {
                    clearTimeout(gameState.spawnTimer);
                    gameState.spawnTimer = null;
                }

                if (gameState.gameTimer) {
                    clearInterval(gameState.gameTimer);
                    gameState.gameTimer = null;
                }

                clearAllMoles();

                if (domElements.gameContainer) {
                    domElements.gameContainer.classList.remove('game-paused', 'game-over');
                }

                console.log('리소스 정리 완료');

            } catch (error) {
                console.error('리소스 정리 실패:', error);
            }
        }

        window.WhackAMoleGame = {
            handleStartGame: handleStartGame,
            handlePauseGame: handlePauseGame,
            handleResumeGame: handlePauseGame,
            handleRestartGame: handleRestartGame,
            handleGameOver: handleGameOver,
            handleMoleClick: handleMoleClick,
            handleMoleDoubleClick: handleMoleClick,
            updateScoreDisplay: updateScoreDisplay,
            updateTimeDisplay: updateTimeDisplay,
            updateMoleCountDisplay: updateMoleCountDisplay,
            spawnMole: spawnMole,
            removeMole: removeMole,
            checkGoldenMoleSpawn: checkGoldenMoleSpawn,
            getGameState: function() { return Object.assign({}, gameState); },
            init: initializeGame,
            cleanup: cleanup
        };

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initializeGame);
        } else {
            setTimeout(initializeGame, 100);
        }

        console.log('웹 두더지 게임 엔진 로드 완료');

    })();
    </script>
</body>
</html>
