<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Classic Tetris 2024</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">

  <style>
  /* CSS Variables (Custom Properties) */
:root{
  /* Colors (from design) */
  --color-bg-start: #1C2833;
  --color-bg-end:   #2C3E50;
  --color-primary:  #2E86C1;
  --color-accent:   #F39C12;
  --color-board-bg: #34495E;
  --color-grid:     #5D6D7E;
  --color-i:        #00F0F0;
  --color-o:        #F0F000;
  --color-t:        #A000F0;
  --color-s:        #00F000;
  --color-z:        #F00000;
  --color-j:        #0000F0;
  --color-l:        #F0A000;
  --color-overlay:  rgba(0,0,0,0.7);

  /* Sizes */
  --board-width: 300px;
  --board-height: 600px;
  --cell-size: 20px; /* each block is 20x20px */
  --next-size: 80px;

  /* Typography */
  --font-title: 'Orbitron', sans-serif;
  --font-mono: 'Roboto Mono', monospace;

  /* UI */
  --radius: 8px;
  --panel-bg: rgba(52,73,94,0.8);
  --transition: 200ms ease;
  --soft-shadow: 0 6px 18px rgba(0,0,0,0.5);
  --line-flash-duration: 300ms;

  /* Animation */
  --vibe-dist: 2px;
  --vibe-time: 100ms;
}

/* Base Layout */
* { box-sizing: border-box; }
html,body { height:100%; }
body {
  font-family: var(--font-mono);
  background: linear-gradient(180deg, var(--color-bg-start) 0%, var(--color-bg-end) 100%);
  color: #fff;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  margin:0;
  display:flex;
  flex-direction:column;
  min-height:100vh;
}

/* App container centers content */
.app {
  display:flex;
  flex-direction:column;
  flex:1;
}

/* Header */
.header {
  text-align:center;
  padding:18px 12px 6px;
}
.title {
  margin:0;
  font-family: var(--font-title);
  letter-spacing: 1px;
  font-size: clamp(20px, 3vw, 28px);
  color: var(--color-primary);
  text-shadow: 0 2px 8px rgba(46,134,193,0.2);
}

/* Main area fills remaining space */
.main {
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
  position:relative;
}

/* Screens (menu / game) */
.screen { width:100%; max-width:1100px; margin:0 auto; }
.hidden { display:none !important; }

/* Menu Screen */
.menu-screen {
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:60vh;
}
.menu-card {
  background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.02));
  padding:28px;
  border-radius:12px;
  box-shadow: var(--soft-shadow);
  text-align:center;
}
.menu-heading { margin:0 0 12px; font-size:22px; color:#ecf0f1; font-family:var(--font-title); }
.high-score { margin-top:14px; color:var(--color-accent); font-weight:700; }

/* Game Layout (board + hud) */
.game-wrap {
  display:flex;
  gap:24px;
  align-items:flex-start;
  justify-content:center;
  width:100%;
  max-width:980px;
}

/* Board wrap (left) */
.board-wrap {
  width:var(--board-width);
  height:var(--board-height);
  position:relative;
  border-radius:6px;
  background: linear-gradient(180deg, var(--color-board-bg), #2f4b5f);
  border: 4px solid var(--color-primary);
  box-shadow: 0 10px 24px rgba(0,0,0,0.6);
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* Canvas fills board area */
.game-canvas {
  width:100%;
  height:100%;
  display:block;
  background: linear-gradient(180deg, #1e2b36 0%, #18242c 100%);
}

/* Grid overlay */
.board-grid {
  position:absolute;
  inset:0;
  pointer-events:none;
  background-image:
    linear-gradient(to right, rgba(0,0,0,0.0) 0 calc((100% / 10) - 1px), var(--color-grid) calc((100% / 10) - 1px) calc(100% / 10)),
    linear-gradient(to bottom, rgba(0,0,0,0.0) 0 calc((100% / 20) - 1px), var(--color-grid) calc((100% / 20) - 1px) calc(100% / 20));
  background-size: 10% 100%, 100% 5%;
  opacity:0.55;
}

/* Level-up gold border */
.levelup-border {
  position:absolute;
  inset:-6px;
  border-radius:10px;
  pointer-events:none;
  box-shadow: 0 0 0 6px transparent;
  transition: box-shadow 150ms ease;
}
.levelup-border.active {
  box-shadow: 0 0 0 6px rgba(243,156,18,0.85), 0 0 24px rgba(243,156,18,0.15);
  animation: levelup-fade .5s ease;
}

@keyframes levelup-fade {
  0% { transform: scale(0.98); opacity:0.0; }
  50% { transform: scale(1.01); opacity:1; }
  100% { transform: scale(1); opacity:0.0; }
}

/* HUD (right) */
.hud {
  width:320px;
  display:flex;
  flex-direction:column;
  gap:12px;
}

/* Top controls row */
.hud-top {
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
}

/* Badges */
.status-badges { display:flex; gap:8px; align-items:center; }
.badge {
  background: var(--panel-bg);
  padding:6px 10px;
  border-radius:999px;
  color:#fff;
  font-weight:700;
  font-size:13px;
  min-width:74px;
  text-align:center;
}

/* Panels common */
.panel {
  background: var(--panel-bg);
  border-radius:10px;
  padding:12px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.35);
}
.panel-title { font-size:13px; color:#fff; margin-bottom:8px; font-weight:700; }
.panel-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
.panel-value { color:var(--color-accent); font-size:20px; font-weight:700; }

/* Next preview canvas */
.next-canvas {
  display:block;
  width:var(--next-size);
  height:var(--next-size);
  background: linear-gradient(180deg, rgba(0,0,0,0.15), rgba(255,255,255,0.02));
  border-radius:6px;
  border:1px solid rgba(255,255,255,0.03);
}

/* Controls list */
.control-list { list-style:none; padding:0; margin:0; font-size:13px; line-height:1.6; color:#ecf0f1; }

/* Actions */
.actions { display:flex; gap:8px; justify-content:space-between; }
.btn {
  appearance:none;
  border:0;
  cursor:pointer;
  padding:10px 14px;
  border-radius:8px;
  font-weight:700;
  font-size:14px;
  transition: filter var(--transition), transform var(--transition);
  box-shadow: 0 6px 12px rgba(0,0,0,0.4);
}
.btn:active { transform: translateY(1px); }
.btn:hover { filter:brightness(1.1); }

/* Primary / Secondary / Icon buttons */
.primary-btn {
  background: linear-gradient(180deg, var(--color-primary), #256fa8);
  color:white;
}
.secondary-btn {
  background: rgba(255,255,255,0.06);
  color: #fff;
  border: 1px solid rgba(255,255,255,0.04);
}
.icon-btn {
  background: rgba(255,255,255,0.04);
  width:44px;
  height:44px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  font-size:18px;
}

/* Modal & Overlays */
.modal {
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background: var(--color-overlay);
  z-index:50;
  padding:20px;
}
.modal-card {
  background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.02));
  border-radius:10px;
  padding:22px;
  min-width:260px;
  text-align:center;
  box-shadow: var(--soft-shadow);
}
.modal-title { font-family:var(--font-title); color:var(--color-primary); margin:0 0 8px; }
.modal-info { margin:6px 0; }
.modal-actions { display:flex; gap:10px; justify-content:center; margin-top:10px; }

/* Overlay for pause */
.overlay {
  position: absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:40;
  pointer-events:none;
}
.overlay-message {
  background: rgba(0,0,0,0.6);
  padding:14px 20px;
  border-radius:10px;
  font-size:22px;
  border: 2px solid rgba(255,255,255,0.03);
  pointer-events:auto;
}

/* Visual Effects & Animations */
.block {
  width:var(--cell-size);
  height:var(--cell-size);
  border-radius:2px;
  box-shadow: inset 0 -4px rgba(0,0,0,0.15);
  transition: opacity var(--transition), transform var(--transition);
}
.block--i { background: linear-gradient(180deg, var(--color-i), #00c9c9); }
.block--o { background: linear-gradient(180deg, var(--color-o), #d0c800); }
.block--t { background: linear-gradient(180deg, var(--color-t), #8a00f0); }
.block--s { background: linear-gradient(180deg, var(--color-s), #00c500); }
.block--z { background: linear-gradient(180deg, var(--color-z), #c80000); }
.block--j { background: linear-gradient(180deg, var(--color-j), #0000c8); }
.block--l { background: linear-gradient(180deg, var(--color-l), #f09a00); }

/* Transparency for falling piece */
.is-falling { opacity:0.8; }

/* Placement vibration */
@keyframes place-vibe {
  0% { transform: translateX(0); }
  25% { transform: translateX(var(--vibe-dist)); }
  50% { transform: translateX(calc(var(--vibe-dist) * -1)); }
  75% { transform: translateX(var(--vibe-dist)); }
  100% { transform: translateX(0); }
}
.place-vibrate { animation: place-vibe var(--vibe-time) ease; }

/* Line removal flash */
@keyframes line-flash {
  0% { background-color: rgba(255,255,255,0.95); opacity:1; }
  60% { background-color: rgba(255,255,255,0.85); opacity:0.9; }
  100% { background-color: transparent; opacity:0; }
}
.line-flash {
  position:absolute;
  left:0;
  right:0;
  height: calc(var(--cell-size));
  animation: line-flash var(--line-flash-duration) ease forwards;
  pointer-events:none;
  z-index:30;
}

/* Particles */
.particle {
  width:10px; height:10px; position:absolute; border-radius:2px;
  animation: particle-move 500ms ease-out forwards;
  opacity:1;
}
@keyframes particle-move {
  to { transform: translateY(-20px) translateX(30px) rotate(20deg); opacity:0; }
}

/* Screen transitions */
.fade-in { animation: screen-fade-in 300ms ease both; }
.fade-out { animation: screen-fade-out 300ms ease both; }
@keyframes screen-fade-in { from { opacity:0; transform: translateY(6px); } to { opacity:1; transform:none; } }
@keyframes screen-fade-out { from { opacity:1; } to { opacity:0; transform: translateY(6px); } }

/* Game over effect */
.board-wrap.game-over::after {
  content:"";
  position:absolute; inset:0;
  background: rgba(231, 76, 60, 0.25);
  animation: gameover-flash 500ms ease both;
  pointer-events:none;
}
@keyframes gameover-flash { from { opacity:0; } to { opacity:1; } }

/* Disabled state utility */
.is-disabled { opacity:0.5; pointer-events:none; }

/* Responsive */
@media (max-width:900px) {
  .game-wrap { flex-direction:column; align-items:center; gap:16px; }
  .hud { width:100%; max-width:420px; }
  .board-wrap { transform: scale(calc(min(0.9, (100vw - 80px) / 420))); transform-origin: top center; }
  .game-canvas { transform-origin: top left; }
}

@media (max-width:420px) {
  :root { --board-width: 240px; --board-height:480px; --cell-size: 20px; --next-size:64px; }
  .board-wrap { width:var(--board-width); height:var(--board-height); }
  .next-canvas { width:var(--next-size); height:var(--next-size); }
}

/* Accessibility focus styles */
.btn:focus { outline: 3px solid rgba(46,134,193,0.35); outline-offset:2px; border-radius:6px; }
  </style>
</head>
<body>
  <div id="app" class="app">
    <header class="header" role="banner">
      <h1 class="title" id="game-title" aria-label="게임 제목 - Classic Tetris 2024">
        🎮 Classic Tetris 2024
      </h1>
    </header>

    <main class="main" role="main">
      <!-- Main Menu -->
      <section id="main-menu" class="screen menu-screen" aria-hidden="false">
        <div class="menu-card">
          <h2 class="menu-heading">Press Start</h2>
          <button id="btn-start" class="btn primary-btn" type="button">
            ▶ START
          </button>
          <div id="high-score" class="high-score" aria-live="polite">
            ★ 최고점수: <span id="high-score-value">0</span>
          </div>
        </div>
      </section>

      <!-- Game Screen -->
      <section id="game-screen" class="screen game-screen hidden" aria-hidden="true">
        <div class="game-wrap">
          <aside class="board-wrap" aria-label="게임 보드 - 10 by 20">
            <canvas id="game-canvas" width="300" height="600" class="game-canvas" role="img" aria-label="게임 보드 캔버스"></canvas>
            <div class="board-grid" aria-hidden="true"></div>
            <div id="levelup-border" class="levelup-border" aria-hidden="true"></div>
          </aside>

          <aside class="hud" aria-label="게임 정보 및 컨트롤">
            <div class="hud-top">
              <button id="btn-pause" class="btn icon-btn" aria-pressed="false" title="일시정지 (P)">
                ⏸
              </button>
              <div class="status-badges">
                <div class="badge" id="badge-level" aria-live="polite">
                  레벨 <span id="level-value">1</span>
                </div>
                <div class="badge" id="badge-lines" aria-live="polite">
                  라인 <span id="lines-value">0</span>
                </div>
              </div>
            </div>

            <section id="score-panel" class="panel score-panel" aria-label="점수 패널">
              <div class="panel-row">
                <div class="panel-title">점수</div>
                <div id="score-value" class="panel-value">0</div>
              </div>
              <div class="panel-row">
                <div class="panel-title">연속</div>
                <div id="combo-value" class="panel-value">0</div>
              </div>
            </section>

            <section class="panel next-panel" aria-label="다음 블록 미리보기">
              <div class="panel-title">다음</div>
              <canvas id="next-canvas" width="80" height="80" class="next-canvas" role="img" aria-label="다음 블록 미리보기"></canvas>
            </section>

            <section class="panel controls-panel" aria-label="조작 안내">
              <div class="panel-title">조작 ⌨️</div>
              <ul class="control-list">
                <li>← → : 이동</li>
                <li>Space : 회전</li>
                <li>P : 일시정지/재개</li>
                <li>Tap / Swipe : 모바일 지원</li>
              </ul>
            </section>

            <div class="panel actions">
              <button id="btn-restart" class="btn secondary-btn" type="button">🔁 다시하기</button>
              <button id="btn-mainmenu" class="btn secondary-btn" type="button">🏠 메인메뉴</button>
            </div>
          </aside>
        </div>
      </section>

      <!-- Game Over Modal -->
      <div id="modal-gameover" class="modal hidden" role="dialog" aria-modal="true" aria-hidden="true" aria-labelledby="gameover-title">
        <div class="modal-card">
          <h3 id="gameover-title" class="modal-title">💥 GAME OVER</h3>
          <p class="modal-info">최종 점수: <strong id="final-score">0</strong></p>
          <p class="modal-info">도달 레벨: <strong id="final-level">1</strong></p>
          <div class="modal-actions">
            <button id="btn-modal-restart" class="btn primary-btn">다시하기</button>
            <button id="btn-modal-menu" class="btn secondary-btn">메인메뉴</button>
          </div>
        </div>
      </div>

      <!-- Pause Overlay -->
      <div id="overlay-pause" class="overlay hidden" aria-hidden="true">
        <div class="overlay-message">⏸ PAUSED</div>
      </div>
    </main>

    <footer class="footer" role="contentinfo">
      <div class="footer-inner">
        <small>© Classic Tetris 2024 · Modern Arcade UI</small>
      </div>
    </footer>
  </div>

  <script>
// Classic Tetris 2024 - 게임 로직 구현
const TetrisGame = (function() {
    'use strict';

    // 게임 상수 정의
    const CONSTANTS = {
        BOARD_WIDTH: 10,
        BOARD_HEIGHT: 20,
        BLOCK_SIZE: 30,
        CANVAS_WIDTH: 300,
        CANVAS_HEIGHT: 600,
        PREVIEW_SIZE: 80,
        MAX_LEVEL: 10,
        LINES_PER_LEVEL: 10,
        BASE_SPEED: 1000,
        MIN_SPEED: 100,
        COLORS: {
            I: '#00F0F0',
            O: '#F0F000',
            T: '#A000F0',
            S: '#00F000',
            Z: '#F00000',
            J: '#0000F0',
            L: '#F0A000',
            EMPTY: '#1C2833',
            GRID: '#5D6D7E',
            GHOST: 'rgba(255, 255, 255, 0.3)'
        }
    };

    // 테트로미노 형태 정의
    const TETROMINOS = {
        I: [
            [1, 1, 1, 1]
        ],
        O: [
            [1, 1],
            [1, 1]
        ],
        T: [
            [0, 1, 0],
            [1, 1, 1]
        ],
        S: [
            [0, 1, 1],
            [1, 1, 0]
        ],
        Z: [
            [1, 1, 0],
            [0, 1, 1]
        ],
        J: [
            [1, 0, 0],
            [1, 1, 1]
        ],
        L: [
            [0, 0, 1],
            [1, 1, 1]
        ]
    };

    // 게임 상태 열거형
    const GAME_STATES = {
        MENU: 'menu',
        PLAYING: 'playing',
        PAUSED: 'paused',
        GAME_OVER: 'game_over'
    };

    // 테트로미노 클래스
    class Tetromino {
        constructor(type, x = 3, y = 0) {
            this.type = type;
            this.x = x;
            this.y = y;
            this.shape = this.copyMatrix(TETROMINOS[type]);
            this.color = CONSTANTS.COLORS[type];
        }

        copyMatrix(matrix) {
            return matrix.map(row => [...row]);
        }

        rotate() {
            const rotated = [];
            const rows = this.shape.length;
            const cols = this.shape[0].length;
            
            for (let i = 0; i < cols; i++) {
                rotated[i] = [];
                for (let j = rows - 1; j >= 0; j--) {
                    rotated[i][rows - 1 - j] = this.shape[j][i];
                }
            }
            
            return new Tetromino(this.type, this.x, this.y).setShape(rotated);
        }

        setShape(shape) {
            this.shape = shape;
            return this;
        }

        move(dx, dy) {
            return new Tetromino(this.type, this.x + dx, this.y + dy).setShape(this.shape);
        }

        getGhostPosition(board) {
            let ghost = new Tetromino(this.type, this.x, this.y).setShape(this.shape);
            while (board.isValidPosition(ghost.move(0, 1))) {
                ghost = ghost.move(0, 1);
            }
            return ghost;
        }
    }

    // 게임 보드 클래스
    class Board {
        constructor() {
            this.grid = this.createEmptyGrid();
            this.linesCleared = 0;
            this.consecutiveClears = 0;
        }

        createEmptyGrid() {
            return Array(CONSTANTS.BOARD_HEIGHT).fill().map(() => 
                Array(CONSTANTS.BOARD_WIDTH).fill(null)
            );
        }

        isValidPosition(tetromino) {
            for (let y = 0; y < tetromino.shape.length; y++) {
                for (let x = 0; x < tetromino.shape[y].length; x++) {
                    if (tetromino.shape[y][x]) {
                        const boardX = tetromino.x + x;
                        const boardY = tetromino.y + y;
                        
                        if (boardX < 0 || boardX >= CONSTANTS.BOARD_WIDTH || 
                            boardY >= CONSTANTS.BOARD_HEIGHT) {
                            return false;
                        }
                        
                        if (boardY >= 0 && this.grid[boardY][boardX]) {
                            return false;
                        }
                    }
                }
            }
            return true;
        }

        placeTetromino(tetromino) {
            for (let y = 0; y < tetromino.shape.length; y++) {
                for (let x = 0; x < tetromino.shape[y].length; x++) {
                    if (tetromino.shape[y][x]) {
                        const boardY = tetromino.y + y;
                        if (boardY >= 0) {
                            this.grid[boardY][tetromino.x + x] = tetromino.color;
                        }
                    }
                }
            }
        }

        clearLines() {
            const completedLines = [];
            
            for (let y = CONSTANTS.BOARD_HEIGHT - 1; y >= 0; y--) {
                if (this.grid[y].every(cell => cell !== null)) {
                    completedLines.push(y);
                }
            }

            if (completedLines.length > 0) {
                this.triggerLineFlash(completedLines);
                
                completedLines.forEach(lineIndex => {
                    this.grid.splice(lineIndex, 1);
                    this.grid.unshift(Array(CONSTANTS.BOARD_WIDTH).fill(null));
                });

                this.linesCleared += completedLines.length;
                this.consecutiveClears++;
                
                return {
                    linesCleared: completedLines.length,
                    totalLines: this.linesCleared,
                    consecutive: this.consecutiveClears
                };
            } else {
                this.consecutiveClears = 0;
                return null;
            }
        }

        triggerLineFlash(lines) {
            const event = new CustomEvent('lineFlash', { detail: { lines } });
            document.dispatchEvent(event);
        }

        isGameOver(tetromino) {
            return !this.isValidPosition(tetromino);
        }
    }

    // 점수 계산기 클래스
    class ScoreCalculator {
        constructor() {
            this.score = 0;
            this.level = 1;
            this.totalLines = 0;
        }

        calculateScore(clearResult) {
            if (!clearResult) return 0;

            const { linesCleared, consecutive } = clearResult;
            let points = linesCleared * 100;
            
            if (consecutive > 1) {
                points += 50 * (consecutive - 1);
            }

            this.score += points;
            this.totalLines += linesCleared;
            
            this.level = Math.min(
                Math.floor(this.totalLines / CONSTANTS.LINES_PER_LEVEL) + 1,
                CONSTANTS.MAX_LEVEL
            );

            return points;
        }

        getDropSpeed() {
            const speedRange = CONSTANTS.BASE_SPEED - CONSTANTS.MIN_SPEED;
            const speedReduction = speedRange * (this.level - 1) / (CONSTANTS.MAX_LEVEL - 1);
            return CONSTANTS.BASE_SPEED - speedReduction;
        }

        reset() {
            this.score = 0;
            this.level = 1;
            this.totalLines = 0;
        }
    }

    // 렌더러 클래스
    class Renderer {
        constructor(canvas, previewCanvas) {
            this.canvas = canvas;
            this.ctx = canvas.getContext('2d');
            this.previewCanvas = previewCanvas;
            this.previewCtx = previewCanvas.getContext('2d');
            
            this.setupCanvas();
        }

        setupCanvas() {
            this.canvas.width = CONSTANTS.CANVAS_WIDTH;
            this.canvas.height = CONSTANTS.CANVAS_HEIGHT;
            
            this.previewCanvas.width = CONSTANTS.PREVIEW_SIZE;
            this.previewCanvas.height = CONSTANTS.PREVIEW_SIZE;
        }

        render(board, currentTetromino, ghostTetromino) {
            this.clearCanvas();
            this.drawGrid();
            this.drawBoard(board);
            
            if (ghostTetromino) {
                this.drawGhost(ghostTetromino);
            }
            
            if (currentTetromino) {
                this.drawTetromino(currentTetromino);
            }
        }

        clearCanvas() {
            this.ctx.fillStyle = CONSTANTS.COLORS.EMPTY;
            this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
        }

        drawGrid() {
            this.ctx.strokeStyle = CONSTANTS.COLORS.GRID;
            this.ctx.lineWidth = 1;
            
            for (let x = 0; x <= CONSTANTS.BOARD_WIDTH; x++) {
                const xPos = x * CONSTANTS.BLOCK_SIZE;
                this.ctx.beginPath();
                this.ctx.moveTo(xPos, 0);
                this.ctx.lineTo(xPos, this.canvas.height);
                this.ctx.stroke();
            }
            
            for (let y = 0; y <= CONSTANTS.BOARD_HEIGHT; y++) {
                const yPos = y * CONSTANTS.BLOCK_SIZE;
                this.ctx.beginPath();
                this.ctx.moveTo(0, yPos);
                this.ctx.lineTo(this.canvas.width, yPos);
                this.ctx.stroke();
            }
        }

        drawBoard(board) {
            for (let y = 0; y < CONSTANTS.BOARD_HEIGHT; y++) {
                for (let x = 0; x < CONSTANTS.BOARD_WIDTH; x++) {
                    if (board.grid[y][x]) {
                        this.drawBlock(x, y, board.grid[y][x]);
                    }
                }
            }
        }

        drawTetromino(tetromino) {
            for (let y = 0; y < tetromino.shape.length; y++) {
                for (let x = 0; x < tetromino.shape[y].length; x++) {
                    if (tetromino.shape[y][x]) {
                        this.drawBlock(tetromino.x + x, tetromino.y + y, tetromino.color);
                    }
                }
            }
        }

        drawGhost(ghostTetromino) {
            this.ctx.save();
            this.ctx.globalAlpha = 0.3;
            
            for (let y = 0; y < ghostTetromino.shape.length; y++) {
                for (let x = 0; x < ghostTetromino.shape[y].length; x++) {
                    if (ghostTetromino.shape[y][x]) {
                        this.drawBlock(ghostTetromino.x + x, ghostTetromino.y + y, CONSTANTS.COLORS.GHOST);
                    }
                }
            }
            
            this.ctx.restore();
        }

        drawBlock(x, y, color) {
            const pixelX = x * CONSTANTS.BLOCK_SIZE;
            const pixelY = y * CONSTANTS.BLOCK_SIZE;
            
            this.ctx.fillStyle = color;
            this.ctx.fillRect(pixelX + 1, pixelY + 1, CONSTANTS.BLOCK_SIZE - 2, CONSTANTS.BLOCK_SIZE - 2);
            
            this.ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
            this.ctx.lineWidth = 1;
            this.ctx.strokeRect(pixelX + 1, pixelY + 1, CONSTANTS.BLOCK_SIZE - 2, CONSTANTS.BLOCK_SIZE - 2);
        }

        renderPreview(nextTetromino) {
            this.previewCtx.fillStyle = CONSTANTS.COLORS.EMPTY;
            this.previewCtx.fillRect(0, 0, CONSTANTS.PREVIEW_SIZE, CONSTANTS.PREVIEW_SIZE);
            
            if (!nextTetromino) return;
            
            const blockSize = 15;
            const offsetX = (CONSTANTS.PREVIEW_SIZE - nextTetromino.shape[0].length * blockSize) / 2;
            const offsetY = (CONSTANTS.PREVIEW_SIZE - nextTetromino.shape.length * blockSize) / 2;
            
            for (let y = 0; y < nextTetromino.shape.length; y++) {
                for (let x = 0; x < nextTetromino.shape[y].length; x++) {
                    if (nextTetromino.shape[y][x]) {
                        this.previewCtx.fillStyle = nextTetromino.color;
                        this.previewCtx.fillRect(
                            offsetX + x * blockSize,
                            offsetY + y * blockSize,
                            blockSize - 1,
                            blockSize - 1
                        );
                    }
                }
            }
        }

        flashLines(lines) {
            this.ctx.save();
            this.ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
            
            lines.forEach(lineY => {
                this.ctx.fillRect(0, lineY * CONSTANTS.BLOCK_SIZE, this.canvas.width, CONSTANTS.BLOCK_SIZE);
            });
            
            this.ctx.restore();
            
            setTimeout(() => {}, 300);
        }
    }

    // 입력 핸들러 클래스
    class InputHandler {
        constructor(game) {
            this.game = game;
            this.keys = {};
            this.lastKeyTime = {};
            this.keyRepeatDelay = 150;
            
            this.setupEventListeners();
        }

        setupEventListeners() {
            document.addEventListener('keydown', (e) => this.handleKeyDown(e));
            document.addEventListener('keyup', (e) => this.handleKeyUp(e));
            
            let touchStartX = 0;
            let touchStartY = 0;
            
            document.addEventListener('touchstart', (e) => {
                touchStartX = e.touches[0].clientX;
                touchStartY = e.touches[0].clientY;
            });
            
            document.addEventListener('touchend', (e) => {
                const touchEndX = e.changedTouches[0].clientX;
                const touchEndY = e.changedTouches[0].clientY;
                const deltaX = touchEndX - touchStartX;
                const deltaY = touchEndY - touchStartY;
                
                if (Math.abs(deltaX) > Math.abs(deltaY)) {
                    if (Math.abs(deltaX) > 50) {
                        if (deltaX > 0) {
                            this.game.handleInput('ArrowRight');
                        } else {
                            this.game.handleInput('ArrowLeft');
                        }
                    }
                } else if (Math.abs(deltaY) > 50) {
                    if (deltaY > 0) {
                        this.game.handleInput('ArrowDown');
                    }
                } else {
                    this.game.handleInput('ArrowUp');
                }
            });
        }

        handleKeyDown(e) {
            const now = Date.now();
            
            if (this.keys[e.code] && now - this.lastKeyTime[e.code] < this.keyRepeatDelay) {
                return;
            }
            
            this.keys[e.code] = true;
            this.lastKeyTime[e.code] = now;
            
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Space'].includes(e.code)) {
                e.preventDefault();
            }
            
            this.game.handleInput(e.code);
        }

        handleKeyUp(e) {
            this.keys[e.code] = false;
        }
    }

    // 사운드 매니저 클래스
    class SoundManager {
        constructor() {
            this.audioContext = null;
            this.sounds = {};
            
            try {
                this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
                this.createSounds();
            } catch (e) {
                console.warn('Web Audio API not supported');
            }
        }

        createSounds() {
            this.sounds = {
                move: () => this.playTone(200, 0.1, 0.05),
                rotate: () => this.playTone(300, 0.1, 0.05),
                drop: () => this.playTone(150, 0.2, 0.1),
                clear: () => this.playTone(400, 0.3, 0.2),
                gameOver: () => this.playTone(100, 0.5, 0.3)
            };
        }

        playTone(frequency, duration, volume = 0.1) {
            if (!this.audioContext) return;
            
            const oscillator = this.audioContext.createOscillator();
            const gainNode = this.audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(this.audioContext.destination);
            
            oscillator.frequency.setValueAtTime(frequency, this.audioContext.currentTime);
            oscillator.type = 'square';
            
            gainNode.gain.setValueAtTime(0, this.audioContext.currentTime);
            gainNode.gain.linearRampToValueAtTime(volume, this.audioContext.currentTime + 0.01);
            gainNode.gain.exponentialRampToValueAtTime(0.001, this.audioContext.currentTime + duration);
            
            oscillator.start(this.audioContext.currentTime);
            oscillator.stop(this.audioContext.currentTime + duration);
        }

        play(soundName) {
            if (this.sounds[soundName]) {
                this.sounds[soundName]();
            }
        }
    }

    // 메인 게임 클래스
    class Game {
        constructor() {
            this.state = GAME_STATES.MENU;
            this.board = new Board();
            this.scoreCalculator = new ScoreCalculator();
            this.soundManager = new SoundManager();
            
            this.currentTetromino = null;
            this.nextTetromino = null;
            this.ghostTetromino = null;
            
            this.dropTimer = 0;
            this.lastTime = 0;
            this.animationId = null;
            
            this.highScore = this.loadHighScore();
            
            this.initializeDOM();
            this.setupEventListeners();
        }

        initializeDOM() {
            this.canvas = document.getElementById('game-canvas');
            this.previewCanvas = document.getElementById('next-canvas');
            
            if (!this.canvas || !this.previewCanvas) {
                console.error('Required canvas elements not found');
                return;
            }
            
            this.renderer = new Renderer(this.canvas, this.previewCanvas);
            this.inputHandler = new InputHandler(this);
            
            this.scoreElement = document.getElementById('score-value');
            this.levelElement = document.getElementById('level-value');
            this.linesElement = document.getElementById('lines-value');
            this.comboElement = document.getElementById('combo-value');
            this.highScoreElement = document.getElementById('high-score-value');
            
            this.updateUI();
        }

        setupEventListeners() {
            const startButton = document.getElementById('btn-start');
            const pauseButton = document.getElementById('btn-pause');
            const restartButton = document.getElementById('btn-restart');
            const menuButton = document.getElementById('btn-mainmenu');
            const modalRestartButton = document.getElementById('btn-modal-restart');
            const modalMenuButton = document.getElementById('btn-modal-menu');
            
            if (startButton) startButton.addEventListener('click', () => this.startGame());
            if (pauseButton) pauseButton.addEventListener('click', () => this.togglePause());
            if (restartButton) restartButton.addEventListener('click', () => this.startGame());
            if (menuButton) menuButton.addEventListener('click', () => this.showMenu());
            if (modalRestartButton) modalRestartButton.addEventListener('click', () => this.startGame());
            if (modalMenuButton) modalMenuButton.addEventListener('click', () => this.showMenu());
            
            document.addEventListener('lineFlash', (e) => {
                this.renderer.flashLines(e.detail.lines);
            });

            document.addEventListener('levelUp', (e) => {
                const levelupBorder = document.getElementById('levelup-border');
                if (levelupBorder) {
                    levelupBorder.classList.add('active');
                    setTimeout(() => levelupBorder.classList.remove('active'), 500);
                }
            });
        }

        startGame() {
            this.state = GAME_STATES.PLAYING;
            this.board = new Board();
            this.scoreCalculator.reset();
            this.dropTimer = 0;
            
            this.currentTetromino = this.createRandomTetromino();
            this.nextTetromino = this.createRandomTetromino();
            this.updateGhost();
            
            this.hideModal();
            this.updateUI();
            this.showGameScreen();
            this.gameLoop();
        }

        gameLoop(currentTime = 0) {
            if (this.state !== GAME_STATES.PLAYING) {
                return;
            }
            
            const deltaTime = currentTime - this.lastTime;
            this.lastTime = currentTime;
            
            this.dropTimer += deltaTime;
            const dropSpeed = this.scoreCalculator.getDropSpeed();
            
            if (this.dropTimer >= dropSpeed) {
                this.moveDown();
                this.dropTimer = 0;
            }
            
            this.renderer.render(this.board, this.currentTetromino, this.ghostTetromino);
            this.renderer.renderPreview(this.nextTetromino);
            
            this.animationId = requestAnimationFrame((time) => this.gameLoop(time));
        }

        handleInput(key) {
            if (this.state === GAME_STATES.MENU) {
                if (key === 'Space' || key === 'Enter') {
                    this.startGame();
                }
                return;
            }
            
            if (this.state === GAME_STATES.GAME_OVER) {
                if (key === 'Space' || key === 'Enter') {
                    this.startGame();
                } else if (key === 'Escape') {
                    this.showMenu();
                }
                return;
            }
            
            if (this.state === GAME_STATES.PLAYING) {
                switch (key) {
                    case 'ArrowLeft':
                        this.moveLeft();
                        break;
                    case 'ArrowRight':
                        this.moveRight();
                        break;
                    case 'ArrowDown':
                        this.moveDown();
                        break;
                    case 'ArrowUp':
                    case 'Space':
                        this.rotate();
                        break;
                    case 'KeyP':
                        this.togglePause();
                        break;
                }
            }
            
            if (this.state === GAME_STATES.PAUSED) {
                if (key === 'KeyP') {
                    this.togglePause();
                }
            }
        }

        moveLeft() {
            const moved = this.currentTetromino.move(-1, 0);
            if (this.board.isValidPosition(moved)) {
                this.currentTetromino = moved;
                this.updateGhost();
                this.soundManager.play('move');
            }
        }

        moveRight() {
            const moved = this.currentTetromino.move(1, 0);
            if (this.board.isValidPosition(moved)) {
                this.currentTetromino = moved;
                this.updateGhost();
                this.soundManager.play('move');
            }
        }

        moveDown() {
            const moved = this.currentTetromino.move(0, 1);
            if (this.board.isValidPosition(moved)) {
                this.currentTetromino = moved;
                this.updateGhost();
            } else {
                this.placeTetromino();
            }
        }

        rotate() {
            const rotated = this.currentTetromino.rotate();
            if (this.board.isValidPosition(rotated)) {
                this.currentTetromino = rotated;
                this.updateGhost();
                this.soundManager.play('rotate');
            }
        }

        updateGhost() {
            this.ghostTetromino = this.currentTetromino.getGhostPosition(this.board);
        }

        placeTetromino() {
            this.board.placeTetromino(this.currentTetromino);
            this.soundManager.play('drop');
            
            // 진동 효과
            const boardWrap = document.querySelector('.board-wrap');
            if (boardWrap) {
                boardWrap.classList.add('place-vibrate');
                setTimeout(() => boardWrap.classList.remove('place-vibrate'), 100);
            }
            
            const clearResult = this.board.clearLines();
            if (clearResult) {
                const points = this.scoreCalculator.calculateScore(clearResult);
                this.soundManager.play('clear');
                this.updateUI();
                
                if (clearResult.totalLines >= this.scoreCalculator.level * CONSTANTS.LINES_PER_LEVEL) {
                    this.triggerLevelUp();
                }
            }
            
            this.currentTetromino = this.nextTetromino;
            this.nextTetromino = this.createRandomTetromino();
            
            if (this.board.isGameOver(this.currentTetromino)) {
                this.gameOver();
            } else {
                this.updateGhost();
            }
        }

        createRandomTetromino() {
            const types = Object.keys(TETROMINOS);
            const randomType = types[Math.floor(Math.random() * types.length)];
            return new Tetromino(randomType);
        }

        triggerLevelUp() {
            const event = new CustomEvent('levelUp', { detail: { level: this.scoreCalculator.level } });
            document.dispatchEvent(event);
        }

        togglePause() {
            if (this.state === GAME_STATES.PLAYING) {
                this.state = GAME_STATES.PAUSED;
                this.showPauseOverlay();
                if (this.animationId) {
                    cancelAnimationFrame(this.animationId);
                }
                const pauseBtn = document.getElementById('btn-pause');
                if (pauseBtn) pauseBtn.setAttribute('aria-pressed', 'true');
            } else if (this.state === GAME_STATES.PAUSED) {
                this.state = GAME_STATES.PLAYING;
                this.hidePauseOverlay();
                this.gameLoop();
                const pauseBtn = document.getElementById('btn-pause');
                if (pauseBtn) pauseBtn.setAttribute('aria-pressed', 'false');
            }
        }

        gameOver() {
            this.state = GAME_STATES.GAME_OVER;
            this.soundManager.play('gameOver');
            
            // 게임오버 보드 효과
            const boardWrap = document.querySelector('.board-wrap');
            if (boardWrap) {
                boardWrap.classList.add('game-over');
            }
            
            if (this.scoreCalculator.score > this.highScore) {
                this.highScore = this.scoreCalculator.score;
                this.saveHighScore();
                this.updateUI();
            }
            
            this.showGameOverModal();
        }

        showMenu() {
            this.state = GAME_STATES.MENU;
            if (this.animationId) {
                cancelAnimationFrame(this.animationId);
            }
            
            const boardWrap = document.querySelector('.board-wrap');
            if (boardWrap) {
                boardWrap.classList.remove('game-over');
            }
            
            this.hideModal();
            this.hidePauseOverlay();
            
            const mainMenu = document.getElementById('main-menu');
            const gameScreen = document.getElementById('game-screen');
            
            if (mainMenu) {
                mainMenu.classList.remove('hidden');
                mainMenu.setAttribute('aria-hidden', 'false');
            }
            if (gameScreen) {
                gameScreen.classList.add('hidden');
                gameScreen.setAttribute('aria-hidden', 'true');
            }
        }

        showGameScreen() {
            const mainMenu = document.getElementById('main-menu');
            const gameScreen = document.getElementById('game-screen');
            
            if (mainMenu) {
                mainMenu.classList.add('hidden');
                mainMenu.setAttribute('aria-hidden', 'true');
            }
            if (gameScreen) {
                gameScreen.classList.remove('hidden');
                gameScreen.setAttribute('aria-hidden', 'false');
            }
        }

        showPauseOverlay() {
            const overlay = document.getElementById('overlay-pause');
            if (overlay) {
                overlay.classList.remove('hidden');
                overlay.setAttribute('aria-hidden', 'false');
            }
        }

        hidePauseOverlay() {
            const overlay = document.getElementById('overlay-pause');
            if (overlay) {
                overlay.classList.add('hidden');
                overlay.setAttribute('aria-hidden', 'true');
            }
        }

        showGameOverModal() {
            const modal = document.getElementById('modal-gameover');
            const finalScore = document.getElementById('final-score');
            const finalLevel = document.getElementById('final-level');
            
            if (finalScore) finalScore.textContent = this.scoreCalculator.score;
            if (finalLevel) finalLevel.textContent = this.scoreCalculator.level;
            
            if (modal) {
                modal.classList.remove('hidden');
                modal.setAttribute('aria-hidden', 'false');
            }
        }

        hideModal() {
            const modal = document.getElementById('modal-gameover');
            if (modal) {
                modal.classList.add('hidden');
                modal.setAttribute('aria-hidden', 'true');
            }
        }

        updateUI() {
            if (this.scoreElement) this.scoreElement.textContent = this.scoreCalculator.score;
            if (this.levelElement) this.levelElement.textContent = this.scoreCalculator.level;
            if (this.linesElement) this.linesElement.textContent = this.scoreCalculator.totalLines;
            if (this.comboElement) this.comboElement.textContent = this.board.consecutiveClears;
            if (this.highScoreElement) this.highScoreElement.textContent = this.highScore;
        }

        saveHighScore() {
            try {
                localStorage.setItem('tetris_high_score', this.highScore.toString());
            } catch (e) {
                console.warn('Could not save high score to localStorage');
            }
        }

        loadHighScore() {
            try {
                const saved = localStorage.getItem('tetris_high_score');
                return saved ? parseInt(saved, 10) : 0;
            } catch (e) {
                console.warn('Could not load high score from localStorage');
                return 0;
            }
        }
    }

    let gameInstance = null;

    function init() {
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', () => {
                gameInstance = new Game();
            });
        } else {
            gameInstance = new Game();
        }
    }

    return {
        init,
        getInstance: () => gameInstance
    };
})();

TetrisGame.init();
  </script>
