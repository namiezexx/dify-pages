<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Classic Tetris 5 Stage 🎮</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --color-primary: #2E86C1;
      --color-primary-hover: #3498DB;
      --color-secondary: #F39C12;
      --color-background: #1C2833;
      --color-board-bg: #000000;
      --color-grid-line: #333333;
      --color-accent: #E74C3C;
      --color-white: #ffffff;
      --tetri-I: #00FFFF;
      --tetri-O: #FFFF00;
      --tetri-T: #800080;
      --tetri-S: #00FF00;
      --tetri-Z: #FF0000;
      --tetri-J: #0000FF;
      --tetri-L: #FFA500;
      --board-width: 300px;
      --board-height: 600px;
      --cell-size: 30px;
      --ui-gap: 18px;
      --glass-radius: 8px;
      --font-title: 'Orbitron', sans-serif;
      --font-mono: 'Roboto Mono', monospace;
    }
    * { box-sizing: border-box; }
    html,body { background: var(--color-background); color: var(--color-white); font-family: var(--font-mono); -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale; margin:0; height:100%; }
    .app {
      min-height:100vh;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      padding:24px;
      gap:16px;
    }
    .screen { display: none; }
    .screen.active { display: flex; flex-direction: column; align-items: center; }
    .main-menu {
      text-align:center;
      margin-bottom: 6px;
    }
    .menu-inner { backdrop-filter: blur(4px); padding:18px; border-radius:10px; }
    .title {
      font-family: var(--font-title);
      font-size: clamp(20px, 3vw, 36px);
      margin:0 0 8px 0;
      letter-spacing:1px;
      color: var(--color-primary);
      text-shadow: 0 0 8px rgba(46,134,193,0.25);
    }
    .subtitle { margin: 0 0 12px 0; color: #cfd8dc; font-size:14px; }
    .highscore { margin-top:12px; color:#ddd; font-size:14px; }
    .game-screen {
      display:flex;
      width: min(1100px, 96vw);
      gap: var(--ui-gap);
      align-items:flex-start;
      justify-content:center;
    }
    .hud {
      display:flex;
      flex-direction:column;
      gap:12px;
      width: 160px;
    }
    .hud-left { align-items:flex-start; }
    .hud-right { align-items:center; }
    .hud-item { background: rgba(255,255,255,0.03); padding:10px 12px; border-radius:8px; width:100%; border: 1px solid rgba(255,255,255,0.03); }
    .hud-label { font-size:12px; color:#bfc9ce; letter-spacing:1px; }
    .hud-value { font-family:var(--font-title); font-size:20px; color:var(--color-accent); }
    .next-box { background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(0,0,0,0.06)); padding:12px; border-radius:8px; border:2px solid var(--color-secondary); width:120px; text-align:center; }
    .next-label { font-size:12px; color:#111; background:var(--color-secondary); color:#fff; padding:6px 8px; border-radius:6px; margin-bottom:8px; display:inline-block; font-weight:700; }
    .btn { cursor:pointer; font-family:var(--font-mono); border-radius:6px; padding:10px 12px; border:2px solid rgba(255,255,255,0.06); background:transparent; color:var(--color-white); transition: all .18s ease; }
    .btn.primary { background: var(--color-primary); border:2px solid var(--color-white); box-shadow: 0 6px 18px rgba(46,134,193,0.14); }
    .btn.primary:hover { background: var(--color-primary-hover); transform: translateY(-2px); }
    .btn.secondary { background: rgba(255,255,255,0.03); border:2px solid rgba(255,255,255,0.04); }
    .btn.ghost { background:transparent; border:2px dashed rgba(255,255,255,0.06); }
    .controls-hint { margin-top:8px; font-size:12px; color:#b6c2c8; text-align:center; }
    .board-area { display:flex; align-items:center; justify-content:center; }
    .board-frame {
      position:relative;
      width:var(--board-width);
      height:var(--board-height);
      background: var(--color-board-bg);
      border-radius:8px;
      border: 4px solid var(--color-primary);
      box-shadow:
        0 0 18px rgba(46,134,193,0.12),
        inset 0 0 30px rgba(255,255,255,0.02);
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
    }
    canvas#game-canvas {
      display:block;
      width:100%;
      height:100%;
      image-rendering: pixelated;
      background: var(--color-board-bg);
      box-shadow: 0 6px 24px rgba(0,0,0,0.6);
    }
    .board-overlay {
      position:absolute;
      inset:0;
      pointer-events:none;
      background-image:
        linear-gradient(to right, rgba(51,51,51,0.6) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(51,51,51,0.6) 1px, transparent 1px);
      background-size: var(--cell-size) var(--cell-size);
      mix-blend-mode: multiply;
    }
    .board-frame::after{
      content:'';
      position:absolute;
      inset:-6px;
      border-radius:12px;
      background: radial-gradient(closest-side, rgba(46,134,193,0.12), transparent 60%);
      pointer-events:none;
    }
    .board-anim { position:absolute; inset:0; pointer-events:none; }
    .modal {
      position:fixed;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      background: rgba(0,0,0,0.6);
      opacity:0;
      visibility:hidden;
      transition: all .22s ease;
      z-index:60;
    }
    .modal.show, .modal[aria-hidden="false"] {
      opacity:1;
      visibility:visible;
    }
    .modal-panel {
      background: #ffffff;
      color:#101217;
      padding:22px;
      border-radius:10px;
      min-width:280px;
      text-align:center;
      box-shadow: 0 18px 50px rgba(0,0,0,0.6);
    }
    .modal-title { font-family:var(--font-title); color:var(--color-primary); margin:0 0 8px 0; }
    .modal-body { margin:8px 0; font-size:16px; }
    .modal-actions { display:flex; gap:12px; justify-content:center; margin-top:12px; }
    .stage-clear {
      position:fixed;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      pointer-events:none;
      opacity:0;
      transform:scale(.98);
      transition:all .2s ease;
      z-index:70;
    }
    .stage-clear.show-stage {
      opacity:1;
      transform:scale(1);
    }
    .stage-clear-text {
      font-family:var(--font-title);
      font-size: clamp(20px, 6vw, 48px);
      color:var(--color-secondary);
      text-shadow: 0 0 18px rgba(243,156,18,0.8), 0 0 36px rgba(231,76,60,0.15);
      padding:12px 18px;
      border-radius:8px;
      background: rgba(0,0,0,0.6);
      border: 2px solid rgba(255,255,255,0.05);
      transform-origin:center;
      animation: stage-pop .9s ease forwards;
    }
    @keyframes stage-pop {
      0% { transform: scale(.6) translateY(10px); opacity:0; filter:blur(4px); }
      50% { transform: scale(1.08) translateY(-6px); opacity:1; filter:blur(0); }
      100% { transform: scale(1) translateY(0); opacity:1; filter:blur(0); }
    }
    .line-clear {
      animation: line-blink .3s ease-in-out 1;
    }
    @keyframes line-blink {
      0% { background: rgba(255,255,255,0.9); transform: translateY(0); }
      50% { background: rgba(255,255,255,0.2); transform: translateY(-2px); }
      100% { background: transparent; transform: translateY(0); }
    }
    .land {
      animation: land-vibe .12s ease 1;
    }
    @keyframes land-vibe {
      0% { transform: translateY(0); }
      25% { transform: translateY(-2px); }
      50% { transform: translateY(1px); }
      100% { transform: translateY(0); }
    }
    @media (max-width:900px){
      .game-screen { flex-direction:column; align-items:center; gap:12px; }
      .hud { width:100%; flex-direction:row; justify-content:space-between; }
      .hud-right { margin-top:6px; }
    }
    @media (max-width:420px){
      .board-frame { transform: scale(.9); transform-origin:center; }
      .menu-inner { padding:12px; }
    }
    canvas#next-canvas {
      border-radius:8px;
      background: linear-gradient(180deg, rgba(0,0,0,0.06), rgba(255,255,255,0.02));
      box-shadow: 0 8px 18px rgba(0,0,0,0.6), inset 0 0 18px rgba(243,156,18,0.06);
    }
    .app-footer { margin-top:8px; color:#9fb0bb; font-size:12px; }
    .hidden { display:none !important; }
    .show { display:block !important; }
    .tetri-color-I { background: var(--tetri-I); }
    .tetri-color-O { background: var(--tetri-O); }
    .tetri-color-T { background: var(--tetri-T); }
    .tetri-color-S { background: var(--tetri-S); }
    .tetri-color-Z { background: var(--tetri-Z); }
    .tetri-color-J { background: var(--tetri-J); }
    .tetri-color-L { background: var(--tetri-L); }
  </style>
</head>
<body>
  <div class="app" id="app">
    <header class="main-menu screen active" id="main-menu" role="banner">
      <div class="menu-inner">
        <h1 class="title">Classic Tetris 5 Stage <span aria-hidden="true">🕹️</span></h1>
        <p class="subtitle">클래식 아케이드 스타일의 5단계 테트리스</p>
        <button id="start-btn" class="btn primary">게임 시작</button>
        <div class="highscore">최고 점수: <span id="high-score">0</span></div>
      </div>
    </header>

    <main id="game-screen" class="game-screen screen" role="main" aria-live="polite">
      <aside class="hud hud-left" id="hud-left" aria-label="상태 표시">
        <div class="hud-item">
          <div class="hud-label">SCORE</div>
          <div id="score" class="hud-value">0</div>
        </div>
        <div class="hud-item">
          <div class="hud-label">STAGE</div>
          <div id="stage" class="hud-value">1</div>
        </div>
        <div class="hud-item">
          <div class="hud-label">LINES</div>
          <div id="lines" class="hud-value">0</div>
        </div>
      </aside>

      <section class="board-area" id="board-area" aria-label="게임 보드 영역">
        <div class="board-frame">
          <canvas id="game-canvas" width="300" height="600" aria-label="테트리스 게임 보드"></canvas>
          <div class="board-overlay" aria-hidden="true"></div>
          <div class="board-anim" id="board-anim" aria-hidden="true"></div>
        </div>
      </section>

      <aside class="hud hud-right" id="hud-right" aria-label="다음 블록 및 컨트롤">
        <div class="next-box">
          <div class="next-label">NEXT</div>
          <canvas id="next-canvas" width="120" height="120" aria-label="다음 블록 미리보기"></canvas>
        </div>
        <button id="pause-btn" class="btn secondary">⏸️ 일시정지</button>
        <div class="controls-hint" aria-hidden="true">
          ← → : 이동 · ↑ : 회전 · ↓ : 소프트드롭 · Space : 하드드롭
        </div>
      </aside>
    </main>

    <div id="game-over-modal" class="modal" role="dialog" aria-modal="true" aria-hidden="true">
      <div class="modal-panel" role="document">
        <h2 class="modal-title">게임 종료</h2>
        <p class="modal-body">최종 점수: <strong id="final-score">0</strong></p>
        <p class="modal-body">클리어 스테이지: <strong id="final-stage">0</strong></p>
        <div class="modal-actions">
          <button id="restart-btn" class="btn primary">다시하기</button>
          <button id="main-menu-btn" class="btn ghost">메인으로</button>
        </div>
      </div>
    </div>

    <div id="pause-modal" class="modal" role="dialog" aria-modal="true" aria-hidden="true">
      <div class="modal-panel" role="document">
        <h2 class="modal-title">일시정지</h2>
        <p class="modal-body">게임이 일시정지되었습니다.</p>
        <div class="modal-actions">
          <button id="resume-btn" class="btn primary">계속하기</button>
        </div>
      </div>
    </div>

    <div id="stage-clear" class="stage-clear" aria-hidden="true">
      <div class="stage-clear-text" id="stage-clear-text">STAGE 1 CLEAR!</div>
    </div>

    <footer class="app-footer">
      <small>Made with ❤️ · Neon Arcade Style · Fonts: Orbitron / Roboto Mono</small>
    </footer>
  </div>

  <script>
    class TetrisGame {
        constructor() {
            this.BOARD_WIDTH = 10;
            this.BOARD_HEIGHT = 20;
            this.CELL_SIZE = 30;
            this.INITIAL_SPEED = 1000;
            this.SPEED_DECREASE_RATE = 0.03;
            this.LINES_PER_STAGE = 20;
            this.MAX_STAGE = 5;
            
            this.TETROMINOES = {
                I: { shape: [[1,1,1,1]], color: '#00FFFF' },
                O: { shape: [[1,1],[1,1]], color: '#FFFF00' },
                T: { shape: [[0,1,0],[1,1,1]], color: '#800080' },
                S: { shape: [[0,1,1],[1,1,0]], color: '#00FF00' },
                Z: { shape: [[1,1,0],[0,1,1]], color: '#FF0000' },
                J: { shape: [[1,0,0],[1,1,1]], color: '#0000FF' },
                L: { shape: [[0,0,1],[1,1,1]], color: '#FFA500' }
            };
            
            this.PIECE_TYPES = Object.keys(this.TETROMINOES);
            this.LINE_SCORES = { 1: 100, 2: 300, 3: 500, 4: 800 };
            
            this.initializeGame();
            this.bindEvents();
            this.gameLoop();
        }
        
        initializeGame() {
            this.gameState = 'MENU';
            this.board = Array(this.BOARD_HEIGHT).fill().map(() => Array(this.BOARD_WIDTH).fill(0));
            this.currentPiece = null;
            this.nextPiece = null;
            this.score = 0;
            this.lines = 0;
            this.stage = 1;
            this.speed = this.INITIAL_SPEED;
            this.lastDropTime = 0;
            this.isGameOver = false;
            
            this.canvas = document.getElementById('game-canvas');
            this.ctx = this.canvas.getContext('2d');
            this.nextCanvas = document.getElementById('next-canvas');
            this.nextCtx = this.nextCanvas.getContext('2d');
            
            this.scoreElement = document.getElementById('score');
            this.stageElement = document.getElementById('stage');
            this.linesElement = document.getElementById('lines');
            
            this.highScore = parseInt(localStorage.getItem('tetris-high-score') || '0');
            document.getElementById('high-score').textContent = this.highScore.toLocaleString();
            
            this.generateNextPiece();
            this.spawnNewPiece();
        }
        
        bindEvents() {
            document.addEventListener('keydown', (e) => {
                if (this.gameState !== 'PLAYING') return;
                
                switch(e.code) {
                    case 'ArrowLeft':
                        this.movePiece(-1, 0);
                        e.preventDefault();
                        break;
                    case 'ArrowRight':
                        this.movePiece(1, 0);
                        e.preventDefault();
                        break;
                    case 'ArrowDown':
                        this.movePiece(0, 1);
                        e.preventDefault();
                        break;
                    case 'ArrowUp':
                        this.rotatePiece();
                        e.preventDefault();
                        break;
                    case 'Space':
                        this.hardDrop();
                        e.preventDefault();
                        break;
                    case 'KeyP':
                        this.togglePause();
                        e.preventDefault();
                        break;
                }
            });
            
            document.getElementById('start-btn').addEventListener('click', () => {
                this.startGame();
            });
            
            document.getElementById('restart-btn').addEventListener('click', () => {
                this.restartGame();
            });
            
            document.getElementById('main-menu-btn').addEventListener('click', () => {
                this.showMainMenu();
            });
            
            document.getElementById('pause-btn').addEventListener('click', () => {
                this.togglePause();
            });
            
            const resumeBtn = document.getElementById('resume-btn');
            if (resumeBtn) {
                resumeBtn.addEventListener('click', () => {
                    this.togglePause();
                });
            }
        }
        
        startGame() {
            this.gameState = 'PLAYING';
            this.showScreen('game-screen');
            this.updateUI();
            this.lastDropTime = performance.now();
        }
        
        restartGame() {
            this.hideModal('game-over-modal');
            this.initializeGame();
            this.startGame();
        }
        
        showMainMenu() {
            this.gameState = 'MENU';
            this.hideModal('game-over-modal');
            this.hideModal('pause-modal');
            this.showScreen('main-menu');
        }
        
        togglePause() {
            if (this.gameState === 'PLAYING') {
                this.gameState = 'PAUSED';
                this.showModal('pause-modal');
            } else if (this.gameState === 'PAUSED') {
                this.gameState = 'PLAYING';
                this.hideModal('pause-modal');
                this.lastDropTime = performance.now();
            }
        }
        
        showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(screen => {
                screen.classList.remove('active');
            });
            document.getElementById(screenId).classList.add('active');
        }
        
        showModal(modalId) {
            const modal = document.getElementById(modalId);
            modal.classList.add('show');
            modal.setAttribute('aria-hidden', 'false');
        }
        
        hideModal(modalId) {
            const modal = document.getElementById(modalId);
            modal.classList.remove('show');
            modal.setAttribute('aria-hidden', 'true');
        }
        
        generateNextPiece() {
            const type = this.PIECE_TYPES[Math.floor(Math.random() * this.PIECE_TYPES.length)];
            this.nextPiece = {
                type: type,
                shape: this.TETROMINOES[type].shape,
                color: this.TETROMINOES[type].color,
                x: 0,
                y: 0
            };
            this.drawNextPiece();
        }
        
        spawnNewPiece() {
            this.currentPiece = this.nextPiece;
            this.currentPiece.x = Math.floor((this.BOARD_WIDTH - this.currentPiece.shape[0].length) / 2);
            this.currentPiece.y = 0;
            
            if (this.checkCollision(this.currentPiece, 0, 0)) {
                this.gameOver();
                return;
            }
            
            this.generateNextPiece();
        }
        
        movePiece(dx, dy) {
            if (!this.currentPiece) return;
            
            if (!this.checkCollision(this.currentPiece, dx, dy)) {
                this.currentPiece.x += dx;
                this.currentPiece.y += dy;
                return true;
            }
            
            if (dy > 0) {
                this.placePiece();
            }
            
            return false;
        }
        
        rotatePiece() {
            if (!this.currentPiece) return;
            
            const rotated = this.rotateMatrix(this.currentPiece.shape);
            const originalShape = this.currentPiece.shape;
            
            this.currentPiece.shape = rotated;
            
            if (this.checkCollision(this.currentPiece, 0, 0)) {
                const kicks = [[-1, 0], [1, 0], [0, -1], [-2, 0], [2, 0]];
                let canRotate = false;
                
                for (let [dx, dy] of kicks) {
                    if (!this.checkCollision(this.currentPiece, dx, dy)) {
                        this.currentPiece.x += dx;
                        this.currentPiece.y += dy;
                        canRotate = true;
                        break;
                    }
                }
                
                if (!canRotate) {
                    this.currentPiece.shape = originalShape;
                }
            }
        }
        
        rotateMatrix(matrix) {
            const rows = matrix.length;
            const cols = matrix[0].length;
            const rotated = Array(cols).fill().map(() => Array(rows).fill(0));
            
            for (let i = 0; i < rows; i++) {
                for (let j = 0; j < cols; j++) {
                    rotated[j][rows - 1 - i] = matrix[i][j];
                }
            }
            
            return rotated;
        }
        
        hardDrop() {
            if (!this.currentPiece) return;
            
            while (this.movePiece(0, 1)) {
                this.score += 2;
            }
            this.updateUI();
        }
        
        checkCollision(piece, dx, dy) {
            const newX = piece.x + dx;
            const newY = piece.y + dy;
            
            for (let y = 0; y < piece.shape.length; y++) {
                for (let x = 0; x < piece.shape[y].length; x++) {
                    if (piece.shape[y][x]) {
                        const boardX = newX + x;
                        const boardY = newY + y;
                        
                        if (boardX < 0 || boardX >= this.BOARD_WIDTH || 
                            boardY >= this.BOARD_HEIGHT) {
                            return true;
                        }
                        
                        if (boardY >= 0 && this.board[boardY][boardX]) {
                            return true;
                        }
                    }
                }
            }
            
            return false;
        }
        
        placePiece() {
            if (!this.currentPiece) return;
            
            for (let y = 0; y < this.currentPiece.shape.length; y++) {
                for (let x = 0; x < this.currentPiece.shape[y].length; x++) {
                    if (this.currentPiece.shape[y][x]) {
                        const boardY = this.currentPiece.y + y;
                        const boardX = this.currentPiece.x + x;
                        
                        if (boardY >= 0) {
                            this.board[boardY][boardX] = this.currentPiece.color;
                        }
                    }
                }
            }
            
            this.clearLines();
            this.spawnNewPiece();
        }
        
        clearLines() {
            let linesCleared = 0;
            const clearedLines = [];
            
            for (let y = this.BOARD_HEIGHT - 1; y >= 0; y--) {
                if (this.board[y].every(cell => cell !== 0)) {
                    clearedLines.push(y);
                    linesCleared++;
                }
            }
            
            if (linesCleared > 0) {
                this.animateLinesClear(clearedLines);
                
                this.score += this.LINE_SCORES[linesCleared];
                this.lines += linesCleared;
                
                clearedLines.forEach(lineY => {
                    this.board.splice(lineY, 1);
                    this.board.unshift(Array(this.BOARD_WIDTH).fill(0));
                });
                
                this.checkStageProgress();
                this.updateUI();
            }
        }
        
        animateLinesClear(lines) {
            lines.forEach(y => {
                for (let x = 0; x < this.BOARD_WIDTH; x++) {
                    this.board[y][x] = '#FFFFFF';
                }
            });
            
            this.draw();
            
            setTimeout(() => {
                this.draw();
            }, 300);
        }
        
        checkStageProgress() {
            const newStage = Math.floor(this.lines / this.LINES_PER_STAGE) + 1;
            
            if (newStage > this.stage && newStage <= this.MAX_STAGE) {
                this.stage = newStage;
                this.speed = this.INITIAL_SPEED * Math.pow(1 - this.SPEED_DECREASE_RATE, this.stage - 1);
                this.showStageClear();
            } else if (this.stage === this.MAX_STAGE && this.lines >= this.MAX_STAGE * this.LINES_PER_STAGE) {
                this.gameComplete();
            }
        }
        
        showStageClear() {
            const message = `STAGE ${this.stage} START!`;
            this.showTemporaryMessage(message, 1500);
        }
        
        showTemporaryMessage(message, duration) {
            const stageElement = document.getElementById('stage-clear');
            const textElement = document.getElementById('stage-clear-text');
            
            textElement.textContent = message;
            stageElement.classList.add('show-stage');
            stageElement.setAttribute('aria-hidden', 'false');
            
            setTimeout(() => {
                stageElement.classList.remove('show-stage');
                stageElement.setAttribute('aria-hidden', 'true');
            }, duration);
        }
        
        gameComplete() {
            this.gameState = 'GAME_OVER';
            this.saveHighScore();
            
            document.getElementById('final-score').textContent = this.score.toLocaleString();
            document.getElementById('final-stage').textContent = `All ${this.MAX_STAGE} Stages Completed!`;
            
            this.showModal('game-over-modal');
            this.showTemporaryMessage('GAME COMPLETE!', 2000);
        }
        
        gameOver() {
            this.gameState = 'GAME_OVER';
            this.saveHighScore();
            
            document.getElementById('final-score').textContent = this.score.toLocaleString();
            document.getElementById('final-stage').textContent = `Stage ${this.stage} Reached`;
            
            this.showModal('game-over-modal');
        }
        
        saveHighScore() {
            if (this.score > this.highScore) {
                this.highScore = this.score;
                localStorage.setItem('tetris-high-score', this.highScore.toString());
                document.getElementById('high-score').textContent = this.highScore.toLocaleString();
            }
        }
        
        updateUI() {
            if (this.scoreElement) this.scoreElement.textContent = this.score.toLocaleString();
            if (this.stageElement) this.stageElement.textContent = this.stage;
            if (this.linesElement) this.linesElement.textContent = this.lines;
        }
        
        drawNextPiece() {
            if (!this.nextCtx || !this.nextPiece) return;
            
            this.nextCtx.clearRect(0, 0, this.nextCanvas.width, this.nextCanvas.height);
            
            const shape = this.nextPiece.shape;
            const cellSize = 20;
            const offsetX = (this.nextCanvas.width - shape[0].length * cellSize) / 2;
            const offsetY = (this.nextCanvas.height - shape.length * cellSize) / 2;
            
            for (let y = 0; y < shape.length; y++) {
                for (let x = 0; x < shape[y].length; x++) {
                    if (shape[y][x]) {
                        this.nextCtx.fillStyle = this.nextPiece.color;
                        this.nextCtx.fillRect(
                            offsetX + x * cellSize,
                            offsetY + y * cellSize,
                            cellSize - 1,
                            cellSize - 1
                        );
                    }
                }
            }
        }
        
        draw() {
            if (!this.ctx) return;
            
            this.ctx.fillStyle = '#000000';
            this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
            
            for (let y = 0; y < this.BOARD_HEIGHT; y++) {
                for (let x = 0; x < this.BOARD_WIDTH; x++) {
                    if (this.board[y][x]) {
                        this.ctx.fillStyle = this.board[y][x];
                        this.ctx.fillRect(
                            x * this.CELL_SIZE + 1,
                            y * this.CELL_SIZE + 1,
                            this.CELL_SIZE - 2,
                            this.CELL_SIZE - 2
                        );
                    }
                }
            }
            
            if (this.currentPiece) {
                this.ctx.fillStyle = this.currentPiece.color;
                
                for (let y = 0; y < this.currentPiece.shape.length; y++) {
                    for (let x = 0; x < this.currentPiece.shape[y].length; x++) {
                        if (this.currentPiece.shape[y][x]) {
                            const drawX = (this.currentPiece.x + x) * this.CELL_SIZE + 1;
                            const drawY = (this.currentPiece.y + y) * this.CELL_SIZE + 1;
                            
                            if (drawY >= 0) {
                                this.ctx.fillRect(drawX, drawY, this.CELL_SIZE - 2, this.CELL_SIZE - 2);
                            }
                        }
                    }
                }
            }
        }
        
        gameLoop() {
            const currentTime = performance.now();
            
            if (this.gameState === 'PLAYING') {
                if (currentTime - this.lastDropTime >= this.speed) {
                    this.movePiece(0, 1);
                    this.lastDropTime = currentTime;
                }
                
                this.draw();
            }
            
            requestAnimationFrame(() => this.gameLoop());
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        try {
            const game = new TetrisGame();
            window.tetrisGame = game;
        } catch (error) {
            console.error('게임 초기화 중 오류 발생:', error);
            alert('게임을 로드하는 중 오류가 발생했습니다. 페이지를 새로고침해 주세요.');
        }
    });

    window.addEventListener('beforeunload', () => {
        if (window.tetrisGame && window.tetrisGame.score > 0) {
            window.tetrisGame.saveHighScore();
        }
    });
  </script>
