<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>길진이 테트리스</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">

  <style>
    /* CSS 퍼블리셔 스타일시트 (전체화면 기반, 반응형) */
    :root{
      /* Color palette */
      --color-bg: #ECF0F1;
      --color-bg-2: #D5DBDB;
      --color-primary: #2C3E50;
      --color-secondary: #34495E;
      --color-accent: #E74C3C;

      /* Block colors (7 테트로미노 컬러) */
      --c1: #FF6B6B;
      --c2: #4ECDC4;
      --c3: #45B7D1;
      --c4: #96CEB4;
      --c5: #FECA57;
      --c6: #FF9FF3;
      --c7: #54A0FF;

      /* Sizes */
      --cell-size: 30px; /* 1 cell = 30px (보드 10x20 => 300x600) */
      --board-w: calc(var(--cell-size) * 10);
      --board-h: calc(var(--cell-size) * 20);
      --info-w: 170px;
      --gap: 24px;

      /* UI */
      --radius: 8px;
      --shadow: 0 2px 4px rgba(0,0,0,0.08);
      --glass: rgba(255,255,255,0.9);

      /* Typography */
      --font-title: 'Press Start 2P', monospace;
      --font-body: 'Roboto', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial;

      /* Animations */
      --blink-dur: 0.3s;
      --levelup-dur: 1s;
      --land-dur: 0.12s;

      /* Breakpoints */
      --mobile-break: 520px;
    }

    /* Base / Layout */
    *{box-sizing:border-box}
    html,body{height:100%;margin:0;background:linear-gradient(180deg,var(--color-bg),var(--color-bg-2));font-family:var(--font-body);color:var(--color-primary);-webkit-font-smoothing:antialiased}
    .app{min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:32px}

    /* Header */
    .header{margin-bottom:12px;text-align:center}
    .game-title{font-family:var(--font-title);font-size:18px;margin:0;color:var(--color-primary)}
    .subtitle{margin:6px 0 0;font-size:12px;color:var(--color-secondary)}

    /* Stage layout */
    .game-stage{display:flex;gap:var(--gap);align-items:flex-start;justify-content:center;width:100%;max-width:960px;padding:18px}

    /* Board Wrap */
    .board-wrap{display:flex;flex-direction:column;align-items:center;gap:12px}
    .board-frame{
      width:var(--board-w);
      height:var(--board-h);
      border:3px solid var(--color-primary);
      border-radius:6px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.02), rgba(0,0,0,0.02)),
        repeating-linear-gradient(90deg, rgba(0,0,0,0.02) 0 calc(var(--cell-size) - 1px), transparent calc(var(--cell-size) - 1px) var(--cell-size)),
        repeating-linear-gradient(180deg, rgba(0,0,0,0.02) 0 calc(var(--cell-size) - 1px), transparent calc(var(--cell-size) - 1px) var(--cell-size));
      position:relative;
      box-shadow:var(--shadow);
      background-color:#ffffff; /* 캔버스에 투명으로 그려지는 경우 대비 */
      overflow:hidden;
    }

    /* Canvas fills the frame (JS draws board & blocks) */
    .board-canvas{
      width:100%;
      height:100%;
      display:block;
      image-rendering:pixelated;
      background:transparent; /* 캔버스 투명. frame의 grid가 보임 */
    }

    /* Overlay layer to animate row clears etc. (JS can append .row-overlay children) */
    .overlay-layer{
      position:absolute;left:0;top:0;width:100%;height:100%;pointer-events:none;
    }

    /* Row overlay element (JS should create div.row-overlay and position with top and height) */
    .row-overlay{
      position:absolute;left:0;width:100%;
      background:rgba(255,255,255,0.12);
      mix-blend-mode:screen;
      /* blinking animation is applied via .line-clear class */
    }
    .row-overlay.line-clear{
      animation: blink var(--blink-dur) steps(2);
    }

    /* Controls */
    .controls{width:var(--board-w);display:flex;flex-direction:column;gap:8px;align-items:center}
    .hint{font-size:12px;color:var(--color-secondary)}
    .control-buttons{display:flex;gap:8px}
    .btn{
      font-family:var(--font-body);
      border-radius:var(--radius);
      padding:8px 12px;
      border:0;
      cursor:pointer;
      box-shadow:var(--shadow);
      background:var(--glass);
      color:var(--color-primary);
      font-weight:600;
      font-size:13px;
    }
    .btn:active{transform:translateY(1px)}
    .btn-primary{background:linear-gradient(180deg,var(--color-secondary),#2f4b63);color:#fff}
    .btn-ghost{background:transparent;border:1px solid rgba(0,0,0,0.06)}
    .btn-danger{background:linear-gradient(180deg,#e74c3c,#c63f32);color:#fff}

    /* Info panel */
    .info-panel{
      width:var(--info-w);
      background:var(--glass);
      border-radius:10px;
      padding:14px;
      box-shadow:var(--shadow);
      display:flex;
      flex-direction:column;
      gap:12px;
    }
    .info-card{display:flex;flex-direction:column;gap:10px}
    .info-row{display:flex;justify-content:space-between;align-items:center}
    .label{font-size:11px;color:var(--color-secondary);letter-spacing:1px}
    .value{font-weight:700;color:var(--color-primary)}
    .level-value{color:var(--color-accent);font-size:14px}
    .score-value{font-size:20px}
    .lines-value{font-size:13px}

    /* Next preview box */
    .preview{display:flex;flex-direction:column;gap:6px}
    .preview-box{
      width:120px;height:120px;border-radius:8px;background:rgba(255,255,255,0.85);display:flex;align-items:center;justify-content:center;border:1px solid rgba(0,0,0,0.04)
    }
    .next-canvas{width:100px;height:100px;background:transparent;image-rendering:pixelated}

    /* Palette pips */
    .palette{margin-top:4px}
    .pal-title{font-size:11px;color:var(--color-secondary);margin-bottom:6px}
    .pips{display:flex;gap:6px;flex-wrap:wrap}
    .pip{width:18px;height:18px;border-radius:4px;box-shadow:inset 0 -2px 6px rgba(0,0,0,0.06)}
    .pip.c1{background:var(--c1)}
    .pip.c2{background:var(--c2)}
    .pip.c3{background:var(--c3)}
    .pip.c4{background:var(--c4)}
    .pip.c5{background:var(--c5)}
    .pip.c6{background:var(--c6)}
    .pip.c7{background:var(--c7)}

    /* Modal */
    .modal{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(2,6,23,0.35);z-index:60}
    .modal.hidden{display:none}
    .modal-card{width:320px;max-width:90%;background:linear-gradient(180deg,#fff,#f8f9fa);padding:20px;border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,0.18);text-align:center}
    .modal-title{font-family:var(--font-title);font-size:14px;margin:0 0 8px;color:var(--color-primary)}
    .modal-desc{font-size:13px;color:var(--color-secondary);margin:0 0 12px}
    .modal-actions{display:flex;gap:10px;justify-content:center;margin-top:12px}
    .modal-foot{display:block;margin-top:10px;color:var(--color-secondary);font-size:11px}

    /* Result card details */
    .result-card .result-body{margin-top:8px;font-size:14px;color:var(--color-primary)}
    .result-card .result-body p{margin:6px 0}

    /* Footer */
    .footer{margin-top:18px;color:var(--color-secondary);font-size:12px}

    /* Animations */
    /* Blink used for line clear */
    @keyframes blink{
      0%{opacity:1}
      50%{opacity:0}
      100%{opacity:1}
    }

    /* Level up pulse: applied to #game-stage via .level-up class with pseudo-element border */
    #game-stage.level-up{
      position:relative;
    }
    #game-stage.level-up::before{
      content:'';
      position:absolute;inset:-6px;border-radius:8px;
      box-shadow:0 0 0 3px rgba(52,152,219,0.18);
      animation:levelPulse var(--levelup-dur) ease-out;
      pointer-events:none;
    }
    @keyframes levelPulse{
      0%{transform:scale(0.98);opacity:0}
      50%{transform:scale(1);opacity:1}
      100%{transform:scale(1.02);opacity:0}
    }

    /* Block landing vibration (apply .landed to board-frame) */
    @keyframes landVibrate{
      0%{transform:translateY(0)}
      25%{transform:translateY(-2px)}
      50%{transform:translateY(0)}
      75%{transform:translateY(2px)}
      100%{transform:translateY(0)}
    }
    .board-frame.landed{animation:landVibrate var(--land-dur) ease-in-out 2}

    /* Game over / clear visual states */
    .app.game-over .board-frame{
      filter:grayscale(0.6) brightness(0.9);
      opacity:0.9;
    }
    .app.game-clear .board-frame{
      box-shadow:0 0 32px rgba(84,160,255,0.18);
      transform:scale(1.01);
    }

    /* Responsive behavior: scale down the whole stage on small screens */
    @media (max-width:720px){
      .game-stage{flex-direction:column;align-items:center}
      .info-panel{width:90%}
    }
    @media (max-width:520px){
      /* Scale the board to fit mobile */
      .board-frame,
      .board-canvas{
        transform-origin:top center;
        transform:scale(0.85);
      }
      .controls .btn{padding:8px 10px;font-size:12px}
    }

    /* Utility: visually-hidden for accessibility */
    .visually-hidden{position:absolute!important;height:1px;width:1px;overflow:hidden;clip:rect(1px,1px,1px,1px);white-space:nowrap}
  </style>
</head>
<body>
  <main id="app" class="app">
    <header class="header">
      <h1 class="game-title">🧩 길진이 테트리스</h1>
      <p class="subtitle">클래식 + 5단계 난이도 • 모바일/데스크톱 반응형</p>
    </header>

    <section id="game-stage" class="game-stage">
      <div class="board-wrap">
        <div class="board-frame" role="region" aria-label="게임 보드">
          <canvas id="game-canvas" width="300" height="600" class="board-canvas"></canvas>
          <div id="overlay-layer" class="overlay-layer" aria-hidden="true"></div>
        </div>

        <div class="controls">
          <div class="hint">키 조작: ◀ ▶ (이동) ▲ (회전) ▼ (하강)</div>
          <div class="control-buttons">
            <button id="start-btn" class="btn btn-primary">시작 ▶</button>
            <button id="pause-btn" class="btn btn-ghost" aria-pressed="false">일시정지 ⏸</button>
            <button id="restart-btn" class="btn btn-danger">재시작 ↻</button>
          </div>
        </div>
      </div>

      <aside class="info-panel" aria-label="게임 정보">
        <div class="info-card">
          <div class="info-row">
            <div class="label">LEVEL</div>
            <div id="level" class="value level-value">1</div>
          </div>

          <div class="info-row">
            <div class="label">SCORE</div>
            <div id="score" class="value score-value">0</div>
          </div>

          <div class="info-row">
            <div class="label">LINES</div>
            <div id="lines" class="value lines-value">0 / 10</div>
          </div>

          <div class="preview">
            <div class="label">NEXT</div>
            <div class="preview-box">
              <canvas id="next-canvas" width="120" height="120" class="next-canvas"></canvas>
            </div>
          </div>
        </div>

        <div class="meta">
          <div class="palette">
            <div class="pal-title">블록 색상</div>
            <div class="pips">
              <span class="pip c1" title="#FF6B6B"></span>
              <span class="pip c2" title="#4ECDC4"></span>
              <span class="pip c3" title="#45B7D1"></span>
              <span class="pip c4" title="#96CEB4"></span>
              <span class="pip c5" title="#FECA57"></span>
              <span class="pip c6" title="#FF9FF3"></span>
              <span class="pip c7" title="#54A0FF"></span>
            </div>
          </div>

          <div class="small-hint">
            <strong>팁:</strong> 10줄마다 레벨 업! 속도 +5% 🔥
          </div>
        </div>
      </aside>
    </section>

    <div id="start-modal" class="modal modal-center" role="dialog" aria-modal="true" aria-hidden="false">
      <div class="modal-card">
        <h2 class="modal-title">길진이 테트리스</h2>
        <p class="modal-desc">클래식 테트리스에 도전하세요! 5단계 레벨을 달성하면 승리합니다.</p>
        <div class="modal-actions">
          <button id="modal-start" class="btn btn-primary">게임 시작</button>
        </div>
        <small class="modal-foot">조작: ◀ ▶ ▲ ▼ • 모바일은 버튼 사용</small>
      </div>
    </div>

    <div id="result-modal" class="modal modal-center hidden" role="dialog" aria-modal="true" aria-hidden="true">
      <div class="modal-card result-card">
        <h2 id="result-title" class="modal-title">게임 종료</h2>
        <div class="result-body">
          <p>최종 점수: <span id="final-score">0</span></p>
          <p>도달 레벨: <span id="final-level">1</span></p>
        </div>
        <div class="modal-actions">
          <button id="modal-restart" class="btn btn-primary">다시하기</button>
          <button id="modal-close" class="btn btn-ghost">닫기</button>
        </div>
      </div>
    </div>

    <footer class="footer">
      <small>© 길진이 테트리스 • Retro modern • Press Start 2P / Roboto</small>
    </footer>
  </main>

  <script>
    // 길진이 테트리스 게임 - 메인 게임 로직
    class TetrisGame {
        constructor() {
            // 게임 상태 초기화
            this.board = new Array(20).fill().map(() => new Array(10).fill(0));
            this.currentPiece = null;
            this.nextPiece = null;
            this.level = 1;
            this.score = 0;
            this.linesCleared = 0;
            this.dropTime = 1000;
            this.lastTime = 0;
            this.isGameRunning = false;
            this.isPaused = false;
            this.gameState = 'menu';
            
            // Canvas 및 컨텍스트 초기화
            this.canvas = document.getElementById('game-canvas');
            this.ctx = this.canvas.getContext('2d');
            this.nextCanvas = document.getElementById('next-canvas');
            this.nextCtx = this.nextCanvas.getContext('2d');
            
            // 게임 설정
            this.BLOCK_SIZE = 30;
            this.BOARD_WIDTH = 10;
            this.BOARD_HEIGHT = 20;
            
            // 테트로미노 정의 (7가지 블록)
            this.PIECES = {
                'I': { shape: [[1, 1, 1, 1]], color: '#FF6B6B' },
                'O': { shape: [[1, 1], [1, 1]], color: '#4ECDC4' },
                'T': { shape: [[0, 1, 0], [1, 1, 1]], color: '#45B7D1' },
                'S': { shape: [[0, 1, 1], [1, 1, 0]], color: '#96CEB4' },
                'Z': { shape: [[1, 1, 0], [0, 1, 1]], color: '#FECA57' },
                'J': { shape: [[1, 0, 0], [1, 1, 1]], color: '#FF9FF3' },
                'L': { shape: [[0, 0, 1], [1, 1, 1]], color: '#54A0FF' }
            };
            
            // 이벤트 리스너 등록
            this.setupEventListeners();
            
            // 최고 점수 불러오기
            this.highScore = parseInt(localStorage.getItem('tetrisHighScore') || '0');
            
            // 첫 번째 블록 생성
            this.generateNewPiece();
            this.generateNextPiece();
            
            // 초기 그리기
            this.draw();
        }
        
        setupEventListeners() {
            document.addEventListener('keydown', (e) => this.handleKeyPress(e));
            
            document.getElementById('start-btn').addEventListener('click', () => this.startGame());
            document.getElementById('pause-btn').addEventListener('click', () => this.togglePause());
            document.getElementById('restart-btn').addEventListener('click', () => this.restartGame());
            document.getElementById('modal-start').addEventListener('click', () => this.startGame());
            document.getElementById('modal-restart').addEventListener('click', () => this.restartGame());
            document.getElementById('modal-close').addEventListener('click', () => this.closeModal());
            
            this.setupTouchControls();
        }
        
        setupTouchControls() {
            let touchStartX = 0;
            let touchStartY = 0;
            
            this.canvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                touchStartX = e.touches[0].clientX;
                touchStartY = e.touches[0].clientY;
            });
            
            this.canvas.addEventListener('touchend', (e) => {
                e.preventDefault();
                const touchEndX = e.changedTouches[0].clientX;
                const touchEndY = e.changedTouches[0].clientY;
                
                const deltaX = touchEndX - touchStartX;
                const deltaY = touchEndY - touchStartY;
                
                if (Math.abs(deltaX) > Math.abs(deltaY)) {
                    if (deltaX > 30) {
                        this.movePiece(1, 0);
                    } else if (deltaX < -30) {
                        this.movePiece(-1, 0);
                    }
                } else {
                    if (deltaY > 30) {
                        this.dropPiece();
                    } else if (deltaY < -30) {
                        this.rotatePiece();
                    }
                }
            });
        }
        
        handleKeyPress(e) {
            if (this.gameState !== 'playing') return;
            
            switch(e.code) {
                case 'ArrowLeft':
                    e.preventDefault();
                    this.movePiece(-1, 0);
                    break;
                case 'ArrowRight':
                    e.preventDefault();
                    this.movePiece(1, 0);
                    break;
                case 'ArrowDown':
                    e.preventDefault();
                    this.dropPiece();
                    break;
                case 'ArrowUp':
                    e.preventDefault();
                    this.rotatePiece();
                    break;
                case 'Space':
                    e.preventDefault();
                    this.hardDrop();
                    break;
            }
        }
        
        generateNewPiece() {
            const pieceTypes = Object.keys(this.PIECES);
            const randomType = pieceTypes[Math.floor(Math.random() * pieceTypes.length)];
            
            this.currentPiece = {
                type: randomType,
                shape: this.PIECES[randomType].shape,
                color: this.PIECES[randomType].color,
                x: Math.floor(this.BOARD_WIDTH / 2) - Math.floor(this.PIECES[randomType].shape[0].length / 2),
                y: 0
            };
        }
        
        generateNextPiece() {
            const pieceTypes = Object.keys(this.PIECES);
            const randomType = pieceTypes[Math.floor(Math.random() * pieceTypes.length)];
            
            this.nextPiece = {
                type: randomType,
                shape: this.PIECES[randomType].shape,
                color: this.PIECES[randomType].color
            };
            
            this.drawNextPiece();
        }
        
        movePiece(dx, dy) {
            if (!this.currentPiece) return false;
            
            const newX = this.currentPiece.x + dx;
            const newY = this.currentPiece.y + dy;
            
            if (this.isValidPosition(this.currentPiece.shape, newX, newY)) {
                this.currentPiece.x = newX;
                this.currentPiece.y = newY;
                return true;
            }
            
            return false;
        }
        
        rotatePiece() {
            if (!this.currentPiece) return;
            
            const rotatedShape = this.rotateMatrix(this.currentPiece.shape);
            
            if (this.isValidPosition(rotatedShape, this.currentPiece.x, this.currentPiece.y)) {
                this.currentPiece.shape = rotatedShape;
            }
        }
        
        rotateMatrix(matrix) {
            const rows = matrix.length;
            const cols = matrix[0].length;
            const rotated = new Array(cols).fill().map(() => new Array(rows).fill(0));
            
            for (let i = 0; i < rows; i++) {
                for (let j = 0; j < cols; j++) {
                    rotated[j][rows - 1 - i] = matrix[i][j];
                }
            }
            
            return rotated;
        }
        
        isValidPosition(shape, x, y) {
            for (let i = 0; i < shape.length; i++) {
                for (let j = 0; j < shape[i].length; j++) {
                    if (shape[i][j]) {
                        const newX = x + j;
                        const newY = y + i;
                        
                        if (newX < 0 || newX >= this.BOARD_WIDTH || newY >= this.BOARD_HEIGHT) {
                            return false;
                        }
                        
                        if (newY >= 0 && this.board[newY][newX]) {
                            return false;
                        }
                    }
                }
            }
            return true;
        }
        
        dropPiece() {
            if (this.movePiece(0, 1)) {
                this.score += 1;
            }
        }
        
        hardDrop() {
            let dropDistance = 0;
            while (this.movePiece(0, 1)) {
                dropDistance++;
            }
            this.score += dropDistance * 2;
            this.placePiece();
        }
        
        placePiece() {
            if (!this.currentPiece) return;
            
            for (let i = 0; i < this.currentPiece.shape.length; i++) {
                for (let j = 0; j < this.currentPiece.shape[i].length; j++) {
                    if (this.currentPiece.shape[i][j]) {
                        const x = this.currentPiece.x + j;
                        const y = this.currentPiece.y + i;
                        
                        if (y >= 0) {
                            this.board[y][x] = this.currentPiece.color;
                        }
                    }
                }
            }
            
            const clearedLines = this.clearLines();
            
            if (clearedLines > 0) {
                this.calculateScore(clearedLines);
                this.linesCleared += clearedLines;
                
                const newLevel = Math.floor(this.linesCleared / 10) + 1;
                if (newLevel > this.level && newLevel <= 5) {
                    this.levelUp();
                }
            }
            
            // 착지 효과
            document.querySelector('.board-frame').classList.add('landed');
            setTimeout(() => {
                document.querySelector('.board-frame').classList.remove('landed');
            }, 240);
            
            if (this.isGameOver()) {
                this.endGame();
                return;
            }
            
            if (this.level > 5) {
                this.victory();
                return;
            }
            
            this.currentPiece = { ...this.nextPiece };
            this.currentPiece.x = Math.floor(this.BOARD_WIDTH / 2) - Math.floor(this.currentPiece.shape[0].length / 2);
            this.currentPiece.y = 0;
            
            this.generateNextPiece();
        }
        
        clearLines() {
            let linesCleared = 0;
            const linesToClear = [];
            
            for (let y = this.BOARD_HEIGHT - 1; y >= 0; y--) {
                if (this.board[y].every(cell => cell !== 0)) {
                    linesToClear.push(y);
                }
            }
            
            if (linesToClear.length > 0) {
                this.showLineClearEffect(linesToClear);
            }
            
            linesToClear.forEach(lineY => {
                this.board.splice(lineY, 1);
                this.board.unshift(new Array(this.BOARD_WIDTH).fill(0));
                linesCleared++;
            });
            
            return linesCleared;
        }
        
        showLineClearEffect(lines) {
            const overlayLayer = document.getElementById('overlay-layer');
            
            lines.forEach(y => {
                const overlay = document.createElement('div');
                overlay.className = 'row-overlay line-clear';
                overlay.style.top = `${y * this.BLOCK_SIZE}px`;
                overlay.style.height = `${this.BLOCK_SIZE}px`;
                overlayLayer.appendChild(overlay);
                
                setTimeout(() => {
                    if (overlay.parentNode) {
                        overlay.parentNode.removeChild(overlay);
                    }
                }, 300);
            });
        }
        
        calculateScore(lines) {
            const baseScores = [0, 100, 300, 500, 800];
            this.score += baseScores[lines] * this.level;
        }
        
        levelUp() {
            this.level++;
            this.dropTime *= 0.95;
            
            const gameStage = document.getElementById('game-stage');
            gameStage.classList.add('level-up');
            setTimeout(() => {
                gameStage.classList.remove('level-up');
            }, 1000);
            
            this.updateUI();
        }
        
        isGameOver() {
            return !this.isValidPosition(this.currentPiece.shape, this.currentPiece.x, this.currentPiece.y);
        }
        
        startGame() {
            this.gameState = 'playing';
            this.isGameRunning = true;
            this.isPaused = false;
            
            document.getElementById('start-modal').classList.add('hidden');
            document.getElementById('start-modal').setAttribute('aria-hidden', 'true');
            
            this.updateUI();
            this.gameLoop();
        }
        
        togglePause() {
            if (this.gameState !== 'playing' && this.gameState !== 'paused') return;
            
            this.isPaused = !this.isPaused;
            this.gameState = this.isPaused ? 'paused' : 'playing';
            
            const pauseBtn = document.getElementById('pause-btn');
            pauseBtn.textContent = this.isPaused ? '재개 ▶' : '일시정지 ⏸';
            pauseBtn.setAttribute('aria-pressed', this.isPaused.toString());
            
            if (!this.isPaused) {
                this.gameLoop();
            }
        }
        
        restartGame() {
            this.board = new Array(20).fill().map(() => new Array(10).fill(0));
            this.level = 1;
            this.score = 0;
            this.linesCleared = 0;
            this.dropTime = 1000;
            this.gameState = 'playing';
            this.isGameRunning = true;
            this.isPaused = false;
            
            this.generateNewPiece();
            this.generateNextPiece();
            
            document.getElementById('result-modal').classList.add('hidden');
            document.getElementById('result-modal').setAttribute('aria-hidden', 'true');
            document.getElementById('start-modal').classList.add('hidden');
            document.getElementById('start-modal').setAttribute('aria-hidden', 'true');
            
            document.getElementById('app').className = 'app';
            
            const pauseBtn = document.getElementById('pause-btn');
            pauseBtn.textContent = '일시정지 ⏸';
            pauseBtn.setAttribute('aria-pressed', 'false');
            
            this.updateUI();
            this.gameLoop();
        }
        
        endGame() {
            this.gameState = 'gameover';
            this.isGameRunning = false;
            
            document.getElementById('app').classList.add('game-over');
            
            if (this.score > this.highScore) {
                this.highScore = this.score;
                localStorage.setItem('tetrisHighScore', this.highScore.toString());
            }
            
            document.getElementById('result-title').textContent = '게임 종료';
            document.getElementById('final-score').textContent = this.score;
            document.getElementById('final-level').textContent = this.level;
            
            document.getElementById('result-modal').classList.remove('hidden');
            document.getElementById('result-modal').setAttribute('aria-hidden', 'false');
        }
        
        victory() {
            this.gameState = 'victory';
            this.isGameRunning = false;
            
            document.getElementById('app').classList.add('game-clear');
            
            this.score += 5000;
            
            if (this.score > this.highScore) {
                this.highScore = this.score;
                localStorage.setItem('tetrisHighScore', this.highScore.toString());
            }
            
            document.getElementById('result-title').textContent = '🎉 게임 클리어! 🎉';
            document.getElementById('final-score').textContent = this.score;
            document.getElementById('final-level').textContent = '5 (완료!)';
            
            document.getElementById('result-modal').classList.remove('hidden');
            document.getElementById('result-modal').setAttribute('aria-hidden', 'false');
        }
        
        closeModal() {
            document.getElementById('result-modal').classList.add('hidden');
            document.getElementById('result-modal').setAttribute('aria-hidden', 'true');
        }
        
        gameLoop(currentTime = 0) {
            if (!this.isGameRunning || this.isPaused) return;
            
            const deltaTime = currentTime - this.lastTime;
            
            if (deltaTime >= this.dropTime) {
                if (!this.movePiece(0, 1)) {
                    this.placePiece();
                }
                this.lastTime = currentTime;
            }
            
            this.draw();
            
            if (this.isGameRunning) {
                requestAnimationFrame((time) => this.gameLoop(time));
            }
        }
        
        draw() {
            this.ctx.fillStyle = '#FFFFFF';
            this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
            
            this.drawGrid();
            this.drawBoard();
            
            if (this.currentPiece) {
                this.drawPiece(this.currentPiece);
            }
        }
        
        drawGrid() {
            this.ctx.strokeStyle = '#BDC3C7';
            this.ctx.lineWidth = 1;
            
            for (let x = 0; x <= this.BOARD_WIDTH; x++) {
                this.ctx.beginPath();
                this.ctx.moveTo(x * this.BLOCK_SIZE, 0);
                this.ctx.lineTo(x * this.BLOCK_SIZE, this.BOARD_HEIGHT * this.BLOCK_SIZE);
                this.ctx.stroke();
            }
            
            for (let y = 0; y <= this.BOARD_HEIGHT; y++) {
                this.ctx.beginPath();
                this.ctx.moveTo(0, y * this.BLOCK_SIZE);
                this.ctx.lineTo(this.BOARD_WIDTH * this.BLOCK_SIZE, y * this.BLOCK_SIZE);
                this.ctx.stroke();
            }
        }
        
        drawBoard() {
            for (let y = 0; y < this.BOARD_HEIGHT; y++) {
                for (let x = 0; x < this.BOARD_WIDTH; x++) {
                    if (this.board[y][x]) {
                        this.drawBlock(x, y, this.board[y][x]);
                    }
                }
            }
        }
        
        drawBlock(x, y, color) {
            const pixelX = x * this.BLOCK_SIZE;
            const pixelY = y * this.BLOCK_SIZE;
            
            this.ctx.fillStyle = color;
            this.ctx.fillRect(pixelX + 1, pixelY + 1, this.BLOCK_SIZE - 2, this.BLOCK_SIZE - 2);
            
            this.ctx.strokeStyle = '#2C3E50';
            this.ctx.lineWidth = 1;
            this.ctx.strokeRect(pixelX + 1, pixelY + 1, this.BLOCK_SIZE - 2, this.BLOCK_SIZE - 2);
        }
        
        drawPiece(piece) {
            for (let y = 0; y < piece.shape.length; y++) {
                for (let x = 0; x < piece.shape[y].length; x++) {
                    if (piece.shape[y][x]) {
                        this.drawBlock(piece.x + x, piece.y + y, piece.color);
                    }
                }
            }
        }
        
        drawNextPiece() {
            if (!this.nextPiece) return;
            
            this.nextCtx.fillStyle = '#FFFFFF';
            this.nextCtx.fillRect(0, 0, this.nextCanvas.width, this.nextCanvas.height);
            
            const offsetX = (4 - this.nextPiece.shape[0].length) / 2;
            const offsetY = (4 - this.nextPiece.shape.length) / 2;
            
            for (let y = 0; y < this.nextPiece.shape.length; y++) {
                for (let x = 0; x < this.nextPiece.shape[y].length; x++) {
                    if (this.nextPiece.shape[y][x]) {
                        const pixelX = (offsetX + x) * 25;
                        const pixelY = (offsetY + y) * 25;
                        
                        this.nextCtx.fillStyle = this.nextPiece.color;
                        this.nextCtx.fillRect(pixelX, pixelY, 23, 23);
                        
                        this.nextCtx.strokeStyle = '#2C3E50';
                        this.nextCtx.strokeRect(pixelX, pixelY, 23, 23);
                    }
                }
            }
        }
        
        updateUI() {
            document.getElementById('level').textContent = this.level;
            document.getElementById('score').textContent = this.score;
            document.getElementById('lines').textContent = `${this.linesCleared % 10} / 10`;
        }
    }

    // 게임 초기화 및 시작
    document.addEventListener('DOMContentLoaded', () => {
        window.tetrisGame = new TetrisGame();
    });
  </script>
