<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>두더지 게임 - Whack-a-Mole</title>
    <style>
        :root {
            --bg-color: #2E8B57;
            --hole-color: #8B4513;
            --hole-dark: #654321;
            --mole-normal: #D2691E;
            --mole-golden: #FFD700;
            --text-color: #FFFFFF;
            --button-color: #32CD32;
            --button-hover: #228B22;
            --shadow-dark: rgba(0, 0, 0, 0.3);
            --shadow-light: rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, var(--bg-color) 0%, #3CB371 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
        }

        #game-container {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px var(--shadow-dark);
            backdrop-filter: blur(10px);
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: var(--text-color);
            font-size: 2.5rem;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px var(--shadow-dark);
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-10px); }
            60% { transform: translateY(-5px); }
        }

        #game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            background: rgba(0, 0, 0, 0.2);
            padding: 15px 20px;
            border-radius: 15px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .score-info {
            color: var(--text-color);
            font-size: 1.2rem;
            font-weight: bold;
            text-shadow: 1px 1px 2px var(--shadow-dark);
        }

        #score-display, #timer-display, #mole-count {
            background: rgba(255, 255, 255, 0.2);
            padding: 8px 15px;
            border-radius: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        #game-board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin: 30px 0;
            perspective: 1000px;
        }

        .hole {
            width: 140px;
            height: 140px;
            background: radial-gradient(ellipse at center, var(--hole-dark) 0%, var(--hole-color) 70%);
            border-radius: 50%;
            position: relative;
            cursor: pointer;
            box-shadow: 
                inset 0 10px 20px var(--shadow-dark),
                0 5px 15px var(--shadow-light);
            transition: transform 0.1s ease;
            overflow: hidden;
            justify-self: center;
        }

        .hole:hover {
            transform: scale(1.05);
        }

        .hole::before {
            content: '';
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            bottom: 10px;
            border-radius: 50%;
            background: linear-gradient(145deg, var(--hole-dark), #4A2C17);
            box-shadow: inset 0 5px 10px rgba(0, 0, 0, 0.5);
        }

        .mole {
            width: 80px;
            height: 80px;
            background: var(--mole-normal);
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) translateY(100px);
            transition: transform 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            cursor: pointer;
            z-index: 2;
            box-shadow: 
                0 5px 15px var(--shadow-dark),
                inset 0 -5px 10px rgba(0, 0, 0, 0.2);
        }

        .mole::before {
            content: '• •';
            position: absolute;
            top: 25px;
            left: 50%;
            transform: translateX(-50%);
            color: #000;
            font-size: 12px;
            font-weight: bold;
            letter-spacing: 8px;
        }

        .mole::after {
            content: '◡';
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #000;
            font-size: 16px;
            font-weight: bold;
        }

        .mole.show {
            transform: translate(-50%, -50%) translateY(0);
        }

        .mole.visible {
            transform: translate(-50%, -50%) translateY(0);
        }

        .mole.golden {
            background: linear-gradient(45deg, var(--mole-golden), #FFA500);
            animation: sparkle 1s infinite alternate;
            box-shadow: 
                0 5px 15px rgba(255, 215, 0, 0.4),
                inset 0 -5px 10px rgba(0, 0, 0, 0.2),
                0 0 20px rgba(255, 215, 0, 0.3);
        }

        @keyframes sparkle {
            0% { filter: brightness(1); }
            100% { filter: brightness(1.3); }
        }

        .mole.hit {
            transform: translate(-50%, -50%) scale(0.9) translateY(0);
            opacity: 0.7;
        }

        .mole.captured {
            transform: translate(-50%, -50%) translateY(100px) scale(0.5);
            opacity: 0;
        }

        .mole.disappearing {
            transform: translate(-50%, -50%) translateY(100px) scale(0.8);
            opacity: 0;
            transition: all 0.2s ease-out;
        }

        .button {
            background: linear-gradient(45deg, var(--button-color), var(--button-hover));
            color: var(--text-color);
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px var(--shadow-dark);
            margin: 10px;
            text-shadow: 1px 1px 2px var(--shadow-dark);
        }

        .button:hover {
            background: linear-gradient(45deg, var(--button-hover), #1E7B1E);
            transform: translateY(-3px);
            box-shadow: 0 8px 20px var(--shadow-dark);
        }

        .button:active {
            transform: translateY(0);
            box-shadow: 0 3px 10px var(--shadow-dark);
        }

        #start-btn {
            font-size: 1.4rem;
            padding: 18px 35px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .game-screen {
            display: none;
        }

        .game-screen.active {
            display: block;
        }

        .result-screen {
            text-align: center;
            color: var(--text-color);
        }

        .result-screen h2 {
            font-size: 2rem;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px var(--shadow-dark);
        }

        .final-score {
            font-size: 3rem;
            color: var(--mole-golden);
            text-shadow: 2px 2px 4px var(--shadow-dark);
            margin: 20px 0;
        }

        .new-record {
            color: #FF6B6B;
            font-size: 1.3rem;
            animation: flash 1s infinite;
        }

        @keyframes flash {
            0%, 50% { opacity: 1; }
            25%, 75% { opacity: 0.5; }
        }

        .score-popup {
            position: absolute;
            color: #FFD700;
            font-weight: bold;
            font-size: 20px;
            z-index: 1000;
            pointer-events: none;
            animation: scorePopup 1s ease-out forwards;
        }

        @keyframes scorePopup {
            0% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -80px) scale(1.2);
            }
        }

        /* 반응형 디자인 */
        @media (max-width: 768px) {
            #game-container {
                padding: 20px;
                margin: 10px;
            }

            h1 {
                font-size: 2rem;
            }

            #game-header {
                flex-direction: column;
                gap: 10px;
            }

            .score-info {
                font-size: 1rem;
            }

            #game-board {
                gap: 15px;
                margin: 20px 0;
            }

            .hole {
                width: 100px;
                height: 100px;
            }

            .mole {
                width: 60px;
                height: 60px;
            }

            .mole::before {
                top: 18px;
                font-size: 10px;
                letter-spacing: 6px;
            }

            .mole::after {
                bottom: 15px;
                font-size: 14px;
            }

            .button {
                padding: 12px 25px;
                font-size: 1rem;
            }

            #start-btn {
                font-size: 1.2rem;
                padding: 15px 30px;
            }
        }

        @media (max-width: 480px) {
            #game-board {
                gap: 10px;
            }

            .hole {
                width: 80px;
                height: 80px;
            }

            .mole {
                width: 50px;
                height: 50px;
            }

            .score-info {
                font-size: 0.9rem;
            }

            .final-score {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div id="game-container">
        <!-- 메인 화면 -->
        <div id="main-screen" class="game-screen active">
            <h1>🐹 두더지 게임</h1>
            <div class="score-info">
                <div>최고 기록: <span id="best-score-display">0</span>점</div>
            </div>
            <button id="start-btn" class="button">게임 시작</button>
            
            <div style="margin-top: 30px; color: var(--text-color); font-size: 0.9rem; opacity: 0.8;">
                <p>🎯 일반 두더지: 10점 | ⭐ 황금 두더지: 50점</p>
                <p>⏱️ 제한시간: 60초</p>
            </div>
        </div>

        <!-- 플레이 화면 -->
        <div id="play-screen" class="game-screen">
            <div id="game-header">
                <div class="score-info">
                    점수: <span id="score-display">0</span>
                </div>
                <div class="score-info">
                    시간: <span id="timer-display">60</span>초
                </div>
                <div class="score-info">
                    잡은 수: <span id="mole-count">0</span>마리
                </div>
            </div>

            <div id="game-board">
                <div class="hole" data-hole="0"></div>
                <div class="hole" data-hole="1"></div>
                <div class="hole" data-hole="2"></div>
                <div class="hole" data-hole="3"></div>
                <div class="hole" data-hole="4"></div>
                <div class="hole" data-hole="5"></div>
                <div class="hole" data-hole="6"></div>
                <div class="hole" data-hole="7"></div>
                <div class="hole" data-hole="8"></div>
            </div>
        </div>

        <!-- 결과 화면 -->
        <div id="result-screen" class="game-screen result-screen">
            <h2>🎉 게임 종료!</h2>
            <div class="final-score" id="final-score">0</div>
            <div id="new-record-text" class="new-record" style="display: none;">
                🏆 새로운 최고 기록!
            </div>
            <div style="margin: 20px 0; color: var(--text-color);">
                <p>잡은 두더지: <span id="final-mole-count">0</span>마리</p>
            </div>
            <button id="restart-btn" class="button">다시 하기</button>
            <button id="main-menu-btn" class="button">메인으로</button>
        </div>
    </div>

    <script>
        // 두더지 게임 메인 모듈 - 상태머신 패턴 적용
        const WhackAMoleGame = (function() {
            'use strict';
            
            // 게임 상태 열거형 정의
            const GAME_STATES = {
                READY: 'ready',      // 게임 준비 상태
                PLAYING: 'playing',  // 게임 진행 상태
                ENDED: 'ended'       // 게임 종료 상태
            };
            
            // 두더지 타입 정의
            const MOLE_TYPES = {
                NORMAL: 'normal',    // 일반 두더지
                GOLDEN: 'golden'     // 황금 두더지
            };
            
            // 게임 설정 상수
            const GAME_CONFIG = {
                GAME_TIME: 60,           // 게임 시간 (초)
                MOLE_SHOW_TIME: 1500,    // 두더지 표시 시간 (밀리초)
                NORMAL_MOLE_SCORE: 10,   // 일반 두더지 점수
                GOLDEN_MOLE_SCORE: 50,   // 황금 두더지 점수
                COMBO_BONUS: 5,          // 연속 클릭 보너스
                GOLDEN_MOLE_INTERVAL: 10, // 황금 두더지 등장 간격 (일반 두더지 수)
                GRID_SIZE: 9,            // 게임 보드 격자 수 (3x3)
                MAX_CONCURRENT_MOLES: 3  // 동시에 나타날 수 있는 최대 두더지 수
            };
            
            // 게임 상태 객체
            let gameState = {
                score: 0,
                timeLeft: GAME_CONFIG.GAME_TIME,
                molesCaught: 0,
                isGameActive: false,
                currentMoles: [],
                bestScore: 0,
                gameTimer: null,
                currentState: GAME_STATES.READY,
                lastClickTime: 0,
                animationFrameId: null,
                moleSpawnTimer: null,
                activeMoleTimeouts: []
            };
            
            // DOM 요소 캐시 객체
            let domCache = {
                gameContainer: null,
                mainScreen: null,
                playScreen: null,
                resultScreen: null,
                gameHeader: null,
                scoreDisplay: null,
                timerDisplay: null,
                moleCount: null,
                gameBoard: null,
                holes: [],
                startBtn: null,
                restartBtn: null,
                mainMenuBtn: null,
                bestScoreDisplay: null,
                finalScore: null,
                finalMoleCount: null,
                newRecordText: null
            };
            
            // DOM 요소 초기화 함수
            function initializeDOMCache() {
                try {
                    domCache.gameContainer = document.getElementById('game-container');
                    domCache.mainScreen = document.getElementById('main-screen');
                    domCache.playScreen = document.getElementById('play-screen');
                    domCache.resultScreen = document.getElementById('result-screen');
                    domCache.gameHeader = document.getElementById('game-header');
                    domCache.scoreDisplay = document.getElementById('score-display');
                    domCache.timerDisplay = document.getElementById('timer-display');
                    domCache.moleCount = document.getElementById('mole-count');
                    domCache.gameBoard = document.getElementById('game-board');
                    domCache.startBtn = document.getElementById('start-btn');
                    domCache.restartBtn = document.getElementById('restart-btn');
                    domCache.mainMenuBtn = document.getElementById('main-menu-btn');
                    domCache.bestScoreDisplay = document.getElementById('best-score-display');
                    domCache.finalScore = document.getElementById('final-score');
                    domCache.finalMoleCount = document.getElementById('final-mole-count');
                    domCache.newRecordText = document.getElementById('new-record-text');
                    
                    // 구멍 요소들을 배열로 수집
                    domCache.holes = Array.from(document.querySelectorAll('.hole'));
                    
                    // 필수 DOM 요소 존재 확인
                    const requiredElements = [
                        'gameContainer', 'mainScreen', 'playScreen', 'resultScreen',
                        'scoreDisplay', 'timerDisplay', 'gameBoard', 'startBtn'
                    ];
                    
                    for (let elementName of requiredElements) {
                        if (!domCache[elementName]) {
                            throw new Error(`필수 DOM 요소를 찾을 수 없습니다: ${elementName}`);
                        }
                    }
                    
                    if (domCache.holes.length !== GAME_CONFIG.GRID_SIZE) {
                        throw new Error(`구멍 요소가 ${GAME_CONFIG.GRID_SIZE}개가 아닙니다. 현재: ${domCache.holes.length}개`);
                    }
                    
                } catch (error) {
                    console.error('DOM 요소 초기화 실패:', error);
                    alert('게임을 시작할 수 없습니다. 페이지를 새로고침해주세요.');
                }
            }
            
            // 화면 전환 함수
            function switchScreen(targetScreen) {
                try {
                    // 모든 화면 숨김
                    const screens = [domCache.mainScreen, domCache.playScreen, domCache.resultScreen];
                    screens.forEach(screen => {
                        if (screen) {
                            screen.classList.remove('active');
                        }
                    });
                    
                    // 대상 화면 표시
                    if (targetScreen) {
                        targetScreen.classList.add('active');
                    }
                } catch (error) {
                    console.error('화면 전환 실패:', error);
                }
            }
            
            // 로컬 스토리지에서 최고 점수 불러오기
            function loadBestScore() {
                try {
                    const savedScore = localStorage.getItem('whack-a-mole-best-score');
                    gameState.bestScore = savedScore ? parseInt(savedScore, 10) : 0;
                    updateBestScoreDisplay();
                } catch (error) {
                    console.error('최고 점수 로드 실패:', error);
                    gameState.bestScore = 0;
                }
            }
            
            // 최고 점수 표시 업데이트
            function updateBestScoreDisplay() {
                if (domCache.bestScoreDisplay) {
                    domCache.bestScoreDisplay.textContent = gameState.bestScore;
                }
            }
            
            // 최고 점수 저장 함수
            function saveScore() {
                try {
                    if (gameState.score > gameState.bestScore) {
                        gameState.bestScore = gameState.score;
                        localStorage.setItem('whack-a-mole-best-score', gameState.bestScore.toString());
                        updateBestScoreDisplay();
                        return true; // 신기록 달성
                    }
                    return false;
                } catch (error) {
                    console.error('점수 저장 실패:', error);
                    return false;
                }
            }
            
            // UI 업데이트 함수
            function updateUI() {
                try {
                    if (domCache.scoreDisplay) {
                        domCache.scoreDisplay.textContent = gameState.score;
                    }
                    
                    if (domCache.timerDisplay) {
                        domCache.timerDisplay.textContent = gameState.timeLeft;
                    }
                    
                    if (domCache.moleCount) {
                        domCache.moleCount.textContent = gameState.molesCaught;
                    }
                    
                } catch (error) {
                    console.error('UI 업데이트 실패:', error);
                }
            }
            
            // 랜덤한 빈 구멍 선택 함수
            function getRandomEmptyHole() {
                const emptyHoles = [];
                
                // 현재 두더지가 없는 구멍들을 찾기
                for (let i = 0; i < GAME_CONFIG.GRID_SIZE; i++) {
                    const isOccupied = gameState.currentMoles.some(mole => mole.holeIndex === i);
                    if (!isOccupied) {
                        emptyHoles.push(i);
                    }
                }
                
                // 빈 구멍이 없으면 null 반환
                if (emptyHoles.length === 0) {
                    return null;
                }
                
                // 랜덤한 빈 구멍 인덱스 반환
                return emptyHoles[Math.floor(Math.random() * emptyHoles.length)];
            }
            
            // 두더지 생성 함수
            function spawnMole() {
                try {
                    // 게임이 진행 중이 아니면 두더지 생성 중단
                    if (gameState.currentState !== GAME_STATES.PLAYING) {
                        return;
                    }
                    
                    // 최대 동시 두더지 수 확인
                    if (gameState.currentMoles.length >= GAME_CONFIG.MAX_CONCURRENT_MOLES) {
                        return;
                    }
                    
                    const holeIndex = getRandomEmptyHole();
                    if (holeIndex === null) {
                        return; // 빈 구멍이 없음
                    }
                    
                    // 황금 두더지 등장 조건 확인 (일반 두더지 10마리마다)
                    const shouldSpawnGolden = (gameState.molesCaught + 1) % GAME_CONFIG.GOLDEN_MOLE_INTERVAL === 0;
                    const moleType = shouldSpawnGolden ? MOLE_TYPES.GOLDEN : MOLE_TYPES.NORMAL;
                    
                    // 새 두더지 객체 생성
                    const newMole = {
                        holeIndex: holeIndex,
                        type: moleType,
                        clickCount: 0,
                        spawnTime: Date.now()
                    };
                    
                    // 두더지 상태 배열에 추가
                    gameState.currentMoles.push(newMole);
                    
                    // DOM에 두더지 요소 생성 및 추가
                    const hole = domCache.holes[holeIndex];
                    const moleElement = createMoleElement(moleType);
                    hole.appendChild(moleElement);
                    
                    // 두더지 등장 애니메이션 트리거
                    requestAnimationFrame(() => {
                        moleElement.classList.add('visible');
                    });
                    
                    // 일정 시간 후 두더지 자동 제거 타이머 설정
                    const timeoutId = setTimeout(() => {
                        removeMole(holeIndex, false); // 자동 제거 (클릭되지 않음)
                    }, GAME_CONFIG.MOLE_SHOW_TIME);
                    
                    gameState.activeMoleTimeouts.push(timeoutId);
                    
                } catch (error) {
                    console.error('두더지 생성 실패:', error);
                }
            }
            
            // 두더지 DOM 요소 생성 함수
            function createMoleElement(moleType) {
                const moleElement = document.createElement('div');
                moleElement.className = `mole ${moleType}`;
                
                return moleElement;
            }
            
            // 두더지 제거 함수
            function removeMole(holeIndex, wasCaught = false) {
                try {
                    // 해당 구멍의 두더지 찾기
                    const moleIndex = gameState.currentMoles.findIndex(mole => mole.holeIndex === holeIndex);
                    if (moleIndex === -1) {
                        return; // 해당 구멍에 두더지가 없음
                    }
                    
                    const mole = gameState.currentMoles[moleIndex];
                    const hole = domCache.holes[holeIndex];
                    const moleElement = hole.querySelector('.mole');
                    
                    if (moleElement) {
                        // 사라지는 애니메이션 추가
                        moleElement.classList.add('disappearing');
                        
                        setTimeout(() => {
                            if (moleElement.parentNode) {
                                moleElement.parentNode.removeChild(moleElement);
                            }
                        }, 200); // 애니메이션 지속 시간
                    }
                    
                    // 두더지 상태 배열에서 제거
                    gameState.currentMoles.splice(moleIndex, 1);
                    
                } catch (error) {
                    console.error('두더지 제거 실패:', error);
                }
            }
            
            // 두더지 클릭 이벤트 핸들러
            function handleMoleClick(event) {
                try {
                    // 게임이 진행 중이 아니면 클릭 무시
                    if (gameState.currentState !== GAME_STATES.PLAYING) {
                        return;
                    }
                    
                    const moleElement = event.target;
                    if (!moleElement.classList.contains('mole')) {
                        return; // 두더지가 아닌 요소 클릭
                    }
                    
                    const hole = moleElement.parentNode;
                    const holeIndex = domCache.holes.indexOf(hole);
                    
                    if (holeIndex === -1) {
                        return; // 유효하지 않은 구멍
                    }
                    
                    // 해당 두더지 객체 찾기
                    const mole = gameState.currentMoles.find(m => m.holeIndex === holeIndex);
                    if (!mole) {
                        return; // 두더지 객체를 찾을 수 없음
                    }
                    
                    // 클릭 효과 추가
                    moleElement.classList.add('hit');
                    
                    // 클릭 수 증가
                    mole.clickCount++;
                    
                    // 두더지 타입별 처리
                    if (mole.type === MOLE_TYPES.NORMAL) {
                        // 일반 두더지: 1번 클릭으로 잡기
                        handleMoleCaught(mole, holeIndex);
                    } else if (mole.type === MOLE_TYPES.GOLDEN) {
                        // 황금 두더지: 2번 클릭으로 잡기
                        if (mole.clickCount === 1) {
                            // 1차 클릭 - 시각적 피드백만 제공
                            moleElement.style.transform = 'translate(-50%, -50%) scale(0.9) translateY(0)';
                        } else if (mole.clickCount >= 2) {
                            // 2차 클릭 - 두더지 잡기 완료
                            handleMoleCaught(mole, holeIndex);
                        }
                    }
                    
                } catch (error) {
                    console.error('두더지 클릭 처리 실패:', error);
                }
            }
            
            // 두더지 잡기 완료 처리 함수
            function handleMoleCaught(mole, holeIndex) {
                try {
                    // 점수 계산
                    const baseScore = mole.type === MOLE_TYPES.GOLDEN 
                        ? GAME_CONFIG.GOLDEN_MOLE_SCORE 
                        : GAME_CONFIG.NORMAL_MOLE_SCORE;
                    
                    let totalScore = baseScore;
                    
                    // 연속 클릭 보너스 계산 (1초 이내 연속 클릭 시)
                    const currentTime = Date.now();
                    if (currentTime - gameState.lastClickTime < 1000) {
                        totalScore += GAME_CONFIG.COMBO_BONUS;
                    }
                    gameState.lastClickTime = currentTime;
                    
                    // 점수 및 통계 업데이트
                    gameState.score += totalScore;
                    gameState.molesCaught++;
                    
                    // 두더지 제거
                    removeMole(holeIndex, true);
                    
                    // UI 업데이트
                    updateUI();
                    
                    // 잡은 두더지 시각적 피드백
                    showScorePopup(holeIndex, totalScore);
                    
                } catch (error) {
                    console.error('두더지 잡기 처리 실패:', error);
                }
            }
            
            // 점수 팝업 표시 함수
            function showScorePopup(holeIndex, score) {
                try {
                    const hole = domCache.holes[holeIndex];
                    const popup = document.createElement('div');
                    popup.className = 'score-popup';
                    popup.textContent = `+${score}`;
                    popup.style.position = 'absolute';
                    popup.style.top = '50%';
                    popup.style.left = '50%';
                    popup.style.transform = 'translate(-50%, -50%)';
                    popup.style.color = '#FFD700';
                    popup.style.fontWeight = 'bold';
                    popup.style.fontSize = '20px';
                    popup.style.zIndex = '1000';
                    popup.style.pointerEvents = 'none';
                    
                    hole.style.position = 'relative';
                    hole.appendChild(popup);
                    
                    // 애니메이션 후 제거
                    setTimeout(() => {
                        if (popup.parentNode) {
                            popup.parentNode.removeChild(popup);
                        }
                    }, 1000);
                    
                } catch (error) {
                    console.error('점수 팝업 표시 실패:', error);
                }
            }
            
            // 게임 시작 함수
            function handleStartGame() {
                try {
                    // 상태를 PLAYING으로 변경
                    gameState.currentState = GAME_STATES.PLAYING;
                    gameState.isGameActive = true;
                    
                    // 게임 상태 초기화
                    gameState.score = 0;
                    gameState.timeLeft = GAME_CONFIG.GAME_TIME;
                    gameState.molesCaught = 0;
                    gameState.lastClickTime = 0;
                    gameState.currentMoles = [];
                    
                    // 기존 타이머들 정리
                    clearAllTimers();
                    
                    // 플레이 화면으로 전환
                    switchScreen(domCache.playScreen);
                    
                    // UI 업데이트
                    updateUI();
                    
                    // 게임 타이머 시작 (1초마다 시간 감소)
                    gameState.gameTimer = setInterval(() => {
                        gameState.timeLeft--;
                        updateUI();
                        
                        if (gameState.timeLeft <= 0) {
                            handleGameEnd();
                        }
                    }, 1000);
                    
                    // 두더지 생성 루프 시작
                    startMoleSpawnLoop();
                    
                    console.log('게임 시작됨');
                    
                } catch (error) {
                    console.error('게임 시작 실패:', error);
                    alert('게임을 시작할 수 없습니다.');
                }
            }
            
            // 두더지 생성 루프 시작 함수
            function startMoleSpawnLoop() {
                const spawnMoleWithRandomDelay = () => {
                    if (gameState.currentState === GAME_STATES.PLAYING) {
                        spawnMole();
                        
                        // 다음 두더지 생성까지의 랜덤 지연 시간 (500ms ~ 2000ms)
                        const nextSpawnDelay = Math.random() * 1500 + 500;
                        gameState.moleSpawnTimer = setTimeout(spawnMoleWithRandomDelay, nextSpawnDelay);
                    }
                };
                
                // 첫 번째 두더지 즉시 생성
                spawnMoleWithRandomDelay();
            }
            
            // 모든 타이머 정리 함수
            function clearAllTimers() {
                try {
                    // 게임 타이머 정리
                    if (gameState.gameTimer) {
                        clearInterval(gameState.gameTimer);
                        gameState.gameTimer = null;
                    }
                    
                    // 두더지 생성 타이머 정리
                    if (gameState.moleSpawnTimer) {
                        clearTimeout(gameState.moleSpawnTimer);
                        gameState.moleSpawnTimer = null;
                    }
                    
                    // 활성 두더지 타임아웃들 정리
                    gameState.activeMoleTimeouts.forEach(timeoutId => {
                        clearTimeout(timeoutId);
                    });
                    gameState.activeMoleTimeouts = [];
                    
                    // 애니메이션 프레임 정리
                    if (gameState.animationFrameId) {
                        cancelAnimationFrame(gameState.animationFrameId);
                        gameState.animationFrameId = null;
                    }
                    
                } catch (error) {
                    console.error('타이머 정리 실패:', error);
                }
            }
            
            // 게임 종료 처리 함수
            function handleGameEnd() {
                try {
                    // 상태를 ENDED로 변경
                    gameState.currentState = GAME_STATES.ENDED;
                    gameState.isGameActive = false;
                    
                    // 모든 타이머 정리
                    clearAllTimers();
                    
                    // 남은 두더지들 모두 제거
                    const remainingMoles = [...gameState.currentMoles];
                    remainingMoles.forEach(mole => {
                        removeMole(mole.holeIndex, false);
                    });
                    
                    // 최고 점수 확인 및 저장
                    const isNewRecord = saveScore();
                    
                    // 결과 화면 데이터 설정
                    if (domCache.finalScore) {
                        domCache.finalScore.textContent = gameState.score;
                    }
                    
                    if (domCache.finalMoleCount) {
                        domCache.finalMoleCount.textContent = gameState.molesCaught;
                    }
                    
                    // 신기록 표시
                    if (domCache.newRecordText) {
                        if (isNewRecord) {
                            domCache.newRecordText.style.display = 'block';
                        } else {
                            domCache.newRecordText.style.display = 'none';
                        }
                    }
                    
                    // 결과 화면으로 전환
                    switchScreen(domCache.resultScreen);
                    
                    console.log('게임 종료됨');
                    
                } catch (error) {
                    console.error('게임 종료 처리 실패:', error);
                }
            }
            
            // 게임 재시작 함수
            function handleRestartGame() {
                try {
                    // 상태를 READY로 초기화
                    gameState.currentState = GAME_STATES.READY;
                    gameState.isGameActive = false;
                    
                    // 모든 타이머 정리
                    clearAllTimers();
                    
                    // 게임 상태 초기화
                    gameState.score = 0;
                    gameState.timeLeft = GAME_CONFIG.GAME_TIME;
                    gameState.molesCaught = 0;
                    gameState.lastClickTime = 0;
                    gameState.currentMoles = [];
                    
                    // 모든 두더지 DOM 요소 제거
                    domCache.holes.forEach(hole => {
                        const moles = hole.querySelectorAll('.mole');
                        moles.forEach(mole => {
                            if (mole.parentNode) {
                                mole.parentNode.removeChild(mole);
                            }
                        });
                    });
                    
                    // UI 업데이트
                    updateUI();
                    
                    console.log('게임 재시작됨');
                    
                } catch (error) {
                    console.error('게임 재시작 실패:', error);
                }
            }
            
            // 메인 메뉴로 돌아가기
            function handleMainMenu() {
                handleRestartGame();
                switchScreen(domCache.mainScreen);
            }
            
            // 이벤트 리스너 등록 함수
            function bindEvents() {
                try {
                    // 게임 시작 버튼 이벤트
                    if (domCache.startBtn) {
                        domCache.startBtn.addEventListener('click', handleStartGame);
                    }
                    
                    // 게임 재시작 버튼 이벤트
                    if (domCache.restartBtn) {
                        domCache.restartBtn.addEventListener('click', () => {
                            handleRestartGame();
                            setTimeout(handleStartGame, 100); // 즉시 게임 시작
                        });
                    }
                    
                    // 메인 메뉴 버튼 이벤트
                    if (domCache.mainMenuBtn) {
                        domCache.mainMenuBtn.addEventListener('click', handleMainMenu);
                    }
                    
                    // 게임 보드에 이벤트 위임 패턴 적용 (두더지 클릭)
                    if (domCache.gameBoard) {
                        domCache.gameBoard.addEventListener('click', handleMoleClick);
                        
                        // 터치 이벤트도 지원 (모바일 대응)
                        domCache.gameBoard.addEventListener('touchend', (event) => {
                            event.preventDefault(); // 더블탭 줌 방지
                            handleMoleClick(event);
                        });
                    }
                    
                    // 키보드 이벤트 (스페이스바로 게임 시작/재시작)
                    document.addEventListener('keydown', (event) => {
                        if (event.code === 'Space') {
                            event.preventDefault();
                            
                            if (gameState.currentState === GAME_STATES.READY) {
                                handleStartGame();
                            } else if (gameState.currentState === GAME_STATES.ENDED) {
                                handleRestartGame();
                                setTimeout(handleStartGame, 100);
                            }
                        }
                    });
                    
                } catch (error) {
                    console.error('이벤트 바인딩 실패:', error);
                }
            }
            
            // 게임 초기화 함수
            function initialize() {
                try {
                    // DOM 요소 캐시 초기화
                    initializeDOMCache();
                    
                    // 최고 점수 불러오기
                    loadBestScore();
                    
                    // 이벤트 리스너 등록
                    bindEvents();
                    
                    // 초기 UI 업데이트
                    updateUI();
                    
                    console.log('두더지 게임 초기화 완료');
                    
                } catch (error) {
                    console.error('게임 초기화 실패:', error);
                    alert('게임 초기화에 실패했습니다. 페이지를 새로고침해주세요.');
                }
            }
            
            // 페이지 로드 완료 시 게임 초기화
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', initialize);
            } else {
                initialize();
            }
            
            // 외부 접근 가능한 공개 메서드들 (디버깅 및 확장용)
            return {
                // 게임 상태 조회
                getGameState: () => ({ ...gameState }),
                
                // 강제 게임 종료 (디버깅용)
                forceEndGame: handleGameEnd,
                
                // 게임 리셋 (디버깅용)
                resetGame: handleRestartGame,
                
                // 현재 게임 버전
                version: '1.0.0'
            };
            
        })();
    </script>
</body>
</html>
