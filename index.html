<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>진중이 테트리스</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Roboto+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        /* CSS Reset & Base */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto Mono', monospace;
            background: linear-gradient(135deg, #F18F01, #C73E1D);
            min-height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        /* 메인 화면 */
        #main-screen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            background: linear-gradient(135deg, #F18F01, #C73E1D);
        }

        .game-title {
            font-family: 'Orbitron', monospace;
            font-size: 4rem;
            font-weight: 900;
            color: #2E86AB;
            text-shadow: 3px 3px 0px #A23B72, 6px 6px 10px rgba(0,0,0,0.3);
            margin-bottom: 2rem;
            animation: titleGlow 2s ease-in-out infinite alternate;
        }

        @keyframes titleGlow {
            0% { text-shadow: 3px 3px 0px #A23B72, 6px 6px 10px rgba(0,0,0,0.3); }
            100% { text-shadow: 3px 3px 0px #A23B72, 6px 6px 20px rgba(46,134,171,0.5); }
        }

        .start-button {
            font-family: 'Orbitron', monospace;
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(45deg, #2E86AB, #A23B72);
            color: white;
            border: none;
            padding: 20px 40px;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        .start-button:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 12px 30px rgba(0,0,0,0.3);
            background: linear-gradient(45deg, #3498db, #e74c3c);
        }

        /* 게임 화면 */
        #game-screen {
            display: none;
            height: 100vh;
            background: #1A1A2E;
            position: relative;
        }

        .game-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 20px;
            gap: 30px;
        }

        .game-board {
            position: relative;
            border: 3px solid #2E86AB;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(46,134,171,0.5);
        }

        #gameCanvas {
            display: block;
            background: #000;
            border-radius: 7px;
        }

        .game-info {
            color: white;
            min-width: 200px;
            padding: 20px;
            background: rgba(46,134,171,0.1);
            border-radius: 15px;
            border: 2px solid #2E86AB;
        }

        .info-section {
            margin-bottom: 30px;
            padding: 15px;
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
        }

        .info-label {
            font-family: 'Orbitron', monospace;
            font-size: 0.9rem;
            color: #A23B72;
            margin-bottom: 5px;
        }

        .info-value {
            font-family: 'Orbitron', monospace;
            font-size: 1.5rem;
            font-weight: 700;
            color: #F18F01;
        }

        /* 모바일 컨트롤 */
        .mobile-controls {
            display: none;
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            gap: 15px;
        }

        .control-btn {
            width: 60px;
            height: 60px;
            background: rgba(46,134,171,0.8);
            border: 2px solid #2E86AB;
            border-radius: 50%;
            color: white;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .control-btn:active {
            transform: scale(0.9);
            background: rgba(46,134,171,1);
        }

        /* 이펙트 */
        #line-clear-effect {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(255,255,255,0.8);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        #line-clear-effect.active {
            opacity: 1;
        }

        #level-up-effect {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Orbitron', monospace;
            font-size: 3rem;
            font-weight: 900;
            color: #FFD700;
            text-shadow: 0 0 20px #FFD700;
            opacity: 0;
            pointer-events: none;
            animation: levelUpAnim 2s ease-out;
        }

        @keyframes levelUpAnim {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            20% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
            80% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
        }

        /* 게임 오버 화면 */
        #game-over-screen {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0,0,0,0.9);
            color: white;
            text-align: center;
            padding: 20px;
            z-index: 1000;
        }

        .game-over-content {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
        }

        .game-over-title {
            font-family: 'Orbitron', monospace;
            font-size: 3rem;
            color: #C73E1D;
            margin-bottom: 30px;
        }

        .final-score {
            font-size: 1.5rem;
            margin-bottom: 40px;
        }

        .restart-btn {
            font-family: 'Orbitron', monospace;
            font-size: 1.2rem;
            background: #2E86AB;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 10px;
        }

        .restart-btn:hover {
            background: #3498db;
            transform: scale(1.05);
        }

        /* 반응형 */
        @media (max-width: 768px) {
            .game-title {
                font-size: 2.5rem;
            }

            .game-container {
                flex-direction: column;
                gap: 20px;
            }

            .game-info {
                display: flex;
                flex-direction: row;
                gap: 20px;
                min-width: auto;
                width: 100%;
                max-width: 400px;
            }

            .info-section {
                flex: 1;
                margin-bottom: 0;
            }

            .mobile-controls {
                display: flex;
            }

            #gameCanvas {
                max-width: 100%;
                height: auto;
            }
        }

        @media (max-width: 480px) {
            .game-title {
                font-size: 2rem;
            }

            .start-button {
                font-size: 1.2rem;
                padding: 15px 30px;
            }

            .game-info {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <!-- 메인 화면 -->
    <div id="main-screen">
        <h1 class="game-title">진중이 테트리스</h1>
        <button id="startBtn" class="start-button">게임 시작</button>
    </div>

    <!-- 게임 화면 -->
    <div id="game-screen">
        <div class="game-container">
            <div class="game-board">
                <canvas id="gameCanvas" width="300" height="600"></canvas>
            </div>
            
            <div class="game-info">
                <div class="info-section">
                    <div class="info-label">점수</div>
                    <div id="score-display" class="info-value">0</div>
                </div>
                
                <div class="info-section">
                    <div class="info-label">레벨</div>
                    <div id="level-display" class="info-value">1</div>
                </div>
                
                <div class="info-section">
                    <div class="info-label">라인</div>
                    <div id="lines-display" class="info-value">0</div>
                </div>
                
                <div class="info-section">
                    <div class="info-label">최고점수</div>
                    <div id="high-score-display" class="info-value">0</div>
                </div>
            </div>
        </div>
        
        <!-- 모바일 컨트롤 -->
        <div class="mobile-controls">
            <div class="control-btn" id="move-left">←</div>
            <div class="control-btn" id="move-down">↓</div>
            <div class="control-btn" id="rotate">↻</div>
            <div class="control-btn" id="move-right">→</div>
        </div>
    </div>

    <!-- 게임 오버 화면 -->
    <div id="game-over-screen">
        <div class="game-over-content">
            <h2 class="game-over-title">GAME OVER</h2>
            <div class="final-score" id="final-score-display">최종 점수: 0</div>
            <button id="restart-btn" class="restart-btn">다시 시작</button>
            <button id="main-menu-btn" class="restart-btn">메인 메뉴</button>
        </div>
    </div>

    <!-- 이펙트 -->
    <div id="line-clear-effect"></div>
    <div id="level-up-effect">LEVEL UP!</div>

    <script>
        // 진중이 테트리스 게임 - JavaScript 로직
        class JinJoongTetris {
            constructor() {
                this.canvas = null;
                this.ctx = null;
                this.gameBoard = [];
                this.currentPiece = null;
                this.nextPiece = null;
                this.score = 0;
                this.level = 1;
                this.linesCleared = 0;
                this.dropTime = 0;
                this.dropSpeed = 1000; // 밀리초
                this.lastTime = 0;
                this.gameRunning = false;
                this.gameOver = false;
                this.clearingLines = null;
                
                // 게임 보드 설정
                this.boardWidth = 10;
                this.boardHeight = 20;
                this.cellSize = 30;
                
                // 테트로미노 정의
                this.pieces = {
                    I: { shape: [[1,1,1,1]], color: '#00FFFF' },
                    O: { shape: [[1,1],[1,1]], color: '#FFFF00' },
                    T: { shape: [[0,1,0],[1,1,1]], color: '#800080' },
                    S: { shape: [[0,1,1],[1,1,0]], color: '#00FF00' },
                    Z: { shape: [[1,1,0],[0,1,1]], color: '#FF0000' },
                    J: { shape: [[1,0,0],[1,1,1]], color: '#0000FF' },
                    L: { shape: [[0,0,1],[1,1,1]], color: '#FFA500' }
                };
                
                this.pieceKeys = Object.keys(this.pieces);
                
                this.init();
            }
            
            // 게임 초기화
            init() {
                this.canvas = document.getElementById('gameCanvas');
                if (!this.canvas) return;
                this.ctx = this.canvas.getContext('2d');
                
                // 캔버스 크기 설정
                this.canvas.width = this.boardWidth * this.cellSize;
                this.canvas.height = this.boardHeight * this.cellSize;
                
                // 게임 보드 초기화
                this.initBoard();
                
                // 이벤트 리스너 등록
                this.setupEventListeners();
                
                // localStorage에서 최고 점수 로드
                this.loadHighScore();
                
                // 사운드 초기화
                this.initAudio();
                
                // UI 업데이트
                this.updateUI();
            }
            
            // 화면 전환
            showScreen(screenId) {
                const screens = ['main-screen', 'game-screen', 'game-over-screen'];
                screens.forEach(id => {
                    const element = document.getElementById(id);
                    if (element) {
                        element.style.display = id === screenId ? 'block' : 'none';
                    }
                });
            }
            
            // 게임 보드 초기화
            initBoard() {
                this.gameBoard = [];
                for (let y = 0; y < this.boardHeight; y++) {
                    this.gameBoard[y] = [];
                    for (let x = 0; x < this.boardWidth; x++) {
                        this.gameBoard[y][x] = null;
                    }
                }
            }
            
            // 이벤트 리스너 설정
            setupEventListeners() {
                // 키보드 이벤트
                document.addEventListener('keydown', (e) => {
                    if (!this.gameRunning || this.gameOver) return;
                    
                    switch(e.code) {
                        case 'ArrowLeft':
                            this.movePiece(-1, 0);
                            e.preventDefault();
                            break;
                        case 'ArrowRight':
                            this.movePiece(1, 0);
                            e.preventDefault();
                            break;
                        case 'ArrowDown':
                            this.movePiece(0, 1);
                            e.preventDefault();
                            break;
                        case 'ArrowUp':
                        case 'Space':
                            this.rotatePiece();
                            e.preventDefault();
                            break;
                    }
                });
                
                // 모바일 컨트롤 이벤트
                const moveLeft = document.getElementById('move-left');
                const moveRight = document.getElementById('move-right');
                const moveDown = document.getElementById('move-down');
                const rotate = document.getElementById('rotate');
                
                if (moveLeft) moveLeft.addEventListener('click', () => this.movePiece(-1, 0));
                if (moveRight) moveRight.addEventListener('click', () => this.movePiece(1, 0));
                if (moveDown) moveDown.addEventListener('click', () => this.movePiece(0, 1));
                if (rotate) rotate.addEventListener('click', () => this.rotatePiece());
                
                // 터치 이벤트 (스와이프)
                let touchStartX = 0;
                let touchStartY = 0;
                
                if (this.canvas) {
                    this.canvas.addEventListener('touchstart', (e) => {
                        touchStartX = e.touches[0].clientX;
                        touchStartY = e.touches[0].clientY;
                        e.preventDefault();
                    });
                    
                    this.canvas.addEventListener('touchend', (e) => {
                        if (!this.gameRunning || this.gameOver) return;
                        
                        const touchEndX = e.changedTouches[0].clientX;
                        const touchEndY = e.changedTouches[0].clientY;
                        const deltaX = touchEndX - touchStartX;
                        const deltaY = touchEndY - touchStartY;
                        
                        if (Math.abs(deltaX) > Math.abs(deltaY)) {
                            if (deltaX > 30) this.movePiece(1, 0);
                            else if (deltaX < -30) this.movePiece(-1, 0);
                        } else {
                            if (deltaY > 30) this.movePiece(0, 1);
                            else if (deltaY < -30) this.rotatePiece();
                        }
                        e.preventDefault();
                    });
                }
            }
            
            // 사운드 초기화
            initAudio() {
                try {
                    this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
                } catch (e) {
                    console.warn('Web Audio API not supported');
                }
            }
            
            // 사운드 재생
            playSound(frequency, duration) {
                if (!this.audioContext) return;
                
                try {
                    const oscillator = this.audioContext.createOscillator();
                    const gainNode = this.audioContext.createGain();
                    
                    oscillator.connect(gainNode);
                    gainNode.connect(this.audioContext.destination);
                    
                    oscillator.frequency.setValueAtTime(frequency, this.audioContext.currentTime);
                    gainNode.gain.setValueAtTime(0.1, this.audioContext.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, this.audioContext.currentTime + duration);
                    
                    oscillator.start(this.audioContext.currentTime);
                    oscillator.stop(this.audioContext.currentTime + duration);
                } catch (e) {
                    console.warn('Sound playback failed');
                }
            }
            
            // 새로운 테트로미노 생성
            generateNewPiece() {
                const randomKey = this.pieceKeys[Math.floor(Math.random() * this.pieceKeys.length)];
                const pieceData = this.pieces[randomKey];
                
                return {
                    shape: JSON.parse(JSON.stringify(pieceData.shape)), // 깊은 복사
                    color: pieceData.color,
                    x: Math.floor(this.boardWidth / 2) - Math.floor(pieceData.shape[0].length / 2),
                    y: 0
                };
            }
            
            // 게임 시작
            startGame() {
                this.gameRunning = true;
                this.gameOver = false;
                this.score = 0;
                this.level = 1;
                this.linesCleared = 0;
                this.dropSpeed = 1000;
                
                this.initBoard();
                this.currentPiece = this.generateNewPiece();
                this.nextPiece = this.generateNewPiece();
                
                this.showScreen('game-screen');
                this.updateUI();
                this.gameLoop();
                this.playSound(440, 0.2); // 시작음
            }
            
            // 메인 게임 루프
            gameLoop(time = 0) {
                if (!this.gameRunning) return;
                
                const deltaTime = time - this.lastTime;
                this.lastTime = time;
                this.dropTime += deltaTime;
                
                // 블록 자동 하강
                if (this.dropTime >= this.dropSpeed) {
                    if (!this.movePiece(0, 1)) {
                        this.placePiece();
                    }
                    this.dropTime = 0;
                }
                
                this.render();
                this.updateUI();
                
                if (!this.gameOver) {
                    requestAnimationFrame((time) => this.gameLoop(time));
                }
            }
            
            // 테트로미노 이동
            movePiece(dx, dy) {
                if (!this.currentPiece) return false;
                
                const newX = this.currentPiece.x + dx;
                const newY = this.currentPiece.y + dy;
                
                if (this.isValidMove(this.currentPiece.shape, newX, newY)) {
                    this.currentPiece.x = newX;
                    this.currentPiece.y = newY;
                    return true;
                }
                return false;
            }
            
            // 테트로미노 회전
            rotatePiece() {
                if (!this.currentPiece) return;
                
                const rotatedShape = this.rotateMatrix(this.currentPiece.shape);
                if (this.isValidMove(rotatedShape, this.currentPiece.x, this.currentPiece.y)) {
                    this.currentPiece.shape = rotatedShape;
                    this.playSound(660, 0.1); // 회전음
                }
            }
            
            // 매트릭스 90도 회전
            rotateMatrix(matrix) {
                const rows = matrix.length;
                const cols = matrix[0].length;
                const rotated = [];
                
                for (let col = 0; col < cols; col++) {
                    rotated[col] = [];
                    for (let row = rows - 1; row >= 0; row--) {
                        rotated[col][rows - 1 - row] = matrix[row][col];
                    }
                }
                return rotated;
            }
            
            // 이동 유효성 검사
            isValidMove(shape, x, y) {
                for (let row = 0; row < shape.length; row++) {
                    for (let col = 0; col < shape[row].length; col++) {
                        if (shape[row][col]) {
                            const newX = x + col;
                            const newY = y + row;
                            
                            // 경계 체크
                            if (newX < 0 || newX >= this.boardWidth || 
                                newY >= this.boardHeight) {
                                return false;
                            }
                            
                            // 기존 블록과 충돌 체크
                            if (newY >= 0 && this.gameBoard[newY][newX]) {
                                return false;
                            }
                        }
                    }
                }
                return true;
            }
            
            // 테트로미노 배치
            placePiece() {
                if (!this.currentPiece) return;
                
                // 현재 블록을 게임 보드에 배치
                for (let row = 0; row < this.currentPiece.shape.length; row++) {
                    for (let col = 0; col < this.currentPiece.shape[row].length; col++) {
                        if (this.currentPiece.shape[row][col]) {
                            const x = this.currentPiece.x + col;
                            const y = this.currentPiece.y + row;
                            
                            if (y < 0) {
                                // 게임 오버
                                this.endGame();
                                return;
                            }
                            
                            this.gameBoard[y][x] = this.currentPiece.color;
                        }
                    }
                }
                
                // 완성된 라인 확인 및 제거
                this.clearLines();
                
                // 다음 블록으로 전환
                this.currentPiece = this.nextPiece;
                this.nextPiece = this.generateNewPiece();
                
                this.playSound(330, 0.1); // 배치음
            }
            
            // 완성된 라인 제거
            clearLines() {
                const linesToClear = [];
                
                // 완성된 라인 찾기
                for (let y = 0; y < this.boardHeight; y++) {
                    let isComplete = true;
                    for (let x = 0; x < this.boardWidth; x++) {
                        if (!this.gameBoard[y][x]) {
                            isComplete = false;
                            break;
                        }
                    }
                    if (isComplete) {
                        linesToClear.push(y);
                    }
                }
                
                if (linesToClear.length > 0) {
                    // 라인 클리어 이펙트
                    this.showClearEffect(linesToClear);
                    
                    // 라인 제거 및 점수 계산
                    setTimeout(() => {
                        this.removeClearedLines(linesToClear);
                        this.updateScore(linesToClear.length);
                        this.updateLevel();
                    }, 300);
                }
            }
            
            // 라인 클리어 이펙트
            showClearEffect(lines) {
                this.clearingLines = lines;
                const effect = document.getElementById('line-clear-effect');
                if (effect) {
                    effect.classList.add('active');
                    setTimeout(() => {
                        effect.classList.remove('active');
                    }, 300);
                }
                this.playSound(880, 0.3); // 클리어음
            }
            
            // 클리어된 라인 제거
            removeClearedLines(lines) {
                lines.sort((a, b) => b - a); // 역순으로 정렬
                
                for (let lineIndex of lines) {
                    this.gameBoard.splice(lineIndex, 1);
                    this.gameBoard.unshift(new Array(this.boardWidth).fill(null));
                }
                
                this.clearingLines = null;
            }
            
            // 점수 업데이트
            updateScore(linesCount) {
                const scoreTable = [0, 100, 300, 500, 800];
                this.score += scoreTable[linesCount] * this.level;
                this.linesCleared += linesCount;
            }
            
            // 레벨 업데이트
            updateLevel() {
                const newLevel = Math.min(5, Math.floor(this.linesCleared / 10) + 1);
                if (newLevel > this.level) {
                    this.level = newLevel;
                    // 매 레벨마다 5% 속도 증가
                    this.dropSpeed = 1000 * Math.pow(0.95, this.level - 1);
                    this.showLevelUpEffect();
                    this.playSound(1100, 0.5); // 레벨업음
                }
            }
            
            // 레벨업 이펙트
            showLevelUpEffect() {
                const effect = document.getElementById('level-up-effect');
                if (effect) {
                    effect.style.opacity = '1';
                    effect.style.animation = 'none';
                    setTimeout(() => {
                        effect.style.animation = 'levelUpAnim 2s ease-out';
                    }, 10);
                    setTimeout(() => {
                        effect.style.opacity = '0';
                    }, 2000);
                }
            }
            
            // UI 업데이트
            updateUI() {
                const scoreDisplay = document.getElementById('score-display');
                const levelDisplay = document.getElementById('level-display');
                const linesDisplay = document.getElementById('lines-display');
                const highScoreDisplay = document.getElementById('high-score-display');
                
                if (scoreDisplay) scoreDisplay.textContent = this.score;
                if (levelDisplay) levelDisplay.textContent = this.level;
                if (linesDisplay) linesDisplay.textContent = this.linesCleared;
                if (highScoreDisplay) highScoreDisplay.textContent = this.loadHighScore();
            }
            
            // 게임 종료
            endGame() {
                this.gameOver = true;
                this.gameRunning = false;
                this.saveHighScore();
                
                const finalScoreDisplay = document.getElementById('final-score-display');
                if (finalScoreDisplay) {
                    finalScoreDisplay.textContent = `최종 점수: ${this.score}`;
                }
                
                this.showScreen('game-over-screen');
                this.playSound(220, 1.0); // 게임오버음
            }
            
            // 최고 점수 저장
            saveHighScore() {
                try {
                    const highScore = localStorage.getItem('jinjoongTetrisHighScore') || 0;
                    if (this.score > highScore) {
                        localStorage.setItem('jinjoongTetrisHighScore', this.score);
                    }
                } catch (e) {
                    console.warn('LocalStorage not available');
                }
            }
            
            // 최고 점수 로드
            loadHighScore() {
                try {
                    return localStorage.getItem('jinjoongTetrisHighScore') || 0;
                } catch (e) {
                    console.warn('LocalStorage not available');
                    return 0;
                }
            }
            
            // 렌더링
            render() {
                if (!this.canvas || !this.ctx) return;
                
                // 캔버스 클리어
                this.ctx.fillStyle = '#000000';
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                
                // 격자 그리기
                this.ctx.strokeStyle = '#333333';
                this.ctx.lineWidth = 1;
                for (let x = 0; x <= this.boardWidth; x++) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(x * this.cellSize, 0);
                    this.ctx.lineTo(x * this.cellSize, this.boardHeight * this.cellSize);
                    this.ctx.stroke();
                }
                for (let y = 0; y <= this.boardHeight; y++) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(0, y * this.cellSize);
                    this.ctx.lineTo(this.boardWidth * this.cellSize, y * this.cellSize);
                    this.ctx.stroke();
                }
                
                // 배치된 블록들 그리기
                for (let y = 0; y < this.boardHeight; y++) {
                    for (let x = 0; x < this.boardWidth; x++) {
                        if (this.gameBoard[y][x]) {
                            this.drawCell(x, y, this.gameBoard[y][x]);
                        }
                    }
                }
                
                // 라인 클리어 이펙트
                if (this.clearingLines) {
                    this.ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
                    for (let line of this.clearingLines) {
                        this.ctx.fillRect(0, line * this.cellSize, this.boardWidth * this.cellSize, this.cellSize);
                    }
                }
                
                // 현재 블록 그리기
                if (this.currentPiece && !this.gameOver) {
                    this.drawPiece(this.currentPiece);
                }
            }
            
            // 셀 그리기
            drawCell(x, y, color) {
                const pixelX = x * this.cellSize;
                const pixelY = y * this.cellSize;
                
                // 블록 채우기
                this.ctx.fillStyle = color;
                this.ctx.fillRect(pixelX + 1, pixelY + 1, this.cellSize - 2, this.cellSize - 2);
                
                // 테두리
                this.ctx.strokeStyle = '#FFFFFF';
                this.ctx.lineWidth = 2;
                this.ctx.strokeRect(pixelX + 1, pixelY + 1, this.cellSize - 2, this.cellSize - 2);
            }
            
            // 테트로미노 그리기
            drawPiece(piece) {
                for (let row = 0; row < piece.shape.length; row++) {
                    for (let col = 0; col < piece.shape[row].length; col++) {
                        if (piece.shape[row][col]) {
                            const x = piece.x + col;
                            const y = piece.y + row;
                            if (y >= 0) {
                                this.drawCell(x, y, piece.color);
                            }
                        }
                    }
                }
            }
        }

        // 게임 인스턴스 생성 및 이벤트 리스너
        let game;

        document.addEventListener('DOMContentLoaded', () => {
            game = new JinJoongTetris();
            
            // 시작 버튼 이벤트
            const startBtn = document.getElementById('startBtn');
            if (startBtn) {
                startBtn.addEventListener('click', () => {
                    if (game.audioContext && game.audioContext.state === 'suspended') {
                        game.audioContext.resume();
                    }
                    game.startGame();
                });
            }
            
            // 재시작 버튼 이벤트
            const restartBtn = document.getElementById('restart-btn');
            if (restartBtn) {
                restartBtn.addEventListener('click', () => {
                    game.startGame();
                });
            }
            
            // 메인 메뉴 버튼 이벤트
            const mainMenuBtn = document.getElementById('main-menu-btn');
            if (mainMenuBtn) {
                mainMenuBtn.addEventListener('click', () => {
                    game.showScreen('main-screen');
                });
            }
            
            // 재시작 키
            document.addEventListener('keydown', (e) => {
                if (e.code === 'KeyR' && game && game.gameOver) {
                    game.startGame();
                }
            });
        });

        // 터치 스크롤 방지
        document.addEventListener('touchmove', (e) => {
            if (e.target.tagName === 'CANVAS') {
                e.preventDefault();
            }
        }, { passive: false });
    </script>
</body>
</html>
