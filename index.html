<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>교보로 테트리스</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Roboto+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #2E86AB;
            --secondary-color: #A23B72;
            --background-color: #F18F01;
            --accent-color: #C73E1D;
            --dark-bg: #0f1419;
            --game-board-bg: #1a1a1a;
            --grid-color: #444444;
            --neon-blue: #00ffff;
            --neon-pink: #ff00ff;
            --white: #ffffff;
            --success-color: #00ff00;
            --danger-color: #ff4444;
            --tetro-i: #00ffff;
            --tetro-o: #ffff00;
            --tetro-t: #aa00ff;
            --tetro-s: #00ff00;
            --tetro-z: #ff0000;
            --tetro-j: #0000ff;
            --tetro-l: #ff8800;
            --font-title: 'Orbitron', monospace;
            --font-mono: 'Roboto Mono', monospace;
            --block-size: 20px;
            --board-width: 200px;
            --board-height: 400px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-mono);
            background: linear-gradient(180deg, var(--dark-bg) 0%, #1a2332 100%);
            color: var(--white);
            overflow: hidden;
            height: 100vh;
            user-select: none;
        }

        .starfield {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: var(--white);
            border-radius: 50%;
            animation: starMove 20s linear infinite;
        }

        @keyframes starMove {
            0% { transform: translateX(-100px); }
            100% { transform: translateX(calc(100vw + 100px)); }
        }

        .game-container {
            width: 100vw;
            height: 100vh;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .screen {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.5s ease-in-out;
        }

        .screen.active {
            opacity: 1;
            visibility: visible;
        }

        .main-screen {
            background: radial-gradient(circle at center, rgba(46, 134, 171, 0.1) 0%, transparent 70%);
        }

        .main-content {
            text-align: center;
            animation: fadeInUp 1s ease-out;
        }

        @keyframes fadeInUp {
            0% { opacity: 0; transform: translateY(50px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .game-title {
            font-family: var(--font-title);
            font-size: 4rem;
            font-weight: 900;
            margin-bottom: 1rem;
            text-shadow: 0 0 20px var(--neon-blue);
        }

        .title-main {
            color: var(--primary-color);
            display: block;
        }

        .title-sub {
            color: var(--neon-blue);
            font-size: 3rem;
            letter-spacing: 0.5rem;
        }

        .game-subtitle {
            font-size: 1.2rem;
            color: var(--background-color);
            margin-bottom: 3rem;
            font-weight: 300;
        }

        .controls-guide {
            margin-top: 3rem;
            text-align: left;
            display: inline-block;
        }

        .controls-guide h3 {
            color: var(--accent-color);
            margin-bottom: 1rem;
            text-align: center;
        }

        .control-item {
            display: flex;
            align-items: center;
            margin: 0.5rem 0;
            font-size: 1rem;
        }

        .key {
            display: inline-block;
            padding: 0.3rem 0.8rem;
            background: var(--game-board-bg);
            border: 2px solid var(--primary-color);
            border-radius: 5px;
            margin-right: 1rem;
            min-width: 3rem;
            text-align: center;
            font-weight: bold;
            box-shadow: 0 0 10px rgba(46, 134, 171, 0.3);
        }

        .neon-button {
            font-family: var(--font-mono);
            font-weight: 700;
            font-size: 1.2rem;
            padding: 1rem 2rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }

        .neon-button.primary {
            background: var(--primary-color);
            color: var(--white);
            box-shadow: 0 0 20px rgba(46, 134, 171, 0.5);
        }

        .neon-button.secondary {
            background: var(--secondary-color);
            color: var(--white);
            box-shadow: 0 0 20px rgba(162, 59, 114, 0.5);
        }

        .neon-button.danger {
            background: var(--danger-color);
            color: var(--white);
            box-shadow: 0 0 20px rgba(255, 68, 68, 0.5);
        }

        .neon-button.small {
            font-size: 0.9rem;
            padding: 0.7rem 1.5rem;
        }

        .neon-button:hover {
            transform: translateY(-2px);
            filter: brightness(1.2);
        }

        .neon-button:active {
            transform: translateY(0);
        }

        .game-screen {
            padding: 2rem;
        }

        .game-layout {
            display: flex;
            gap: 3rem;
            align-items: flex-start;
            max-width: 800px;
            width: 100%;
        }

        .game-board-area {
            position: relative;
        }

        .game-board {
            width: var(--board-width);
            height: var(--board-height);
            background: var(--game-board-bg);
            border: 3px solid var(--neon-blue);
            border-radius: 10px;
            position: relative;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.5), inset 0 0 20px rgba(0, 255, 255, 0.1);
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            grid-template-rows: repeat(20, 1fr);
        }

        .board-cell {
            width: var(--block-size);
            height: var(--block-size);
            border: 1px solid var(--grid-color);
            box-sizing: border-box;
        }

        .board-cell.filled {
            border: 2px solid;
            border-radius: 3px;
            box-shadow: inset 0 0 10px rgba(255, 255, 255, 0.2);
        }

        .line-clear-effect {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: var(--block-size);
            background: var(--white);
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .line-clear-effect.active {
            opacity: 0.8;
        }

        .game-info-area {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            min-width: 200px;
        }

        .info-panel {
            background: rgba(26, 26, 26, 0.8);
            border: 2px solid var(--primary-color);
            border-radius: 10px;
            padding: 1rem;
            box-shadow: 0 0 15px rgba(46, 134, 171, 0.3);
        }

        .panel-title {
            font-family: var(--font-title);
            font-size: 1rem;
            color: var(--neon-blue);
            text-align: center;
            margin-bottom: 0.5rem;
        }

        .stage-display, .score-display, .lines-display {
            font-family: var(--font-title);
            font-size: 2rem;
            font-weight: bold;
            text-align: center;
            color: var(--white);
        }

        .stage-progress {
            width: 100%;
            height: 8px;
            background: var(--game-board-bg);
            border-radius: 4px;
            overflow: hidden;
            margin-top: 0.5rem;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--neon-blue));
            width: 0%;
            transition: width 0.3s ease;
        }

        .next-block-container {
            width: 80px;
            height: 80px;
            background: var(--game-board-bg);
            border: 1px solid var(--grid-color);
            border-radius: 5px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 1fr);
        }

        .game-controls {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .result-screen {
            background: rgba(15, 20, 25, 0.9);
        }

        .result-content {
            text-align: center;
            background: rgba(26, 26, 26, 0.9);
            border: 3px solid var(--primary-color);
            border-radius: 20px;
            padding: 3rem;
            box-shadow: 0 0 50px rgba(46, 134, 171, 0.5);
        }

        .result-title {
            font-family: var(--font-title);
            font-size: 3rem;
            font-weight: 900;
            margin-bottom: 2rem;
            color: var(--accent-color);
            text-shadow: 0 0 20px var(--accent-color);
        }

        .result-stats {
            margin-bottom: 2rem;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 1rem 0;
            font-size: 1.2rem;
        }

        .stat-label {
            color: var(--background-color);
        }

        .stat-value {
            font-family: var(--font-title);
            font-weight: bold;
            color: var(--white);
        }

        .result-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-content {
            background: var(--game-board-bg);
            border: 3px solid var(--primary-color);
            border-radius: 15px;
            padding: 2rem;
            text-align: center;
            box-shadow: 0 0 30px rgba(46, 134, 171, 0.5);
        }

        .modal-title {
            font-family: var(--font-title);
            font-size: 2rem;
            margin-bottom: 1.5rem;
            color: var(--neon-blue);
        }

        .modal-buttons {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 768px) {
            .game-layout {
                flex-direction: column;
                align-items: center;
                gap: 1rem;
            }
            
            .game-title {
                font-size: 2.5rem;
            }
            
            .title-sub {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div id="starfield" class="starfield"></div>

    <div id="gameContainer" class="game-container">
        <div id="mainScreen" class="screen main-screen active">
            <div class="main-content">
                <h1 class="game-title">
                    <span class="title-main">교보로</span>
                    <span class="title-sub">TETRIS</span>
                </h1>
                <p class="game-subtitle">7단계 스테이지를 정복하세요!</p>
                <button id="startButton" class="neon-button primary">
                    🚀 START GAME
                </button>
                <div class="controls-guide">
                    <h3>🎮 조작법</h3>
                    <div class="control-item">
                        <span class="key">←→</span> 좌우 이동
                    </div>
                    <div class="control-item">
                        <span class="key">↑</span> 회전
                    </div>
                    <div class="control-item">
                        <span class="key">↓</span> 빠른 낙하
                    </div>
                </div>
            </div>
        </div>

        <div id="gameScreen" class="screen game-screen">
            <div class="game-layout">
                <div class="game-board-area">
                    <div id="gameBoard" class="game-board"></div>
                    <div id="lineClearEffect" class="line-clear-effect hidden"></div>
                </div>

                <div class="game-info-area">
                    <div class="info-panel score-panel">
                        <h3 class="panel-title">STAGE</h3>
                        <div id="currentStage" class="stage-display">1</div>
                        <div class="stage-progress">
                            <div id="stageProgress" class="progress-bar"></div>
                        </div>
                    </div>

                    <div class="info-panel score-panel">
                        <h3 class="panel-title">SCORE</h3>
                        <div id="currentScore" class="score-display">0</div>
                    </div>

                    <div class="info-panel lines-panel">
                        <h3 class="panel-title">LINES</h3>
                        <div id="clearedLines" class="lines-display">0</div>
                    </div>

                    <div class="info-panel next-panel">
                        <h3 class="panel-title">NEXT</h3>
                        <div id="nextBlock" class="next-block-container"></div>
                    </div>

                    <div class="game-controls">
                        <button id="pauseButton" class="neon-button secondary small">⏸️ PAUSE</button>
                        <button id="quitButton" class="neon-button danger small">🚪 QUIT</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="resultScreen" class="screen result-screen">
            <div class="result-content">
                <div id="resultTitle" class="result-title">GAME OVER</div>
                <div class="result-stats">
                    <div class="stat-item">
                        <span class="stat-label">최종 점수</span>
                        <span id="finalScore" class="stat-value">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">도달 스테이지</span>
                        <span id="finalStage" class="stat-value">1</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">클리어 라인</span>
                        <span id="finalLines" class="stat-value">0</span>
                    </div>
                </div>
                <div class="result-buttons">
                    <button id="restartButton" class="neon-button primary">🔄 RESTART</button>
                    <button id="homeButton" class="neon-button secondary">🏠 HOME</button>
                </div>
            </div>
        </div>

        <div id="pauseModal" class="modal-overlay hidden">
            <div class="modal-content">
                <h2 class="modal-title">⏸️ PAUSED</h2>
                <div class="modal-buttons">
                    <button id="resumeButton" class="neon-button primary">▶️ RESUME</button>
                    <button id="restartFromPause" class="neon-button secondary">🔄 RESTART</button>
                    <button id="quitFromPause" class="neon-button danger">🚪 QUIT</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        class TetrisGame {
            constructor() {
                this.BOARD_WIDTH = 10;
                this.BOARD_HEIGHT = 20;
                this.BLOCK_SIZE = 20;
                this.INITIAL_SPEED = 1000;
                this.SPEED_INCREASE = 0.03;
                
                this.gameState = 'MENU';
                this.currentStage = 1;
                this.maxStage = 7;
                this.score = 0;
                this.linesCleared = 0;
                this.gameSpeed = this.INITIAL_SPEED;
                
                this.board = this.createEmptyBoard();
                this.currentPiece = null;
                this.nextPiece = null;
                
                this.lastTime = 0;
                this.dropTimer = 0;
                this.keys = {};
                
                this.tetrominoes = {
                    'I': { shape: [[1, 1, 1, 1]], color: '#00FFFF' },
                    'O': { shape: [[1, 1], [1, 1]], color: '#FFFF00' },
                    'T': { shape: [[0, 1, 0], [1, 1, 1]], color: '#800080' },
                    'S': { shape: [[0, 1, 1], [1, 1, 0]], color: '#00FF00' },
                    'Z': { shape: [[1, 1, 0], [0, 1, 1]], color: '#FF0000' },
                    'J': { shape: [[1, 0, 0], [1, 1, 1]], color: '#0000FF' },
                    'L': { shape: [[0, 0, 1], [1, 1, 1]], color: '#FFA500' }
                };
                
                this.lineScores = { 1: 100, 2: 300, 3: 500, 4: 800 };
                this.init();
            }
            
            init() {
                this.setupEventListeners();
                this.createStarfield();
                this.createGameBoard();
            }
            
            createEmptyBoard() {
                return Array(this.BOARD_HEIGHT).fill().map(() => Array(this.BOARD_WIDTH).fill(0));
            }
            
            createStarfield() {
                const starfield = document.getElementById('starfield');
                for (let i = 0; i < 30; i++) {
                    const star = document.createElement('div');
                    star.className = 'star';
                    star.style.top = Math.random() * 100 + '%';
                    star.style.left = '-10px';
                    star.style.opacity = Math.random() * 0.5 + 0.3;
                    star.style.animationDelay = Math.random() * 20 + 's';
                    starfield.appendChild(star);
                }
            }
            
            createGameBoard() {
                const board = document.getElementById('gameBoard');
                board.innerHTML = '';
                for (let row = 0; row < this.BOARD_HEIGHT; row++) {
                    for (let col = 0; col < this.BOARD_WIDTH; col++) {
                        const cell = document.createElement('div');
                        cell.className = 'board-cell';
                        cell.id = `cell-${row}-${col}`;
                        board.appendChild(cell);
                    }
                }
            }
            
            setupEventListeners() {
                document.addEventListener('keydown', (e) => {
                    this.keys[e.code] = true;
                    this.handleInput(e.code, true);
                });
                
                document.addEventListener('keyup', (e) => {
                    this.keys[e.code] = false;
                });
                
                document.getElementById('startButton').addEventListener('click', () => this.startGame());
                document.getElementById('restartButton').addEventListener('click', () => this.startGame());
                document.getElementById('homeButton').addEventListener('click', () => this.showMenu());
                document.getElementById('pauseButton').addEventListener('click', () => this.pauseGame());
                document.getElementById('quitButton').addEventListener('click', () => this.showMenu());
                document.getElementById('resumeButton').addEventListener('click', () => this.pauseGame());
                document.getElementById('restartFromPause').addEventListener('click', () => this.startGame());
                document.getElementById('quitFromPause').addEventListener('click', () => this.showMenu());
            }
            
            handleInput(keyCode, isPressed) {
                if (this.gameState !== 'PLAYING' || !isPressed) return;
                
                switch (keyCode) {
                    case 'ArrowLeft':
                        this.movePiece(-1, 0);
                        break;
                    case 'ArrowRight':
                        this.movePiece(1, 0);
                        break;
                    case 'ArrowDown':
                        this.movePiece(0, 1);
                        break;
                    case 'ArrowUp':
                        this.rotatePiece();
                        break;
                    case 'Space':
                        this.dropPiece();
                        break;
                    case 'Escape':
                        this.pauseGame();
                        break;
                }
            }
            
            startGame() {
                this.gameState = 'PLAYING';
                this.currentStage = 1;
                this.score = 0;
                this.linesCleared = 0;
                this.gameSpeed = this.INITIAL_SPEED;
                this.board = this.createEmptyBoard();
                
                this.spawnNewPiece();
                this.spawnNewPiece();
                
                this.showGameScreen();
                this.updateDisplay();
                
                this.lastTime = performance.now();
                this.gameLoop();
            }
            
            spawnNewPiece() {
                if (!this.nextPiece) {
                    this.currentPiece = this.createRandomPiece();
                } else {
                    this.currentPiece = this.nextPiece;
                }
                
                this.nextPiece = this.createRandomPiece();
                this.updateNextPieceDisplay();
                
                if (this.isCollision(this.currentPiece.x, this.currentPiece.y, this.currentPiece.shape)) {
                    this.gameOver();
                }
            }
            
            createRandomPiece() {
                const types = Object.keys(this.tetrominoes);
                const randomType = types[Math.floor(Math.random() * types.length)];
                const tetromino = this.tetrominoes[randomType];
                
                return {
                    type: randomType,
                    shape: tetromino.shape.map(row => [...row]),
                    color: tetromino.color,
                    x: Math.floor(this.BOARD_WIDTH / 2) - Math.floor(tetromino.shape[0].length / 2),
                    y: 0
                };
            }
            
            movePiece(dx, dy) {
                if (!this.currentPiece) return;
                
                const newX = this.currentPiece.x + dx;
                const newY = this.currentPiece.y + dy;
                
                if (!this.isCollision(newX, newY, this.currentPiece.shape)) {
                    this.currentPiece.x = newX;
                    this.currentPiece.y = newY;
                    return true;
                }
                
                if (dy > 0) {
                    this.placePiece();
                }
                
                return false;
            }
            
            rotatePiece() {
                if (!this.currentPiece) return;
                
                const rotated = this.rotateMatrix(this.currentPiece.shape);
                
                if (!this.isCollision(this.currentPiece.x, this.currentPiece.y, rotated)) {
                    this.currentPiece.shape = rotated;
                }
            }
            
            rotateMatrix(matrix) {
                const rows = matrix.length;
                const cols = matrix[0].length;
                const rotated = Array(cols).fill().map(() => Array(rows).fill(0));
                
                for (let i = 0; i < rows; i++) {
                    for (let j = 0; j < cols; j++) {
                        rotated[j][rows - 1 - i] = matrix[i][j];
                    }
                }
                
                return rotated;
            }
            
            dropPiece() {
                if (!this.currentPiece) return;
                
                while (this.movePiece(0, 1)) {}
            }
            
            isCollision(x, y, shape) {
                for (let row = 0; row < shape.length; row++) {
                    for (let col = 0; col < shape[row].length; col++) {
                        if (shape[row][col]) {
                            const newX = x + col;
                            const newY = y + row;
                            
                            if (newX < 0 || newX >= this.BOARD_WIDTH || newY >= this.BOARD_HEIGHT) {
                                return true;
                            }
                            
                            if (newY >= 0 && this.board[newY][newX]) {
                                return true;
                            }
                        }
                    }
                }
                return false;
            }
            
            placePiece() {
                if (!this.currentPiece) return;
                
                const { x, y, shape, color } = this.currentPiece;
                
                for (let row = 0; row < shape.length; row++) {
                    for (let col = 0; col < shape[row].length; col++) {
                        if (shape[row][col]) {
                            const boardX = x + col;
                            const boardY = y + row;
                            
                            if (boardY >= 0) {
                                this.board[boardY][boardX] = color;
                            }
                        }
                    }
                }
                
                const clearedLines = this.clearLines();
                if (clearedLines > 0) {
                    this.updateScore(clearedLines);
                    this.checkStageUp();
                }
                
                this.spawnNewPiece();
            }
            
            clearLines() {
                let clearedCount = 0;
                
                for (let row = this.BOARD_HEIGHT - 1; row >= 0; row--) {
                    if (this.board[row].every(cell => cell !== 0)) {
                        this.showLineClearEffect(row);
                        
                        this.board.splice(row, 1);
                        this.board.unshift(Array(this.BOARD_WIDTH).fill(0));
                        
                        clearedCount++;
                        row++;
                    }
                }
                
                return clearedCount;
            }
            
            showLineClearEffect(row) {
                const effect = document.getElementById('lineClearEffect');
                effect.style.top = (row * this.BLOCK_SIZE) + 'px';
                effect.classList.remove('hidden');
                effect.classList.add('active');
                
                setTimeout(() => {
                    effect.classList.remove('active');
                    effect.classList.add('hidden');
                }, 200);
            }
            
            updateScore(clearedLines) {
                const baseScore = this.lineScores[clearedLines] || 0;
                const stageMultiplier = this.currentStage;
                this.score += baseScore * stageMultiplier;
                this.linesCleared += clearedLines;
            }
            
            checkStageUp() {
                const requiredLines = this.currentStage * 10;
                
                if (this.linesCleared >= requiredLines && this.currentStage < this.maxStage) {
                    this.currentStage++;
                    this.gameSpeed *= (1 - this.SPEED_INCREASE);
                    this.showStageUpEffect();
                }
                
                if (this.currentStage > this.maxStage) {
                    this.gameWin();
                }
            }
            
            showStageUpEffect() {
                document.body.style.background = 'linear-gradient(180deg, #0066ff 0%, #1a2332 100%)';
                setTimeout(() => {
                    document.body.style.background = 'linear-gradient(180deg, #0f1419 0%, #1a2332 100%)';
                }, 500);
            }
            
            gameLoop(currentTime = 0) {
                if (this.gameState !== 'PLAYING') return;
                
                const deltaTime = currentTime - this.lastTime;
                this.lastTime = currentTime;
                
                this.dropTimer += deltaTime;
                
                if (this.dropTimer > this.gameSpeed) {
                    this.movePiece(0, 1);
                    this.dropTimer = 0;
                }
                
                this.render();
                requestAnimationFrame((time) => this.gameLoop(time));
            }
            
            render() {
                this.clearBoard();
                this.drawBoard();
                this.drawCurrentPiece();
                this.updateDisplay();
            }
            
            clearBoard() {
                for (let row = 0; row < this.BOARD_HEIGHT; row++) {
                    for (let col = 0; col < this.BOARD_WIDTH; col++) {
                        const cell = document.getElementById(`cell-${row}-${col}`);
                        cell.style.backgroundColor = '';
                        cell.classList.remove('filled');
                    }
                }
            }
            
            drawBoard() {
                for (let row = 0; row < this.BOARD_HEIGHT; row++) {
                    for (let col = 0; col < this.BOARD_WIDTH; col++) {
                        if (this.board[row][col]) {
                            const cell = document.getElementById(`cell-${row}-${col}`);
                            cell.style.backgroundColor = this.board[row][col];
                            cell.classList.add('filled');
                        }
                    }
                }
            }
            
            drawCurrentPiece() {
                if (!this.currentPiece) return;
                
                const { x, y, shape, color } = this.currentPiece;
                
                for (let row = 0; row < shape.length; row++) {
                    for (let col = 0; col < shape[row].length; col++) {
                        if (shape[row][col]) {
                            const boardX = x + col;
                            const boardY = y + row;
                            
                            if (boardX >= 0 && boardX < this.BOARD_WIDTH && 
                                boardY >= 0 && boardY < this.BOARD_HEIGHT) {
                                const cell = document.getElementById(`cell-${boardY}-${boardX}`);
                                cell.style.backgroundColor = color;
                                cell.classList.add('filled');
                            }
                        }
                    }
                }
            }
            
            updateDisplay() {
                document.getElementById('currentStage').textContent = this.currentStage;
                document.getElementById('currentScore').textContent = this.score.toLocaleString();
                document.getElementById('clearedLines').textContent = this.linesCleared;
                
                const progress = (this.linesCleared % 10) / 10 * 100;
                document.getElementById('stageProgress').style.width = progress + '%';
            }
            
            updateNextPieceDisplay() {
                const container = document.getElementById('nextBlock');
                container.innerHTML = '';
                
                if (!this.nextPiece) return;
                
                const { shape, color } = this.nextPiece;
                
                for (let row = 0; row < 4; row++) {
                    for (let col = 0; col < 4; col++) {
                        const cell = document.createElement('div');
                        cell.style.width = '20px';
                        cell.style.height = '20px';
                        cell.style.border = '1px solid #444';
                        
                        if (shape[row] && shape[row][col]) {
                            cell.style.backgroundColor = color;
                            cell.style.border = '2px solid ' + color;
                            cell.style.borderRadius = '3px';
                        }
                        
                        container.appendChild(cell);
                    }
                }
            }
            
            gameOver() {
                this.gameState = 'GAMEOVER';
                this.showResultScreen('GAME OVER');
            }
            
            gameWin() {
                this.gameState = 'WIN';
                this.showResultScreen('GAME CLEAR!');
            }
            
            pauseGame() {
                if (this.gameState === 'PLAYING') {
                    this.gameState = 'PAUSED';
                    document.getElementById('pauseModal').classList.remove('hidden');
                } else if (this.gameState === 'PAUSED') {
                    this.gameState = 'PLAYING';
                    document.getElementById('pauseModal').classList.add('hidden');
                    this.lastTime = performance.now();
                    this.gameLoop();
                }
            }
            
            showMenu() {
                this.gameState = 'MENU';
                document.getElementById('mainScreen').classList.add('active');
                document.getElementById('gameScreen').classList.remove('active');
                document.getElementById('resultScreen').classList.remove('active');
                document.getElementById('pauseModal').classList.add('hidden');
            }
            
            showGameScreen() {
                document.getElementById('mainScreen').classList.remove('active');
                document.getElementById('gameScreen').classList.add('active');
                document.getElementById('resultScreen').classList.remove('active');
                document.getElementById('pauseModal').classList.add('hidden');
            }
            
            showResultScreen(title) {
                document.getElementById('resultTitle').textContent = title;
                document.getElementById('finalScore').textContent = this.score.toLocaleString();
                document.getElementById('finalStage').textContent = this.currentStage;
                document.getElementById('finalLines').textContent = this.linesCleared;
                
                document.getElementById('mainScreen').classList.remove('active');
                document.getElementById('gameScreen').classList.remove('active');
                document.getElementById('resultScreen').classList.add('active');
                document.getElementById('pauseModal').classList.add('hidden');
            }
        }

        // 게임 인스턴스 생성 및 시작
        const game = new TetrisGame();
    </script>
</body>
